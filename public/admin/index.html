                        sponsors: d.sponsors.map((t, i) => i === ti ? { ...t, size: e.target.value } : t),
                      }))}>
                      <option value="xl">XL — Title Sponsor</option>
                      <option value="lg">Large — Featured</option>
                      <option value="md">Medium — Standard</option>
                      <option value="sm">Small — Activity</option>
                    </select>
                  </div>
                  <div style="display: flex; gap: 0.25rem; flex-shrink: 0; padding-bottom: 2px;">
                    <button class="btn btn-ghost btn-sm" style="color: var(--text-tertiary); font-size: 1.1rem; padding: 0.25rem 0.4rem;"
                      title="Move tier up" disabled=${ti === 0}
                      onClick=${() => setData(d => {
                        const s = [...d.sponsors];
                        [s[ti - 1], s[ti]] = [s[ti], s[ti - 1]];
                        return { ...d, sponsors: s };
                      })}>↑</button>
                    <button class="btn btn-ghost btn-sm" style="color: var(--text-tertiary); font-size: 1.1rem; padding: 0.25rem 0.4rem;"
                      title="Move tier down" disabled=${ti === (data.sponsors || []).length - 1}
                      onClick=${() => setData(d => {
                        const s = [...d.sponsors];
                        [s[ti], s[ti + 1]] = [s[ti + 1], s[ti]];
                        return { ...d, sponsors: s };
                      })}>↓</button>
                    <button class="btn btn-ghost btn-sm" style="color: #c62828; padding: 0.25rem 0.5rem;"
                      title="Remove this entire tier and all its sponsors"
                      onClick=${() => { if (confirm('Remove tier "' + (tier.tier || 'Untitled') + '" and all its sponsors?')) setData(d => ({ ...d, sponsors: d.sponsors.filter((_, i) => i !== ti) })); }}>✕</button>
                  </div>
                </div>

                <!-- Sponsor rows within this tier -->
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                  ${(tier.names || []).map((s, ni) => html`
                    <div style="display: flex; gap: 0.75rem; align-items: center; padding: 0.65rem 0.75rem; background: var(--bg-secondary); border-radius: 8px;">
                      <!-- Logo thumbnail + actions -->
                      <div style="flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 0.3rem;">
                        <div style="width: 56px; height: 56px; border-radius: 8px; background: var(--bg-primary); border: 1.5px dashed ${s.logo ? 'transparent' : 'var(--border)'}; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; transition: border-color 0.15s;"
                          onClick=${() => { setImagePickerTarget('sponsor:' + ti + ':' + ni); setShowImagePicker(true); }}
                          title="Browse existing images">
                          ${s.logo
                            ? html`<img src=${cfThumb(s.logo, 'w=112,h=112,fit=contain')} alt="" style="width: 100%; height: 100%; object-fit: contain; padding: 4px;" />`
                            : html`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--text-tertiary); opacity: 0.5;"><rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>`
                          }
                        </div>
                        <div style="display: flex; gap: 0.2rem;">
                          <button class="btn btn-ghost btn-sm" style="font-size: 0.6rem; padding: 0.1rem 0.35rem; color: var(--color-primary);"
                            title="Browse existing images"
                            onClick=${() => { setImagePickerTarget('sponsor:' + ti + ':' + ni); setShowImagePicker(true); }}>browse</button>
                          <label style="font-size: 0.6rem; padding: 0.1rem 0.35rem; color: var(--color-primary); cursor: pointer; font-weight: 600;" title="Upload a new logo">
                            upload
                            <input type="file" accept="image/*" style="display:none"
                              onChange=${(e) => { const f = e.target.files[0]; if (f) handleSponsorLogoUpload(f, ti, ni); e.target.value = ''; }} />
                          </label>
                        </div>
                      </div>
                      <!-- Name input -->
                      <div style="flex: 1; min-width: 0;">
                        <input class="form-input" placeholder="Company name" value=${s.name}
                          onInput=${(e) => setData(d => ({
                            ...d,
                            sponsors: d.sponsors.map((t, i) => i === ti
                              ? { ...t, names: t.names.map((n, j) => j === ni ? { ...n, name: e.target.value } : n) }
                              : t
                            ),
                          }))} />
                      </div>
                      <!-- Remove logo button -->
                      ${s.logo && html`
                        <button class="btn btn-ghost btn-sm" style="color: var(--text-tertiary); font-size: 0.72rem; padding: 0.2rem 0.5rem; white-space: nowrap;"
                          title="Remove logo (keep name)"
                          onClick=${() => setData(d => ({
                            ...d,
                            sponsors: d.sponsors.map((t, i) => i === ti
                              ? { ...t, names: t.names.map((n, j) => j === ni ? { name: n.name } : n) }
                              : t
                            ),
                          }))}>✕ logo</button>
                      `}
                      <!-- Remove sponsor button -->
                      <button class="btn btn-ghost btn-sm" style="color: var(--text-tertiary); padding: 0.2rem 0.4rem; font-size: 0.88rem;"
                        title="Remove this sponsor"
                        onClick=${() => setData(d => ({
                          ...d,
                          sponsors: d.sponsors.map((t, i) => i === ti
                            ? { ...t, names: t.names.filter((_, j) => j !== ni) }
                            : t
                          ),
                        }))}>✕</button>
                    </div>
                  `)}
                </div>

                <button class="btn btn-ghost btn-sm" style="margin-top: 0.6rem; color: var(--color-primary);"
                  onClick=${() => setData(d => ({
                    ...d,
                    sponsors: d.sponsors.map((t, i) => i === ti
                      ? { ...t, names: [...(t.names || []), { name: '' }] }
                      : t
                    ),
                  }))}>+ Add Sponsor${tier.tier ? ' to ' + tier.tier : ''}</button>
              </div>
            `)}
          `}

          ${activeTab === 'gallery' && html`
            <div class="card">
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <div>
                  <h2 class="card-title">Photo Gallery</h2>
                  <p class="card-subtitle">Photos shown in the scrolling gallery strip on the golf page.</p>
                </div>
                <button class="btn btn-primary btn-sm" onClick=${() => {
                  setData(d => ({ ...d, galleryPhotos: [...(d.galleryPhotos || []), { id: '', alt: '' }] }));
                  // Open picker for the newly added photo
                  setTimeout(() => {
                    setImagePickerTarget('gallery:' + (data.galleryPhotos || []).length);
                    setShowImagePicker(true);
                  }, 50);
                }}>+ Add Photo</button>
              </div>
              ${(data.galleryPhotos || []).length > 0 ? html`
                <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 0.75rem;">
                  ${(data.galleryPhotos || []).map((p, i) => html`
                    <div style="position: relative; border-radius: 10px; overflow: hidden; background: var(--bg-secondary); border: 1px solid var(--border);">
                      <div style="aspect-ratio: 4/3; cursor: pointer; display: flex; align-items: center; justify-content: center; background: var(--bg-primary);"
                        onClick=${() => { setImagePickerTarget('gallery:' + i); setShowImagePicker(true); }}>
                        ${p.id
                          ? html`<img src=${cfThumb(p.id, 'w=320,h=240,fit=cover')} alt=${p.alt || ''} style="width: 100%; height: 100%; object-fit: cover;" />`
                          : html`<span style="font-size: 0.7rem; color: var(--text-tertiary); text-align: center; padding: 0.5rem;">Click to<br/>choose image</span>`
                        }
                      </div>
                      <div style="padding: 0.5rem;">
                        <input class="form-input" placeholder="Alt text" value=${p.alt || ''} style="font-size: 0.82rem; padding: 0.35rem 0.5rem;"
                          onInput=${(e) => setData(d => ({ ...d, galleryPhotos: d.galleryPhotos.map((ph, j) => j === i ? { ...ph, alt: e.target.value } : ph) }))} />
                      </div>
                      <button style="position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; border-radius: 50%; background: rgba(0,0,0,0.6); color: #fff; border: none; cursor: pointer; font-size: 0.7rem; display: flex; align-items: center; justify-content: center;"
                        onClick=${() => setData(d => ({ ...d, galleryPhotos: d.galleryPhotos.filter((_, j) => j !== i) }))}>✕</button>
                    </div>
                  `)}
                </div>
              ` : html`
                <p style="text-align: center; color: var(--text-tertiary); padding: 2rem;">No gallery photos yet. Click "+ Add Photo" to browse and select images.</p>
              `}
            </div>
          `}

          <div class="editor-save-footer">
            <button class="btn btn-primary" onClick=${handleSave} disabled=${saving}>
              ${saving ? html`<span class="spinner" />` : null}
              ${saving ? 'Saving...' : 'Save & Publish'}
            </button>
          </div>
        </div>
      `;
    }

    // ═══════════════════════════════════════════
    // EVENING OF SUNSHINE GALA — admin editor
    // Loads + saves both the event JSON (date/location/ticket URL/etc.)
    // and gala.json (tiers/testimonial/FAQs/auction items/evening/sponsors)
    // ═══════════════════════════════════════════
    function GalaEditor({ slug, addToast, onBack }) {
      const eventPath = 'src/content/events/' + slug + '.json';
      const galaPath = 'src/content/site/gala.json';

      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [eventSha, setEventSha] = useState(null);
      const [galaSha, setGalaSha] = useState(null);
      const [eventData, setEventData] = useState(null);
      const [data, setData] = useState({
        testimonial: { quote: '', name: '', title: '' },
        faqs: [],
        sponsors: [],
        auctionItems: [],
        evening: [],
        galleryPhotos: [],
        tiers: { main: [], addons: [] },
      });
      const [activeTab, setActiveTab] = useState('event');
      const [showImagePicker, setShowImagePicker] = useState(false);
      const [imagePickerTarget, setImagePickerTarget] = useState(null);

      useEffect(() => {
        (async () => {
          try {
            const [evRes, galaRes] = await Promise.all([
              api.readContent(eventPath),
              api.readContent(galaPath),
            ]);
            if (evRes.success) {
              setEventData(JSON.parse(evRes.content));
              setEventSha(evRes.sha);
            }
            if (galaRes.success) {
              setData(prev => ({ ...prev, ...JSON.parse(galaRes.content) }));
              setGalaSha(galaRes.sha);
            }
          } catch {}
          setLoading(false);
        })();
      }, [slug]);

      const handleSave = async () => {
        setSaving(true);
        try {
          // Save both files in parallel; report combined result
          const [evRes, galaRes] = await Promise.all([
            eventData
              ? api.saveContent(eventPath, JSON.stringify(eventData, null, 2),
                  'Update gala event details', eventSha)
              : Promise.resolve({ success: true }),
            api.saveContent(galaPath, JSON.stringify(data, null, 2),
              'Update gala settings', galaSha),
          ]);
          if (evRes.success && evRes.sha) setEventSha(evRes.sha);
          if (galaRes.success && galaRes.sha) setGalaSha(galaRes.sha);
          if (evRes.success && galaRes.success) {
            addToast('Gala settings saved!', 'success');
            logActivity('updated', 'Gala Settings', '');
          } else {
            const err = evRes.error || galaRes.error || 'Unknown error';
            addToast('Save failed: ' + err, 'error');
          }
        } catch (err) {
          addToast('Error: ' + err.message, 'error');
        }
        setSaving(false);
      };

      const updateEvent = (field, value) => setEventData(d => ({ ...(d || {}), [field]: value }));

      const updateTier = (type, idx, field, value) => {
        setData(d => ({
          ...d,
          tiers: {
            ...(d.tiers || { main: [], addons: [] }),
            [type]: (d.tiers?.[type] || []).map((t, i) => i === idx ? { ...t, [field]: value } : t),
          },
        }));
      };
      const addTier = (type) => setData(d => ({
        ...d,
        tiers: {
          ...(d.tiers || { main: [], addons: [] }),
          [type]: [...(d.tiers?.[type] || []), { name: '', price: '', status: 'available' }],
        },
      }));
      const removeTier = (type, idx) => setData(d => ({
        ...d,
        tiers: {
          ...(d.tiers || { main: [], addons: [] }),
          [type]: (d.tiers?.[type] || []).filter((_, i) => i !== idx),
        },
      }));
      const moveTier = (type, from, to) => setData(d => {
        const arr = [...(d.tiers?.[type] || [])];
        if (to < 0 || to >= arr.length) return d;
        const [item] = arr.splice(from, 1);
        arr.splice(to, 0, item);
        return { ...d, tiers: { ...(d.tiers || { main: [], addons: [] }), [type]: arr } };
      });

      const addFaq = () => setData(d => ({ ...d, faqs: [...(d.faqs || []), { question: '', answer: '' }] }));
      const updateFaq = (idx, field, value) => setData(d => ({
        ...d,
        faqs: (d.faqs || []).map((f, i) => i === idx ? { ...f, [field]: value } : f),
      }));
      const removeFaq = idx => setData(d => ({ ...d, faqs: (d.faqs || []).filter((_, i) => i !== idx) }));

      const addAuctionItem = () => setData(d => ({ ...d, auctionItems: [...(d.auctionItems || []), { name: '', detail: '' }] }));
      const updateAuctionItem = (idx, field, value) => setData(d => ({
        ...d,
        auctionItems: (d.auctionItems || []).map((a, i) => i === idx ? { ...a, [field]: value } : a),
      }));
      const removeAuctionItem = idx => setData(d => ({ ...d, auctionItems: (d.auctionItems || []).filter((_, i) => i !== idx) }));

      const addEveningStep = () => setData(d => ({ ...d, evening: [...(d.evening || []), { time: '', title: '', detail: '' }] }));
      const updateEveningStep = (idx, field, value) => setData(d => ({
        ...d,
        evening: (d.evening || []).map((s, i) => i === idx ? { ...s, [field]: value } : s),
      }));
      const removeEveningStep = idx => setData(d => ({ ...d, evening: (d.evening || []).filter((_, i) => i !== idx) }));
      const moveEveningStep = (from, to) => setData(d => {
        const arr = [...(d.evening || [])];
        if (to < 0 || to >= arr.length) return d;
        const [item] = arr.splice(from, 1);
        arr.splice(to, 0, item);
        return { ...d, evening: arr };
      });

      const handleImageSelect = (id) => {
        if (!imagePickerTarget) return;
        const parts = imagePickerTarget.split(':');
        if (parts[0] === 'sponsor') {
          const tierIdx = parseInt(parts[1]);
          const nameIdx = parseInt(parts[2]);
          setData(d => ({
            ...d,
            sponsors: (d.sponsors || []).map((tier, ti) => ti === tierIdx
              ? { ...tier, names: tier.names.map((s, ni) => ni === nameIdx ? { ...s, logo: id } : s) }
              : tier
            ),
          }));
        } else if (parts[0] === 'gallery') {
          const idx = parseInt(parts[1]);
          setData(d => ({ ...d, galleryPhotos: (d.galleryPhotos || []).map((ph, j) => j === idx ? { ...ph, id } : ph) }));
        } else if (parts[0] === 'event-hero') {
          updateEvent('image', id);
        }
        setShowImagePicker(false);
        setImagePickerTarget(null);
      };

      const handleSponsorLogoUpload = async (file, tierIdx, nameIdx) => {
        const sponsorName = data.sponsors?.[tierIdx]?.names?.[nameIdx]?.name || 'sponsor';
        const sl = sponsorName.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
        const cfId = 'partners/' + sl + '/' + Date.now();
        try {
          const res = await api.uploadImage(file, cfId);
          if (res.success) {
            const logoId = res.imageUrl || cfId;
            setData(d => ({
              ...d,
              sponsors: d.sponsors.map((tier, ti) => ti === tierIdx
                ? { ...tier, names: tier.names.map((s, ni) => ni === nameIdx ? { ...s, logo: logoId } : s) }
                : tier
              ),
            }));
            addToast('Logo uploaded!', 'success');
          } else {
            addToast('Upload failed: ' + (res.error || 'Unknown error'), 'error');
          }
        } catch (err) {
          addToast('Upload error: ' + err.message, 'error');
        }
      };

      if (loading) return html`<div class="loading-state"><span class="spinner" /> Loading gala settings...</div>`;

      return html`
        ${showImagePicker ? html`<${ImagePicker}
          onSelect=${handleImageSelect}
          onClose=${() => { setShowImagePicker(false); setImagePickerTarget(null); }}
        />` : null}
        <div class="editor-page">
          ${onBack ? html`
            <nav class="breadcrumb" aria-label="Breadcrumb">
              <button onClick=${onBack}>Events</button>
              <span class="sep">›</span>
              <span>Evening of Sunshine Gala</span>
            </nav>
          ` : null}
          <div class="editor-header">
            <h1 class="editor-title">Evening of Sunshine Gala</h1>
            <p class="editor-subtitle">Edit event details, this year's theme schedule, sponsorship tiers, auction items, FAQs, sponsors, and the testimonial that appear on the gala page.</p>
          </div>

          <div class="hub-tabs" style="margin-bottom: 1.5rem;">
            <button class="hub-tab ${activeTab === 'event' ? 'active' : ''}" onClick=${() => setActiveTab('event')}>Event Details</button>
            <button class="hub-tab ${activeTab === 'tiers' ? 'active' : ''}" onClick=${() => setActiveTab('tiers')}>Tiers & Status</button>
            <button class="hub-tab ${activeTab === 'evening' ? 'active' : ''}" onClick=${() => setActiveTab('evening')}>Evening Schedule</button>
            <button class="hub-tab ${activeTab === 'auction' ? 'active' : ''}" onClick=${() => setActiveTab('auction')}>Auction Items</button>
            <button class="hub-tab ${activeTab === 'testimonial' ? 'active' : ''}" onClick=${() => setActiveTab('testimonial')}>Testimonial</button>
            <button class="hub-tab ${activeTab === 'faqs' ? 'active' : ''}" onClick=${() => setActiveTab('faqs')}>FAQs</button>
            <button class="hub-tab ${activeTab === 'sponsors' ? 'active' : ''}" onClick=${() => setActiveTab('sponsors')}>Sponsors</button>
            <button class="hub-tab ${activeTab === 'gallery' ? 'active' : ''}" onClick=${() => setActiveTab('gallery')}>Gallery</button>
          </div>

          ${activeTab === 'event' && eventData && html`
            <div class="card">
              <h2 class="card-title">Event Details</h2>
              <p class="card-subtitle" style="margin-bottom: 1rem;">Date, time, location, ticket URL, and the long-form description that appears in event listings.</p>
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                  <label>Title</label>
                  <input class="form-input" value=${eventData.title || ''}
                    onInput=${e => updateEvent('title', e.target.value)} />
                </div>
                <div class="form-group">
                  <label>Theme (this year)</label>
                  <input class="form-input" placeholder="e.g. Havana Nights" value=${eventData.theme || ''}
                    onInput=${e => updateEvent('theme', e.target.value)} />
                </div>
                <div class="form-group">
                  <label>Date</label>
                  <input type="date" class="form-input" value=${eventData.date || ''}
                    onInput=${e => updateEvent('date', e.target.value)} />
                </div>
                <div class="form-group">
                  <label>Time</label>
                  <input class="form-input" placeholder="e.g. 6:00 to 11:00 p.m." value=${eventData.time || ''}
                    onInput=${e => updateEvent('time', e.target.value)} />
                </div>
                <div class="form-group">
                  <label>Location Name</label>
                  <input class="form-input" placeholder="e.g. You42 Studios" value=${eventData.location || ''}
                    onInput=${e => updateEvent('location', e.target.value)} />
                </div>
                <div class="form-group">
                  <label>Address</label>
                  <input class="form-input" value=${eventData.address || ''}
                    onInput=${e => updateEvent('address', e.target.value)} />
                </div>
                <div class="form-group" style="grid-column: 1 / -1;">
                  <label>Ticket URL</label>
                  <input class="form-input" placeholder="https://www.zeffy.com/..." value=${eventData.ticketUrl || ''}
                    onInput=${e => updateEvent('ticketUrl', e.target.value)} />
                </div>
                <div class="form-group" style="grid-column: 1 / -1;">
                  <label>Description <span style="color: var(--text-tertiary); font-weight: 400;">(used on the events index card)</span></label>
                  <textarea rows="6" class="form-textarea" value=${eventData.description || ''}
                    onInput=${e => updateEvent('description', e.target.value)} />
                </div>
                <div class="form-group" style="grid-column: 1 / -1;">
                  <label>Hero Image</label>
                  <div style="display: flex; gap: 0.75rem; align-items: center;">
                    <div style="width: 120px; height: 96px; border-radius: 8px; background: var(--bg-secondary); border: 1.5px dashed var(--border); overflow: hidden; cursor: pointer; display: flex; align-items: center; justify-content: center;"
                      onClick=${() => { setImagePickerTarget('event-hero'); setShowImagePicker(true); }}>
                      ${eventData.image
                        ? html`<img src=${cfThumb(eventData.image, 'w=240,h=192,fit=cover')} alt="" style="width: 100%; height: 100%; object-fit: cover;" />`
                        : html`<span style="font-size: 0.7rem; color: var(--text-tertiary); text-align: center;">Click to choose</span>`
                      }
                    </div>
                    <button class="btn btn-ghost btn-sm" onClick=${() => { setImagePickerTarget('event-hero'); setShowImagePicker(true); }}>Browse images</button>
                  </div>
                </div>
              </div>
            </div>
          `}

          ${activeTab === 'tiers' && html`
            <div class="card">
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <div>
                  <h2 class="card-title">Tables & Tickets</h2>
                  <p class="card-subtitle">Sponsor tables and individual seats shown in the main "Tables & Tickets" section.</p>
                </div>
                <button class="btn btn-primary btn-sm" onClick=${() => addTier('main')}>+ Add Tier</button>
              </div>
              <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                ${(data.tiers?.main || []).map((tier, i) => html`
                  <div style="padding: 0.85rem 0.9rem; background: var(--bg-secondary); border-radius: 8px; position: relative;">
                    <div style="position: absolute; top: 0.5rem; right: 0.5rem; display: flex; gap: 0.2rem;">
                      <button class="btn btn-ghost btn-sm" style="color: var(--text-tertiary); padding: 0.15rem 0.4rem;"
                        title="Move up" disabled=${i === 0}
                        onClick=${() => moveTier('main', i, i - 1)}>↑</button>
                      <button class="btn btn-ghost btn-sm" style="color: var(--text-tertiary); padding: 0.15rem 0.4rem;"
                        title="Move down" disabled=${i === (data.tiers?.main || []).length - 1}
                        onClick=${() => moveTier('main', i, i + 1)}>↓</button>
                      <button class="btn btn-ghost btn-sm" style="color: var(--text-tertiary); padding: 0.15rem 0.4rem;"
                        title="Remove" onClick=${() => removeTier('main', i)}>✕</button>
                    </div>
                    <div style="display: grid; grid-template-columns: 2fr 1fr auto; gap: 0.6rem; padding-right: 100px; margin-bottom: 0.6rem;">
                      <div class="form-group" style="margin-bottom: 0;">
                        <label style="font-size: 0.76rem; color: var(--text-secondary);">Name</label>
                        <input class="form-input" placeholder='e.g. "Sunshine Sponsor"' style="font-size: 0.85rem;"
                          value=${tier.name || ''}
                          onInput=${(e) => updateTier('main', i, 'name', e.target.value)} />
                      </div>

    /* ─── Photo Freshness helpers ──────── */
    const PHOTO_FRESH_DAYS = 60;   // green
    const PHOTO_STALE_DAYS = 120;  // yellow → red after this

    function newest(...isos) { return isos.filter(Boolean).sort().pop() || null; }
    function daysSince(iso) {
      if (!iso) return Infinity;
      return Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
    }
    function freshnessBadge(iso) {
      const d = daysSince(iso);
      if (d === Infinity) return html`<span class="freshness-badge freshness-unknown" title="No date recorded">unknown</span>`;
      const label = d === 0 ? 'today' : d === 1 ? '1 day' : `${d} days`;
      if (d <= PHOTO_FRESH_DAYS) return html`<span class="freshness-badge freshness-fresh" title="Photo set ${label} ago">${label}</span>`;
      if (d <= PHOTO_STALE_DAYS) return html`<span class="freshness-badge freshness-aging" title="Consider refreshing — ${label} ago">${label}</span>`;
      return html`<span class="freshness-badge freshness-stale" title="Photo is stale — ${label} ago">${label} ⚠</span>`;
    }
    function photoFreshnessSummary(timestamps) {
      if (!timestamps || !Object.keys(timestamps).length) return null;
      const entries = Object.entries(timestamps);
      const stale = entries.filter(([, v]) => daysSince(v) > PHOTO_STALE_DAYS);
      const aging = entries.filter(([, v]) => { const d = daysSince(v); return d > PHOTO_FRESH_DAYS && d <= PHOTO_STALE_DAYS; });
      if (!stale.length && !aging.length) return null;
      return { stale: stale.length, aging: aging.length };
    }

        setData(d => {

    // ═══════════════════════════════════════════
    // KIDS ON SITE — Manage kids across all pages
    // ═══════════════════════════════════════════
    function KidsOnSite({ addToast, kids: allKids = [] }) {
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [sha, setSha] = useState(null);
      const [data, setData] = useState({});
      const [showImagePicker, setShowImagePicker] = useState(false);
      const [imagePickerTarget, setImagePickerTarget] = useState(null);

      const sortedKids = useMemo(() =>
        [...allKids].sort((a, b) => (a.name || '').localeCompare(b.name || '')),
        [allKids]
      );

      useEffect(() => {
        (async () => {
          const res = await api.readContent('src/content/site/settings.json');
          if (res.success) {
            setData(JSON.parse(res.content));
            setSha(res.sha);
          }
          setLoading(false);
        })();
      }, []);

      const TRACKED_PHOTO_FIELDS = ['heroKidSlug', 'heroKidPhotoId', 'featuredKidSlug', 'featuredStoryImage',
        'sectionPhotos.missionMain', 'sectionPhotos.missionAccent', 'sectionPhotos.process',
        'sectionPhotos.roomBedroom', 'sectionPhotos.roomBath', 'sectionPhotos.roomTherapy',
        'donatePhotos.hero', 'donatePhotos.story',
        'applyPhotos.hero', 'applyPhotos.story', 'applyPhotos.selection',
        'communityPhotos.hero', 'communityPhotos.accent',
        'waysToGivePhotos.hero', 'waysToGivePhotos.breakPhoto', 'waysToGivePhotos.legacyPhoto',
        'partnerPhoto'];

      const stampPhoto = (copy, path) => {
        if (TRACKED_PHOTO_FIELDS.includes(path)) {
          if (!copy.photoTimestamps) copy.photoTimestamps = {};
          copy.photoTimestamps[path] = new Date().toISOString();
        }
      };

      const updateField = (path, value) => {
        setData(d => {
          const copy = JSON.parse(JSON.stringify(d));
          const keys = path.split('.');
          let obj = copy;
          for (let i = 0; i < keys.length - 1; i++) {
            if (!obj[keys[i]] || typeof obj[keys[i]] !== 'object') obj[keys[i]] = {};
            obj = obj[keys[i]];
          }
          obj[keys[keys.length - 1]] = value;
          stampPhoto(copy, path);
          return copy;
        });
      };

      const handleKidSelect = (index, slug) => {
        const kid = allKids.find(k => k.slug === slug);
        setData(d => {
          const arr = [...(d.kidShowcase || [])];
          // Warn if this kid already exists elsewhere in the showcase
          if (slug && arr.some((k, i) => i !== index && k.slug === slug)) {
            addToast(`${kid?.name || slug} is already in the showcase — duplicates will show the same kid twice`, 'info');
          }
          arr[index] = { slug, cfId: kid ? extractCfId(kid.heroImage) : '' };
          const ts = { ...(d.photoTimestamps || {}) };
          ts['kidShowcase'] = new Date().toISOString();
          return { ...d, kidShowcase: arr, photoTimestamps: ts };
        });
      };

      const addToArray = (key, item) => {
        setData(d => ({ ...d, [key]: [...(d[key] || []), item] }));
      };
      const removeFromArray = (key, index) => {
        setData(d => ({ ...d, [key]: (d[key] || []).filter((_, i) => i !== index) }));
      };
      const updateArrayItem = (key, index, field, value) => {
        setData(d => {
          const arr = [...(d[key] || [])];
          arr[index] = { ...arr[index], [field]: value };
          return { ...d, [key]: arr };
        });
      };
      const moveArrayItem = (key, from, to) => {
        setData(d => {
          const arr = [...(d[key] || [])];
          const [item] = arr.splice(from, 1);
          arr.splice(to, 0, item);
          return { ...d, [key]: arr };
        });
      };

      const openImagePicker = (target) => {
        setImagePickerTarget(target);
        setShowImagePicker(true);
      };

      const handleSave = async () => {
        setSaving(true);
        try {
          const content = JSON.stringify(data, null, 2);
          const res = await api.saveContent(
            'src/content/site/settings.json', content,
            'Update kids on site', sha
          );
          if (res.success) {
            setSha(res.sha);
            addToast('Kids on Site saved!', 'success');
            logActivity('updated', 'kids on site', '');
          } else {
            addToast(`Failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Error: ${err.message}`, 'error');
        }
        setSaving(false);

      if (loading) return html`<${EditorSkeleton} />`;

      const pts = data.photoTimestamps || {};

            <input class="form-input" style="flex:1; font-size: 0.85rem;" value=${currentId || ''}

          </div>
        </div>

      return html`

    function OurStory({ addToast }) {
      const {
        data, setData, loading, saving, handleSave, updateNestedField: updateField,
      } = useEditor({
        path: 'src/content/site/our-story.json', label: 'Our Story page', addToast,
      });
      const [showImagePicker, setShowImagePicker] = useState(false);
      const [imagePickerTarget, setImagePickerTarget] = useState(null);

      const updateParagraph = (section, index, value) => {
        setData(d => {
          const copy = JSON.parse(JSON.stringify(d));
          copy[section].paragraphs[index] = value;
          return copy;
        });
      };

      const addParagraph = (section) => {
        setData(d => {
          const copy = JSON.parse(JSON.stringify(d));
          copy[section].paragraphs.push('');
          return copy;
        });
      };

      const removeParagraph = (section, index) => {
        setData(d => {
          const copy = JSON.parse(JSON.stringify(d));
          copy[section].paragraphs.splice(index, 1);
          return copy;
        });
      };

      const updateMilestone = (index, field, value) => {
        setData(d => {
          const copy = JSON.parse(JSON.stringify(d));
          copy.milestones[index][field] = value;
          return copy;
        });
      };

      const addMilestone = () => {
        setData(d => ({
          ...d,
          milestones: [...(d.milestones || []), { year: '', title: '', desc: '', image: '' }],
        }));
      };

      const removeMilestone = (index) => {
        setData(d => {
          const copy = JSON.parse(JSON.stringify(d));
          copy.milestones.splice(index, 1);
          return copy;
        });
      };

      const moveMilestone = (index, dir) => {
        setData(d => {
          const copy = JSON.parse(JSON.stringify(d));
          const newIdx = index + dir;
          if (newIdx < 0 || newIdx >= copy.milestones.length) return d;
          [copy.milestones[index], copy.milestones[newIdx]] = [copy.milestones[newIdx], copy.milestones[index]];
          return copy;
        });
      };

      const openImagePicker = (target) => {
        setImagePickerTarget(target);
        setShowImagePicker(true);
      };

      if (loading) return html`<${EditorSkeleton} />`;

      const renderImageField = (label, fieldPath, currentId) => html`

              placeholder="kids/name/hero-xxxxx"
              onInput=${e => updateField(fieldPath, e.target.value)} />
            <button class="btn btn-ghost" type="button" onClick=${() => openImagePicker(fieldPath)}>Browse</button>
          </div>

    function MediaKit({ addToast, kids: allKids = [] }) {
      const {
        data, loading, saving, dirty, setDirty, handleSave, updateNestedField: updateField, setData,
      } = useEditor({
        path: 'src/content/site/media.json', label: 'Media Kit', addToast,
      });

      const sortedKids = useMemo(() =>
        [...allKids].filter(k => k.heroImage || (k.photos && k.photos.length))
          .sort((a, b) => (b.year || 0) - (a.year || 0) || (a.name || '').localeCompare(b.name || '')),
        [allKids]
      );

      const setBrandingData = (fn) => { setData(fn); setDirty(true); };
      const addBrandingPhoto = () => {
        setBrandingData(d => ({
          ...d,
          brandingPhotos: [...(d.brandingPhotos || []), { kidSlug: '', cfId: '', caption: '' }],
        }));
      };
      const removeBrandingPhoto = (index) => {
        setBrandingData(d => ({
          ...d,
          brandingPhotos: (d.brandingPhotos || []).filter((_, i) => i !== index),
        }));
      };
      const updateBrandingPhoto = (index, field, value) => {
        setBrandingData(d => {
          const arr = [...(d.brandingPhotos || [])];
          arr[index] = { ...arr[index], [field]: value };
          return { ...d, brandingPhotos: arr };
        });
      };
      const moveBrandingPhoto = (from, to) => {
        setBrandingData(d => {
          const arr = [...(d.brandingPhotos || [])];
          const [item] = arr.splice(from, 1);
          arr.splice(to, 0, item);
          return { ...d, brandingPhotos: arr };
        });
      };
      const handleBrandingKidSelect = (index, slug) => {
        const kid = allKids.find(k => k.slug === slug);
        setBrandingData(d => {
          const arr = [...(d.brandingPhotos || [])];
          arr[index] = {
            kidSlug: slug,
            cfId: kid ? extractCfId(kid.heroImage) : '',
            caption: kid ? `${kid.name}${kid.diagnosis ? ' — ' + kid.diagnosis : ''}` : '',
          };
          return { ...d, brandingPhotos: arr };
        });
      };

      if (loading) return html`<${EditorSkeleton} />`;

      return html`
        <div class="page-header">
          <h2>Media Kit</h2>
          <button class="btn btn-primary" onClick=${handleSave} disabled=${saving}>
            ${saving ? html`<span class="spinner" />` : null} ${saving ? 'Saving...' : 'Save & Publish'}
          </button>
        </div>

        <div class="card">
          <h3 style="margin-bottom: 0.5rem;">Organization Bio</h3>
          <p class="text-sm text-muted mb-1">Basic organization details shown on the branding page.</p>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Organization Name</label>
              <input class="form-input" value=${data.bio?.orgName || ''} onInput=${e => updateField('bio.orgName', e.target.value)} />
            </div>
            <div class="form-group">
              <label class="form-label">Founded</label>
              <input class="form-input" value=${data.bio?.founded || ''} onInput=${e => updateField('bio.founded', e.target.value)} />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Founders</label>
              <input class="form-input" value=${data.bio?.founders || ''} onInput=${e => updateField('bio.founders', e.target.value)} />
            </div>
            <div class="form-group">
              <label class="form-label">Location</label>
              <input class="form-input" value=${data.bio?.location || ''} onInput=${e => updateField('bio.location', e.target.value)} />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">EIN</label>
              <input class="form-input" value=${data.bio?.ein || ''} onInput=${e => updateField('bio.ein', e.target.value)} />
            </div>
            <div class="form-group">
              <label class="form-label">Website</label>
              <input class="form-input" value=${data.bio?.website || ''} onInput=${e => updateField('bio.website', e.target.value)} />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Boilerplate (one-line bio for press)</label>
            <textarea class="form-input" style="min-height: 60px;" value=${data.bio?.boilerplate || ''}
              onInput=${e => updateField('bio.boilerplate', e.target.value)} />
          </div>
        </div>

        <div class="card">
          <h3 style="margin-bottom: 0.5rem;">Mission Statement</h3>
          <div class="form-group">
            <label class="form-label">Mission</label>
            <textarea class="form-input" style="min-height: 100px;" value=${data.mission || ''}
              onInput=${e => updateField('mission', e.target.value)} />
          </div>
        </div>

        <div class="card">
          <h3 style="margin-bottom: 0.5rem;">Who We Are</h3>
          <div class="form-group">
            <label class="form-label">Who</label>
            <textarea class="form-input" style="min-height: 80px;" value=${data.who || ''}
              onInput=${e => updateField('who', e.target.value)} />
          </div>
        </div>

        <div class="card">
          <h3 style="margin-bottom: 0.5rem;">Founder's Story</h3>
          <p class="text-sm text-muted mb-1">Use blank lines between paragraphs. They will render as separate &lt;p&gt; tags on the page.</p>
          <div class="form-group">
            <label class="form-label">Founder's Story</label>
            <textarea class="form-input" style="min-height: 160px;" value=${data.founderStory || ''}
              onInput=${e => updateField('founderStory', e.target.value)} />
          </div>
        </div>

        <div class="card">
          <h3 style="margin-bottom: 0.5rem;">Branding Photos</h3>
          <p class="text-sm text-muted mb-1">Select up to 8 kid photos to showcase on the branding page. Pick a kid, then choose which photo to feature.</p>
          ${(data.brandingPhotos || []).map((bp, i) => {
            const kid = allKids.find(k => k.slug === bp.kidSlug);
            const seen = new Set();
            const kidPhotos = kid ? [
              { id: extractCfId(kid.heroImage), label: 'Hero' },
              ...(kid.photos || []).map((p, pi) => ({ id: extractCfId(p.url), label: `Photo ${pi + 1}` })),
            ].filter(p => p.id && !seen.has(p.id) && seen.add(p.id)) : [];
            return html`
              <div style="display: flex; gap: 0.75rem; align-items: flex-start; margin-bottom: 1rem; padding: 0.75rem; background: rgba(0,0,0,0.02); border-radius: 10px; border: 1px solid var(--color-border);">
                <div style="flex-shrink: 0; display: flex; flex-direction: column; gap: 0.25rem; align-items: center;">
                  <span style="font-size: 0.7rem; font-weight: 700; color: var(--color-muted);">${i + 1}</span>
                  <button class="btn btn-ghost" style="padding: 0.2rem 0.4rem; font-size: 0.75rem;" disabled=${i === 0}
                    onClick=${() => moveBrandingPhoto(i, i - 1)}>↑</button>
                  <button class="btn btn-ghost" style="padding: 0.2rem 0.4rem; font-size: 0.75rem;" disabled=${i === (data.brandingPhotos || []).length - 1}
                    onClick=${() => moveBrandingPhoto(i, i + 1)}>↓</button>
                </div>
                <div style="flex: 1; min-width: 0;">
                  <div style="display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.5rem;">
                    ${bp.cfId ? html`<img src=${CF + '/' + bp.cfId + '/w=120,h=120,fit=cover,gravity=face'}
                      alt="" style="width: 48px; height: 48px; border-radius: 8px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--color-border);" />` : null}
                    <select class="form-input" style="flex: 1;" value=${bp.kidSlug || ''}
                      onChange=${e => handleBrandingKidSelect(i, e.target.value)}>
                      <option value="">— Select a kid —</option>
                      ${sortedKids.map(k => html`<option value=${k.slug} selected=${k.slug === bp.kidSlug}>${k.name}${k.year ? ` (${k.year})` : ''}</option>`)}
                    </select>
                  </div>
                  ${kidPhotos.length ? html`
                    <div style="display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 0.5rem;">
                      ${kidPhotos.slice(0, 20).map(p => html`
                        <button type="button" onClick=${() => updateBrandingPhoto(i, 'cfId', p.id)}
                          style="padding: 0; border: 3px solid ${bp.cfId === p.id ? 'var(--color-primary, #2563eb)' : 'transparent'}; border-radius: 8px; overflow: hidden; cursor: pointer; background: none; position: relative; width: 56px; height: 56px; flex-shrink: 0;">
                          <img src=${CF + '/' + p.id + '/w=112,h=112,fit=cover,gravity=face'} alt=${p.label}
                            style="width: 100%; height: 100%; object-fit: cover; display: block;" />
                          ${bp.cfId === p.id ? html`<span style="position: absolute; top: 1px; right: 1px; background: var(--color-primary, #2563eb); color: #fff; border-radius: 50%; width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; font-size: 10px;">✓</span>` : null}
                        </button>
                      `)}
                    </div>
                  ` : null}
                  <input class="form-input" style="font-size: 0.85rem;" value=${bp.caption || ''} placeholder="Caption (e.g. Zyah — Spinal Muscular Atrophy)"
                    onInput=${e => updateBrandingPhoto(i, 'caption', e.target.value)} />
                </div>
                <button class="btn btn-ghost" style="padding: 0.3rem 0.5rem; color: var(--color-danger); flex-shrink: 0;"
                  onClick=${() => removeBrandingPhoto(i)} title="Remove">✕</button>
              </div>
            `;
          })}
          ${(data.brandingPhotos || []).length < 8 ? html`
            <button class="btn btn-ghost" style="margin-top: 0.25rem;" onClick=${addBrandingPhoto}>+ Add Photo</button>
          ` : html`<p class="text-sm text-muted" style="margin-top: 0.5rem;">Maximum of 8 photos reached.</p>`}
        </div>

        <div class="card">
          <h3 style="margin-bottom: 0.5rem;">Contact & Social</h3>
          <div class="form-group">
            <label class="form-label">Contact Email</label>
            <input class="form-input" value=${data.contactEmail || ''} onInput=${e => updateField('contactEmail', e.target.value)} />
          </div>
          <div class="form-row" style="grid-template-columns: 1fr 1fr 1fr;">
            <div class="form-group">
              <label class="form-label">Facebook URL</label>
              <input class="form-input" value=${data.socialLinks?.facebook || ''} onInput=${e => updateField('socialLinks.facebook', e.target.value)} />
            </div>
            <div class="form-group">
              <label class="form-label">Instagram URL</label>
              <input class="form-input" value=${data.socialLinks?.instagram || ''} onInput=${e => updateField('socialLinks.instagram', e.target.value)} />
            </div>
            <div class="form-group">
              <label class="form-label">YouTube URL</label>
              <input class="form-input" value=${data.socialLinks?.youtube || ''} onInput=${e => updateField('socialLinks.youtube', e.target.value)} />
            </div>

    function Deploys({ addToast }) {
      const [deploys, setDeploys] = useState([]);
      const [source, setSource] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [pendingChanges, setPendingChanges] = useState([]);
      const [pendingSince, setPendingSince] = useState(null);
      const [lastDeployBy, setLastDeployBy] = useState(null);
      const [lastDeployAt, setLastDeployAt] = useState(null);
      const [pendingLoading, setPendingLoading] = useState(true);

      const loadDeploys = async () => {
        setLoading(true);
        setError(null);
        try {
          const r = await fetch('/api/deployments');
          const data = await r.json();
          if (data.success) {
            setDeploys(data.deploys || []);
            setSource(data.source);
          } else {
            setError(data.error || 'Failed to load deployments');
          }
        } catch (err) {
          setError(err.message);
        }
        setLoading(false);
      };

      const loadPendingChanges = async () => {
        setPendingLoading(true);
        try {
          const r = await fetch('/api/pending-changes');
          const data = await r.json();
          if (data.success) {
            setPendingChanges(data.changes || []);
            setPendingSince(data.since);
            setLastDeployBy(data.lastDeployBy || null);
            setLastDeployAt(data.lastDeployAt || null);
          }
        } catch (_) {}
        setPendingLoading(false);
      };

      useEffect(() => {
        loadDeploys(); loadPendingChanges();
        // Auto-refresh when a deploy is triggered from the sidebar
        const onDeploy = () => { loadPendingChanges(); loadDeploys(); };
        window.addEventListener('soard-deployed', onDeploy);
        return () => window.removeEventListener('soard-deployed', onDeploy);
      }, []);

      const timeAgo = (dateStr) => {
        if (!dateStr) return '';
        const now = Date.now();
        const then = new Date(dateStr).getTime();
        const diff = Math.floor((now - then) / 1000);
        if (diff < 60) return 'just now';
        if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
        if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
        if (diff < 604800) return `${Math.floor(diff / 86400)}d ago`;
        return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      };

      const statusBadge = (status) => {
        const map = {
          success: { cls: 'badge-green', label: '● Success' },
          active: { cls: 'badge-blue', label: '◉ Building' },
          failure: { cls: 'badge-red', label: 'Failed' },
          canceled: { cls: 'badge-gray', label: '— Canceled' },
          unknown: { cls: 'badge-gray', label: '? Unknown' },
        };
        const s = map[status] || map.unknown;
        return html`<span class="badge ${s.cls}" style="font-size: 0.72rem;">${s.label}</span>`;
      };

      const formatDuration = (start, end) => {
        if (!start || !end) return null;
        const ms = new Date(end) - new Date(start);
        const secs = Math.floor(ms / 1000);
        if (secs < 60) return `${secs}s`;
        return `${Math.floor(secs / 60)}m ${secs % 60}s`;
      };

      if (loading) {
        return html`
          <div class="page-header"><h2>Deploys</h2></div>
          <div style="text-align: center; padding: 4rem;">
            <div class="spinner" style="width: 40px; height: 40px; border-width: 3px;" />
            <p class="mt-2 text-muted">Loading deployment history...</p>
          </div>`;
      }

      if (error) {
        return html`
          <div class="page-header"><h2>Deploys</h2></div>
          <div class="card" style="text-align: center; padding: 2rem;">
            <p style="color: #E53E3E; margin-bottom: 1rem;">${icons.warning} ${error}</p>
            <button class="btn btn-primary" onClick=${loadDeploys}>Retry</button>
          </div>`;
      }

      const actionLabel = (action) => {
        const map = { created: 'Created', updated: 'Updated', deleted: 'Deleted', drafted: 'Drafted', published: 'Published', uploaded: 'Uploaded' };
        return map[action] || action;
      };

      const actionColor = (action) => {
        const map = { created: 'badge-green', updated: 'badge-blue', deleted: 'badge-red', drafted: 'badge-yellow', published: 'badge-green', uploaded: 'badge-blue' };
        return map[action] || 'badge-gray';
      };

      const typeLabel = (type) => {
        if (!type) return '';
        return type.charAt(0).toUpperCase() + type.slice(1);
      };

      return html`
        <div class="page-header">
          <h2>Deploys (${deploys.length})</h2>
          <div style="display: flex; gap: 0.5rem; align-items: center;">
            ${source === 'github' ? html`<span class="badge badge-gray" style="font-size: 0.72rem;">via GitHub commits</span>` : null}
            ${source === 'cloudflare' ? html`<span class="badge badge-blue" style="font-size: 0.72rem;">via Cloudflare Pages</span>` : null}
            <button class="btn btn-ghost btn-sm" onClick=${() => { loadDeploys(); loadPendingChanges(); }}>↻ Refresh</button>
          </div>
        </div>

        ${!pendingLoading && pendingChanges.length > 0 ? html`
          <div class="card" style="margin-bottom: 1.25rem;">
            <div style="padding: 0.85rem 1rem; border-bottom: 1px solid rgba(0,0,0,0.06); display: flex; align-items: center; justify-content: space-between;">
              <div style="display: flex; align-items: center; gap: 0.5rem;">
                <span style="width: 8px; height: 8px; border-radius: 50%; background: #FFD500; flex-shrink: 0;" />
                <strong style="font-size: 0.9rem;">Pending Changes (${pendingChanges.length})</strong>
              </div>
              <span class="text-sm text-muted">${lastDeployAt
                ? html`since <strong>${lastDeployBy ? lastDeployBy.split('@')[0] : 'unknown'}</strong> deployed ${timeAgo(lastDeployAt)}`
                : 'since last deploy'
              }</span>
            </div>
            ${pendingChanges.map(c => html`
              <div style="display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; border-bottom: 1px solid rgba(0,0,0,0.04); font-size: 0.85rem;">
                <span class="badge ${actionColor(c.action)}" style="font-size: 0.7rem; min-width: 58px; text-align: center;">${actionLabel(c.action)}</span>
                <span style="font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                  ${c.name || c.slug || '—'}
                </span>
                <span class="badge badge-gray" style="font-size: 0.68rem;">${typeLabel(c.type)}</span>
                ${c.edits > 1 ? html`<span style="color: #6B6C72; font-size: 0.72rem; flex-shrink: 0;" title="${c.edits} total edits">${c.edits} edits</span>` : null}
                <span style="color: #6B6C72; font-size: 0.72rem; flex-shrink: 0;">
                  ${c.users && c.users.length > 0 ? c.users.map(u => u.split('@')[0]).join(', ') : '—'}
                </span>
                <span style="color: #9CA3AF; font-size: 0.72rem; flex-shrink: 0; min-width: 50px; text-align: right;" title=${c.at ? new Date(c.at).toLocaleString() : ''}>${timeAgo(c.at)}</span>
              </div>
            `)}
          </div>
        ` : null}

        ${!pendingLoading && pendingChanges.length === 0 && !loading ? html`
          <div class="card" style="padding: 1rem 1.25rem; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem; color: #38A169; font-size: 0.85rem;">
            <span>●</span> All changes have been deployed${lastDeployAt ? html` — last by <strong>${lastDeployBy ? lastDeployBy.split('@')[0] : 'unknown'}</strong> ${timeAgo(lastDeployAt)}` : null}
          </div>
        ` : null}

        ${source === 'github' ? html`
          <div class="card" style="padding: 0.75rem 1rem; margin-bottom: 1rem; background: #FEFCF5; border-left: 3px solid #FFD500;">
            <p class="text-sm" style="margin: 0;">
              <strong>Tip:</strong> To see build status and preview URLs, add a <code>CF_PAGES_TOKEN</code> environment variable
              in your Cloudflare Pages settings with Pages:Read permission.
            </p>
          </div>
        ` : null}

        <div class="card" style="padding: 0;">
          ${deploys.length === 0
            ? html`<div style="padding: 2rem; text-align: center; color: #6B6C72;">No deployments found</div>`
            : deploys.map(d => html`
              <div class="deploy-item" key=${d.id}>
                ${d.avatar
                  ? html`<img class="deploy-avatar" src="${d.avatar}" alt="" />`
                  : html`<div class="deploy-avatar" style="display:flex;align-items:center;justify-content:center;font-size:0.8rem;color:#6B6C72;">${icons.user}</div>`
                }
                <div class="deploy-body">
                  <div class="deploy-msg" title=${d.commitMessage || ''}>${d.commitMessage || 'No commit message'}</div>
                  <div class="deploy-meta">
                    ${d.author ? html`<span>${d.author}</span>` : null}
                    ${d.commitHash ? html`<a class="deploy-sha" href=${d.commitUrl || `https://github.com/pranney82/soard/commit/${d.commitHash}`} target="_blank" rel="noopener">${d.commitHash.slice(0, 7)}</a>` : null}
                    ${d.branch && d.branch !== 'main' ? html`<span class="badge badge-accent" style="font-size:0.7rem;">${d.branch}</span>` : null}
                    ${d.createdOn ? html`<span title=${new Date(d.createdOn).toLocaleString()}>${timeAgo(d.createdOn)}</span>` : null}
                    ${formatDuration(d.startedOn, d.endedOn) ? html`<span>⏱ ${formatDuration(d.startedOn, d.endedOn)}</span>` : null}
                    ${d.url ? html`<a class="deploy-link" href=${d.url} target="_blank" rel="noopener">Preview ↗</a>` : null}
                  </div>
                </div>
                <div class="deploy-status">${statusBadge(d.status)}</div>
              </div>
            `)
          }
        </div>
      `;
    }

    // ═══════════════════════════════════════════
    // DEPLOY CONFIRMATION MODAL
    // ═══════════════════════════════════════════
    function DeployConfirmModal({ pendingData, deploying, onConfirm, onCancel }) {
      const changes = pendingData?.changes || [];
      const lastDeployBy = pendingData?.lastDeployBy;
      const lastDeployAt = pendingData?.lastDeployAt;

      const timeAgo = (dateStr) => {
        if (!dateStr) return '';
        const diff = Math.floor((Date.now() - new Date(dateStr).getTime()) / 1000);
        if (diff < 60) return 'just now';
        if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
        if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
        if (diff < 604800) return `${Math.floor(diff / 86400)}d ago`;
        return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      };

      const actionLabel = (a) => ({ created: 'Created', updated: 'Updated', deleted: 'Deleted', drafted: 'Drafted', published: 'Published', uploaded: 'Uploaded' }[a] || a);
      const actionColor = (a) => ({ created: 'badge-green', updated: 'badge-blue', deleted: 'badge-red', drafted: 'badge-yellow', published: 'badge-green', uploaded: 'badge-blue' }[a] || 'badge-gray');
      const typeLabel = (t) => t ? t.charAt(0).toUpperCase() + t.slice(1) : '';

      useEffect(() => {
        const handler = (e) => { if (e.key === 'Escape') onCancel(); };
        window.addEventListener('keydown', handler);
        document.body.classList.add('modal-open');
        return () => { window.removeEventListener('keydown', handler); document.body.classList.remove('modal-open'); };
      }, []);

      return html`<div class="modal-overlay" onClick=${onCancel}>
        <div class="modal" onClick=${e => e.stopPropagation()} style="max-width: 560px;">
          <h3 style="display: flex; align-items: center; gap: 0.5rem;">
            ${icons.deploys} Deploy to Production
          </h3>

          ${lastDeployAt ? html`
            <p style="margin-bottom: 1rem; font-size: 0.82rem; color: #6B6C72;">
              Last deployed by <strong style="color: #2D2E33;">${lastDeployBy ? lastDeployBy.split('@')[0] : 'unknown'}</strong> ${timeAgo(lastDeployAt)}
            </p>
          ` : html`
            <p style="margin-bottom: 1rem; font-size: 0.82rem; color: #6B6C72;">This will be the first tracked deploy.</p>
          `}

          ${changes.length > 0 ? html`
            <div style="border: 1px solid rgba(0,0,0,0.08); border-radius: 8px; margin-bottom: 1.25rem; max-height: 280px; overflow-y: auto;">
              <div style="padding: 0.6rem 0.85rem; background: rgba(0,0,0,0.02); border-bottom: 1px solid rgba(0,0,0,0.06); font-size: 0.78rem; font-weight: 600; color: #6B6C72; position: sticky; top: 0; z-index: 1;">
                ${changes.length} ${changes.length === 1 ? 'change' : 'changes'} to deploy
              </div>
              ${changes.map(c => html`
                <div style="display: flex; align-items: center; gap: 0.6rem; padding: 0.5rem 0.85rem; border-bottom: 1px solid rgba(0,0,0,0.04); font-size: 0.82rem;">
                  <span class="badge ${actionColor(c.action)}" style="font-size: 0.68rem; min-width: 54px; text-align: center;">${actionLabel(c.action)}</span>
                  <span style="font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${c.name || c.slug || '—'}</span>
                  <span class="badge badge-gray" style="font-size: 0.66rem;">${typeLabel(c.type)}</span>
                  ${c.edits > 1 ? html`<span style="color: #9CA3AF; font-size: 0.7rem;">${c.edits}x</span>` : null}
                  <span style="color: #9CA3AF; font-size: 0.72rem; flex-shrink: 0;">${c.users && c.users.length > 0 ? c.users.map(u => u.split('@')[0]).join(', ') : '—'}</span>
                  <span style="color: #CBCDD3; font-size: 0.7rem; flex-shrink: 0;">${timeAgo(c.at)}</span>
                </div>
              `)}
            </div>
          ` : html`
            <div style="border: 1px solid rgba(0,0,0,0.08); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.25rem; text-align: center; color: #6B6C72; font-size: 0.85rem;">
              No tracked changes since last deploy
            </div>
          `}

          <div class="modal-buttons">
            <button class="btn btn-ghost" onClick=${onCancel} disabled=${deploying}>Cancel</button>
            <button class="btn btn-primary" onClick=${onConfirm} disabled=${deploying}
              style="background: #FFD500; color: #000; border-color: #FFD500; font-weight: 600;">
              ${deploying ? html`<span class="spinner" style="width: 14px; height: 14px; border-width: 2px;" /> Deploying...` : html`${icons.deploys} Deploy Now`}
            </button>
          </div>
        </div>
      </div>`;
    }

    // ═══════════════════════════════════════════
    // MAIN APP
    // ═══════════════════════════════════════════
    // ═══════════════════════════════════════════
    // COMMAND PALETTE (Cmd+K)
    // ═══════════════════════════════════════════
    function CommandPalette({ open, onClose, onNavigate, kids, partners, communityPartners, mediaLogos, team, articles, events, communityProjects, press }) {
      const [query, setQuery] = useState('');
      const [activeIdx, setActiveIdx] = useState(0);
      const inputRef = useRef();

      useEffect(() => {
        if (open) {
          setQuery(''); setActiveIdx(0);
          document.body.classList.add('modal-open');
          setTimeout(() => inputRef.current?.focus(), 50);
        } else {
          document.body.classList.remove('modal-open');
        }
        return () => document.body.classList.remove('modal-open');
      }, [open]);

      const allItems = useMemo(() => {
        const pages = [
          { type: 'page', label: 'Dashboard', id: 'dashboard', section: 'Pages' },
          { type: 'page', label: 'Kids', id: 'kids-hub', section: 'Pages' },
          { type: 'page', label: 'Community Projects', id: 'kids-hub', subTab: 'community', section: 'Pages' },
          { type: 'page', label: 'Partners', id: 'partners-hub', section: 'Pages' },
          { type: 'page', label: 'Community Partners', id: 'partners-hub', subTab: 'community-partners', section: 'Pages' },
          { type: 'page', label: 'Media Logos', id: 'partners-hub', subTab: 'medialogos', section: 'Pages' },
          { type: 'page', label: 'Board', id: 'people-hub', subTab: 'board', section: 'Pages' },
          { type: 'page', label: 'Team', id: 'people-hub', subTab: 'team', section: 'Pages' },
          { type: 'page', label: 'Articles', id: 'articles', section: 'Pages' },
          { type: 'page', label: 'Events', id: 'events', section: 'Pages' },
          { type: 'page', label: 'Press & Media', id: 'press-hub', subTab: 'press', section: 'Pages' },
          { type: 'page', label: 'Press Monitor', id: 'press-hub', subTab: 'press-monitor', section: 'Pages' },
          { type: 'page', label: 'Site Config', id: 'site-hub', section: 'Pages' },
          { type: 'page', label: 'Kids on Site', id: 'site-hub', subTab: 'kids-on-site', section: 'Pages' },
          { type: 'page', label: 'FAQs', id: 'site-hub', subTab: 'faq', section: 'Pages' },
          { type: 'page', label: 'Our Story', id: 'site-hub', subTab: 'ourstory', section: 'Pages' },
          { type: 'page', label: 'Media Kit', id: 'site-hub', subTab: 'mediakit', section: 'Pages' },
          { type: 'page', label: 'Financials', id: 'site-hub', subTab: 'financials', section: 'Pages' },
          { type: 'page', label: 'Site Settings', id: 'site-hub', subTab: 'settings', section: 'Pages' },
          { type: 'page', label: 'Deploys', id: 'deploys', section: 'Pages' },
        ];
        const actions = [
          { type: 'action', label: 'Add New Kid', id: 'kids-hub', slug: '', section: 'Actions' },
          { type: 'action', label: 'Add New Partner', id: 'partners-hub', slug: '', section: 'Actions' },
          { type: 'action', label: 'Add New Community Partner', id: 'partners-hub', subTab: 'community-partners', slug: '', section: 'Actions' },
          { type: 'action', label: 'Add New Media Logo', id: 'partners-hub', subTab: 'medialogos', slug: '', section: 'Actions' },
          { type: 'action', label: 'Add New Board Member', id: 'people-hub', subTab: 'board', slug: '', section: 'Actions' },
          { type: 'action', label: 'Add New Team Member', id: 'people-hub', subTab: 'team', slug: '', section: 'Actions' },
          { type: 'action', label: 'Add New Article', id: 'articles', slug: '', section: 'Actions' },
          { type: 'action', label: 'Add New Event', id: 'events', slug: '', section: 'Actions' },
          { type: 'action', label: 'Add New Community Project', id: 'kids-hub', subTab: 'community', slug: '', section: 'Actions' },
          { type: 'action', label: 'Add New Press Article', id: 'press-hub', subTab: 'press', slug: '', section: 'Actions' },
        ];
        const content = [
          ...(kids || []).map(k => ({ type: 'content', label: k.name, meta: `Kid · ${k.year || ''}`, id: 'kids-hub', slug: k.slug, section: 'Content' })),
          ...(partners || []).map(p => ({ type: 'content', label: p.name, meta: `Partner · ${p.level || ''}`, id: 'partners-hub', slug: p.slug, section: 'Content' })),
          ...(communityPartners || []).map(c => ({ type: 'content', label: c.name, meta: `Community Partner · ${c.category || ''}`, id: 'partners-hub', subTab: 'community-partners', slug: c.slug, section: 'Content' })),
          ...(mediaLogos || []).map(m => ({ type: 'content', label: m.name, meta: 'Media Logo', id: 'partners-hub', subTab: 'medialogos', slug: m.slug, section: 'Content' })),
          ...(team || []).map(t => ({ type: 'content', label: t.name, meta: `${t.group === 'board' ? 'Board' : 'Team'} · ${t.title || ''}`, id: 'people-hub', subTab: t.group === 'board' ? 'board' : 'team', slug: t.slug, section: 'Content' })),
          ...(articles || []).map(a => ({ type: 'content', label: a.title || a.name, meta: 'Article', id: 'articles', slug: a.slug, section: 'Content' })),
          ...(events || []).map(e => ({ type: 'content', label: e.title || e.name, meta: `Event · ${e.date || ''}`, id: 'events', slug: e.slug, section: 'Content' })),
          ...(communityProjects || []).map(c => ({ type: 'content', label: c.name, meta: `Community · ${c.year || ''}`, id: 'kids-hub', subTab: 'community', slug: c.slug, section: 'Content' })),
          ...(press || []).map(p => ({ type: 'content', label: p.title || p.name, meta: `Press · ${p.outlet || ''}`, id: 'press-hub', subTab: 'press', slug: p.slug, section: 'Content' })),
        ];
        return [...pages, ...actions, ...content];
      }, [kids, partners, communityPartners, mediaLogos, team, articles, events, communityProjects, press]);

      const filtered = useMemo(() => {
        if (!query) return allItems.slice(0, 20);
        const q = query.toLowerCase();
        return allItems.filter(item =>
          item.label.toLowerCase().includes(q) ||
          (item.meta || '').toLowerCase().includes(q) ||
          item.section.toLowerCase().includes(q)
        ).slice(0, 20);
      }, [query, allItems]);

      useEffect(() => { setActiveIdx(0); }, [query]);

      const handleSelect = (item) => {
        if (item.type === 'action') {
          onNavigate(item.id, '', item.subTab || null);
        } else if (item.type === 'content') {
          onNavigate(item.id, item.slug, item.subTab || null);
        } else {
          onNavigate(item.id, null, item.subTab || null);
        }
        onClose();
      };

      const handleKeyDown = (e) => {
        if (e.key === 'ArrowDown') { e.preventDefault(); setActiveIdx(i => Math.min(i + 1, filtered.length - 1)); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); setActiveIdx(i => Math.max(i - 1, 0)); }
        else if (e.key === 'Enter' && filtered[activeIdx]) { handleSelect(filtered[activeIdx]); }
        else if (e.key === 'Escape') { onClose(); }
      };

      if (!open) return null;

      // Group by section
      const grouped = [];
      let lastSection = null;
      filtered.forEach((item, i) => {
        if (item.section !== lastSection) {
          grouped.push({ type: 'section', label: item.section });
          lastSection = item.section;
        }
        grouped.push({ ...item, flatIdx: i });
      });

      const typeIcon = (type) => {
        if (type === 'page') return html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg>`;
        if (type === 'action') return html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>`;
        return html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>`;
      };

      return html`
        <div class="cmd-palette-overlay" onClick=${onClose}>
          <div class="cmd-palette" onClick=${e => e.stopPropagation()}>
            <div class="cmd-palette-input-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
              <input ref=${inputRef} class="cmd-palette-input"
                placeholder="Search pages, content, actions..."
                value=${query} onInput=${e => setQuery(e.target.value)}
                onKeyDown=${handleKeyDown} />
              <kbd style="font-size: 0.7rem; padding: 2px 6px; background: #f0f0f0; border: 1px solid #ddd; border-radius: 4px; color: #999;">esc</kbd>
            </div>
            <div class="cmd-palette-results">
              ${filtered.length === 0 ? html`<div style="padding: 2rem; text-align: center; color: #737580;">No results for "${query}"</div>` : null}
              ${grouped.map(item => {
                if (item.type === 'section') return html`<div class="cmd-palette-section">${item.label}</div>`;
                return html`<button key=${item.label + item.id}
                  class="cmd-palette-item ${item.flatIdx === activeIdx ? 'active' : ''}"
                  onClick=${() => handleSelect(item)}
                  onMouseEnter=${() => setActiveIdx(item.flatIdx)}>
                  ${typeIcon(item.type)}

    // ═══════════════════════════════════════════
    // KEYBOARD SHORTCUTS MODAL
    // ═══════════════════════════════════════════
    function KeyboardShortcuts({ open, onClose }) {
      useEffect(() => {
        if (!open) return;
        const handler = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [open]);

      if (!open) return null;

      const isMac = navigator.platform.includes('Mac');
      const mod = isMac ? '⌘' : 'Ctrl';

      const shortcuts = [
        { keys: [mod, 'K'], label: 'Command palette' },
        { keys: [mod, 'S'], label: 'Save current item' },
        { keys: ['?'], label: 'Keyboard shortcuts' },
        { keys: ['Esc'], label: 'Close modal / palette' },
        { keys: ['↑', '↓'], label: 'Navigate palette results' },
        { keys: ['Enter'], label: 'Select palette result' },
        { keys: ['Tab'], label: 'Next form field' },
        { keys: [mod, 'B'], label: 'Bold (rich text)' },
        { keys: [mod, 'I'], label: 'Italic (rich text)' },
        { keys: [mod, 'U'], label: 'Underline (rich text)' },
      ];

      return html`
        <div class="modal-overlay" onClick=${onClose}>
          <div class="modal" style="max-width: 520px;" onClick=${e => e.stopPropagation()}>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
              <h3 style="margin: 0;">Keyboard Shortcuts</h3>
              <button class="btn btn-ghost btn-sm" onClick=${onClose}>Close</button>
            </div>
            <div class="shortcuts-grid">
              ${shortcuts.map(s => html`
                <div class="shortcut-item">
                  <span style="font-size: 0.9rem;">${s.label}</span>
                  <div class="shortcut-keys">
                    ${s.keys.map(k => html`<kbd>${k}</kbd>`)}
                  </div>
                </div>
              `)}
            </div>
            <div style="margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid #f0f0f0; font-size: 0.8rem; color: #737580; text-align: center;">
              Press <kbd style="display: inline; padding: 1px 5px; background: #f0f0f0; border: 1px solid #ddd; border-radius: 3px; font-size: 0.75rem;">?</kbd> anywhere to show this dialog
            </div>
          </div>
        </div>
      `;
    }
