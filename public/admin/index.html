<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOARD Admin</title>
  <link rel="icon" href="/favicon.ico" sizes="32x32">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#1A1B1F">
  <style>
    /* ─── Design Tokens ────────────────── */
    :root {
      --color-primary: #FFD500;
      --color-primary-hover: #E6C000;
      --color-primary-bg: rgba(255, 213, 0, 0.08);
      --color-primary-ring: rgba(255, 213, 0, 0.25);
      --color-danger: #E53E3E;
      --color-danger-bg: rgba(229, 62, 62, 0.06);
      --color-success: #38A169;
      --color-info: #3182CE;
      --color-warning: #D69E2E;
      --color-bg: #F5F4F0;
      --color-bg-card: #fff;
      --color-bg-secondary: #FAFAF8;
      --color-text: #2D2E33;
      --color-text-secondary: #6B6C72;
      --color-text-muted: #737580;
      --color-border: #E5E4E0;
      --color-sidebar: #1A1B1F;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 12px 36px rgba(0,0,0,0.12);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --focus-ring: 0 0 0 3px var(--color-primary-ring);
    }

    /* ─── Reset & Base ──────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: inherit; }
    button:focus-visible { outline: none; box-shadow: var(--focus-ring); border-radius: var(--radius-sm); }
    input, textarea, select { font-family: inherit; font-size: 1rem; }

    /* ─── Page Transitions ─────────────── */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .main > * { animation: fadeIn 0.2s ease-out; }

    /* ─── Layout ────────────────────────── */
    .app { display: flex; min-height: 100vh; }
    .sidebar {
      width: 240px;
      background: #1A1B1F;
      color: #fff;
      padding: 1.5rem 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      overflow-y: auto;
      z-index: 100;
      transition: transform 0.25s ease;
    }
    .main {
      margin-left: 240px;
      flex: 1;
      min-width: 0;
      overflow-x: hidden;
      padding: 2rem;
      min-height: 100vh;
    }
    .sidebar-logo {
      padding: 0.75rem 1.25rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .sidebar-logo img {
      height: 32px;
      width: auto;
      display: block;
      flex-shrink: 0;
    }
    .sidebar-logo small {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
      display: block;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .nav-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.7rem 1.25rem;
      font-size: 0.95rem;
      color: rgba(255,255,255,0.65);
      border: none; background: none; width: 100%;
      text-align: left;
      transition: all 0.15s;
      border-left: 3px solid transparent;
    }
    .nav-item:hover { color: #fff; background: rgba(255,255,255,0.05); }
    .nav-item:focus-visible { outline: none; box-shadow: inset 0 0 0 2px var(--color-primary); }
    .nav-item.active {
      color: var(--color-primary);
      background: var(--color-primary-bg);
      border-left-color: var(--color-primary);
    }
    .nav-icon { width: 1.25rem; height: 1.25rem; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .nav-icon svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .nav-section {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.3);
      padding: 1.25rem 1.25rem 0.4rem;
    }

    /* ─── Hub Tabs ─────────────────────── */
    .hub-tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid var(--color-border);
      margin-bottom: 1.75rem;
    }
    .hub-tab {
      padding: 0.65rem 1.25rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--color-text-secondary);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .hub-tab:hover {
      color: var(--color-text);
      background: var(--color-primary-bg);
    }
    .hub-tab.active {
      color: var(--color-text);
      border-bottom-color: var(--color-primary);
    }
    @media (max-width: 768px) {
      .hub-tabs {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .hub-tabs::-webkit-scrollbar { display: none; }
      .hub-tab { padding: 0.55rem 0.9rem; font-size: 0.85rem; }
    }

    /* ─── Mobile hamburger ──────────────── */
    .hamburger {
      display: none;
      position: fixed; top: 1rem; left: 1rem; z-index: 200;
      background: var(--color-sidebar); color: var(--color-primary);
      border: none; border-radius: 10px;
      width: 44px; height: 44px; font-size: 1.4rem;
      align-items: center; justify-content: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
      -webkit-tap-highlight-color: transparent;
    }
    .hamburger:active { transform: scale(0.92); }
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 99;
    }

    /* ─── Editor save footer ──────────── */
    .editor-save-footer {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
      margin-top: 1rem;
    }

    /* ─── Mobile: 768px ────────────────── */
    @media (max-width: 768px) {
      /* Layout */
      .hamburger { display: flex; top: max(1rem, env(safe-area-inset-top, 0px)); left: max(1rem, env(safe-area-inset-left, 0px)); }
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); overscroll-behavior: contain; }
      .sidebar-logo { padding-left: 4rem; }
      .overlay.open { display: block; }
      .main { margin-left: 0; padding: 4rem 1rem 1rem; padding-top: calc(4rem + env(safe-area-inset-top, 0px)); padding-bottom: env(safe-area-inset-bottom, 0px); }
      .card { padding: 1rem; }

      /* Page header */
      .page-header { flex-direction: column; align-items: stretch; gap: 0.75rem; }
      .page-header h2 { font-size: 1.25rem; }
      .page-header > div:last-child { display: flex; gap: 0.5rem; }
      .page-header > .flex { width: 100%; }

      /* Stat cards */
      .stat-card .stat-number { font-size: 1.75rem; }
      .stat-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 0.75rem !important; margin-bottom: 1.25rem !important; }
      .chart-panel { min-width: 0 !important; width: 100% !important; }

      /* Dashboard Recent Kids — grid layout per row */
      .dashboard-recent .table-wrap tr {
        display: grid !important;
        grid-template-columns: 44px 1fr auto;
        grid-template-rows: auto auto;
        gap: 0.15rem 0.6rem;
        padding: 0.75rem 0 !important;
        align-items: center;
      }
      .dashboard-recent .table-wrap td { padding: 0 !important; border: none !important; }
      .dashboard-recent .table-wrap td:nth-child(1) { grid-row: 1 / 3; grid-column: 1; } /* thumb */
      .dashboard-recent .table-wrap td:nth-child(2) { grid-row: 1; grid-column: 2; } /* name */
      .dashboard-recent .table-wrap td:nth-child(3) { grid-row: 1; grid-column: 3; font-size: 0.8rem; color: #6B6C72; } /* year */
      .dashboard-recent .table-wrap td:nth-child(4) { grid-row: 2; grid-column: 2 / 4; } /* status */
      .dashboard-recent .table-wrap td:nth-child(5) { display: none; } /* hide photo count on mobile */

      /* Tables — responsive card layout */
      .table-wrap { overflow-x: visible; }
      .table-wrap table { display: block; }
      .table-wrap thead { display: none; }
      .table-wrap tbody { display: block; }
      .table-wrap tr {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.35rem 0.6rem;
        padding: 0.85rem 0;
        border-bottom: 1px solid #E5E4E0;
      }
      .table-wrap tr:first-child { padding-top: 0; }
      .table-wrap tr:last-child { border-bottom: none; }
      .table-wrap td {
        padding: 0;
        border: none;
        font-size: 0.88rem;
      }
      .table-wrap tr:hover td { background: transparent; }
      .td-thumb { width: 44px; height: 44px; flex-shrink: 0; }
      /* Name cell */
      .table-wrap td:has(> strong) { flex: 1 1 40%; min-width: 0; }
      .table-wrap td:has(> strong) strong { 
        display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
      }
      /* Secondary data cells */
      .table-wrap td .badge { font-size: 0.7rem; }
      .table-wrap td.text-sm { font-size: 0.8rem; color: #6B6C72; }
      /* Action cell */
      .table-wrap td:last-child {
        margin-left: auto;
        flex-shrink: 0;
        white-space: nowrap !important;
      }
      /* Hide non-essential columns on mobile */
      .td-hide-mobile { display: none; }
      /* Show subtitle under name on mobile */
      .team-title-sub { display: block !important; font-size: 0.8rem; margin-top: 0.1rem; }
      /* Title cell: full width so tag/date/actions flow on next line */
      .table-wrap td:has(> strong) { flex: 1 1 100%; }
      /* Touch targets for table action buttons */
      .table-wrap .btn-sm { min-height: 36px; min-width: 36px; padding: 0.4rem 0.65rem; }

      /* Forms */
      .form-row, .form-grid { grid-template-columns: 1fr !important; }
      .form-grid .span-2 { grid-column: 1; }
      .form-input, .form-textarea, .form-select { font-size: 16px; } /* prevents iOS zoom */
      .search-bar { max-width: 100%; }
      .rte-body { min-height: 120px !important; }

      /* Modals */
      .modal-overlay { padding: 0.5rem; padding-bottom: env(safe-area-inset-bottom, 0.5rem); }
      .modal, .modal-content { padding: 1.25rem; max-width: calc(100vw - 1rem); }
      .modal-buttons { flex-wrap: wrap; }
      .modal-buttons .btn { flex: 1; min-height: 44px; justify-content: center; }

      /* Toast */
      .toast-container { left: 1rem; right: 1rem; bottom: calc(1rem + env(safe-area-inset-bottom, 0px)); }
      .toast { font-size: 0.85rem; }

      /* Image picker */
      .img-picker-modal { width: 100vw; max-width: 100vw; max-height: 95vh; border-radius: 12px 12px 0 0; }
      .img-picker-toolbar { flex-direction: column; gap: 0.5rem; }
      .img-picker-toolbar input { min-width: 0; width: 100%; flex: none; }
      .img-picker-toolbar .btn { width: 100%; justify-content: center; min-height: 44px; }
      .img-picker-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
      .img-picker-pager .btn { min-height: 44px; min-width: 44px; }

      /* Deploy items */
      .deploy-msg { font-size: 0.82rem; white-space: normal; }
      .deploy-meta { font-size: 0.75rem; }
      .deploy-item { flex-wrap: wrap; }

      /* Dropzone */
      .dropzone { padding: 1.5rem 1rem; }

      /* Chips / tags */
      .chip { padding: 0.3rem 0.7rem; }

      /* All buttons: enforce min touch target */
      .btn { min-height: 40px; }
      .btn-sm { min-height: 36px; }

      /* Checkbox labels: larger touch target */
      .checkbox-label { min-height: 44px; padding: 0.25rem 0; }
      .checkbox-label input { width: 22px; height: 22px; }

      /* Sticky editor save footer */
      .editor-save-footer {
        position: sticky;
        bottom: 0;
        z-index: 50;
        background: #fff;
        border-top: 1px solid #E5E4E0;
        padding: 0.75rem 1rem;
        padding-bottom: calc(0.75rem + env(safe-area-inset-bottom, 0px));
        margin: 1rem -1rem 0;
        gap: 0.75rem;
        box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
      }
      .editor-save-footer .btn { min-height: 44px; flex: 1; justify-content: center; max-width: 200px; }

      /* Array row items (Kid Showcase, Partner Logos) */
      .array-row-item {
        flex-wrap: wrap !important;
      }
      .array-row-item input.form-input {
        flex: 1 1 100% !important;
        min-width: 0 !important;
      }
      .array-row-item .array-row-actions {
        display: flex;
        gap: 0.35rem;
        margin-left: auto;
      }

      /* Back link: bigger touch target */
      .back-link { min-height: 44px; display: inline-flex; align-items: center; font-size: 0.9rem; }

      /* Photo grid — larger photos on mobile */
      .photo-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 0.5rem; }
      .photo-actions { opacity: 1; } /* always visible on touch */

      /* Partner picker in Kid editor */
      .partner-picker-list label {
        min-height: 44px;
        padding: 0.6rem 0.75rem;
      }

      /* ─── OurStory milestone rows ────── */
      /* Milestone rows use inline flex with fixed widths — force wrap */
      .card > div[style*="margin-bottom: 0.5rem"][style*="background: rgba(45,46,51"] > div[style*="display: flex"] {
        flex-wrap: wrap !important;
      }
      .card > div[style*="margin-bottom: 0.5rem"][style*="background: rgba(45,46,51"] > div[style*="display: flex"] > div[style*="flex: 0 0 80px"] {
        flex: 1 1 60px !important;
        min-width: 60px !important;
      }
      .card > div[style*="margin-bottom: 0.5rem"][style*="background: rgba(45,46,51"] > div[style*="display: flex"] > div[style*="flex: 0 0 180px"] {
        flex: 1 1 120px !important;
        min-width: 0 !important;
      }
      .card > div[style*="margin-bottom: 0.5rem"][style*="background: rgba(45,46,51"] > div[style*="display: flex"] > div[style*="flex: 1"] {
        flex: 1 1 100% !important;
      }

      /* ─── FAQ category edit row ──────── */
      .card > div[style*="justify-content: space-between"] > div[style*="display: flex"][style*="flex: 1"] {
        flex-wrap: wrap !important;
        gap: 0.5rem !important;
      }
      .card > div[style*="justify-content: space-between"] > div[style*="display: flex"][style*="flex: 1"] input.form-input {
        min-width: 0 !important;
        flex: 1 1 140px !important;
      }

      /* ─── Event photo entry rows ─────── */
      /* The flex row with image preview + inputs + delete button */
      .card > div[style*="border: 1px solid"][style*="border-radius: 8px"][style*="display: flex"] {
        flex-wrap: wrap !important;
      }
      .card > div[style*="border: 1px solid"][style*="border-radius: 8px"][style*="display: flex"] > div[style*="width: 80px"] {
        width: 60px !important;
        height: 45px !important;
      }
      .card > div[style*="border: 1px solid"][style*="border-radius: 8px"][style*="display: flex"] > div[style*="flex: 1"] {
        flex: 1 1 100% !important;
        min-width: 0 !important;
      }

      /* ─── Image + Browse button combos ── */
      div[style*="display: flex"][style*="gap: 0.5rem"]:has(> .btn) {
        flex-wrap: wrap !important;
      }

      /* ─── Press Monitor page header ──── */
      .page-header > div[style*="display: flex"][style*="gap: 0.5rem"] {
        flex-wrap: wrap;
        width: 100%;
      }
      .page-header > div[style*="display: flex"][style*="gap: 0.5rem"] .btn {
        flex: 1;
        justify-content: center;
        min-height: 44px;
      }

      /* ─── Financial tab row ──────────── */
      div[style*="display:flex"][style*="margin-bottom:1.5rem"][style*="flex-wrap:wrap"] .btn {
        flex: 1;
        justify-content: center;
        min-height: 40px;
        font-size: 0.82rem;
      }

      /* ─── Inline flex button groups ──── */
      div[style*="display:flex"][style*="justify-content:space-between"] {
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      /* ─── Newsletter / Constant Contact table ── */
      .card table[style*="border-collapse"] {
        font-size: 0.82rem !important;
      }
      .card table[style*="border-collapse"] th,
      .card table[style*="border-collapse"] td {
        padding: 0.4rem 0.5rem !important;
      }

      /* ─── Inline multi-column form-row overrides ── */
      .form-row[style*="grid-template-columns"] {
        grid-template-columns: 1fr !important;
      }

      /* ─── Fix input min-width overflow at 390px ── */
      input[style*="min-width"],
      .form-input[style*="min-width"] {
        min-width: 0 !important;
      }
      /* Image picker search input */
      .img-picker-toolbar input[style*="min-width"] {
        min-width: 0 !important;
        width: 100% !important;
      }

      /* ─── Fix inline max-width overflow ─────── */
      img[style*="max-width: 400px"],
      img[style*="max-width: 480px"],
      div[style*="max-width: 400px"],
      div[style*="max-width: 480px"] {
        max-width: 100% !important;
      }
      iframe[style*="max-width"] {
        max-width: 100% !important;
      }

      /* ─── Touch targets: inline small buttons ── */
      /* Photo/gallery delete & browse buttons with tiny padding */
      .card button[style*="padding: 0.2rem"],
      .card button[style*="padding:0.2rem"] {
        min-height: 40px !important;
        min-width: 40px !important;
        padding: 0.4rem 0.6rem !important;
      }
      /* Partner/chip remove buttons */
      .chip-remove,
      button[style*="padding: 0 0.2rem"],
      button[style*="padding:0 0.2rem"] {
        min-height: 36px !important;
        min-width: 36px !important;
      }
      /* Photo grid action buttons */
      .photo-btn {
        width: 36px !important;
        height: 36px !important;
      }

      /* ─── FAQ reorder buttons ──────────────── */
      button[style*="min-height: auto"],
      button[style*="min-height:auto"] {
        min-height: 36px !important;
        min-width: 36px !important;
        padding: 0.3rem 0.5rem !important;
      }

      /* ─── OurStory milestone nav buttons ───── */
      .card button[style*="padding: 2px"],
      .card button[style*="padding:2px"] {
        min-height: 36px !important;
        min-width: 36px !important;
        padding: 0.35rem 0.5rem !important;
        font-size: 0.78rem !important;
      }

      /* ─── Small font size floor on mobile ──── */
      [style*="font-size: 0.6rem"],
      [style*="font-size:0.6rem"] {
        font-size: 0.72rem !important;
      }
      [style*="font-size: 0.7rem"],
      [style*="font-size:0.7rem"] {
        font-size: 0.78rem !important;
      }
    }

    /* ─── Mobile: 480px ────────────────── */
    @media (max-width: 480px) {
      .main { padding: 3.5rem 0.75rem 0.75rem; padding-top: calc(3.5rem + env(safe-area-inset-top, 0px)); }
      .page-header { gap: 0.5rem; margin-bottom: 1.25rem; }
      .page-header h2 { font-size: 1.1rem; }
      .page-header .btn { font-size: 0.85rem; flex: 1; justify-content: center; }
      .stat-grid { grid-template-columns: 1fr !important; }
      .stat-card { padding: 1rem; }
      .stat-card .stat-number { font-size: 1.5rem; }
      .td-thumb { width: 36px; height: 36px; }
      .photo-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
      .photo-btn { width: 36px !important; height: 36px !important; }
      .form-hint { font-size: 0.75rem; }
      .card { padding: 0.85rem; border-radius: 10px; }
      .dropzone { padding: 1.25rem 0.75rem; }
      .dropzone-text { font-size: 0.82rem; }
      .badge { font-size: 0.7rem; }
      .deploy-item { padding: 0.7rem 0.75rem; gap: 0.5rem; }

      /* Milestones: reduce left padding on image row */
      .card > div[style*="background: rgba(45,46,51"] > div[style*="padding-left: 2.5rem"] {
        padding-left: 0 !important;
      }
      /* Milestones: smaller image preview */
      .card > div[style*="background: rgba(45,46,51"] img[style*="width: 80px"] {
        width: 60px !important;
        height: 40px !important;
      }
    }

    /* ─── Landscape phone ──────────────── */
    @media (max-width: 768px) and (orientation: landscape) {
      .sidebar.open { width: 200px; }
      .modal-content { max-height: 90vh; overflow-y: auto; }
    }

    /* ─── Page Header ───────────────────── */
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.75rem;
      flex-wrap: wrap; gap: 1rem;
    }
    .page-header h2 {
      font-size: 1.5rem;
      font-weight: 700;
    }

    h3 { margin: 0; }

    /* ─── Cards ──────────────────────────── */
    .card {
      background: var(--color-bg-card);
      border-radius: var(--radius-md);
      padding: 1.5rem;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--color-border);
      margin-bottom: 1rem;
      overflow: hidden;
    }
    .card:has(.table-wrap) { padding: 0; }
    .card:has(.table-wrap) > div:first-child { padding: 1.5rem 1.5rem 0.5rem; }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
    }
    .stat-card {
      --card-accent: var(--color-primary);
      background: var(--color-bg-card);
      border-radius: var(--radius-md);
      padding: 1.25rem 1.5rem;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--color-border);
      text-align: center;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      animation: cardSlideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) both;
    }
    .stat-card:nth-child(1) { animation-delay: 0s; }
    .stat-card:nth-child(2) { animation-delay: 0.05s; }
    .stat-card:nth-child(3) { animation-delay: 0.1s; }
    .stat-card:nth-child(4) { animation-delay: 0.15s; }
    .stat-card:nth-child(5) { animation-delay: 0.2s; }
    .stat-card:nth-child(6) { animation-delay: 0.25s; }
    .stat-card:nth-child(7) { animation-delay: 0.3s; }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--color-border);
      transition: background 0.25s ease, height 0.25s ease;
    }
    .stat-card:hover {
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      transform: translateY(-3px);
      border-color: transparent;
    }
    .stat-card:hover::before {
      background: var(--card-accent, var(--color-primary));
      height: 4px;
    }
    .stat-card:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(255, 213, 0, 0.25);
    }
    .stat-card .stat-number {
      font-size: 2.25rem;
      font-weight: 800;
      color: var(--card-accent);
      line-height: 1.1;
      animation: countUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) both;
      animation-delay: inherit;
    }
    .stat-card .stat-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #6B6C72;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-top: 0.25rem;
    }

    /* ─── Buttons ────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      transition: all 0.15s;
    }
    .btn-primary { background: var(--color-primary); color: var(--color-text); }
    .btn-primary:hover { background: var(--color-primary-hover); }
    .btn-secondary { background: var(--color-text); color: #fff; }
    .btn-secondary:hover { background: #3D3E43; }
    .btn-danger { background: var(--color-danger); color: #fff; }
    .btn-danger:hover { background: #C53030; }
    .btn-ghost { background: transparent; color: var(--color-text-secondary); border: 1px solid var(--color-border); }
    .btn-ghost:hover { background: var(--color-bg); }
    .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ─── Forms ──────────────────────────── */
    .form-group { margin-bottom: 1.25rem; }
    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 0.35rem;
    }
    /* Photo freshness badges */
    .freshness-badge {
      display: inline-block; font-size: 0.7rem; font-weight: 600; padding: 0.15rem 0.5rem;
      border-radius: 99px; margin-left: 0.5rem; vertical-align: middle; letter-spacing: 0.01em;
    }
    .freshness-fresh { background: #C6F6D5; color: #22543D; }
    .freshness-aging { background: #FEFCBF; color: #744210; }
    .freshness-stale { background: #FED7D7; color: #9B2C2C; }
    .freshness-unknown { background: #E2E8F0; color: #4A5568; }
    .freshness-alert {
      display: flex; align-items: center; gap: 0.75rem; padding: 0.85rem 1rem;
      border-radius: var(--radius-sm); margin-bottom: 1rem; font-size: 0.88rem;
    }
    .freshness-alert--warn { background: #FFFBEB; border: 1px solid #F6E05E; color: #744210; }
    .freshness-alert--danger { background: #FFF5F5; border: 1px solid #FEB2B2; color: #9B2C2C; }
    .form-hint {
      font-size: 0.78rem;
      color: #737580;
      margin-top: 0.2rem;
    }
    .form-input, .form-textarea, .form-select {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      background: var(--color-bg-card);
      font-size: 0.95rem;
      transition: border-color 0.15s;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: var(--focus-ring);
    }
    .form-textarea { resize: vertical; min-height: 120px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-grid .span-2 { grid-column: 1 / -1; }
    .form-grid input, .form-grid textarea, .form-grid select,
    .form-group input:not(.form-input):not([type="checkbox"]):not([type="radio"]),
    .form-group textarea:not(.form-textarea),
    .form-group select:not(.form-select) {
      width: 100%; padding: 0.6rem 0.75rem; border: 1px solid #E5E4E0;
      border-radius: 8px; background: #fff; font-size: 0.95rem; transition: border-color 0.15s;
    }
    .form-grid input:focus, .form-grid textarea:focus, .form-grid select:focus,
    .form-group input:not(.form-input):not([type="checkbox"]):not([type="radio"]):focus,
    .form-group textarea:not(.form-textarea):focus,
    .form-group select:not(.form-select):focus {
      outline: none; border-color: var(--color-primary); box-shadow: var(--focus-ring);
    }
    .form-grid textarea, .form-group textarea:not(.form-textarea) { resize: vertical; min-height: 80px; }
    .modal-content {
      background: #fff; border-radius: 16px;
      max-width: 500px; width: 100%;
      padding: 1.75rem;
    }
    .modal-content h3 { font-weight: 700; }
    .modal-content .form-group { margin-bottom: 1rem; }
    .modal-content label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.35rem; }
    .modal-content input, .modal-content select {
      width: 100%; padding: 0.6rem 0.75rem; border: 1px solid #E5E4E0;
      border-radius: 8px; background: #fff; font-size: 0.95rem;
    }
    .modal-content input:focus, .modal-content select:focus {
      outline: none; border-color: var(--color-primary); box-shadow: var(--focus-ring);
    }
    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr !important; }
      .form-grid { grid-template-columns: 1fr !important; }
      .form-grid .span-2 { grid-column: 1; }
    }

    .checkbox-label {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.9rem; cursor: pointer;
    }
    .checkbox-label input { width: 18px; height: 18px; accent-color: var(--color-primary); }

    /* ─── Chips/Tags ─────────────────────── */
    .chip {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.25rem 0.65rem;
      background: rgba(45,46,51,0.08);
      color: var(--color-text);
      border: none;
      border-radius: 100px;
      font-size: 0.78rem;
      font-weight: 500;
    }
    .chip-remove {
      background: none; border: none;
      color: var(--color-text); font-size: 1rem;
      line-height: 1; cursor: pointer;
      padding: 0 0.1rem;
    }

    /* ─── Table ──────────────────────────── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--color-text-secondary);
      padding: 0.75rem;
      border-bottom: 2px solid var(--color-border);
    }
    td {
      padding: 0.75rem;
      border-bottom: 1px solid var(--color-bg);
      font-size: 0.9rem;
    }
    tr:hover td { background: var(--color-primary-bg); }
    .td-thumb {
      width: 48px; height: 48px;
      border-radius: 8px;
      object-fit: cover;
      background: #E5E4E0;
    }

    /* ─── Drop Zone ──────────────────────── */
    .dropzone {
      border: 2px dashed var(--color-border);
      border-radius: 12px;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #FEFCF5;
    }
    .dropzone:hover, .dropzone.drag-over {
      border-color: var(--color-primary);
      background: var(--color-primary-bg);
    }
    .dropzone-icon { font-size: 2rem; margin-bottom: 0.5rem; color: var(--color-text-secondary); }
    .dropzone-icon svg { width: 32px; height: 32px; }
    .dropzone-text { color: var(--color-text-secondary); font-size: 0.9rem; }
    .dropzone-text strong { color: var(--color-primary); }

    /* ─── Photo Grid (drag-to-reorder) ───── */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.75rem;
      margin-top: 1rem;
    }
    .photo-grid-item { display: flex; flex-direction: column; }
    .photo-grid-item[draggable="true"] { cursor: grab; }
    .photo-grid-item[draggable="true"]:active { cursor: grabbing; }
    .photo-grid-item.drag-over {
      outline: 2px dashed var(--color-primary);
      outline-offset: 2px;
      border-radius: 8px;
    }
    .photo-grid-item.dragging { opacity: 0.4; }
    .sortable-ghost { opacity: 0.15; }
    .sortable-chosen { background: var(--color-primary-bg) !important; }
    .sortable-drag { background: var(--color-bg-card) !important; box-shadow: 0 8px 24px rgba(0,0,0,0.15); border-radius: 8px; }
    .drag-handle { cursor: grab; user-select: none; color: #999; font-size: 1.1rem; padding: 0 4px; }
    .drag-handle:active { cursor: grabbing; }
    .drag-handle:hover { color: #555; }
    .photo-item {
      position: relative;
      aspect-ratio: 4/3;
      border-radius: 8px;
      overflow: hidden;
      background: #E5E4E0;
    }
    .photo-item img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .photo-item.is-hero { outline: 3px solid var(--color-primary); outline-offset: -3px; }
    .photo-actions {
      position: absolute; top: 0.35rem; right: 0.35rem;
      display: flex; gap: 0.25rem;
    }
    .photo-btn {
      width: 28px; height: 28px;
      border-radius: 6px;
      border: none;
      font-size: 0.85rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      background: rgba(0,0,0,0.6); color: #fff;
      transition: background 0.15s;
    }
    .photo-btn:hover { background: rgba(0,0,0,0.85); }
    .photo-btn.hero-btn { background: rgba(255,213,0,0.9); color: var(--color-text); }
    .photo-uploading {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 0.85rem;
    }

    /* ─── Toast ──────────────────────────── */
    .toast-container {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      z-index: 1000;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .toast {
      padding: 0.75rem 1.25rem;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      font-weight: 500;
      box-shadow: var(--shadow-md);
      animation: slideIn 0.25s ease;
    }
    .toast-success { background: var(--color-success); color: #fff; }
    .toast-error { background: var(--color-danger); color: #fff; }
    .toast-info { background: var(--color-text); color: #fff; }
    .toast-warning { background: var(--color-warning); color: #fff; }
    @keyframes slideIn {
      from { transform: translateY(1rem); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* ─── Modal ──────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 500;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
    }
    .modal {
      background: var(--color-bg-card); border-radius: var(--radius-lg);
      max-width: 500px; width: 100%;
      padding: 1.75rem;
      box-shadow: var(--shadow-lg);
    }
    .modal h3 { font-weight: 700; margin-bottom: 0.75rem; }
    .modal p { color: var(--color-text-secondary); font-size: 0.9rem; margin-bottom: 1.25rem; }
    .modal-buttons { display: flex; gap: 0.75rem; justify-content: flex-end; }

    /* ─── Search ──────────────────────────── */
    .search-bar {
      position: relative;
      max-width: 320px;
    }
    .search-bar input {
      width: 100%;
      padding: 0.55rem 0.75rem 0.55rem 2.25rem;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      background: var(--color-bg-card);
    }
    .search-bar input:focus { outline: none; border-color: var(--color-primary); box-shadow: var(--focus-ring); }
    .search-icon {
      position: absolute; left: 0.7rem; top: 50%;
      transform: translateY(-50%);
      color: #737580; font-size: 0.9rem;
      pointer-events: none;
    }

    /* ─── Empty State ────────────────────── */
    .empty-state {
      text-align: center; padding: 3rem 1rem;
      color: var(--color-text-secondary);
    }
    .empty-state-icon { font-size: 3rem; margin-bottom: 0.75rem; color: var(--color-text-muted); }
    .empty-state-icon svg { width: 48px; height: 48px; }

    /* ─── Back link / Breadcrumb ─────────── */
    .breadcrumb {
      display: flex; align-items: center; gap: 0.35rem;
      font-size: 0.85rem; color: var(--color-text-secondary);
      margin-bottom: 1rem;
    }
    .breadcrumb button {
      background: none; border: none; cursor: pointer;
      color: var(--color-text-secondary); font-size: 0.85rem; padding: 0;
      display: inline-flex; align-items: center; gap: 0.25rem;
    }
    .breadcrumb button:hover { color: var(--color-primary); }
    .breadcrumb .sep { color: #737580; font-size: 0.75rem; }
    .breadcrumb .current { color: var(--color-text); font-weight: 500; }
    .back-link {
      display: inline-flex; align-items: center; gap: 0.35rem;
      font-size: 0.85rem; color: var(--color-text-secondary);
      margin-bottom: 1rem; cursor: pointer;
      background: none; border: none;
    }
    .back-link:hover { color: var(--color-text); }

    /* ─── Badge ──────────────────────────── */
    .badge {
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-green { background: #C6F6D5; color: #22543D; }
    .badge-yellow { background: #FEFCBF; color: #744210; }
    .badge-accent { background: rgba(45,46,51,0.1); color: #2D2E33; }
    .badge-gray { background: #E2E8F0; color: #4A5568; }
    .badge-red { background: #FED7D7; color: #9B2C2C; }
    .badge-blue { background: #BEE3F8; color: #2A4365; }

    /* ─── Deploy List ────────────────────── */
    .deploy-item {
      display: flex; align-items: flex-start; gap: 0.75rem;
      padding: 0.85rem 1rem;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      transition: background 0.15s;
    }
    .deploy-item:last-child { border-bottom: none; }
    .deploy-item:hover { background: rgba(0,0,0,0.02); }
    .deploy-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      flex-shrink: 0; background: #E2E8F0;
    }
    .deploy-body { flex: 1; min-width: 0; }
    .deploy-msg {
      font-weight: 500; font-size: 0.9rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .deploy-meta {
      font-size: 0.78rem; color: #6B6C72; margin-top: 0.2rem;
      display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center;
    }
    .deploy-sha {
      font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.75rem;
      background: rgba(0,0,0,0.06); padding: 0.1rem 0.4rem; border-radius: 4px;
      color: #4A5568; text-decoration: none;
    }
    .deploy-sha:hover { background: rgba(0,0,0,0.1); }
    .deploy-status { flex-shrink: 0; margin-top: 0.1rem; }
    .deploy-link {
      font-size: 0.78rem; color: var(--color-info); text-decoration: none;
    }
    .deploy-link:hover { text-decoration: underline; }

    /* ─── Spinner ─────────────────────────── */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid rgba(0,0,0,0.15);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Rich Text Toolbar ────────────── */
    .rte-wrap { border: 1px solid var(--color-border); border-radius: var(--radius-sm); overflow: hidden; transition: border-color 0.15s; }
    .rte-wrap:focus-within { border-color: var(--color-primary); box-shadow: var(--focus-ring); }
    .rte-toolbar {
      display: flex; flex-wrap: wrap; gap: 0.15rem; padding: 0.35rem 0.5rem;
      background: var(--color-bg); border-bottom: 1px solid var(--color-border);
    }
    .rte-btn {
      width: 32px; height: 28px; display: flex; align-items: center; justify-content: center;
      border: none; background: transparent; border-radius: 4px; cursor: pointer;
      font-size: 0.85rem; font-weight: 600; color: var(--color-text); transition: background 0.1s;
    }
    .rte-btn:hover { background: rgba(0,0,0,0.08); }
    .rte-btn.active { background: var(--color-primary); }
    .rte-sep { width: 1px; height: 20px; background: var(--color-border); margin: 4px 2px; }
    .rte-body {
      min-height: 200px; padding: 0.75rem; font-size: 0.95rem; line-height: 1.6;
      outline: none; background: var(--color-bg-card);
    }
    .rte-body p { margin-bottom: 0.5em; }
    .rte-body h3 { margin-bottom: 0.3em; font-weight: 700; }
    .rte-body ul, .rte-body ol { margin-left: 1.5em; margin-bottom: 0.5em; }
    .rte-body blockquote { border-left: 3px solid var(--color-primary); padding-left: 0.75rem; color: var(--color-text-secondary); margin-bottom: 0.5em; }
    .rte-body a { color: #1a0dab; text-decoration: underline; }

    /* ─── Sortable table headers ──────── */
    th.sortable { cursor: pointer; user-select: none; white-space: nowrap; }
    th.sortable:hover { color: #2D2E33; }
    .sort-icon { font-size: 0.7rem; margin-left: 0.25rem; opacity: 0.4; }
    th.sortable.sorted .sort-icon { opacity: 1; color: var(--color-primary); }

    /* ─── Bulk actions bar ────────────── */
    .bulk-bar {
      display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem;
      background: #2D2E33; color: #fff; border-radius: 10px;
      margin-bottom: 1rem; animation: slideIn 0.2s ease;
    }
    .bulk-bar .btn { font-size: 0.82rem; }

    /* ─── Draft status badge ─────────── */
    .draft-badge, .draft-badge-draft, .draft-badge-published {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.2rem 0.6rem; border-radius: 100px;
      font-size: 0.75rem; font-weight: 600;
    }
    .draft-badge-draft { background: #FEFCBF; color: #744210; }
    .draft-badge-published { background: #C6F6D5; color: #22543D; }

    /* ─── Activity log ───────────────── */
    .activity-item {
      display: flex; align-items: flex-start; gap: 0.75rem;
      padding: 0.6rem 0.5rem; border-bottom: 1px solid #F5F4F0;
      font-size: 0.85rem;
      border-radius: 6px;
      margin: 0 -0.5rem;
      transition: background 0.15s ease;
      cursor: default;
    }
    .activity-item:hover { background: var(--color-primary-bg); }
    .activity-item:last-child { border-bottom: none; }
    .activity-dot {
      width: 8px; height: 8px; border-radius: 50%;
      margin-top: 0.35rem; flex-shrink: 0;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .activity-item:hover .activity-dot {
      transform: scale(1.4);
      box-shadow: 0 0 0 3px rgba(255,213,0,0.15);
    }
    .activity-dot-create { background: #38A169; }
    .activity-dot-update { background: var(--color-primary); }
    .activity-dot-delete { background: #E53E3E; }

    /* ─── Form Validation ────────────────── */
    .form-input.is-invalid, .form-textarea.is-invalid, .form-select.is-invalid {
      border-color: var(--color-danger);
    }
    .form-input.is-invalid:focus, .form-textarea.is-invalid:focus, .form-select.is-invalid:focus {
      border-color: #E53E3E;
      box-shadow: 0 0 0 3px rgba(229,62,62,0.15);
    }
    .form-error {
      font-size: 0.78rem;
      color: var(--color-danger);
      margin-top: 0.2rem;
    }
    .char-count {
      font-size: 0.75rem;
      color: var(--color-text-muted);
      text-align: right;
      margin-top: 0.15rem;
    }
    .char-count.over { color: var(--color-danger); font-weight: 600; }

    /* ─── Command Palette ──────────────── */
    .cmd-palette-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.5);
      display: flex; justify-content: center;
      padding-top: min(20vh, 140px);
    }
    .cmd-palette {
      width: min(560px, 92vw);
      max-height: 420px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 0 1px rgba(0,0,0,0.06);
      display: flex; flex-direction: column;
      overflow: hidden;
      align-self: flex-start;
    }
    .cmd-palette-input-wrap {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border, #E5E4E0);
    }
    .cmd-palette-input-wrap svg { width: 18px; height: 18px; stroke: #737580; flex-shrink: 0; }
    .cmd-palette-input {
      flex: 1; border: none; outline: none; font-size: 1rem;

    class ErrorBoundary extends Component {
      constructor(props) { super(props); this.state = { error: null }; }
      static getDerivedStateFromError(error) { return { error }; }
      componentDidCatch(error, info) { console.error('Admin panel error:', error, info); }
      render() {
        if (this.state.error) {
          return html`<div style="padding: 3rem; max-width: 600px; margin: 0 auto; text-align: center;">
            <h2 style="margin-bottom: 1rem; color: var(--color-danger);">Something went wrong</h2>
            <p style="margin-bottom: 0.5rem; color: var(--color-text-secondary);">${this.state.error.message}</p>
            <pre style="text-align: left; font-size: 0.75rem; background: #f5f5f5; padding: 1rem; border-radius: 8px; overflow: auto; max-height: 200px; margin-bottom: 1.5rem;">${this.state.error.stack}</pre>
            <button class="btn btn-primary" onClick=${() => { this.setState({ error: null }); }}>Try Again</button>
          </div>`;
        }
        return this.props.children;
      }
    }

    // ─── API Helpers ────────────────────────
    const api = {
      async listContent(dir) {
        const r = await fetch(`/api/list-content?dir=${encodeURIComponent(dir)}`);
        return r.json();
      },
      async bulkListContent(dir) {
        // Fetch all pages — API returns max 45 items per page to stay under subrequest limits
        let allItems = [];
        let page = 0;
        let totalPages = 1;
        while (page < totalPages) {
          const r = await fetch(`/api/list-content?dir=${encodeURIComponent(dir)}&page=${page}`);
          const data = await r.json();
          if (!data.success) return data;
          allItems = allItems.concat(data.items || []);
          totalPages = data.pages || 1;
          page++;
        }
        return { success: true, count: allItems.length, items: allItems };
      },
      async readContent(path) {
        const r = await fetch(`/api/read-content?path=${encodeURIComponent(path)}`);
        return r.json();
      },
      async saveContent(path, content, message, sha) {
        const r = await fetch('/api/save-content', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path, content, message, sha }),
        });
        const data = await r.json();
        if (data.success) window.dispatchEvent(new CustomEvent('soard-content-changed'));
        return data;
      },
      async deleteContent(path, sha, message) {
        const r = await fetch('/api/delete-content', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path, sha, message }),
        });
        const data = await r.json();
        if (data.success) window.dispatchEvent(new CustomEvent('soard-content-changed'));
        return data;
      },
      async uploadImage(file, id) {
        const form = new FormData();
        form.append('file', file);
        if (id) form.append('id', id);
        const r = await fetch('/api/upload-image', { method: 'POST', body: form });
        return r.json();
      },
      async deleteImage(imageId) {
        const r = await fetch('/api/delete-image', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ imageId }),
        });
        return r.json();
      },
      async uploadFile(file, path, message) {
        const form = new FormData();
        form.append('file', file);
        form.append('path', path);
        form.append('message', message || `Upload ${file.name}`);
        const r = await fetch('/api/upload-file', { method: 'POST', body: form });
        return r.json();
      },
      async uploadVideo(file, name, { onProgress } = {}) {
        // Step 1: Get a direct creator upload URL from our backend
        const r = await fetch('/api/upload-video', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, fileSize: file.size }),
        });
        const data = await r.json();
        if (!data.success) throw new Error(data.error || 'Failed to get upload URL');

        // Step 2: Upload directly to Cloudflare Stream via TUS (resumable)
        return new Promise((resolve, reject) => {
          const upload = new tus.Upload(file, {
            uploadUrl: data.uploadUrl,
            chunkSize: 50 * 1024 * 1024, // 50 MB chunks
            retryDelays: [0, 1000, 3000, 5000, 10000],
            metadata: { filename: file.name, filetype: file.type },
            onError(err) { reject(err); },
            onProgress(bytesUploaded, bytesTotal) {
              if (onProgress) onProgress(Math.round((bytesUploaded / bytesTotal) * 100));
            },
            onSuccess() {
              resolve({ success: true, videoId: data.videoId });
            },
          });
          upload.start();
        });
      },
      async generate(type, kid) {
        const r = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type, kid }),
        });
        return r.json();
      },
      async listImages(perPage = 100, continuationToken = '') {
        let url = `/api/list-images?per_page=${perPage}`;
        if (continuationToken) url += `&continuation_token=${encodeURIComponent(continuationToken)}`;
        const r = await fetch(url);
        return r.json();
      },
    };

    // ─── Activity Log (server-backed) ──────────────────────
    // Legacy logActivity kept for backward compat — now a no-op since server handles it
    function logActivity() {}

    const AUDIT_ACTION_COLORS = {
      created: '#38A169',
      updated: '#3182CE',
      published: '#3182CE',
      deleted: '#E53E3E',
      drafted: '#D69E2E',
      uploaded: '#805AD5',
    };

    function auditTimeAgo(isoStr) {
      const diff = Date.now() - new Date(isoStr + 'Z').getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return mins + 'm ago';
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + 'h ago';
      const days = Math.floor(hrs / 24);
      if (days < 30) return days + 'd ago';
      return new Date(isoStr + 'Z').toLocaleDateString();
    }

    function userInitials(email) {
      if (!email || email === 'unknown') return '?';
      const name = email.split('@')[0];
      const parts = name.split(/[._-]/);
      if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
      return name.slice(0, 2).toUpperCase();
    }

    /** Mini activity feed for the dashboard — shows latest 15 from server */
    function ActivityLog({ onViewAll }) {
      const [log, setLog] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        fetch('/api/audit-log?limit=15')
          .then(r => r.json())
          .then(data => { if (data.success) setLog(data.entries); })
          .catch(() => {})
          .finally(() => setLoading(false));
      }, []);

      if (loading) return html`
        <div class="card" style="text-align: center; color: var(--text-secondary); padding: 2rem;">
          Loading activity...
        </div>
      `;

      if (!log.length) return html`
        <div class="card" style="text-align: center; color: var(--text-secondary); padding: 2rem;">
          No activity yet. Changes you make will appear here.
        </div>
      `;

      return html`
        <div class="card" style="padding: 1rem 1.25rem;">
          <div style="max-height: 400px; overflow-y: auto;">
            ${log.map((entry, i) => html`
              <div class="activity-item" key=${entry.id || i}>
                <div class="activity-dot" style="background: ${AUDIT_ACTION_COLORS[entry.action] || '#718096'};"></div>
                <div style="flex: 1; min-width: 0;">
                  <div>
                    <span style="font-weight: 500; text-transform: capitalize;">${entry.action}</span>
                    ${' '}
                    <span style="color: var(--text-secondary);">${entry.entity_type}</span>
                    ${entry.entity_name ? html` — <strong>${entry.entity_name}</strong>` : ''}
                  </div>
                  <div style="font-size: 0.78rem; color: var(--text-secondary); margin-top: 2px;">
                    ${entry.user_email && entry.user_email !== 'unknown'
                      ? html`<span style="font-weight: 500;">${entry.user_email.split('@')[0]}</span> · `
                      : ''}${auditTimeAgo(entry.created_at)}${entry.changes ? html` · <span style="color: #805AD5;">${entry.changes.length} field${entry.changes.length !== 1 ? 's' : ''}</span>` : ''}
                  </div>
                </div>
              </div>
            `)}
          </div>
          ${onViewAll ? html`
            <div style="text-align: center; padding-top: 0.75rem; border-top: 1px solid #F5F4F0; margin-top: 0.5rem;">
              <button onClick=${onViewAll} class="btn btn-ghost" style="font-size: 0.85rem;">View Full Audit Log</button>
            </div>
          ` : null}
        </div>
      `;
    }

    // ─── Full Audit Log Page ──────────────────────
    function AuditLogPage({ addToast }) {
      const [entries, setEntries] = useState([]);
      const [total, setTotal] = useState(0);
      const [loading, setLoading] = useState(true);
      const [offset, setOffset] = useState(0);
      const [expanded, setExpanded] = useState(null);
      const limit = 30;

      // Filters
      const [filterAction, setFilterAction] = useState('');
      const [filterType, setFilterType] = useState('');
      const [filterUser, setFilterUser] = useState('');
      const [filterSearch, setFilterSearch] = useState('');

      const loadEntries = useCallback(async (newOffset = 0) => {
        setLoading(true);
        try {
          const params = new URLSearchParams({ limit: String(limit), offset: String(newOffset) });
          if (filterAction) params.set('action', filterAction);
          if (filterType) params.set('type', filterType);
          if (filterUser) params.set('user', filterUser);
          if (filterSearch) params.set('search', filterSearch);
          const res = await fetch('/api/audit-log?' + params.toString());
          const data = await res.json();
          if (data.success) {
            setEntries(data.entries);
            setTotal(data.total);
            setOffset(newOffset);
          }
        } catch (e) {
          addToast?.('Failed to load audit log', 'error');
        }
        setLoading(false);
      }, [filterAction, filterType, filterUser, filterSearch]);

      useEffect(() => { loadEntries(0); }, [loadEntries]);

      const totalPages = Math.ceil(total / limit);
      const currentPage = Math.floor(offset / limit) + 1;

      // Collect unique users and types for filter dropdowns
      const uniqueUsers = [...new Set(entries.map(e => e.user_email).filter(Boolean))];

      const entityTypes = ['kids', 'partners', 'medialogos', 'team', 'articles', 'events', 'press', 'community', 'financials', 'settings', 'faq', 'our-story', 'media', 'kids-on-site'];

      return html`
        <div>

            <div>
              <h2 style="margin: 0;">Audit Log</h2>
              <p class="text-sm text-muted" style="margin: 0.25rem 0 0;">Server-side record of every content change — who, what, when, and exactly what changed.</p>

          </div>

          <div class="card" style="padding: 1rem 1.25rem; margin-bottom: 1rem; display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center;">
            <input class="form-input" style="flex: 1; min-width: 180px; max-width: 260px;" type="text"
              placeholder="Search by name..."
              value=${filterSearch}
              onInput=${e => setFilterSearch(e.target.value)} />
            <select class="form-select" style="min-width: 130px;"
              value=${filterAction} onChange=${e => setFilterAction(e.target.value)}>

              <option value="created">Created</option>
              <option value="updated">Updated</option>
              <option value="deleted">Deleted</option>

            <select class="form-select" style="min-width: 130px;"
              value=${filterType} onChange=${e => setFilterType(e.target.value)}>
              <option value="">All types</option>
              ${entityTypes.map(t => html`<option value=${t}>${t}</option>`)}
            </select>
            ${(filterAction || filterType || filterSearch || filterUser) ? html`
              <button class="btn btn-ghost" style="font-size: 0.85rem;"
                onClick=${() => { setFilterAction(''); setFilterType(''); setFilterSearch(''); setFilterUser(''); }}>
                Clear filters
              </button>

          </div>

          <!-- Entries -->
          <div class="card" style="padding: 0;">
            ${loading ? html`
              <div style="text-align: center; padding: 3rem; color: var(--text-secondary);">Loading...</div>

              <div style="text-align: center; padding: 3rem; color: var(--text-secondary);">No entries match your filters.</div>

                    <th>Name</th>
                    <th>User</th>

                <tbody>
                  ${entries.map((entry, i) => html`

                        <div style="width: 28px; height: 28px; border-radius: 50%; background: ${AUDIT_ACTION_COLORS[entry.action] || '#718096'}15;
                          display: flex; align-items: center; justify-content: center;">

      name: 'Name', slug: 'Slug', age: 'Age', diagnosis: 'Diagnosis',
      year: 'Year', bio: 'Bio', heroImage: 'Hero Image',
      shortDescription: 'Short Description', quote: 'Quote', photos: 'Photos (3+)',
    };

    function getCompleteness(kid, detailed) {
      const fields = [
        { k: 'name', w: 1 }, { k: 'slug', w: 1 }, { k: 'age', w: 0.5 },
        { k: 'diagnosis', w: 0.5 }, { k: 'year', w: 0.5 }, { k: 'bio', w: 1 },
        { k: 'heroImage', w: 1 }, { k: 'shortDescription', w: 0.5 },
        { k: 'quote', w: 0.5 },
      ];
      const photoScore = Math.min((kid.photoCount || 0) / 3, 1);
      let earned = 0, total = 0;
      const missing = [];
      fields.forEach(f => {
        total += f.w;
        if (kid[f.k]) earned += f.w;
        else missing.push(COMPLETENESS_FIELD_LABELS[f.k] || f.k);
      });
      total += 1;
      earned += photoScore;
      if (photoScore < 1) missing.push(COMPLETENESS_FIELD_LABELS.photos);
      const pct = Math.round((earned / total) * 100);
      return detailed ? { pct, missing } : pct;
    }

    function CompletenessRing({ pct, missing, size = 28 }) {
      const r = (size - 4) / 2;
      const circ = 2 * Math.PI * r;
      const offset = circ - (pct / 100) * circ;
      const color = pct >= 80 ? '#38A169' : pct >= 50 ? '#D69E2E' : '#E53E3E';
      const tip = pct >= 100 ? '100% complete!'
        : `${pct}% complete — Missing: ${missing && missing.length ? missing.join(', ') : 'nothing'}`;
      return html`
        <span class="completeness-ring" title="${tip}">
          <svg width=${size} height=${size}>
            <circle cx=${size/2} cy=${size/2} r=${r} fill="none" stroke="#E5E4E0" stroke-width="3" />
            <circle cx=${size/2} cy=${size/2} r=${r} fill="none" stroke=${color} stroke-width="3"
              stroke-dasharray=${circ} stroke-dashoffset=${offset} stroke-linecap="round" />
          </svg>
          <span class="completeness-pct" style="color: ${color};">${pct}</span>
        </span>
      `;
    }

    // ─── Community Completeness ─────────────
    const COMMUNITY_COMPLETENESS_LABELS = {
      name: 'Name', slug: 'Slug', year: 'Year', impact: 'Impact Number',
      impactLabel: 'Impact Label', description: 'Description',
      heroImage: 'Hero Image', story: 'Story', metaDescription: 'Meta Description',
      photos: 'Photos (2+)',
    };
    function getCommunityCompleteness(project, detailed) {
      const fields = [
        { k: 'name', w: 1 }, { k: 'slug', w: 1 }, { k: 'year', w: 0.5 },
        { k: 'impact', w: 0.5 }, { k: 'impactLabel', w: 0.5 },
        { k: 'description', w: 1 }, { k: 'heroImage', w: 1 },
        { k: 'story', w: 1 }, { k: 'metaDescription', w: 0.5 },
      ];
      const photoScore = Math.min(((project.photos || []).length || (project.imageId ? 1 : 0)) / 2, 1);
      let earned = 0, total = 0;
      const missing = [];
      fields.forEach(f => {
        total += f.w;
        if (project[f.k]) earned += f.w;
        else missing.push(COMMUNITY_COMPLETENESS_LABELS[f.k] || f.k);
      });
      total += 1;
      earned += photoScore;
      if (photoScore < 1) missing.push(COMMUNITY_COMPLETENESS_LABELS.photos);
      const pct = Math.round((earned / total) * 100);
      return detailed ? { pct, missing } : pct;
    }

    // ─── Favorites ──────────────────────────
    const FAVS_KEY = 'soard_favorites';
    function getFavorites() {
      try { return JSON.parse(localStorage.getItem(FAVS_KEY) || '[]'); } catch (e) { return []; }

    function toggleFavorite(type, slug) {
      const favs = getFavorites();
      const key = `${type}:${slug}`;
      const idx = favs.indexOf(key);
      if (idx >= 0) favs.splice(idx, 1); else favs.push(key);
      localStorage.setItem(FAVS_KEY, JSON.stringify(favs));
      return favs;

    function isFavorite(type, slug) {
      return getFavorites().includes(`${type}:${slug}`);
