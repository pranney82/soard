    // ═══════════════════════════════════════════
    // KIDS ON SITE — Manage kids across all pages
    // ═══════════════════════════════════════════
    function KidsOnSite({ addToast, kids: allKids = [] }) {
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [sha, setSha] = useState(null);
      const [data, setData] = useState({});
      const [showImagePicker, setShowImagePicker] = useState(false);
      const [imagePickerTarget, setImagePickerTarget] = useState(null);

      const sortedKids = useMemo(() =>
        [...allKids].sort((a, b) => (a.name || '').localeCompare(b.name || '')),
        [allKids]
      );

      useEffect(() => {
        (async () => {
          const res = await api.readContent('src/content/site/settings.json');
          if (res.success) {
            setData(JSON.parse(res.content));
            setSha(res.sha);
          }
          setLoading(false);
        })();
      }, []);

      const TRACKED_PHOTO_FIELDS = ['heroKidSlug', 'heroKidPhotoId', 'featuredKidSlug', 'featuredStoryImage',
        'sectionPhotos.missionMain', 'sectionPhotos.missionAccent', 'sectionPhotos.process',
        'sectionPhotos.roomBedroom', 'sectionPhotos.roomBath', 'sectionPhotos.roomTherapy',
        'donatePhotos.hero', 'donatePhotos.story',
        'applyPhotos.hero', 'applyPhotos.story', 'applyPhotos.selection',
        'communityPhotos.hero', 'communityPhotos.accent',
        'waysToGivePhotos.hero', 'waysToGivePhotos.breakPhoto', 'waysToGivePhotos.legacyPhoto',
        'partnerPhoto'];

      const stampPhoto = (copy, path) => {
        if (TRACKED_PHOTO_FIELDS.includes(path)) {
          if (!copy.photoTimestamps) copy.photoTimestamps = {};
          copy.photoTimestamps[path] = new Date().toISOString();
        }
      };

      const updateField = (path, value) => {
        setData(d => {
          const copy = JSON.parse(JSON.stringify(d));
          const keys = path.split('.');
          let obj = copy;
          for (let i = 0; i < keys.length - 1; i++) {
            if (!obj[keys[i]] || typeof obj[keys[i]] !== 'object') obj[keys[i]] = {};
            obj = obj[keys[i]];
          }
          obj[keys[keys.length - 1]] = value;
          stampPhoto(copy, path);
          return copy;
        });
      };

      const handleKidSelect = (index, slug) => {
        const kid = allKids.find(k => k.slug === slug);
        setData(d => {
          const arr = [...(d.kidShowcase || [])];
          // Warn if this kid already exists elsewhere in the showcase
          if (slug && arr.some((k, i) => i !== index && k.slug === slug)) {
            addToast(`${kid?.name || slug} is already in the showcase — duplicates will show the same kid twice`, 'info');
          }
          arr[index] = { slug, cfId: kid ? extractCfId(kid.heroImage) : '' };
          const ts = { ...(d.photoTimestamps || {}) };
          ts['kidShowcase'] = new Date().toISOString();
          return { ...d, kidShowcase: arr, photoTimestamps: ts };
        });
      };

      const addToArray = (key, item) => {
        setData(d => ({ ...d, [key]: [...(d[key] || []), item] }));
      };
      const removeFromArray = (key, index) => {
        setData(d => ({ ...d, [key]: (d[key] || []).filter((_, i) => i !== index) }));
      };
      const updateArrayItem = (key, index, field, value) => {
        setData(d => {
          const arr = [...(d[key] || [])];
          arr[index] = { ...arr[index], [field]: value };
          return { ...d, [key]: arr };
        });
      };
      const moveArrayItem = (key, from, to) => {
        setData(d => {
          const arr = [...(d[key] || [])];
          const [item] = arr.splice(from, 1);
          arr.splice(to, 0, item);
          return { ...d, [key]: arr };
        });
      };

      const openImagePicker = (target) => {
        setImagePickerTarget(target);
        setShowImagePicker(true);
      };

      const handleSave = async () => {
        setSaving(true);
        try {
          const content = JSON.stringify(data, null, 2);
          const res = await api.saveContent(
            'src/content/site/settings.json', content,
            'Update kids on site', sha
          );
          if (res.success) {
            setSha(res.sha);
            addToast('Kids on Site saved!', 'success');
            logActivity('updated', 'kids on site', '');
          } else {
            addToast(`Failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Error: ${err.message}`, 'error');
        }
        setSaving(false);
      };

      if (loading) return html`<${EditorSkeleton} />`;

      const pts = data.photoTimestamps || {};
      const fSummary = photoFreshnessSummary(pts);

      const renderPhotoField = (label, fieldPath, currentId) => html`
        <div class="form-group">
          <label class="form-label">${label} ${freshnessBadge(pts[fieldPath])}</label>
          ${currentId ? html`
            <div style="margin-bottom: 0.5rem; border-radius: 8px; overflow: hidden; max-height: 180px;">
              <img src="${CF}/${currentId}/w=400" alt="Preview" style="width: 100%; height: 180px; object-fit: cover; display: block;" />
            </div>
          ` : null}
          <div style="display: flex; gap: 0.5rem;">
            <input class="form-input" style="flex:1; font-size: 0.85rem;" value=${currentId || ''}
              onInput=${e => updateField(fieldPath, e.target.value)} />
            <button class="btn btn-ghost" type="button" onClick=${() => openImagePicker(fieldPath)}>Browse</button>
          </div>
        </div>
      `;

      return html`
        ${showImagePicker ? html`<${ImagePicker}
          onSelect=${(id) => { updateField(imagePickerTarget, id); setShowImagePicker(false); }}
          onClose=${() => setShowImagePicker(false)}
        />` : null}
        <div class="page-header">
          <h2>Kids on Site</h2>
          <button class="btn btn-primary" onClick=${handleSave} disabled=${saving}>
            ${saving ? html`<span class="spinner" />` : null} ${saving ? 'Saving...' : 'Save & Publish'}
          </button>
        </div>
        <p class="text-sm text-muted" style="margin: -0.5rem 0 1.5rem;">Control which kids, photos, and text appear across the entire site — homepage, donate, apply, partners, and section imagery — all in one place.</p>

        ${fSummary?.stale ? html`
          <div class="freshness-alert freshness-alert--danger">
            <span style="font-size: 1.3rem;">⚠</span>
            <span><strong>${fSummary.stale} photo${fSummary.stale > 1 ? 's' : ''}</strong> ha${fSummary.stale > 1 ? 've' : 's'} been the same for over ${PHOTO_STALE_DAYS} days. Consider refreshing to keep the site looking current.</span>
          </div>
        ` : fSummary?.aging ? html`
          <div class="freshness-alert freshness-alert--warn">
            <span style="font-size: 1.3rem;">🕐</span>
            <span><strong>${fSummary.aging} photo${fSummary.aging > 1 ? 's' : ''}</strong> ha${fSummary.aging > 1 ? 've' : 's'} been the same for over ${PHOTO_FRESH_DAYS} days. Consider updating soon.</span>
          </div>
        ` : null}

        <div class="card">
          <h3 style="margin-bottom: 1rem;">Homepage Hero ${freshnessBadge(newest(pts['heroKidSlug'], pts['heroKidPhotoId']))}</h3>
          <p class="text-sm text-muted mb-1">The kid shown in the large hero photo at the top of the homepage.</p>
          <div class="form-group">
            <label class="form-label">Kid</label>
            <div style="display: flex; gap: 0.75rem; align-items: center;">
              ${(() => {
                const sel = sortedKids.find(k => k.slug === (data.heroKidSlug || data.featuredKidSlug));
                const cid = data.heroKidPhotoId || (sel ? extractCfId(sel.heroImage) : '');
                return cid ? html`<img src=${CF + '/' + cid + '/w=120,h=120,fit=cover'}
                  alt="" style="width: 56px; height: 56px; border-radius: 8px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--color-border);" />` : null;
              })()}
              <select class="form-input" style="flex: 1" value=${data.heroKidSlug || data.featuredKidSlug || ''}
                onChange=${e => { const kid = sortedKids.find(k => k.slug === e.target.value); updateField('heroKidSlug', e.target.value); updateField('heroKidPhotoId', kid ? extractCfId(kid.heroImage) : ''); }}>
                <option value="">— Select a kid —</option>
                ${sortedKids.map(k => html`<option value=${k.slug} selected=${k.slug === (data.heroKidSlug || data.featuredKidSlug)}>${k.name}${k.year ? ` (${k.year})` : ''}</option>`)}
              </select>
            </div>
          </div>
          ${(() => {
            const sel = sortedKids.find(k => k.slug === (data.heroKidSlug || data.featuredKidSlug));
            if (!sel) return null;
            const seen = new Set();
            const allPhotos = [
              { id: extractCfId(sel.heroImage), label: 'Hero' },
              ...(sel.photos || []).map((p, i) => ({ id: extractCfId(p.url), label: `Photo ${i + 1}` })),
            ].filter(p => p.id && !seen.has(p.id) && seen.add(p.id));
            if (!allPhotos.length) return null;
            const currentId = data.heroKidPhotoId || extractCfId(sel.heroImage);
            return html`
              <div class="form-group" style="margin-top: 1rem;">
                <label class="form-label">Choose Photo</label>
                <div style="display: flex; flex-wrap: wrap; gap: 0.5rem;">
                  ${allPhotos.map(p => html`
                    <button type="button" onClick=${() => {
                      updateField('heroKidPhotoId', p.id);
                    }}
                      style="padding: 0; border: 3px solid ${(currentId === p.id) ? 'var(--color-primary, #2563eb)' : 'transparent'}; border-radius: 10px; overflow: hidden; cursor: pointer; background: none; position: relative; width: 80px; height: 80px; flex-shrink: 0;">
                      <img src=${CF + '/' + p.id + '/w=160,h=160,fit=cover'} alt=${p.label}
                        style="width: 100%; height: 100%; object-fit: cover; display: block;" />
                      ${(currentId === p.id) ? html`<span style="position: absolute; top: 2px; right: 2px; background: var(--color-primary, #2563eb); color: #fff; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 11px;">✓</span>` : null}
                    </button>
                  `)}
                </div>
              </div>
            `;
          })()}
        </div>

        <div class="card">
          <h3 style="margin-bottom: 1rem;">Featured Story ${freshnessBadge(newest(pts['featuredKidSlug'], pts['featuredStoryImage']))}</h3>
          <p class="text-sm text-muted mb-1">The kid highlighted in the "Featured Story" section further down the homepage. Can be different from the hero photo kid.</p>
          <div class="form-group">
            <label class="form-label">Kid</label>
            <div style="display: flex; gap: 0.75rem; align-items: center;">
              ${(() => {
                const sel = sortedKids.find(k => k.slug === data.featuredKidSlug);
                const cid = data.featuredStoryImage || (sel ? extractCfId(sel.heroImage) : '');
                return cid ? html`<img src=${CF + '/' + cid + '/w=120,h=120,fit=cover'}
                  alt="" style="width: 56px; height: 56px; border-radius: 8px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--color-border);" />` : null;
              })()}
              <select class="form-input" style="flex: 1" value=${data.featuredKidSlug || ''}
                onChange=${e => { updateField('featuredKidSlug', e.target.value); updateField('featuredStoryImage', ''); }}>
                <option value="">— Select a kid —</option>
                ${sortedKids.map(k => html`<option value=${k.slug} selected=${k.slug === data.featuredKidSlug}>${k.name}${k.year ? ` (${k.year})` : ''}</option>`)}
              </select>
            </div>
          </div>
          ${(() => {
            const sel = sortedKids.find(k => k.slug === data.featuredKidSlug);
            if (!sel) return null;
            const seen = new Set();
            const allPhotos = [
              { id: extractCfId(sel.heroImage), label: 'Hero' },
              ...(sel.photos || []).map((p, i) => ({ id: extractCfId(p.url), label: `Photo ${i + 1}` })),
            ].filter(p => p.id && !seen.has(p.id) && seen.add(p.id));
            if (!allPhotos.length) return null;
            const currentId = data.featuredStoryImage || extractCfId(sel.heroImage);
            return html`
              <div class="form-group" style="margin-top: 1rem;">
                <label class="form-label">Choose Photo</label>
                <div style="display: flex; flex-wrap: wrap; gap: 0.5rem;">
                  ${allPhotos.map(p => html`
                    <button type="button" onClick=${() => {
                      const val = p.label === 'Hero' ? '' : p.id;
                      updateField('featuredStoryImage', val);
                    }}
                      style="padding: 0; border: 3px solid ${(currentId === p.id) ? 'var(--color-primary, #2563eb)' : 'transparent'}; border-radius: 10px; overflow: hidden; cursor: pointer; background: none; position: relative; width: 80px; height: 80px; flex-shrink: 0;">
                      <img src=${CF + '/' + p.id + '/w=160,h=160,fit=cover'} alt=${p.label}
                        style="width: 100%; height: 100%; object-fit: cover; display: block;" />
                      ${(currentId === p.id) ? html`<span style="position: absolute; top: 2px; right: 2px; background: var(--color-primary, #2563eb); color: #fff; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 11px;">✓</span>` : null}
                    </button>
                  `)}
                </div>
              </div>
            `;
          })()}
          ${(() => {
            const fk = sortedKids.find(k => k.slug === data.featuredKidSlug);
            const fName = fk?.name || 'Zyah';
            const fAge = fk ? (Array.isArray(fk.age) ? `ages ${fk.age.join(', ')}` : `age ${fk.age || ''}`) : 'age 7';
            const fDiag = fk?.diagnosis || 'Spinal Muscular Atrophy';
            const autoHeadline = `${fName}'s new space gave them independence — and their family peace of mind.`;
            const autoDesc = `${fName}, ${fAge}, lives with ${fDiag}. Our team transformed their space into an accessible, joyful haven — with custom features designed around their unique needs and personality.`;
            return html`
              <div class="form-group" style="margin-top: 1rem;">
                <label class="form-label">Headline</label>
                <input class="form-input" value=${data.featuredStoryHeadline || ''}
                  placeholder=${autoHeadline}
                  onFocus=${e => { if (!e.target.value) { e.target.value = autoHeadline; updateField('featuredStoryHeadline', autoHeadline); } }}
                  onInput=${e => updateField('featuredStoryHeadline', e.target.value)} />
                <p class="text-sm text-muted" style="margin-top: 0.25rem;">Leave blank to use: "${autoHeadline}"</p>
              </div>
              <div class="form-group" style="margin-top: 0.5rem;">
                <label class="form-label">Description</label>
                <textarea class="form-input" rows="3" value=${data.featuredStoryDescription || ''}
                  placeholder=${autoDesc}
                  onFocus=${e => { if (!e.target.value) { e.target.value = autoDesc; updateField('featuredStoryDescription', autoDesc); } }}
                  onInput=${e => updateField('featuredStoryDescription', e.target.value)} />
              </div>
            `;
          })()}
        </div>

        <div class="card">
          <h3 style="margin-bottom: 1rem;">Kid Showcase Strip ${freshnessBadge(pts['kidShowcase'])}</h3>
          <p class="text-sm text-muted mb-1">The row of featured kids on the homepage. Names and details are pulled from kid records automatically.</p>
          ${(data.kidShowcase || []).map((kid, i) => {
            const isDup = kid.slug && (data.kidShowcase || []).some((k, j) => j !== i && k.slug === kid.slug);
            return html`
            <div style="display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.5rem; padding: 0.5rem; background: ${isDup ? 'rgba(229,62,62,0.06)' : 'rgba(0,0,0,0.02)'}; border-radius: 8px; ${isDup ? 'border: 1px solid rgba(229,62,62,0.2);' : ''}">
              ${kid.cfId ? html`<img src=${CF + '/' + kid.cfId + '/w=60,h=60,fit=cover'}
                alt="" style="width: 36px; height: 36px; border-radius: 6px; object-fit: cover; flex-shrink: 0;" />` : null}
              ${isDup ? html`<span style="font-size: 0.7rem; color: var(--color-danger); font-weight: 600; flex-shrink: 0;">DUP</span>` : null}
              <select class="form-input" style="flex: 1" value=${kid.slug || ''}
                onChange=${e => handleKidSelect(i, e.target.value)}>
                <option value="">— Select a kid —</option>
                ${sortedKids.map(k => html`<option value=${k.slug} selected=${k.slug === kid.slug}>${k.name}${k.year ? ` (${k.year})` : ''}</option>`)}
              </select>
              <input class="form-input" style="flex: 2" value=${kid.cfId || ''} placeholder="Image ID (auto-filled)"
                onInput=${e => updateArrayItem('kidShowcase', i, 'cfId', e.target.value)} />
              <div style="display: flex; gap: 0.25rem;">
                <button class="btn btn-ghost" style="padding: 0.3rem 0.5rem; font-size: 0.8rem;" disabled=${i === 0}
                  onClick=${() => moveArrayItem('kidShowcase', i, i - 1)}>↑</button>
                <button class="btn btn-ghost" style="padding: 0.3rem 0.5rem; font-size: 0.8rem;" disabled=${i === (data.kidShowcase || []).length - 1}
                  onClick=${() => moveArrayItem('kidShowcase', i, i + 1)}>↓</button>
                <button class="btn btn-ghost" style="padding: 0.3rem 0.5rem; color: #c00;"
                  onClick=${() => removeFromArray('kidShowcase', i)}>✕</button>
              </div>
            </div>
          `;})}
          <button class="btn btn-ghost" style="margin-top: 0.5rem;"
            onClick=${() => addToArray('kidShowcase', { slug: '', cfId: '' })}>+ Add Kid</button>
        </div>

        <div class="card">
          <h3 style="margin-bottom: 1rem;">Section Photos</h3>
          <p class="text-sm text-muted mb-1">Kid photos used throughout homepage sections.</p>
          <div class="form-row">

    function OurStory({ addToast }) {
      const {
        data, setData, loading, saving, handleSave, updateNestedField: updateField,

        path: 'src/content/site/our-story.json', label: 'Our Story page', addToast,
      });
      const [showImagePicker, setShowImagePicker] = useState(false);
      const [imagePickerTarget, setImagePickerTarget] = useState(null);

      const updateParagraph = (section, index, value) => {
        setData(d => {
          const copy = JSON.parse(JSON.stringify(d));
          copy[section].paragraphs[index] = value;
          return copy;
        });
      };

      const addParagraph = (section) => {
        setData(d => {
          const copy = JSON.parse(JSON.stringify(d));
          copy[section].paragraphs.push('');
          return copy;
        });
      };

      const removeParagraph = (section, index) => {
        setData(d => {
          const copy = JSON.parse(JSON.stringify(d));
          copy[section].paragraphs.splice(index, 1);
          return copy;
        });
      };

      const updateMilestone = (index, field, value) => {
        setData(d => {
          const copy = JSON.parse(JSON.stringify(d));
          copy.milestones[index][field] = value;
          return copy;
        });
      };

      const addMilestone = () => {
        setData(d => ({
          ...d,
          milestones: [...(d.milestones || []), { year: '', title: '', desc: '', image: '' }],
        }));
      };

      const removeMilestone = (index) => {
        setData(d => {
          const copy = JSON.parse(JSON.stringify(d));
          copy.milestones.splice(index, 1);
          return copy;
        });
      };

      const moveMilestone = (index, dir) => {
        setData(d => {
          const copy = JSON.parse(JSON.stringify(d));
          const newIdx = index + dir;
          if (newIdx < 0 || newIdx >= copy.milestones.length) return d;
          [copy.milestones[index], copy.milestones[newIdx]] = [copy.milestones[newIdx], copy.milestones[index]];
          return copy;

    function Deploys({ addToast }) {
      const [deploys, setDeploys] = useState([]);
      const [source, setSource] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [pendingChanges, setPendingChanges] = useState([]);
      const [pendingSince, setPendingSince] = useState(null);
      const [lastDeployBy, setLastDeployBy] = useState(null);
      const [lastDeployAt, setLastDeployAt] = useState(null);
      const [pendingLoading, setPendingLoading] = useState(true);

      const loadDeploys = async () => {
        setLoading(true);
        setError(null);
        try {
          const r = await fetch('/api/deployments');
          const data = await r.json();
          if (data.success) {
            setDeploys(data.deploys || []);
            setSource(data.source);
          } else {
            setError(data.error || 'Failed to load deployments');
          }
        } catch (err) {
          setError(err.message);
        }
        setLoading(false);
      };

      const loadPendingChanges = async () => {
        setPendingLoading(true);
        try {
          const r = await fetch('/api/pending-changes');
          const data = await r.json();
          if (data.success) {
            setPendingChanges(data.changes || []);
            setPendingSince(data.since);
            setLastDeployBy(data.lastDeployBy || null);
            setLastDeployAt(data.lastDeployAt || null);
          }
        } catch (_) {}
        setPendingLoading(false);
      };

      useEffect(() => {
        loadDeploys(); loadPendingChanges();
        // Auto-refresh when a deploy is triggered from the sidebar
        const onDeploy = () => { loadPendingChanges(); loadDeploys(); };
        window.addEventListener('soard-deployed', onDeploy);
        return () => window.removeEventListener('soard-deployed', onDeploy);
      }, []);

      const timeAgo = (dateStr) => {
        if (!dateStr) return '';
        const now = Date.now();
        const then = new Date(dateStr).getTime();
        const diff = Math.floor((now - then) / 1000);
        if (diff < 60) return 'just now';
        if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
        if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
        if (diff < 604800) return `${Math.floor(diff / 86400)}d ago`;
        return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      };

      const statusBadge = (status) => {
        const map = {
          success: { cls: 'badge-green', label: '● Success' },
          active: { cls: 'badge-blue', label: '◉ Building' },
          failure: { cls: 'badge-red', label: 'Failed' },
          canceled: { cls: 'badge-gray', label: '— Canceled' },
          unknown: { cls: 'badge-gray', label: '? Unknown' },
        };
        const s = map[status] || map.unknown;
        return html`<span class="badge ${s.cls}" style="font-size: 0.72rem;">${s.label}</span>`;
      };

      const formatDuration = (start, end) => {
        if (!start || !end) return null;
        const ms = new Date(end) - new Date(start);
        const secs = Math.floor(ms / 1000);
        if (secs < 60) return `${secs}s`;
        return `${Math.floor(secs / 60)}m ${secs % 60}s`;
      };

      if (loading) {
        return html`
          <div class="page-header"><h2>Deploys</h2></div>
          <div style="text-align: center; padding: 4rem;">
            <div class="spinner" style="width: 40px; height: 40px; border-width: 3px;" />
            <p class="mt-2 text-muted">Loading deployment history...</p>
          </div>`;
      }

      if (error) {
        return html`
          <div class="page-header"><h2>Deploys</h2></div>
          <div class="card" style="text-align: center; padding: 2rem;">
            <p style="color: #E53E3E; margin-bottom: 1rem;">${icons.warning} ${error}</p>
            <button class="btn btn-primary" onClick=${loadDeploys}>Retry</button>
          </div>`;
      }

      const actionLabel = (action) => {
        const map = { created: 'Created', updated: 'Updated', deleted: 'Deleted', drafted: 'Drafted', published: 'Published', uploaded: 'Uploaded' };
        return map[action] || action;
      };

      const actionColor = (action) => {
        const map = { created: 'badge-green', updated: 'badge-blue', deleted: 'badge-red', drafted: 'badge-yellow', published: 'badge-green', uploaded: 'badge-blue' };
        return map[action] || 'badge-gray';
      };

      const typeLabel = (type) => {
        if (!type) return '';
        return type.charAt(0).toUpperCase() + type.slice(1);
      };

      return html`
        <div class="page-header">
          <h2>Deploys (${deploys.length})</h2>
          <div style="display: flex; gap: 0.5rem; align-items: center;">
            ${source === 'github' ? html`<span class="badge badge-gray" style="font-size: 0.72rem;">via GitHub commits</span>` : null}
            ${source === 'cloudflare' ? html`<span class="badge badge-blue" style="font-size: 0.72rem;">via Cloudflare Pages</span>` : null}
            <button class="btn btn-ghost btn-sm" onClick=${() => { loadDeploys(); loadPendingChanges(); }}>↻ Refresh</button>
          </div>
        </div>

        ${!pendingLoading && pendingChanges.length > 0 ? html`
          <div class="card" style="margin-bottom: 1.25rem;">
            <div style="padding: 0.85rem 1rem; border-bottom: 1px solid rgba(0,0,0,0.06); display: flex; align-items: center; justify-content: space-between;">
              <div style="display: flex; align-items: center; gap: 0.5rem;">
                <span style="width: 8px; height: 8px; border-radius: 50%; background: #FFD500; flex-shrink: 0;" />
                <strong style="font-size: 0.9rem;">Pending Changes (${pendingChanges.length})</strong>
              </div>
              <span class="text-sm text-muted">${lastDeployAt
                ? html`since <strong>${lastDeployBy ? lastDeployBy.split('@')[0] : 'unknown'}</strong> deployed ${timeAgo(lastDeployAt)}`
                : 'since last deploy'
              }</span>
            </div>
            ${pendingChanges.map(c => html`
              <div style="display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; border-bottom: 1px solid rgba(0,0,0,0.04); font-size: 0.85rem;">
                <span class="badge ${actionColor(c.action)}" style="font-size: 0.7rem; min-width: 58px; text-align: center;">${actionLabel(c.action)}</span>
                <span style="font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                  ${c.name || c.slug || '—'}
                </span>
                <span class="badge badge-gray" style="font-size: 0.68rem;">${typeLabel(c.type)}</span>
                ${c.edits > 1 ? html`<span style="color: #6B6C72; font-size: 0.72rem; flex-shrink: 0;" title="${c.edits} total edits">${c.edits} edits</span>` : null}
                <span style="color: #6B6C72; font-size: 0.72rem; flex-shrink: 0;">
                  ${c.users && c.users.length > 0 ? c.users.map(u => u.split('@')[0]).join(', ') : '—'}
                </span>
                <span style="color: #9CA3AF; font-size: 0.72rem; flex-shrink: 0; min-width: 50px; text-align: right;" title=${c.at ? new Date(c.at).toLocaleString() : ''}>${timeAgo(c.at)}</span>
              </div>
            `)}
          </div>
        ` : null}

        ${!pendingLoading && pendingChanges.length === 0 && !loading ? html`
          <div class="card" style="padding: 1rem 1.25rem; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem; color: #38A169; font-size: 0.85rem;">
            <span>●</span> All changes have been deployed${lastDeployAt ? html` — last by <strong>${lastDeployBy ? lastDeployBy.split('@')[0] : 'unknown'}</strong> ${timeAgo(lastDeployAt)}` : null}
          </div>
        ` : null}

        ${source === 'github' ? html`
          <div class="card" style="padding: 0.75rem 1rem; margin-bottom: 1rem; background: #FEFCF5; border-left: 3px solid #FFD500;">
            <p class="text-sm" style="margin: 0;">
              <strong>Tip:</strong> To see build status and preview URLs, add a <code>CF_PAGES_TOKEN</code> environment variable
              in your Cloudflare Pages settings with Pages:Read permission.
            </p>
          </div>
        ` : null}

        <div class="card" style="padding: 0;">
          ${deploys.length === 0
            ? html`<div style="padding: 2rem; text-align: center; color: #6B6C72;">No deployments found</div>`
            : deploys.map(d => html`
              <div class="deploy-item" key=${d.id}>
                ${d.avatar
                  ? html`<img class="deploy-avatar" src="${d.avatar}" alt="" />`
                  : html`<div class="deploy-avatar" style="display:flex;align-items:center;justify-content:center;font-size:0.8rem;color:#6B6C72;">${icons.user}</div>`
                }
                <div class="deploy-body">
                  <div class="deploy-msg" title=${d.commitMessage || ''}>${d.commitMessage || 'No commit message'}</div>
                  <div class="deploy-meta">
                    ${d.author ? html`<span>${d.author}</span>` : null}
                    ${d.commitHash ? html`<a class="deploy-sha" href=${d.commitUrl || `https://github.com/pranney82/soard/commit/${d.commitHash}`} target="_blank" rel="noopener">${d.commitHash.slice(0, 7)}</a>` : null}
                    ${d.branch && d.branch !== 'main' ? html`<span class="badge badge-accent" style="font-size:0.7rem;">${d.branch}</span>` : null}
                    ${d.createdOn ? html`<span title=${new Date(d.createdOn).toLocaleString()}>${timeAgo(d.createdOn)}</span>` : null}
                    ${formatDuration(d.startedOn, d.endedOn) ? html`<span>⏱ ${formatDuration(d.startedOn, d.endedOn)}</span>` : null}
                    ${d.url ? html`<a class="deploy-link" href=${d.url} target="_blank" rel="noopener">Preview ↗</a>` : null}
                  </div>
                </div>
                <div class="deploy-status">${statusBadge(d.status)}</div>
              </div>
            `)
          }
        </div>
      `;
    }

    // ═══════════════════════════════════════════
    // DEPLOY CONFIRMATION MODAL
    // ═══════════════════════════════════════════
    function DeployConfirmModal({ pendingData, deploying, onConfirm, onCancel }) {
      const changes = pendingData?.changes || [];
      const lastDeployBy = pendingData?.lastDeployBy;
      const lastDeployAt = pendingData?.lastDeployAt;

      const timeAgo = (dateStr) => {
        if (!dateStr) return '';
        const diff = Math.floor((Date.now() - new Date(dateStr).getTime()) / 1000);
        if (diff < 60) return 'just now';
        if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
        if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
        if (diff < 604800) return `${Math.floor(diff / 86400)}d ago`;
        return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      };

      const actionLabel = (a) => ({ created: 'Created', updated: 'Updated', deleted: 'Deleted', drafted: 'Drafted', published: 'Published', uploaded: 'Uploaded' }[a] || a);
      const actionColor = (a) => ({ created: 'badge-green', updated: 'badge-blue', deleted: 'badge-red', drafted: 'badge-yellow', published: 'badge-green', uploaded: 'badge-blue' }[a] || 'badge-gray');
      const typeLabel = (t) => t ? t.charAt(0).toUpperCase() + t.slice(1) : '';

      useEffect(() => {
        const handler = (e) => { if (e.key === 'Escape') onCancel(); };
        window.addEventListener('keydown', handler);
        document.body.classList.add('modal-open');
        return () => { window.removeEventListener('keydown', handler); document.body.classList.remove('modal-open'); };
      }, []);

      return html`<div class="modal-overlay" onClick=${onCancel}>
        <div class="modal" onClick=${e => e.stopPropagation()} style="max-width: 560px;">
          <h3 style="display: flex; align-items: center; gap: 0.5rem;">
            ${icons.deploys} Deploy to Production
          </h3>

          ${lastDeployAt ? html`
            <p style="margin-bottom: 1rem; font-size: 0.82rem; color: #6B6C72;">
              Last deployed by <strong style="color: #2D2E33;">${lastDeployBy ? lastDeployBy.split('@')[0] : 'unknown'}</strong> ${timeAgo(lastDeployAt)}
            </p>
          ` : html`
            <p style="margin-bottom: 1rem; font-size: 0.82rem; color: #6B6C72;">This will be the first tracked deploy.</p>
          `}

          ${changes.length > 0 ? html`
            <div style="border: 1px solid rgba(0,0,0,0.08); border-radius: 8px; margin-bottom: 1.25rem; max-height: 280px; overflow-y: auto;">
              <div style="padding: 0.6rem 0.85rem; background: rgba(0,0,0,0.02); border-bottom: 1px solid rgba(0,0,0,0.06); font-size: 0.78rem; font-weight: 600; color: #6B6C72; position: sticky; top: 0; z-index: 1;">
                ${changes.length} ${changes.length === 1 ? 'change' : 'changes'} to deploy
              </div>
              ${changes.map(c => html`
                <div style="display: flex; align-items: center; gap: 0.6rem; padding: 0.5rem 0.85rem; border-bottom: 1px solid rgba(0,0,0,0.04); font-size: 0.82rem;">
                  <span class="badge ${actionColor(c.action)}" style="font-size: 0.68rem; min-width: 54px; text-align: center;">${actionLabel(c.action)}</span>
                  <span style="font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${c.name || c.slug || '—'}</span>
                  <span class="badge badge-gray" style="font-size: 0.66rem;">${typeLabel(c.type)}</span>
                  ${c.edits > 1 ? html`<span style="color: #9CA3AF; font-size: 0.7rem;">${c.edits}x</span>` : null}
                  <span style="color: #9CA3AF; font-size: 0.72rem; flex-shrink: 0;">${c.users && c.users.length > 0 ? c.users.map(u => u.split('@')[0]).join(', ') : '—'}</span>
                  <span style="color: #CBCDD3; font-size: 0.7rem; flex-shrink: 0;">${timeAgo(c.at)}</span>
                </div>
              `)}
            </div>
          ` : html`
            <div style="border: 1px solid rgba(0,0,0,0.08); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.25rem; text-align: center; color: #6B6C72; font-size: 0.85rem;">
              No tracked changes since last deploy
            </div>
          `}

          <div class="modal-buttons">
            <button class="btn btn-ghost" onClick=${onCancel} disabled=${deploying}>Cancel</button>
            <button class="btn btn-primary" onClick=${onConfirm} disabled=${deploying}
              style="background: #FFD500; color: #000; border-color: #FFD500; font-weight: 600;">
              ${deploying ? html`<span class="spinner" style="width: 14px; height: 14px; border-width: 2px;" /> Deploying...` : html`${icons.deploys} Deploy Now`}
            </button>
          </div>
        </div>
      </div>`;
    }

    // ═══════════════════════════════════════════
    // MAIN APP
    // ═══════════════════════════════════════════
    // ═══════════════════════════════════════════
    // COMMAND PALETTE (Cmd+K)
    // ═══════════════════════════════════════════
    function CommandPalette({ open, onClose, onNavigate, kids, partners, communityPartners, mediaLogos, team, articles, events, communityProjects, press }) {
      const [query, setQuery] = useState('');
      const [activeIdx, setActiveIdx] = useState(0);
      const inputRef = useRef();

      useEffect(() => {
        if (open) {
          setQuery(''); setActiveIdx(0);
          document.body.classList.add('modal-open');
          setTimeout(() => inputRef.current?.focus(), 50);
        } else {
          document.body.classList.remove('modal-open');
        }
        return () => document.body.classList.remove('modal-open');
      }, [open]);

      const allItems = useMemo(() => {
        const pages = [
          { type: 'page', label: 'Dashboard', id: 'dashboard', section: 'Pages' },
          { type: 'page', label: 'Kids', id: 'kids-hub', section: 'Pages' },
          { type: 'page', label: 'Community Projects', id: 'kids-hub', subTab: 'community', section: 'Pages' },
          { type: 'page', label: 'Partners', id: 'partners-hub', section: 'Pages' },
          { type: 'page', label: 'Community Partners', id: 'partners-hub', subTab: 'community-partners', section: 'Pages' },
          { type: 'page', label: 'Media Logos', id: 'partners-hub', subTab: 'medialogos', section: 'Pages' },
          { type: 'page', label: 'Board', id: 'people-hub', subTab: 'board', section: 'Pages' },
          { type: 'page', label: 'Team', id: 'people-hub', subTab: 'team', section: 'Pages' },
          { type: 'page', label: 'Articles', id: 'articles', section: 'Pages' },
          { type: 'page', label: 'Events', id: 'events', section: 'Pages' },
          { type: 'page', label: 'Press & Media', id: 'press-hub', subTab: 'press', section: 'Pages' },
          { type: 'page', label: 'Press Monitor', id: 'press-hub', subTab: 'press-monitor', section: 'Pages' },
          { type: 'page', label: 'Site Config', id: 'site-hub', section: 'Pages' },
          { type: 'page', label: 'Kids on Site', id: 'site-hub', subTab: 'kids-on-site', section: 'Pages' },
          { type: 'page', label: 'FAQs', id: 'site-hub', subTab: 'faq', section: 'Pages' },
          { type: 'page', label: 'Our Story', id: 'site-hub', subTab: 'ourstory', section: 'Pages' },
          { type: 'page', label: 'Media Kit', id: 'site-hub', subTab: 'mediakit', section: 'Pages' },
          { type: 'page', label: 'Financials', id: 'site-hub', subTab: 'financials', section: 'Pages' },
          { type: 'page', label: 'Site Settings', id: 'site-hub', subTab: 'settings', section: 'Pages' },
          { type: 'page', label: 'Deploys', id: 'deploys', section: 'Pages' },
        ];
        const actions = [
          { type: 'action', label: 'Add New Kid', id: 'kids-hub', slug: '', section: 'Actions' },
          { type: 'action', label: 'Add New Partner', id: 'partners-hub', slug: '', section: 'Actions' },
          { type: 'action', label: 'Add New Community Partner', id: 'partners-hub', subTab: 'community-partners', slug: '', section: 'Actions' },
          { type: 'action', label: 'Add New Media Logo', id: 'partners-hub', subTab: 'medialogos', slug: '', section: 'Actions' },
          { type: 'action', label: 'Add New Board Member', id: 'people-hub', subTab: 'board', slug: '', section: 'Actions' },
          { type: 'action', label: 'Add New Team Member', id: 'people-hub', subTab: 'team', slug: '', section: 'Actions' },
          { type: 'action', label: 'Add New Article', id: 'articles', slug: '', section: 'Actions' },
          { type: 'action', label: 'Add New Event', id: 'events', slug: '', section: 'Actions' },
          { type: 'action', label: 'Add New Community Project', id: 'kids-hub', subTab: 'community', slug: '', section: 'Actions' },
          { type: 'action', label: 'Add New Press Article', id: 'press-hub', subTab: 'press', slug: '', section: 'Actions' },
        ];
        const content = [
          ...(kids || []).map(k => ({ type: 'content', label: k.name, meta: `Kid · ${k.year || ''}`, id: 'kids-hub', slug: k.slug, section: 'Content' })),
          ...(partners || []).map(p => ({ type: 'content', label: p.name, meta: `Partner · ${p.level || ''}`, id: 'partners-hub', slug: p.slug, section: 'Content' })),
          ...(communityPartners || []).map(c => ({ type: 'content', label: c.name, meta: `Community Partner · ${c.category || ''}`, id: 'partners-hub', subTab: 'community-partners', slug: c.slug, section: 'Content' })),
          ...(mediaLogos || []).map(m => ({ type: 'content', label: m.name, meta: 'Media Logo', id: 'partners-hub', subTab: 'medialogos', slug: m.slug, section: 'Content' })),
          ...(team || []).map(t => ({ type: 'content', label: t.name, meta: `${t.group === 'board' ? 'Board' : 'Team'} · ${t.title || ''}`, id: 'people-hub', subTab: t.group === 'board' ? 'board' : 'team', slug: t.slug, section: 'Content' })),
          ...(articles || []).map(a => ({ type: 'content', label: a.title || a.name, meta: 'Article', id: 'articles', slug: a.slug, section: 'Content' })),
          ...(events || []).map(e => ({ type: 'content', label: e.title || e.name, meta: `Event · ${e.date || ''}`, id: 'events', slug: e.slug, section: 'Content' })),
          ...(communityProjects || []).map(c => ({ type: 'content', label: c.name, meta: `Community · ${c.year || ''}`, id: 'kids-hub', subTab: 'community', slug: c.slug, section: 'Content' })),
          ...(press || []).map(p => ({ type: 'content', label: p.title || p.name, meta: `Press · ${p.outlet || ''}`, id: 'press-hub', subTab: 'press', slug: p.slug, section: 'Content' })),
        ];
        return [...pages, ...actions, ...content];
      }, [kids, partners, communityPartners, mediaLogos, team, articles, events, communityProjects, press]);

      const filtered = useMemo(() => {
        if (!query) return allItems.slice(0, 20);
        const q = query.toLowerCase();
        return allItems.filter(item =>
          item.label.toLowerCase().includes(q) ||
          (item.meta || '').toLowerCase().includes(q) ||
          item.section.toLowerCase().includes(q)
        ).slice(0, 20);
      }, [query, allItems]);

      useEffect(() => { setActiveIdx(0); }, [query]);

      const handleSelect = (item) => {
        if (item.type === 'action') {
          onNavigate(item.id, '', item.subTab || null);
        } else if (item.type === 'content') {
          onNavigate(item.id, item.slug, item.subTab || null);
        } else {
          onNavigate(item.id, null, item.subTab || null);
        }
        onClose();
      };

      const handleKeyDown = (e) => {
        if (e.key === 'ArrowDown') { e.preventDefault(); setActiveIdx(i => Math.min(i + 1, filtered.length - 1)); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); setActiveIdx(i => Math.max(i - 1, 0)); }
        else if (e.key === 'Enter' && filtered[activeIdx]) { handleSelect(filtered[activeIdx]); }
        else if (e.key === 'Escape') { onClose(); }
      };

      if (!open) return null;

      // Group by section
      const grouped = [];
      let lastSection = null;
      filtered.forEach((item, i) => {
        if (item.section !== lastSection) {
          grouped.push({ type: 'section', label: item.section });
          lastSection = item.section;
        }
        grouped.push({ ...item, flatIdx: i });
      });

      const typeIcon = (type) => {
        if (type === 'page') return html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg>`;
        if (type === 'action') return html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>`;
        return html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>`;
      };

      return html`
        <div class="cmd-palette-overlay" onClick=${onClose}>
          <div class="cmd-palette" onClick=${e => e.stopPropagation()}>
            <div class="cmd-palette-input-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
              <input ref=${inputRef} class="cmd-palette-input"
                placeholder="Search pages, content, actions..."
                value=${query} onInput=${e => setQuery(e.target.value)}
                onKeyDown=${handleKeyDown} />
              <kbd style="font-size: 0.7rem; padding: 2px 6px; background: #f0f0f0; border: 1px solid #ddd; border-radius: 4px; color: #999;">esc</kbd>
            </div>
            <div class="cmd-palette-results">
              ${filtered.length === 0 ? html`<div style="padding: 2rem; text-align: center; color: #737580;">No results for "${query}"</div>` : null}
              ${grouped.map(item => {
                if (item.type === 'section') return html`<div class="cmd-palette-section">${item.label}</div>`;
                return html`<button key=${item.label + item.id}
                  class="cmd-palette-item ${item.flatIdx === activeIdx ? 'active' : ''}"
                  onClick=${() => handleSelect(item)}
                  onMouseEnter=${() => setActiveIdx(item.flatIdx)}>
                  ${typeIcon(item.type)}
                  <span>${item.label}</span>
                  ${item.meta ? html`<span class="cmd-meta">${item.meta}</span>` : null}
                </button>`;
              })}
            </div>
            <div class="cmd-palette-footer">
              <span><kbd>↑</kbd><kbd>↓</kbd> navigate</span>
              <span><kbd>↵</kbd> open</span>
              <span><kbd>esc</kbd> close</span>
            </div>
          </div>
        </div>
      `;
    }

    // ═══════════════════════════════════════════
    // KEYBOARD SHORTCUTS MODAL
    // ═══════════════════════════════════════════
    function KeyboardShortcuts({ open, onClose }) {
      useEffect(() => {
        if (!open) return;
        const handler = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [open]);

      if (!open) return null;

      const isMac = navigator.platform.includes('Mac');
      const mod = isMac ? '⌘' : 'Ctrl';

      const shortcuts = [
        { keys: [mod, 'K'], label: 'Command palette' },
        { keys: [mod, 'S'], label: 'Save current item' },
        { keys: ['?'], label: 'Keyboard shortcuts' },

    // ═══════════════════════════════════════════
    // MINI SPARKLINE CHART
    // ═══════════════════════════════════════════
    function MiniChart({ data, color = '#FFD500', height = 40, width = 120 }) {
      if (!data || data.length < 2) return null;
      const max = Math.max(...data);
      const min = Math.min(...data);
      const range = max - min || 1;
      const step = width / (data.length - 1);
      const pts = data.map((v, i) => ({
        x: i * step,
        y: height - ((v - min) / range) * (height - 6) - 3
      }));
      // Smooth bezier curve
      const pathD = pts.reduce((acc, p, i) => {
        if (i === 0) return `M ${p.x},${p.y}`;
        const prev = pts[i - 1];
        const cpx = (prev.x + p.x) / 2;
        return `${acc} C ${cpx},${prev.y} ${cpx},${p.y} ${p.x},${p.y}`;
      }, '');
      const areaD = `${pathD} L ${pts[pts.length - 1].x},${height} L ${pts[0].x},${height} Z`;
      const gradId = `miniGrad_${color.replace('#', '')}`;

      return html`
        <svg width=${width} height=${height} viewBox="0 0 ${width} ${height}" style="display: block; overflow: visible;">
          <defs>
            <linearGradient id=${gradId} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color=${color} stop-opacity="0.25" />
              <stop offset="100%" stop-color=${color} stop-opacity="0" />
            </linearGradient>
          </defs>
          <path d=${areaD} fill=${`url(#${gradId})`} />
          <path d=${pathD} fill="none" stroke=${color} stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          <circle cx=${pts[pts.length - 1].x} cy=${pts[pts.length - 1].y} r="3" fill=${color} />
        </svg>
      `;
    }

      // Fetch pending changes from API — single source of truth
      const refreshPendingData = async () => {
        try {
          const r = await fetch('/api/pending-changes');
          const data = await r.json();
          if (data.success) {
            setPendingData(data);
            setPendingCount(data.changes?.length || 0);
          }
        } catch (_) {}
      };

      // Debounced refresh — cancels previous timer so rapid saves don't hammer the API
      const debounceRef = useRef(null);
      const debouncedRefresh = (delay = 300) => {
        clearTimeout(debounceRef.current);
        debounceRef.current = setTimeout(refreshPendingData, delay);
      };

      // Refresh on mount, after content changes, and after deploys
      useEffect(() => {
        refreshPendingData();
        const onChanged = () => debouncedRefresh(300);
        const onDeploy = () => debouncedRefresh(500);
        window.addEventListener('soard-content-changed', onChanged);
        window.addEventListener('soard-deployed', onDeploy);
        return () => {
          clearTimeout(debounceRef.current);
          window.removeEventListener('soard-content-changed', onChanged);
          window.removeEventListener('soard-deployed', onDeploy);
        };
      }, []);

      // Open confirmation modal instead of deploying immediately
      const promptDeploy = () => {
        refreshPendingData();
        setShowDeployModal(true);
      };

      const handleDeploy = async () => {
        setDeploying(true);
        try {
          const r = await fetch('/api/flush-deploy', { method: 'POST' });
          const data = await r.json();
          if (data.success) {
            setShowDeployModal(false);
            window.dispatchEvent(new CustomEvent('soard-deployed'));
            if (data.warning) {
              addToast(data.warning, 'warning');
            }
            addToast('Deploy triggered — site will rebuild shortly', 'success');
          } else {
            addToast(`Deploy failed: ${data.error}`, 'error');
          }
        } catch (err) {
          addToast(`Deploy error: ${err.message}`, 'error');
        }
        setDeploying(false);
      };

      const addToast = (msg, type = 'info', action = null) => {
        const id = ++toastId;
        setToasts(t => [...t, { id, msg, type, action }]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), action ? 8000 : 4000);
      };

      // Load all content
      const loadData = async () => {
        setLoading(true);
        try {

          const kidsRes = await api.bulkListContent('src/content/kids');

        { label: 'Site', items: [
          { id: 'site-hub', icon: icons.settings, label: 'Site Config' },
          { id: 'audit-log', icon: icons.auditLog, label: 'Audit Log' },
        ]},
      ];

      const renderView = () => {
        if (loading && view === 'dashboard') {
          return html`<${SkeletonDashboard} />`;
        }

        switch (view) {
          case 'dashboard':
            return html`<${Dashboard} kids=${kids} partners=${partners} team=${team} events=${events} communityProjects=${communityProjects} press=${press} articles=${articles} onNavigate=${navigate} />`;

          // ─── Kids Hub (tabs: Kids | Community Projects) ───
          case 'kids-hub': {
            const tab = subTab || 'kids';
            // If editing, show the appropriate editor
            if (editSlug !== null) {
              if (tab === 'community') {
                return html`<${CommunityEditor} slug=${editSlug || undefined} onBack=${() => { setEditSlug(null); loadData(); }} addToast=${addToast} partners=${partners} existingSlugs=${communityProjects.map(c => c.slug)} />`;
              }
              return html`<${KidEditor} slug=${editSlug || undefined} onBack=${() => { setEditSlug(null); loadData(); }} addToast=${addToast} partners=${partners} existingSlugs=${kids.map(k => k.slug)} />`;
            }
            return html`
              <div class="hub-tabs">
                <button class="hub-tab ${tab === 'kids' ? 'active' : ''}" onClick=${() => { setSubTab('kids'); setEditSlug(null); }}>Kids</button>
                <button class="hub-tab ${tab === 'community' ? 'active' : ''}" onClick=${() => { setSubTab('community'); setEditSlug(null); }}>Community Projects</button>
              </div>
              ${tab === 'community'
                ? html`<${CommunityList} projects=${communityProjects} onEdit=${s => { setSubTab('community'); setEditSlug(s); }} onAdd=${() => { setSubTab('community'); setEditSlug(''); }}
                    onDelete=${p => setDeleteModal({ type: 'community project', item: p })} addToast=${addToast} onReload=${loadData} />`
                : html`<${KidsList} kids=${kids} onEdit=${s => { setSubTab('kids'); setEditSlug(s); }} onAdd=${() => { setSubTab('kids'); setEditSlug(''); }}
                    onDelete=${k => setDeleteModal({ type: 'kid', item: k })} addToast=${addToast} onReload=${loadData}
                    dashboardFilter=${dashboardFilter} onClearFilter=${() => setDashboardFilter(null)} />`
              }
            `;
          }

          // ─── People Hub (tabs: Team | Board) ───
          case 'people-hub': {
            const pTab = subTab || 'team';
            if (editSlug !== null) {
              return html`<${TeamEditor} slug=${editSlug || undefined} onBack=${() => { setEditSlug(null); loadData(); }} addToast=${addToast} defaultGroup=${pTab} existingSlugs=${team.map(t => t.slug)} />`;
            }
            return html`
              <div class="hub-tabs">
                <button class="hub-tab ${pTab === 'team' ? 'active' : ''}" onClick=${() => { setSubTab('team'); setEditSlug(null); }}>Team</button>
                <button class="hub-tab ${pTab === 'board' ? 'active' : ''}" onClick=${() => { setSubTab('board'); setEditSlug(null); }}>Board</button>
              </div>
              ${pTab === 'board'
                ? html`<${TeamList} team=${team} group=${'board'} onEdit=${s => { setSubTab('board'); setEditSlug(s); }} onAdd=${() => { setSubTab('board'); setEditSlug(''); }}
                    onDelete=${t => setDeleteModal({ type: 'board member', item: t })} />`
                : html`<${TeamList} team=${team} group=${'team'} onEdit=${s => { setSubTab('team'); setEditSlug(s); }} onAdd=${() => { setSubTab('team'); setEditSlug(''); }}
                    onDelete=${t => setDeleteModal({ type: 'team member', item: t })} />`
              }
            `;
          }

          // ─── Partners Hub (tabs: Partners | Media Logos) ───
          case 'partners-hub': {
            const pTab = subTab || 'partners';
            if (editSlug !== null) {
              if (pTab === 'medialogos') {
                return html`<${MediaLogoEditor} slug=${editSlug || undefined} onBack=${() => { setEditSlug(null); loadData(); }} addToast=${addToast} existingSlugs=${mediaLogos.map(m => m.slug)} />`;
              }
              if (pTab === 'community-partners') {
                return html`<${CommunityPartnerEditor} slug=${editSlug || undefined} onBack=${() => { setEditSlug(null); loadData(); }} addToast=${addToast} existingSlugs=${communityPartners.map(c => c.slug)} />`;
              }
              return html`<${PartnerEditor} slug=${editSlug || undefined} onBack=${() => { setEditSlug(null); loadData(); }} addToast=${addToast} existingSlugs=${partners.map(p => p.slug)} />`;
            }
            return html`
              <div class="hub-tabs">
                <button class="hub-tab ${pTab === 'partners' ? 'active' : ''}" onClick=${() => { setSubTab('partners'); setEditSlug(null); }}>Partners</button>
                <button class="hub-tab ${pTab === 'community-partners' ? 'active' : ''}" onClick=${() => { setSubTab('community-partners'); setEditSlug(null); }}>Community Partners</button>
                <button class="hub-tab ${pTab === 'medialogos' ? 'active' : ''}" onClick=${() => { setSubTab('medialogos'); setEditSlug(null); }}>Media Logos</button>
              </div>
              ${pTab === 'community-partners'
                ? html`<${CommunityPartnersList} partners=${communityPartners} onEdit=${s => { setSubTab('community-partners'); setEditSlug(s); }} onAdd=${() => { setSubTab('community-partners'); setEditSlug(''); }}
                    onDelete=${p => setDeleteModal({ type: 'community partner', item: p })} />`
                : pTab === 'medialogos'
                ? html`<${MediaLogosList} logos=${mediaLogos} onEdit=${s => { setSubTab('medialogos'); setEditSlug(s); }} onAdd=${() => { setSubTab('medialogos'); setEditSlug(''); }}
                    onDelete=${m => setDeleteModal({ type: 'media logo', item: m })} />`
                : html`<${PartnersList} partners=${partners} onEdit=${s => { setSubTab('partners'); setEditSlug(s); }} onAdd=${() => { setSubTab('partners'); setEditSlug(''); }}
                    onDelete=${p => setDeleteModal({ type: 'partner', item: p })} />`
              }
            `;
          }


          case 'articles':
            return editSlug !== null
              ? html`<${ArticleEditor} slug=${editSlug || undefined} onBack=${() => { navigate('articles'); loadData(); }} addToast=${addToast} existingSlugs=${articles.map(a => a.slug)} />`
              : html`<${ArticlesList} articles=${articles} onEdit=${s => navigate('articles', s)} onAdd=${() => navigate('articles', '')}
                  onDelete=${a => setDeleteModal({ type: 'article', item: a })} />`;
          case 'events':
            return editSlug !== null
              ? html`<${EventEditor} slug=${editSlug || undefined} onBack=${() => { navigate('events'); loadData(); }} addToast=${addToast} existingSlugs=${events.map(e => e.slug)} />`
              : html`<${EventsList} events=${events} onEdit=${s => navigate('events', s)} onAdd=${() => navigate('events', '')}
                  onDelete=${e => setDeleteModal({ type: 'event', item: { ...e, name: e.title } })}
                  dashboardFilter=${dashboardFilter} onClearFilter=${() => setDashboardFilter(null)} />`;

          // ─── Press Hub (tabs: Press & Media | Press Monitor) ───
          case 'press-hub': {
            const prTab = subTab || 'press';
            if (editSlug !== null && prTab === 'press') {
              return html`<${PressEditor} slug=${editSlug || undefined} onBack=${() => { setEditSlug(null); loadData(); }} addToast=${addToast} existingSlugs=${press.map(p => p.slug)} />`;
            }
            return html`
              <div class="hub-tabs">
                <button class="hub-tab ${prTab === 'press' ? 'active' : ''}" onClick=${() => { setSubTab('press'); setEditSlug(null); }}>Press & Media</button>
                <button class="hub-tab ${prTab === 'press-monitor' ? 'active' : ''}" onClick=${() => { setSubTab('press-monitor'); setEditSlug(null); }}>Press Monitor</button>
              </div>
              ${prTab === 'press-monitor'
                ? html`<${PressMonitor} existingPress=${press} addToast=${addToast} onApprove=${(mention) => {
                    sessionStorage.setItem('press-prefill', JSON.stringify(mention));
                    setSubTab('press');
                    setEditSlug('');
                  }} />`
                : html`<${PressList} press=${press} onEdit=${s => { setSubTab('press'); setEditSlug(s); }} onAdd=${() => { setSubTab('press'); setEditSlug(''); }}
                    onDelete=${p => setDeleteModal({ type: 'press article', item: p })} />`
              }
            `;
          }

          case 'audit-log':
            return html`<${AuditLogPage} addToast=${addToast} />`;

          case 'deploys':
            return html`<${Deploys} addToast=${addToast} />`;

          // ─── Site Config Hub (tabs: Kids on Site | FAQs | Our Story | Media Kit | Financials | Settings) ───
          case 'site-hub': {
            const sTab = subTab || 'kids-on-site';
            return html`
              <div class="hub-tabs">
                <button class="hub-tab ${sTab === 'kids-on-site' ? 'active' : ''}" onClick=${() => setSubTab('kids-on-site')}>Kids on Site</button>
                <button class="hub-tab ${sTab === 'faq' ? 'active' : ''}" onClick=${() => setSubTab('faq')}>FAQs</button>
                <button class="hub-tab ${sTab === 'ourstory' ? 'active' : ''}" onClick=${() => setSubTab('ourstory')}>Our Story</button>
                <button class="hub-tab ${sTab === 'mediakit' ? 'active' : ''}" onClick=${() => setSubTab('mediakit')}>Media Kit</button>
                <button class="hub-tab ${sTab === 'snapshot' ? 'active' : ''}" onClick=${() => setSubTab('snapshot')}>Financial Snapshot</button>
                <button class="hub-tab ${sTab === 'financials' ? 'active' : ''}" onClick=${() => setSubTab('financials')}>Financials</button>
                <button class="hub-tab ${sTab === 'settings' ? 'active' : ''}" onClick=${() => setSubTab('settings')}>Settings</button>
              </div>
              ${sTab === 'faq' ? html`<${FAQManager} addToast=${addToast} />`
                : sTab === 'ourstory' ? html`<${OurStory} addToast=${addToast} />`
                : sTab === 'mediakit' ? html`<${MediaKit} addToast=${addToast} />`
                : sTab === 'snapshot' ? html`<${FinancialSnapshot} addToast=${addToast} />`
                : sTab === 'financials' ? html`<${Financials} addToast=${addToast} />`
                : sTab === 'settings' ? html`<${SiteSettings} addToast=${addToast} kids=${kids} partners=${partners} />`
                : html`<${KidsOnSite} addToast=${addToast} kids=${kids} />`
              }
            `;
          }

          default:
            return html`<${Dashboard} kids=${kids} partners=${partners} team=${team} events=${events} communityProjects=${communityProjects} press=${press} articles=${articles} onNavigate=${navigate} />`;
        }
      };

      return html`
        <div class="app">
          ${deleteModal ? html`<${ConfirmModal}
            title="Delete ${deleteModal.item.name}?"
            message="This will permanently remove this ${deleteModal.type} from the site. This cannot be undone."
            danger=${true}
            loading=${deleteLoading}
            onConfirm=${handleListDelete}
            onCancel=${() => { if (!deleteLoading) setDeleteModal(null); }}
          />` : null}
          <button class="hamburger" onClick=${() => setSidebarOpen(!sidebarOpen)} aria-label="${sidebarOpen ? 'Close menu' : 'Open menu'}">
            ${sidebarOpen ? icons.x : icons.menu}
          </button>
          <div class="overlay ${sidebarOpen ? 'open' : ''}" onClick=${() => setSidebarOpen(false)} />

          <nav class="sidebar ${sidebarOpen ? 'open' : ''}">
            <div class="sidebar-logo">
              <img src="https://sunshineonaranneyday.com/cdn-cgi/imagedelivery/ROYFuPmfN2vPS6mt5sCkZQ/brand-logo-admin/w=128" alt="" />
              <small>Content Admin</small>
            </div>
            <button onClick=${() => setCmdPaletteOpen(true)}
              style="display: flex; align-items: center; gap: 0.5rem; margin: 0 0.75rem 0.5rem; padding: 0.5rem 0.75rem; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: rgba(255,255,255,0.5); font-size: 0.85rem; cursor: pointer; transition: all 0.15s;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
              Search...
              <kbd style="margin-left: auto; font-size: 0.65rem; padding: 1px 5px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 4px; color: rgba(255,255,255,0.4);">${navigator.platform?.includes('Mac') ? '⌘K' : 'Ctrl+K'}</kbd>
            </button>
            ${navSections.map(section => html`
              ${section.label ? html`<div class="nav-section">${section.label}</div>` : null}
              ${section.items.map(item => html`
                <button key=${item.id}
                  class="nav-item ${view === item.id ? 'active' : ''}"
                  onClick=${() => navigate(item.id)}>
                  <span class="nav-icon">${item.icon}</span>
                  ${item.label}
                </button>
              `)}
            `)}
            <div class="nav-section" style="margin-top: auto;">Links & Deploys</div>
            ${pendingCount > 0 ? html`
              <button
                class="nav-item"
                onClick=${promptDeploy}
                disabled=${deploying}
                style="background: rgba(255, 213, 0, 0.12); color: #FFD500; border-left: 3px solid #FFD500; font-weight: 600;">
                <span class="nav-icon">${deploying
                  ? html`<div class="spinner" style="width: 16px; height: 16px; border-width: 2px;" />`
                  : icons.deploys}</span>
                ${deploying ? 'Deploying...' : html`Deploy Now <span style="margin-left: auto; font-size: 0.7rem; background: rgba(255,213,0,0.3); padding: 1px 6px; border-radius: 8px;">${pendingCount}</span>`}
              </button>
            ` : null}
            <button class="nav-item ${view === 'deploys' ? 'active' : ''}" onClick=${() => navigate('deploys')}>
              <span class="nav-icon">${icons.deploys}</span> Deploys
              ${pendingCount > 0 ? html`<span style="margin-left: auto; min-width: 18px; height: 18px; border-radius: 9px; background: #FFD500; color: #000; font-size: 0.68rem; font-weight: 700; display: flex; align-items: center; justify-content: center; padding: 0 4px; flex-shrink: 0;">${pendingCount}</span>` : null}
            </button>
            <a href="/" class="nav-item" target="_blank">
              <span class="nav-icon">${icons.globe}</span> View Site ↗
            </a>
            <a href="https://github.com/pranney82/soard" class="nav-item" target="_blank">
              <span class="nav-icon">${icons.github}</span> GitHub ↗
            </a>
          </nav>

          <main class="main">
            ${renderView()}
          </main>

          <${ToastContainer} toasts=${toasts} />
          <${CommandPalette} open=${cmdPaletteOpen} onClose=${() => setCmdPaletteOpen(false)}
            onNavigate=${navigate} kids=${kids} partners=${partners} communityPartners=${communityPartners} mediaLogos=${mediaLogos} team=${team}
            articles=${articles} events=${events} communityProjects=${communityProjects} press=${press} />
          <${KeyboardShortcuts} open=${shortcutsOpen} onClose=${() => setShortcutsOpen(false)} />

          ${showDeployModal ? html`
            <${DeployConfirmModal}
              pendingData=${pendingData}
              deploying=${deploying}
              onConfirm=${handleDeploy}
              onCancel=${() => setShowDeployModal(false)}
            />
          ` : null}
        </div>
      `;
    }

    // ─── Mount ──────────────────────────────
    render(html`<${ErrorBoundary}><${App} /></${ErrorBoundary}>`, document.getElementById('app'));
  </script>
</body>
</html>
