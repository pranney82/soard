    // ═══════════════════════════════════════════
    // PRESS MONITOR — Discover new media mentions
    // ═══════════════════════════════════════════
    function PressMonitor({ existingPress, addToast, onApprove }) {
      const [scanning, setScanning] = useState(false);
      const [mentions, setMentions] = useState([]);
      const [dismissed, setDismissed] = useState(() => {
        try { return JSON.parse(localStorage.getItem('soard-press-dismissed') || '[]'); } catch { return []; }
      });
      const [lastScan, setLastScan] = useState(() => localStorage.getItem('soard-press-last-scan') || null);

      // Build set of existing press URLs for dedup
      const existingUrls = useMemo(() => {
        const urls = new Set();
        for (const p of existingPress) {
          if (p.url) {
            try {
              const u = new URL(p.url);
              urls.add(u.hostname.replace(/^www\./, '') + u.pathname.replace(/\/$/, ''));
            } catch { urls.add(p.url); }
          }
        }
        return urls;
      }, [existingPress]);

      const dismissedSet = useMemo(() => new Set(dismissed), [dismissed]);

      const filteredMentions = useMemo(() => {
        return mentions.filter(m => {
          // Filter out already-published entries — check both RSS link and resolved URL
          const urlsToCheck = [m.link, m.resolvedUrl].filter(Boolean);
          for (const url of urlsToCheck) {
            try {
              const u = new URL(url);
              const norm = u.hostname.replace(/^www\./, '') + u.pathname.replace(/\/$/, '');
              if (existingUrls.has(norm)) return false;
              if (dismissedSet.has(norm)) return false;
            } catch {}
          }
          return true;
        });
      }, [mentions, existingUrls, dismissedSet]);

      const doScan = async () => {
        setScanning(true);
        try {
          const res = await fetch('/api/press-scan');
          const data = await res.json();
          if (data.success) {
            setMentions(data.mentions);
            const now = new Date().toLocaleString();
            setLastScan(now);
            localStorage.setItem('soard-press-last-scan', now);
            addToast(`Found ${data.mentions.length} results, ${filteredMentions.length || '—'} new`, 'success');
          } else {
            addToast(`Scan failed: ${data.error}`, 'error');
          }
        } catch (err) {
          addToast(`Scan error: ${err.message}`, 'error');
        }
        setScanning(false);
      };

      const dismiss = (mention) => {
        const urls = [mention.link, mention.resolvedUrl].filter(Boolean);
        const norms = [];
        for (const url of urls) {
          try {
            const u = new URL(url);
            norms.push(u.hostname.replace(/^www\./, '') + u.pathname.replace(/\/$/, ''));
          } catch {}
        }
        if (norms.length) {
          const updated = [...dismissed, ...norms];
          setDismissed(updated);
          localStorage.setItem('soard-press-dismissed', JSON.stringify(updated));
        }
      };

      const clearDismissed = () => {
        setDismissed([]);
        localStorage.removeItem('soard-press-dismissed');
        addToast('Dismissed list cleared', 'success');
      };

      const handleApprove = (mention) => {
        const slug = mention.source
          ? mention.source.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') + '-' + (mention.date || 'new')
          : 'press-' + Date.now();

        onApprove({
          outlet: mention.source || '',
          outletLogo: mention.source ? mention.source.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') : '',
          category: 'print',
          title: mention.title || '',
          slug,
          date: mention.date || new Date().toISOString().split('T')[0],
          url: mention.resolvedUrl || mention.link || '',
          excerpt: mention.description || '',
          featured: false,
          order: 99,
        });
      };

      return html`
        <div class="page-header">
          <div>
            <h2>Press Monitor</h2>
            <p class="text-sm text-muted" style="margin-top: 0.25rem;">
              Scans Google News for SOARD media mentions. Approve to create press entries.
            </p>
          </div>
          <div style="display: flex; gap: 0.5rem; align-items: center;">
            ${dismissed.length > 0 ? html`
              <button class="btn btn-ghost btn-sm" onClick=${clearDismissed}>
                Clear ${dismissed.length} dismissed
              </button>
            ` : null}
            <button class="btn btn-primary" onClick=${doScan} disabled=${scanning}>
              ${scanning ? html`<span class="spinner" style="width:16px;height:16px;border-width:2px;margin-right:0.5rem;" />` : null}
              ${scanning ? 'Scanning…' : 'Scan for Mentions'}
            </button>
          </div>
        </div>

        ${lastScan ? html`
          <p class="text-sm text-muted" style="margin-bottom: 1rem;">Last scan: ${lastScan}</p>
        ` : null}

        <div class="card" style="margin-bottom: 1rem; padding: 1rem;">
          <p class="text-sm" style="margin: 0; color: #6B6C72;">
            <strong>Search queries:</strong> "Sunshine on a Ranney Day", "SOARD" charity, "Peter Ranney" nonprofit, "Holly Ranney", "Sunny and Ranney", "sunshineonaranneyday"
          </p>
        </div>

        ${mentions.length > 0 ? html`
          <div class="card" style="margin-bottom: 0.75rem; padding: 0.75rem 1rem;">
            <span class="text-sm">
              <strong>${mentions.length}</strong> total results · 
              <strong>${filteredMentions.length}</strong> new · 
              <strong>${mentions.length - filteredMentions.length}</strong> already tracked or dismissed
            </span>
          </div>
        ` : null}

        ${!scanning && mentions.length === 0 ? html`
          <div class="card" style="padding: 3rem; text-align: center; color: #6B6C72;">
            <p style="font-size: 2rem; margin-bottom: 0.5rem;">📡</p>
            <p>Click <strong>Scan for Mentions</strong> to search for new press coverage.</p>
          </div>
        ` : null}

        ${scanning ? html`
          <div class="card" style="padding: 3rem; text-align: center;">
            <div class="spinner" style="width: 32px; height: 32px; border-width: 3px; margin: 0 auto 1rem;" />
            <p class="text-muted">Searching Google News RSS feeds…</p>
          </div>
        ` : null}

        ${filteredMentions.length > 0 ? html`
          <div class="card">
            <div class="table-wrap"><table>
              <thead><tr><th>Title</th><th>Source</th><th>Date</th><th>Matched Query</th><th style="width: 190px;"></th></tr></thead>
              <tbody>
                ${filteredMentions.map(m => html`<tr key=${m.link}>
                  <td>
                    <a href=${m.resolvedUrl || m.link} target="_blank" rel="noopener" style="color: var(--c-dark); text-decoration: underline; text-underline-offset: 2px;">
                      ${m.title.length > 70 ? m.title.slice(0, 70) + '…' : m.title}
                    </a>
                    ${m.resolvedUrl ? html`<br /><span class="text-sm text-muted" style="word-break: break-all;">${(() => { try { const u = new URL(m.resolvedUrl); return u.hostname + u.pathname; } catch { return ''; } })()}</span>` : m.description ? html`<br /><span class="text-sm text-muted">${m.description.length > 100 ? m.description.slice(0, 100) + '…' : m.description}</span>` : null}
                    <span class="team-title-sub text-sm" style="display: none; color: var(--color-text-secondary);">${m.source || ''}${m.date ? ` · ${m.date}` : ''}</span>
                  </td>
                  <td class="text-sm td-hide-mobile">${m.source || '—'}</td>
                  <td class="text-sm td-hide-mobile" style="white-space: nowrap;">${m.date || '—'}</td>
                  <td class="td-hide-mobile"><span class="badge" style="font-size: 0.7rem;">${m.query.replace(/"/g, '')}</span></td>
                  <td style="white-space: nowrap;">
                    <button class="btn btn-primary btn-sm" onClick=${() => handleApprove(m)}>Approve</button>
                    <button class="btn btn-ghost btn-sm" style="color: #999;" onClick=${() => dismiss(m)}>Dismiss</button>
                  </td>
                </tr>`)}
              </tbody>
            </table></div>
          </div>
        ` : mentions.length > 0 && !scanning ? html`
          <div class="card" style="padding: 2rem; text-align: center; color: #6B6C72;">
            <p>All ${mentions.length} results are already tracked or dismissed.</p>
          </div>
        ` : null}
      `;
    }

    // ═══════════════════════════════════════════
    // COMMUNITY PROJECTS LIST
    // ═══════════════════════════════════════════
    function CommunityList({ projects, onEdit, onAdd, onDelete, addToast, onReload }) {
      const [search, setSearch] = useState('');
      const [statusFilter, setStatusFilter] = useState('all');
      const [selected, setSelected] = useState(new Set());
      const [favs, setFavs] = useState(getFavorites());
      const [inlineEdit, setInlineEdit] = useState(null);
      const [reordering, setReordering] = useState(false);
      const tbodyRef = useRef(null);
      const sortableRef = useRef(null);
      const sortedRef = useRef([]);
      const filtered = useMemo(() => {
        let result = projects;
        if (statusFilter !== 'all') {
          result = result.filter(p => p.status === statusFilter);
        }
        if (search) {
          const q = search.toLowerCase();
          result = result.filter(p =>
            p.name.toLowerCase().includes(q) ||
            (p.description || '').toLowerCase().includes(q) ||
            (p.year + '').includes(q)
          );
        }
        return result;
      }, [projects, search, statusFilter]);

      const { sorted, SortHeader, sortKey } = useSortable(filtered, 'order', 'asc');

      const canDrag = sortKey === 'order' && !search && statusFilter === 'all';

      // Keep a ref to sorted so the Sortable onEnd callback always sees current data
      sortedRef.current = sorted;

      const saveRowOrder = async (fromIdx, toIdx) => {
        if (fromIdx === toIdx) return;
        setReordering(true);
        const reordered = [...sortedRef.current];
        const [moved] = reordered.splice(fromIdx, 1);
        reordered.splice(toIdx, 0, moved);
        let saved = 0;
        for (let i = 0; i < reordered.length; i++) {
          const p = reordered[i];
          const newOrder = i + 1;
          if ((p.order || 0) === newOrder) continue;
          try {
            const filePath = `src/content/community/${p.slug}.json`;
            const fileRes = await api.readContent(filePath);
            if (!fileRes.success) continue;
            const content = typeof fileRes.content === 'string' ? JSON.parse(fileRes.content) : fileRes.content;
            content.order = newOrder;
            const res = await api.saveContent(filePath, JSON.stringify(content, null, 2), `Reorder community project: ${content.name} → #${newOrder}`, fileRes.sha);
            if (res.success) saved++;
          } catch {}
        }
        setReordering(false);
        if (saved > 0) { addToast?.(`Reordered projects`, 'success'); onReload?.(); }
      };

      // Initialize / teardown SortableJS on the tbody
      useEffect(() => {
        if (sortableRef.current) { sortableRef.current.destroy(); sortableRef.current = null; }
        if (!canDrag || !tbodyRef.current) return;
        sortableRef.current = Sortable.create(tbodyRef.current, {
          handle: '.drag-handle',
          animation: 200,
          ghostClass: 'sortable-ghost',
          chosenClass: 'sortable-chosen',
          dragClass: 'sortable-drag',
          forceFallback: true,
          fallbackTolerance: 3,
          onEnd: (evt) => {
            // SortableJS already moved the DOM node — put it back so Preact stays in control
            const el = tbodyRef.current;
            if (el) {
              const rows = [...el.children];
              const movedRow = rows.splice(evt.newIndex, 1)[0];
              if (movedRow) {
                rows.splice(evt.oldIndex, 0, movedRow);
                el.innerHTML = '';
                rows.forEach(r => el.appendChild(r));
              }
            }
            saveRowOrder(evt.oldIndex, evt.newIndex);
          },
        });
        return () => { if (sortableRef.current) { sortableRef.current.destroy(); sortableRef.current = null; } };
      }, [canDrag, sorted.length]);

      const toggleSelect = (slug) => {
        setSelected(s => { const n = new Set(s); n.has(slug) ? n.delete(slug) : n.add(slug); return n; });
      };
      const toggleAll = () => {
        if (selected.size === sorted.length) setSelected(new Set());
        else setSelected(new Set(sorted.map(p => p.slug)));
      };
      const [showBulkDeleteModal, setShowBulkDeleteModal] = useState(false);
      const [bulkDeleting, setBulkDeleting] = useState(false);
      const bulkDelete = () => setShowBulkDeleteModal(true);
      const confirmBulkDelete = async () => {
        setBulkDeleting(true);
        const toDelete = sorted.filter(p => selected.has(p.slug));
        let deleted = 0;
        for (const p of toDelete) {
          try {
            const filePath = `src/content/community/${p.slug}.json`;
            const fileRes = await api.readContent(filePath);
            if (!fileRes.success) continue;
            const res = await api.deleteContent(filePath, fileRes.sha, `Delete community project: ${p.name}`);
            if (res.success) deleted++;
          } catch {}
        }
        setBulkDeleting(false);
        setSelected(new Set());
        setShowBulkDeleteModal(false);
        if (deleted > 0) {
          addToast?.(`Deleted ${deleted} project${deleted > 1 ? 's' : ''}`, 'success');
          onReload?.();
        }
      };

      const handleToggleFav = (slug) => {
        const updated = toggleFavorite('community', slug);
        setFavs([...updated]);
      };

      const saveInlineEdit = async () => {
        if (!inlineEdit) return;
        const { slug, field, value } = inlineEdit;
        try {
          const fileRes = await api.readContent(`src/content/community/${slug}.json`);
          if (!fileRes.success) { addToast?.('Could not load file', 'error'); setInlineEdit(null); return; }
          const content = typeof fileRes.content === 'string' ? JSON.parse(fileRes.content) : fileRes.content;
          content[field] = field === 'order' ? (Number(value) || 0) : value;
          const res = await api.saveContent(`src/content/community/${slug}.json`, JSON.stringify(content, null, 2), `Quick edit ${field}: ${content.name}`, fileRes.sha);
          if (res.success) { addToast?.(`Updated ${field}`, 'success'); logActivity('updated', 'community project', content.name); onReload?.(); }
          else addToast?.(`Save failed: ${res.error}`, 'error');
        } catch (e) { addToast?.(`Error: ${e.message}`, 'error'); }
        setInlineEdit(null);
      };

      const startInlineEdit = (e, slug, field, value) => {
        e.stopPropagation();
        setInlineEdit({ slug, field, value: value || '' });
      };

      return html`
        ${showBulkDeleteModal ? html`<${ConfirmModal}
          title="Delete ${selected.size} project${selected.size > 1 ? 's' : ''}?"
          message="This will permanently remove the selected community projects from the site. This cannot be undone."
          danger=${true}
          loading=${bulkDeleting}
          onConfirm=${confirmBulkDelete}
          onCancel=${() => { if (!bulkDeleting) setShowBulkDeleteModal(false); }}
        />` : null}
        <div class="page-header">
          <h2>Community Projects (${projects.length})${reordering ? html` <span style="font-size: 0.8rem; color: #999; font-weight: 400;">Saving order…</span>` : null}</h2>
          <button class="btn btn-primary" onClick=${onAdd}>+ Add Project</button>
        </div>
        <div class="card" style="margin-bottom: 1rem; padding: 0.75rem 1rem;">
          <div style="display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;">
            <div class="search-bar" style="flex: 1; min-width: 200px;">
              <span class="search-icon">${icons.search}</span>
              <input placeholder="Search by name, description, or year..."
                value=${search} onInput=${e => setSearch(e.target.value)} />
            </div>
            <select value=${statusFilter} onChange=${e => setStatusFilter(e.target.value)}
              style="padding: 0.45rem 0.75rem; border: 1px solid var(--color-border); border-radius: var(--radius-sm); background: var(--color-bg-card); font-size: 0.85rem; color: var(--color-text); cursor: pointer; ${statusFilter !== 'all' ? 'border-color: var(--color-primary); background: var(--color-primary-bg);' : ''}">
              <option value="all">All Statuses</option>
              <option value="completed">Completed</option>
              <option value="in-progress">In Progress</option>
            </select>
          </div>
        </div>
        ${selected.size > 0 ? html`
          <div class="bulk-bar">
            <span style="font-weight: 600;">${selected.size} selected</span>
            <button class="btn btn-danger btn-sm" onClick=${bulkDelete}>Delete Selected</button>
            <button class="btn btn-ghost btn-sm" style="color: #fff; border-color: rgba(255,255,255,0.2);" onClick=${() => setSelected(new Set())}>Clear</button>
          </div>
        ` : null}
        <div class="card">
          <div class="table-wrap"><table>
            <thead><tr>
              <th style="width: 36px;"><input type="checkbox" checked=${selected.size === sorted.length && sorted.length > 0}
                onChange=${toggleAll} style="width: 16px; height: 16px; accent-color: #FFD500;" /></th>
              <th style="width: 28px;"></th>
              ${canDrag ? html`<th style="width: 28px;"></th>` : null}
              <th></th>
              <${SortHeader} field="order">Order<//>
              <${SortHeader} field="name">Name<//>
              <th style="width: 32px;" title="Completeness"></th>
              <${SortHeader} field="year">Year<//>
              <${SortHeader} field="impact">Impact<//>
              <${SortHeader} field="status">Status<//>
              <th>Photos</th>
              <th></th>
            </tr></thead>
            <tbody ref=${tbodyRef}>
              ${sorted.length === 0 ? html`<tr><td colspan="${canDrag ? 12 : 11}"><${EmptyState}
                icon="🏠" title=${search ? 'No projects match your search' : 'No community projects yet'}
                description=${search ? 'Try a different search term.' : 'Add your first community project.'}
                actionLabel=${search ? null : 'Add Project'} onAction=${onAdd} /></td></tr>` : null}
              ${sorted.map((p, idx) => {
                const { pct, missing } = getCommunityCompleteness(p, true);
                return html`<tr key=${p.slug} data-slug=${p.slug} onClick=${() => onEdit(p.slug)} style="cursor: pointer; ${selected.has(p.slug) ? 'background: rgba(255,213,0,0.06);' : ''}">
                  <td onClick=${e => e.stopPropagation()}><input type="checkbox" checked=${selected.has(p.slug)}
                    onChange=${() => toggleSelect(p.slug)} style="width: 16px; height: 16px; accent-color: #FFD500;" /></td>
                  <td><button class="fav-btn ${favs.includes('community:' + p.slug) ? 'is-fav' : ''}"
                    onClick=${(e) => { e.stopPropagation(); handleToggleFav(p.slug); }}
                    title=${favs.includes('community:' + p.slug) ? 'Remove from favorites' : 'Add to favorites'}>
                    ${favs.includes('community:' + p.slug) ? '★' : '☆'}
                  </button></td>
                  ${canDrag ? html`<td onClick=${e => e.stopPropagation()} class="drag-handle" title="Drag to reorder">⠿</td>` : null}
                  <td>${p.heroImage || p.imageId
                    ? html`<img class="td-thumb" src="${cfThumb(p.heroImage || p.imageId, 'w=88,h=88,fit=cover')}" alt="" style="border-radius: 6px;" />`
                    : html`<div class="td-thumb" style="background: #E5E4E0; border-radius: 6px;" />`}</td>
                  <td>
                    ${inlineEdit?.slug === p.slug && inlineEdit?.field === 'order'
                      ? html`<input class="inline-edit-input" type="number" value=${inlineEdit.value}
                          onInput=${e => setInlineEdit({ ...inlineEdit, value: e.target.value })}
                          onBlur=${saveInlineEdit}
                          onKeyDown=${e => { if (e.key === 'Enter') saveInlineEdit(); if (e.key === 'Escape') setInlineEdit(null); }}
                          ref=${el => el && el.focus()} style="width: 50px;" />`
                      : html`<span onDblClick=${e => startInlineEdit(e, p.slug, 'order', p.order || 0)} style="cursor: text; color: #666;" title="Double-click to edit">${p.order || 0}</span>`}
                  </td>
                  <td>
                    ${inlineEdit?.slug === p.slug && inlineEdit?.field === 'name'
                      ? html`<input class="inline-edit-input" value=${inlineEdit.value}
                          onInput=${e => setInlineEdit({ ...inlineEdit, value: e.target.value })}
                          onBlur=${saveInlineEdit}
                          onKeyDown=${e => { if (e.key === 'Enter') saveInlineEdit(); if (e.key === 'Escape') setInlineEdit(null); }}
                          ref=${el => el && el.focus()} />`
                      : html`<strong onDblClick=${e => startInlineEdit(e, p.slug, 'name', p.name)} style="cursor: text;" title="Double-click to edit">${p.name}</strong>`}
                  </td>
                  <td><${CompletenessRing} pct=${pct} missing=${missing} /></td>
                  <td>
                    ${inlineEdit?.slug === p.slug && inlineEdit?.field === 'year'
                      ? html`<input class="inline-edit-input" value=${inlineEdit.value}
                          onInput=${e => setInlineEdit({ ...inlineEdit, value: e.target.value })}
                          onBlur=${saveInlineEdit}
                          onKeyDown=${e => { if (e.key === 'Enter') saveInlineEdit(); if (e.key === 'Escape') setInlineEdit(null); }}
                          ref=${el => el && el.focus()} style="width: 70px;" />`
                      : html`<span onDblClick=${e => startInlineEdit(e, p.slug, 'year', p.year)} style="cursor: text;" title="Double-click to edit">${p.year || '—'}</span>`}
                  </td>
                  <td class="text-sm td-hide-mobile">${p.impact} ${p.impactLabel}</td>
                  <td><span class="badge ${p.status === 'completed' ? 'badge-green' : 'badge-yellow'}">${p.status || 'completed'}</span></td>
                  <td class="td-hide-mobile">${(p.photos || []).length || (p.imageId ? 1 : 0)}</td>
                  <td style="white-space: nowrap;">
                    <button class="btn btn-ghost btn-sm" style="color: #E53E3E;" onClick=${(ev) => { ev.stopPropagation(); onDelete(p); }}>Delete</button>
                  </td>
                </tr>`;
              })}
            </tbody>
          </table></div>
        </div>
      `;
    }

    // ═══════════════════════════════════════════
    // COMMUNITY PROJECT EDITOR
    // ═══════════════════════════════════════════
    function CommunityEditor({ slug, onBack, addToast, partners = [], existingSlugs = [] }) {
      const [loading, setLoading] = useState(!!slug);
      const [saving, setSaving] = useState(false);
      const [deleting, setDeleting] = useState(false);
      const [showDeleteModal, setShowDeleteModal] = useState(false);
      const [dirty, setDirty] = useState(false);
      const [touched, setTouched] = useState({});
      const [sha, setSha] = useState(null);
      const [lastSaved, setLastSaved] = useState(null);
      const [data, setData] = useState({
        name: '', slug: '', impact: '', impactLabel: 'children impacted yearly',
        year: new Date().getFullYear().toString(), description: '',
        color: '#373A36', imageId: '', imageAlt: '', badge: '', order: 0,
        photos: [], heroImage: '', status: 'completed',
        founded: '', story: '', quote: '', metaDescription: '',
        videoUrl: '', streamVideoId: '',
        partnerLogos: [],
      });
      const [videoUploading, setVideoUploading] = useState(false);
      const [videoProgress, setVideoProgress] = useState(0);
      const [generatingAlt, setGeneratingAlt] = useState(false);

      // ─── Photo upload + reorder hooks ──────
      const { uploading, upload: uploadCommunityPhotos } = useImageUpload({
        setData, setDirty, addToast,
        buildCfId: (file) => `community/${data.slug || 'new'}/${Date.now()}-${file.name.replace(/[^a-z0-9.]/gi, '-')}`,
        arrayKey: 'photos',
        makeEntry: (localUrl, file, tempId) => ({ url: localUrl, alt: '', _tempId: tempId }),
        replaceEntry: (item, res) => ({ url: res.imageUrl, alt: '' }),
        onSuccess: (d, res) => ({
          ...d,
          imageId: d.imageId || res.imageId,
          heroImage: d.heroImage || res.imageUrl,
        }),
      });
      const { dragHandlers: communityPhotoDragHandlers } = useDragReorder({ setData, setDirty, arrayKey: 'photos' });

      // ─── Partner logo upload + reorder hooks ──────
      const { uploading: partnerLogoUploading, upload: uploadPartnerLogos } = useImageUpload({
        setData, setDirty, addToast,
        buildCfId: (file) => `community/${data.slug || 'new'}/partner-${Date.now()}-${file.name.replace(/[^a-z0-9.]/gi, '-')}`,
        arrayKey: 'partnerLogos',
        makeEntry: (localUrl, file, tempId) => ({ url: localUrl, name: file.name.replace(/\.[^.]+$/, ''), _tempId: tempId }),
        replaceEntry: (item, res) => ({ url: res.imageUrl, name: item.name }),
      });
      const { dragHandlers: partnerDragHandlers } = useDragReorder({ setData, setDirty, arrayKey: 'partnerLogos' });

      // ─── Partner Linking ──────────────────
      const [partnerSearch, setPartnerSearch] = useState('');
      const isPartnerLinked = (partner) => (data.partnerLogos || []).some(pl => pl.url === partner.logo);
      const togglePartner = (partner) => {
        setDirty(true);
        setData(d => {
          const existing = d.partnerLogos || [];
          const linked = existing.some(pl => pl.url === partner.logo);
          if (linked) return { ...d, partnerLogos: existing.filter(pl => pl.url !== partner.logo) };
          return { ...d, partnerLogos: [...existing, { url: partner.logo, name: partner.name }] };
        });
      };
      const removePartnerLogo = (index) => {
        setDirty(true);
        setData(d => ({ ...d, partnerLogos: d.partnerLogos.filter((_, i) => i !== index) }));
      };

      // Generate alt text for all photos with AI
      const handleGenerateAlt = async () => {
        if (!data.photos?.length) { addToast('Upload photos first', 'error'); return; }
        setGeneratingAlt(true);
        try {
          const res = await api.generate('alt-text', data);
          if (res.success && res.altTexts) {
            setDirty(true);
            setData(d => ({
              ...d,
              photos: d.photos.map((p, i) => ({ ...p, alt: res.altTexts[i] || p.alt || '' })),
            }));
            addToast(`Generated alt text for ${res.altTexts.filter(Boolean).length} photos`, 'success');
          } else { addToast(`Generation failed: ${res.error}`, 'error'); }
        } catch (err) { addToast(`Error: ${err.message}`, 'error'); }
        setGeneratingAlt(false);
      };

      const updatePhotoAlt = (index, alt) => {
        setDirty(true);
        setData(d => ({ ...d, photos: d.photos.map((p, i) => i === index ? { ...p, alt } : p) }));
      };
      // Auto-generate alt text when all uploads finish
      const prevUploadCount = useRef(0);
      useEffect(() => {
        const count = Object.keys(uploading).length;
        if (prevUploadCount.current > 0 && count === 0) {
          const hasBlankAlt = data.photos.some(p => p.url && !p._tempId && !p.alt);
          if (hasBlankAlt && !generatingAlt) handleGenerateAlt();
        }
        prevUploadCount.current = count;
      }, [uploading]);


      const removePhoto = (index) => {
        const photoUrl = (data.photos || [])[index]?.url;
        setDirty(true);
        setData(d => {
          const newPhotos = (d.photos || []).filter((_, i) => i !== index);
          const removedUrl = (d.photos || [])[index]?.url;
          return {
            ...d, photos: newPhotos,
            heroImage: d.heroImage === removedUrl ? (newPhotos[0]?.url || '') : d.heroImage,
            imageId: newPhotos.length === 0 ? '' : d.imageId,
          };
        });
        const imageId = extractCfImageId(photoUrl);
        if (imageId) { api.deleteImage(imageId).catch(() => {}); }
      };
      const setHero = (index) => {
        setDirty(true);
        const photo = (data.photos || [])[index];
        if (photo) setData(d => ({ ...d, heroImage: photo.url, imageId: photo.cfImageId || d.imageId }));
      };

      // Warn on browser close/refresh with unsaved changes
      useEffect(() => {
        const handler = (e) => { if (dirty) { e.preventDefault(); e.returnValue = ''; } };
        window.addEventListener('beforeunload', handler);
        return () => window.removeEventListener('beforeunload', handler);
      }, [dirty]);

      // Auto-save to localStorage every 5s when dirty
      const draftKey = `soard-draft-community-${slug || 'new'}`;
      useEffect(() => {
        if (!dirty) return;
        const timer = setTimeout(() => {
          try { localStorage.setItem(draftKey, JSON.stringify(data)); } catch (e) {}
        }, 5000);
        return () => clearTimeout(timer);
      }, [dirty, data]);

      // Recover draft on mount
      const [hasDraft, setHasDraft] = useState(false);
      useEffect(() => {
        if (loading) return;
        try { const saved = localStorage.getItem(draftKey); if (saved) setHasDraft(true); } catch (e) {}
      }, [loading]);
      const restoreDraft = () => {
        try {
          const saved = JSON.parse(localStorage.getItem(draftKey));
          if (saved) { setData(saved); setDirty(true); setHasDraft(false); addToast('Draft restored', 'success'); }
        } catch (e) { addToast('Could not restore draft', 'error'); }
      };
      const dismissDraft = () => { localStorage.removeItem(draftKey); setHasDraft(false); };
      const clearDraft = () => { try { localStorage.removeItem(draftKey); } catch (e) {} };

      const safeBack = () => {
        if (dirty && !confirm('You have unsaved changes. Leave without saving?')) return;
        clearDraft();
        onBack();
      };

      const handleDelete = async () => {
        if (!slug || !sha) return;
        setDeleting(true);
        try {
          const res = await api.deleteContent(`src/content/community/${slug}.json`, sha, `Delete community project: ${data.name}`);
          if (res.success) { addToast(`${data.name} deleted`, 'success'); logActivity('deleted', 'community project', data.name); setDirty(false); onBack(); }
          else addToast(`Delete failed: ${res.error}`, 'error');
        } catch (err) { addToast(`Delete error: ${err.message}`, 'error'); }
        setDeleting(false);
        setShowDeleteModal(false);
      };

      // Load existing project
      useEffect(() => {
        if (!slug) return;
        (async () => {
          const res = await api.readContent(`src/content/community/${slug}.json`);
          if (res.success) {
            const parsed = JSON.parse(res.content);
            if (parsed.imageId && (!parsed.photos || parsed.photos.length === 0)) {
              parsed.photos = [{ url: parsed.imageId, alt: parsed.imageAlt || '' }];
              parsed.heroImage = parsed.heroImage || parsed.imageId;
            }
            if (!parsed.photos) parsed.photos = [];
            if (!parsed.partnerLogos) parsed.partnerLogos = [];
            setData(d => ({ ...d, ...parsed }));
            setSha(res.sha);
          } else { addToast('Failed to load project data', 'error'); }
          setLoading(false);
        })();
      }, [slug]);

      const dedupeSlug = (base) => {
        if (!existingSlugs.includes(base)) return base;
        const withYear = `${base}-${new Date().getFullYear()}`;
        if (!existingSlugs.includes(withYear)) return withYear;
        let n = 2;
        while (existingSlugs.includes(`${withYear}-${n}`)) n++;
        return `${withYear}-${n}`;
      };

      const updateField = (field, value) => {
        setDirty(true);
        setData(d => {
          const updated = { ...d, [field]: value };
          if (field === 'name' && !slug) updated.slug = dedupeSlug(slugify(value));
          return updated;
        });
      };

      const handleVideoUpload = async (files) => {
        const file = files[0];
        if (!file) return;
        setVideoUploading(true);
        setVideoProgress(0);
        try {
          const videoName = data.name ? `${data.name} - Community Project` : file.name;
          const res = await api.uploadVideo(file, videoName, { onProgress: (pct) => setVideoProgress(pct) });
          updateField('streamVideoId', res.videoId);
          addToast('Video uploaded to Stream! It may take a few minutes to process.', 'success');
        } catch (err) { addToast(`Video upload failed: ${err.message}`, 'error'); }
        setVideoUploading(false);
        setVideoProgress(0);
      };

      const removeVideo = () => {
        setData(d => ({ ...d, streamVideoId: '' }));
        addToast('Stream video removed (video still exists in Cloudflare dashboard)', 'info');
      };

      const handleSave = async () => {
        setTouched({ name: true });
        if (!data.name || !data.slug) { addToast('Name is required', 'error'); return; }
        if (!data.impact) { addToast('Impact number is required', 'error'); return; }
        if (!data.impactLabel) { addToast('Impact label is required', 'error'); return; }
        if (!data.description) { addToast('Description is required', 'error'); return; }
        if (!slug && existingSlugs.includes(data.slug)) {
          addToast(`A project with the URL slug "${data.slug}" already exists.`, 'error'); return;
        }
        setSaving(true);
        try {
          const saveData = {
            ...data,
            streamVideoId: data.streamVideoId || null,
            videoUrl: data.videoUrl || null,
            photos: (data.photos || []).map(({ _tempId, ...p }) => p),
            partnerLogos: (data.partnerLogos || []).map(({ _tempId, ...p }) => p),
          };
          const path = `src/content/community/${data.slug}.json`;
          const content = JSON.stringify(saveData, null, 2);
          const message = slug ? `Update community project: ${data.name}` : `Add community project: ${data.name}`;
          const res = await api.saveContent(path, content, message, sha || undefined);
          if (res.success) {
            setSha(res.sha);
            setDirty(false);
            clearDraft();
            addToast(`${data.name} published! Site rebuilding...`, 'success');
            logActivity(slug ? 'updated' : 'created', 'community project', data.name);
            setLastSaved(new Date());
          } else { addToast(`Save failed: ${res.error}`, 'error'); }
        } catch (err) { addToast(`Save error: ${err.message}`, 'error'); }
        setSaving(false);
      };

      if (loading) return html`<${EditorSkeleton} />`;

      return html`
        ${showDeleteModal ? html`<${ConfirmModal}
          title="Delete ${data.name}?"
          message="This will permanently remove this community project from the site. This cannot be undone."
          danger=${true}
          onConfirm=${handleDelete}
          onCancel=${() => setShowDeleteModal(false)}
        />` : null}
        ${hasDraft ? html`
          <div style="display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; background: #FEFCF5; border: 1px solid #FFD500; border-radius: 10px; margin-bottom: 1rem;">
            <span style="font-size: 1.1rem;">${icons.warning}</span>
            <span style="flex: 1; font-size: 0.9rem;">You have an unsaved draft from a previous session.</span>
            <button class="btn btn-primary btn-sm" onClick=${restoreDraft}>Restore</button>
            <button class="btn btn-ghost btn-sm" onClick=${dismissDraft}>Dismiss</button>
          </div>
        ` : null}
        <div style="display: flex; align-items: center; justify-content: space-between;">
          <nav class="breadcrumb" aria-label="Breadcrumb">
            <button onClick=${safeBack}>Community Projects</button>
            <span class="sep">›</span>
            <span class="current">${slug ? data.name || 'Edit' : 'New Project'}</span>
          </nav>
          <div class="save-status">
            ${saving
              ? html`<span class="save-status-dot saving"></span> Saving...`
              : dirty
                ? html`<span class="save-status-dot unsaved"></span> Unsaved changes`
                : lastSaved
                  ? html`<span class="save-status-dot saved"></span> Saved ${lastSaved.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`
                  : slug

    // FAQ MANAGEMENT
    // ═══════════════════════════════════════════
    function FAQManager({ addToast }) {
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [sha, setSha] = useState(null);
      const [data, setData] = useState({ categories: [], items: [] });
      const [editItem, setEditItem] = useState(null); // null=list, 'new'=new, {id}=editing
      const [editCat, setEditCat] = useState(null);
      const [dragIdx, setDragIdx] = useState(null);

      useEffect(() => {
        (async () => {
          try {
            const res = await api.readContent('src/content/site/faq.json');
            if (res.success) {
              setData(JSON.parse(res.content));
              setSha(res.sha);
            }
          } catch {}
          setLoading(false);
        })();
      }, []);

      const handleSave = async () => {
        // Validate all FAQ items have both question and answer
        const incomplete = data.items.filter(item => !item.question?.trim() || !item.answer?.trim());
        if (incomplete.length) {
          addToast(`${incomplete.length} FAQ item${incomplete.length > 1 ? 's' : ''} missing a question or answer — fix before saving`, 'error');
          return;
        }
        setSaving(true);
        try {
          const content = JSON.stringify(data, null, 2);
          const res = await api.saveContent(
            'src/content/site/faq.json', content,
            'Update FAQ content', sha
          );
          if (res.success) {
            setSha(res.sha);
            addToast('FAQs saved & published!', 'success');
            logActivity('updated', 'FAQs', '');
          } else {
            addToast(`Failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Error: ${err.message}`, 'error');
        }
        setSaving(false);
      };

      // ── Category helpers ──
      const addCategory = () => {
        const id = `cat-${Date.now()}`;
        setData(d => ({
          ...d,
          categories: [...d.categories, { id, label: 'New Category', showOnDonatePage: false }],
        }));
        setEditCat(id);
      };

      const updateCategory = (id, field, value) => {
        setData(d => ({
          ...d,
          categories: d.categories.map(c => c.id === id ? { ...c, [field]: value } : c),
        }));
      };

      const deleteCategory = (id) => {
        const hasItems = data.items.some(i => i.category === id);
        if (hasItems) {
          addToast('Move or delete all FAQs in this category first.', 'error');
          return;
        }
        setData(d => ({
          ...d,
          categories: d.categories.filter(c => c.id !== id),
        }));
        setEditCat(null);
      };

      // ── Item helpers ──
      const addItem = (categoryId) => {
        const id = `faq-${Date.now()}`;
        const catItems = data.items.filter(i => i.category === categoryId);
        const maxOrder = catItems.reduce((m, i) => Math.max(m, i.order || 0), 0);
        const newItem = {
          id,
          question: '',
          answer: '',
          category: categoryId,
          order: maxOrder + 1,
        };
        setData(d => ({ ...d, items: [...d.items, newItem] }));
        setEditItem(id);
      };

      const updateItem = (id, field, value) => {
        setData(d => ({
          ...d,
          items: d.items.map(i => i.id === id ? { ...i, [field]: value } : i),
        }));
      };

      const deleteItem = (id) => {
        setData(d => ({ ...d, items: d.items.filter(i => i.id !== id) }));
        if (editItem === id) setEditItem(null);
      };

      const moveItem = (id, direction) => {
        setData(d => {
          const item = d.items.find(i => i.id === id);
          if (!item) return d;
          const catItems = d.items
            .filter(i => i.category === item.category)
            .sort((a, b) => (a.order || 0) - (b.order || 0));
          const idx = catItems.findIndex(i => i.id === id);
          const swapIdx = idx + direction;
          if (swapIdx < 0 || swapIdx >= catItems.length) return d;
          const swapItem = catItems[swapIdx];
          return {
            ...d,
            items: d.items.map(i => {
              if (i.id === id) return { ...i, order: swapItem.order };
              if (i.id === swapItem.id) return { ...i, order: item.order };
              return i;
            }),
          };
        });
      };

      if (loading) return html`<${EditorSkeleton} />`;

      // ── Edit single FAQ item ──
      if (editItem) {
        const item = data.items.find(i => i.id === editItem);
        if (!item) { setEditItem(null); return null; }
        return html`
          <div class="page-header">
            <div style="display: flex; align-items: center; gap: 0.75rem;">
              <button class="btn btn-ghost btn-sm" onClick=${() => setEditItem(null)}>${icons.arrowLeft} Back</button>
              <h2>${item.question ? 'Edit FAQ' : 'New FAQ'}</h2>
            </div>
            <button class="btn btn-primary" onClick=${handleSave} disabled=${saving}>
              ${saving ? html`<span class="spinner" />` : null} ${saving ? 'Saving...' : 'Save All'}
            </button>
          </div>
          <div class="card">
            <div class="form-group">
              <label class="form-label">Question *</label>
              <input class="form-input" value=${item.question}
                placeholder="e.g. Is my donation tax-deductible?"
                onInput=${e => updateItem(item.id, 'question', e.target.value)} />
            </div>
            <div class="form-group">
              <label class="form-label">Answer *</label>
              <textarea class="form-input" rows="5" value=${item.answer}
                placeholder="Write the answer here. HTML links are supported: <a href='/page'>Link text</a>"
                onInput=${e => updateItem(item.id, 'answer', e.target.value)} />
              <p class="text-sm text-muted" style="margin-top: 0.35rem;">Supports basic HTML for links. Example: &lt;a href="/donate"&gt;Donate page&lt;/a&gt;</p>
            </div>
            <div class="form-group">
              <label class="form-label">Category</label>
              <select class="form-input" value=${item.category}
                onChange=${e => updateItem(item.id, 'category', e.target.value)}>
                ${data.categories.map(c => html`<option value=${c.id}>${c.label}</option>`)}
              </select>
            </div>
          </div>
          <div style="margin-top: 1rem;">
            <button class="btn btn-ghost" style="color: #e53e3e;" onClick=${() => { deleteItem(item.id); }}>
              ${icons.trash} Delete this FAQ
            </button>
          </div>
        `;
      }

      // ── Main FAQ list view ──
      return html`
        <div class="page-header">
          <h2>FAQs</h2>
          <div style="display: flex; gap: 0.5rem;">
            <button class="btn btn-ghost btn-sm" onClick=${addCategory}>+ Category</button>
            <button class="btn btn-primary" onClick=${handleSave} disabled=${saving}>
              ${saving ? html`<span class="spinner" />` : null} ${saving ? 'Saving...' : 'Save & Publish'}
            </button>
          </div>
        </div>
        <p class="text-sm text-muted" style="margin-bottom: 1rem;">Manage FAQ questions shown on the Donate page and the FAQ page. Categories marked with a star appear on the Donate page.</p>

        ${data.categories.map(cat => {
          const catItems = data.items
            .filter(i => i.category === cat.id)
            .sort((a, b) => (a.order || 0) - (b.order || 0));

          return html`
            <div class="card" key=${cat.id} style="margin-bottom: 1rem;">
              <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;">
                ${editCat === cat.id ? html`
                  <div style="display: flex; align-items: center; gap: 0.5rem; flex: 1;">
                    <input class="form-input" value=${cat.label} style="max-width: 240px;"
                      onInput=${e => updateCategory(cat.id, 'label', e.target.value)} 
                      onKeyDown=${e => { if (e.key === 'Enter') setEditCat(null); }} />
                    <label style="display: flex; align-items: center; gap: 0.35rem; font-size: 0.85rem; color: rgba(45,46,51,0.6); white-space: nowrap; cursor: pointer;">
                      <input type="checkbox" checked=${cat.showOnDonatePage}
                        onChange=${e => updateCategory(cat.id, 'showOnDonatePage', e.target.checked)} />
                      Show on Donate page
                    </label>
                    <button class="btn btn-ghost btn-sm" onClick=${() => setEditCat(null)}>Done</button>
                    <button class="btn btn-ghost btn-sm" style="color: #e53e3e;" onClick=${() => deleteCategory(cat.id)}>Delete</button>
                  </div>
                ` : html`

    // IMAGE PICKER MODAL
    // ═══════════════════════════════════════════
    function ImagePicker({ onSelect, onClose }) {
      const [allImages, setAllImages] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [search, setSearch] = useState('');
      const [category, setCategory] = useState('all');
      const [displayPage, setDisplayPage] = useState(1);
      const THUMBS_PER_PAGE = 60;

      // Lock body scroll while picker is open
      useEffect(() => {
        document.body.classList.add('modal-open');
        return () => document.body.classList.remove('modal-open');
      }, []);

      // Load ALL images on mount via CF v2 API (up to 10k per request)
      useEffect(() => {
        let cancelled = false;
        (async () => {
          try {
            let collected = [];
            let token = '';
            do {
              const res = await api.listImages(10000, token);
              if (cancelled) return;
              if (!res.success) {
                setError(res.error || 'Failed to load images');
                break;
              }
              collected = collected.concat(res.images || []);
              token = res.continuation_token || '';
              setAllImages([...collected]);
            } while (token);
          } catch (err) {
            console.error('Image load error', err);
            if (!cancelled) setError('Network error loading images');
          }
          if (!cancelled) setLoading(false);
        })();
        return () => { cancelled = true; };
      }, []);

      // Filter images by category and search
      const filtered = useMemo(() => {
        let list = allImages;
        if (category === 'kids') list = list.filter(img => img.id.startsWith('kids/'));
        else if (category === 'partners') list = list.filter(img => img.id.startsWith('partners/'));
        else if (category === 'logos') list = list.filter(img => img.id.startsWith('logos/'));
        else if (category === 'other') list = list.filter(img => !img.id.startsWith('kids/') && !img.id.startsWith('logos/') && !img.id.startsWith('partners/'));
        if (search.trim()) {
          const q = search.toLowerCase().trim();
          list = list.filter(img => img.id.toLowerCase().includes(q));
        }
        return list;
      }, [allImages, category, search]);

      // Extract kid names for quick-pick buttons
      const kidNames = useMemo(() => {
        const names = new Set();
        allImages.forEach(img => {
          if (img.id.startsWith('kids/')) {
            const name = img.id.split('/')[1];
            if (name) names.add(name);
          }
        });
        return [...names].sort();
      }, [allImages]);

      const pageCount = Math.ceil(filtered.length / THUMBS_PER_PAGE);
      const pageImages = filtered.slice((displayPage - 1) * THUMBS_PER_PAGE, displayPage * THUMBS_PER_PAGE);

      // Reset to page 1 when filters change
      useEffect(() => { setDisplayPage(1); }, [search, category]);

      return html`<div class="modal-overlay" onClick=${onClose}>
        <div class="modal img-picker-modal" onClick=${e => e.stopPropagation()}>
          <h3 style="margin-bottom: 0.75rem;">Choose an Image</h3>

          <div class="img-picker-toolbar">
            <div style="display: flex; gap: 0.35rem;">
              ${[['kids', 'Kids'], ['partners', 'Partners'], ['logos', 'Logos'], ['all', 'All'], ['other', 'Other']].map(([id, label]) => html`
                <button key=${id} class="chip" style="${category === id
                  ? 'background: #2D2E33; color: #fff;'
                  : 'background: rgba(45,46,51,0.08); color: #2D2E33; cursor: pointer;'}"
                  onClick=${() => setCategory(id)}>${label}</button>
              `)}
            </div>
          </div>

          <div style="display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.75rem;">
            <input class="form-input" type="text" style="flex:1"
              placeholder="${category === 'kids' ? 'Search by kid name (e.g. harper, zyah, liam)...' : 'Search by image ID...'}"
              value=${search} onInput=${e => setSearch(e.target.value)} />
            <span class="text-sm text-muted" style="white-space: nowrap;">
              ${loading ? html`${allImages.length.toLocaleString()} loading...` : html`${filtered.length.toLocaleString()} images`}
            </span>
          </div>

          ${category === 'kids' && kidNames.length > 0 && !search ? html`
            <div style="display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 0.75rem; max-height: 72px; overflow-y: auto;">
              ${kidNames.map(name => html`
                <button key=${name} class="chip" style="background: rgba(45,46,51,0.06); color: #2D2E33; cursor: pointer; font-size: 0.75rem; padding: 3px 10px;"
                  onClick=${() => setSearch(name)}>${name}</button>
              `)}
            </div>
          ` : null}

          <div class="img-picker-grid">
            ${error && allImages.length === 0
              ? html`<div class="img-picker-empty" style="color: #b91c1c;">
                  <div style="margin-bottom: 0.5rem;">Failed to load images</div>
                  <div class="text-sm">${error}</div>
                </div>`
              : loading && allImages.length === 0
              ? html`<div class="img-picker-empty">
                  <div class="spinner" style="width:32px;height:32px;margin:0 auto 0.75rem;" />
                  <div>Loading images...</div>
                </div>`
              : pageImages.length === 0
              ? html`<div class="img-picker-empty">No images match "${search || category}". ${loading ? 'Still loading more...' : ''}</div>`
              : pageImages.map(img => html`
                <div key=${img.id} class="img-picker-thumb" title=${img.id}
                  onClick=${() => { onSelect(img.id); onClose(); }}>
                  <img src="${CF}/${img.id}/w=400,fit=scale-down" alt="" loading="lazy" />
                  <div class="img-picker-id">${img.id.startsWith('kids/') ? img.id.replace('kids/', '') : img.id}</div>
                </div>
              `)
            }
          </div>
          ${pageCount > 1 ? html`
            <div class="img-picker-pager">
              <button class="btn btn-ghost btn-sm" disabled=${displayPage <= 1} onClick=${() => setDisplayPage(p => p - 1)}>${icons.chevLeft} Prev</button>
              <span class="text-sm">Page ${displayPage} of ${pageCount}</span>
              <button class="btn btn-ghost btn-sm" disabled=${displayPage >= pageCount} onClick=${() => setDisplayPage(p => p + 1)}>Next →</button>
            </div>
          ` : null}
        </div>
      </div>`;
    }

    // GOLF TOURNAMENT EDITOR
    // ═══════════════════════════════════════════
    function GolfTournamentEditor({ addToast, onBack }) {
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [sha, setSha] = useState(null);
      const [data, setData] = useState({
        testimonial: { quote: '', name: '', title: '' },
        faqs: [],
        sponsors: [],
        galleryPhotos: [],
        tiers: { main: [], addons: [] },
      });
      const [activeTab, setActiveTab] = useState('tiers');
      const [showImagePicker, setShowImagePicker] = useState(false);
      const [imagePickerTarget, setImagePickerTarget] = useState(null); // 'sponsor:tierIdx:nameIdx' or 'gallery:0'

      useEffect(() => {
        (async () => {
          try {
            const res = await api.readContent('src/content/site/golf.json');
            if (res.success) {
              setData(JSON.parse(res.content));
              setSha(res.sha);
            }
          } catch {}
          setLoading(false);
        })();
      }, []);

      const handleSave = async () => {
        setSaving(true);
        try {
          const content = JSON.stringify(data, null, 2);
          const res = await api.saveContent(
            'src/content/site/golf.json', content,
            'Update golf tournament settings', sha
          );
          if (res.success) {
            setSha(res.sha);
            addToast('Golf settings saved!', 'success');
            logActivity('updated', 'Golf Tournament Settings', '');
          } else {
            addToast('Failed: ' + (res.error || 'Unknown error'), 'error');
          }
        } catch (err) {
          addToast('Error: ' + err.message, 'error');
        }
        setSaving(false);
      };

      const updateTier = (type, idx, field, value) => {
        setData(d => ({
          ...d,
          tiers: {
            ...d.tiers,
            [type]: d.tiers[type].map((t, i) => i === idx ? { ...t, [field]: value } : t),
          },
        }));
      };

      const addFaq = () => {
        setData(d => ({ ...d, faqs: [...d.faqs, { question: '', answer: '' }] }));
      };

      const updateFaq = (idx, field, value) => {
        setData(d => ({
          ...d,
          faqs: d.faqs.map((f, i) => i === idx ? { ...f, [field]: value } : f),
        }));
      };

      const removeFaq = (idx) => {
        setData(d => ({ ...d, faqs: d.faqs.filter((_, i) => i !== idx) }));
      };

      if (loading) return html`<div class="loading-state"><span class="spinner" /> Loading golf settings...</div>`;

      const handleImageSelect = (id) => {
        if (!imagePickerTarget) return;
        const parts = imagePickerTarget.split(':');
        if (parts[0] === 'sponsor') {
          const tierIdx = parseInt(parts[1]);
          const nameIdx = parseInt(parts[2]);
          setData(d => ({
            ...d,
            sponsors: d.sponsors.map((tier, ti) => ti === tierIdx
              ? { ...tier, names: tier.names.map((s, ni) => ni === nameIdx ? { ...s, logo: id } : s) }
              : tier
            ),
          }));
        } else if (parts[0] === 'gallery') {
          const idx = parseInt(parts[1]);
          setData(d => ({ ...d, galleryPhotos: d.galleryPhotos.map((ph, j) => j === idx ? { ...ph, id } : ph) }));
        }
        setShowImagePicker(false);
        setImagePickerTarget(null);
      };

      const handleSponsorLogoUpload = async (file, tierIdx, nameIdx) => {
        const sponsorName = data.sponsors?.[tierIdx]?.names?.[nameIdx]?.name || 'sponsor';
        const slug = sponsorName.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
        const cfId = 'partners/' + slug + '/' + Date.now();
        try {
          const res = await api.uploadImage(file, cfId);
          if (res.success) {
            const logoId = res.imageUrl || cfId;
            setData(d => ({
              ...d,
              sponsors: d.sponsors.map((tier, ti) => ti === tierIdx
                ? { ...tier, names: tier.names.map((s, ni) => ni === nameIdx ? { ...s, logo: logoId } : s) }
                : tier
              ),
            }));
            addToast('Logo uploaded!', 'success');
          } else {
            addToast('Upload failed: ' + (res.error || 'Unknown error'), 'error');
          }
        } catch (err) {
          addToast('Upload error: ' + err.message, 'error');
        }
      };

      return html`
        ${showImagePicker ? html`<${ImagePicker}
          onSelect=${handleImageSelect}
          onClose=${() => { setShowImagePicker(false); setImagePickerTarget(null); }}
        />` : null}
        <div class="editor-page">
          ${onBack ? html`
            <nav class="breadcrumb" aria-label="Breadcrumb">
              <button onClick=${onBack}>Events</button>
              <span class="sep">›</span>
              <span>Golf Tournament</span>
            </nav>
          ` : null}
          <div class="editor-header">
            <h1 class="editor-title">Golf Tournament Settings</h1>

          ${activeTab === 'tiers' && html`
            <div class="card">
              <h2 class="card-title">Main Sponsorship Tiers</h2>
              <p class="card-subtitle" style="margin-bottom: 1rem;">Update availability and describe what's included in each tier.</p>

                ${(data.tiers?.main || []).map((tier, i) => html`

                      </div>
                      <select value=${tier.status || 'available'} onChange=${(e) => updateTier('main', i, 'status', e.target.value)}
