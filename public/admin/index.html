        </div>
        <div class="card">
          <div class="table-wrap"><table>
            <thead><tr><th>Title</th><th>Date</th><th>Location</th><th>Category</th><th>Status</th><th>Featured</th><th></th></tr></thead>
            <tbody>
              ${filtered.length === 0 ? html`<tr><td colspan="7"><${EmptyState}
                icon="📅" title=${search ? 'No events match your search' : 'No events yet'}
                description=${search ? 'Try a different search term.' : 'Create your first event.'}
                actionLabel=${search ? null : 'Add Event'} onAction=${onAdd} /></td></tr>` : null}
              ${filtered.map(e => html`<tr key=${e.slug}>
                <td><strong>${e.title}</strong></td>
                <td class="text-sm">${e.date || '—'}</td>
                <td class="text-sm">${(e.location || '—').slice(0, 30)}${(e.location || '').length > 30 ? '…' : ''}</td>
                <td><span class="badge badge-accent">${EVENT_CAT_LABELS[e.category] || e.category}</span></td>
                <td><span class="badge ${e.status === 'upcoming' ? 'badge-green' : e.status === 'cancelled' ? 'badge-red' : 'badge-gray'}">${e.status}</span></td>
                <td>${e.featured ? icons.star : '—'}</td>
                <td style="white-space: nowrap;">
                  <button class="btn btn-ghost btn-sm" onClick=${() => onEdit(e.slug)}>Edit</button>
                  <button class="btn btn-ghost btn-sm" style="color: #E53E3E;" onClick=${(ev) => { ev.stopPropagation(); onDelete(e); }}>Delete</button>
                </td>
              </tr>`)}
            </tbody>
          </table></div>
        </div>
      `;
    }

    // ═══════════════════════════════════════════
    // EVENT EDITOR
    // ═══════════════════════════════════════════
    function EventEditor({ slug, onBack, addToast }) {
      const [loading, setLoading] = useState(!!slug);
      const [saving, setSaving] = useState(false);
      const [sha, setSha] = useState(null);
      const [dirty, setDirty] = useState(false);
      const [showImagePicker, setShowImagePicker] = useState(false);
      const [imagePickerTarget, setImagePickerTarget] = useState(null);
      const [videoUploading, setVideoUploading] = useState(false);
      const [uploading, setUploading] = useState({});
      const [imageUploading, setImageUploading] = useState(false);
      const [data, setData] = useState({
        title: '', slug: '', date: new Date().toISOString().split('T')[0],
        endDate: '', time: '', location: '', address: '',
        description: '', body: '', image: null,
        streamVideoId: null, videoUrl: null, photos: [],
        ticketUrl: '', ticketPrice: '',
        category: 'other', featured: false, status: 'upcoming', order: 0,
      });

      useEffect(() => {
        if (!slug) return;
        (async () => {
          try {
            const res = await api.readContent(`src/content/events/${slug}.json`);
            if (res.success && res.content) {
              const parsed = typeof res.content === 'string' ? JSON.parse(res.content) : res.content;
              setData(parsed);
              setSha(res.sha);
            } else {
              addToast('Event not found', 'error');
              onBack();
            }
          } catch (err) {
            addToast(`Load error: ${err.message}`, 'error');
          }
          setLoading(false);
        })();
      }, [slug]);

      const update = (key, val) => {
        setData(d => {
          const updated = { ...d, [key]: val };
          if (key === 'title' && !slug) {
            updated.slug = slugify(val);
          }
          return updated;
        });
        setDirty(true);
      };

      // ── Event Image Upload ──
      const handleImageUpload = async (files) => {
        const file = files[0];
        if (!file) return;
        setImageUploading(true);
        try {
          const cfId = `events/${data.slug || 'new'}/${Date.now()}-${file.name.replace(/[^a-z0-9.]/gi, '-')}`;
          const res = await api.uploadImage(file, cfId);
          if (res.success) {
            update('image', res.imageId);
            addToast('Event image uploaded!', 'success');
          } else {
            addToast(`Image upload failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Upload error: ${err.message}`, 'error');
        }
        setImageUploading(false);
      };

      // ── Video Upload ──
      const handleVideoUpload = async (files) => {
        const file = files[0];
        if (!file) return;
        setVideoUploading(true);
        try {
          const videoName = data.title ? `${data.title} - Event` : file.name;
          const res = await api.uploadVideo(file, videoName);
          if (res.success) {
            update('streamVideoId', res.videoId);
            addToast('Video uploaded to Stream! It may take a few minutes to process.', 'success');
          } else {
            addToast(`Video upload failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Video upload error: ${err.message}`, 'error');
        }
        setVideoUploading(false);
      };

      const removeVideo = () => {
        update('streamVideoId', null);
        addToast('Video removed (still exists in Cloudflare dashboard)', 'info');
      };

      // ── Photo Uploads ──
      const handlePhotoUpload = async (files) => {
        setDirty(true);
        for (const file of files) {
          const tempId = Date.now() + '-' + file.name;
          const localUrl = URL.createObjectURL(file);
          setData(d => ({
            ...d,
            photos: [...(d.photos || []), { id: localUrl, alt: '', _tempId: tempId }],
          }));
          setUploading(u => ({ ...u, [tempId]: true }));
          try {
            const cfId = `events/${data.slug || 'new'}/${Date.now()}-${file.name.replace(/[^a-z0-9.]/gi, '-')}`;
            const res = await api.uploadImage(file, cfId);
            if (res.success) {
              setData(d => ({
                ...d,
                photos: (d.photos || []).map(p =>
                  p._tempId === tempId ? { id: res.imageId, alt: '' } : p
                ),
              }));
              addToast(`Uploaded ${file.name}`, 'success');
            } else {
              addToast(`Failed: ${res.error}`, 'error');
              setData(d => ({ ...d, photos: (d.photos || []).filter(p => p._tempId !== tempId) }));
            }
          } catch (err) {
            addToast(`Upload error: ${err.message}`, 'error');
          }
          setUploading(u => { const n = { ...u }; delete n[tempId]; return n; });
        }
      };

      const removePhoto = (index) => {
        setDirty(true);
        setData(d => ({ ...d, photos: (d.photos || []).filter((_, i) => i !== index) }));
      };

      const handleSave = async () => {
        if (!data.title) { addToast('Title is required', 'error'); return; }
        if (!data.slug) data.slug = slugify(data.title);
        setSaving(true);
        try {
          // Clean temp fields before saving
          const saveData = {
            ...data,
            streamVideoId: data.streamVideoId || null,
            videoUrl: data.videoUrl || null,
            image: data.image || null,
            photos: (data.photos || []).map(({ _tempId, ...p }) => p).filter(p => p.id && !p.id.startsWith('blob:')),
          };
          const path = `src/content/events/${data.slug}.json`;
          const content = JSON.stringify(saveData, null, 2);
          const message = slug ? `Update event: ${data.title}` : `Add event: ${data.title}`;
          const res = await api.saveContent(path, content, message, sha || undefined);
          if (res.success) {
            setSha(res.sha);
            setDirty(false);
            addToast('Event saved & published!', 'success');
            logActivity(slug ? 'published' : 'created', 'event', data.title);
          } else {
            addToast(`Save failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Save error: ${err.message}`, 'error');
        }
        setSaving(false);
      };

      useEffect(() => {
        const handler = (e) => { if (dirty) { e.preventDefault(); e.returnValue = ''; } };
        window.addEventListener('beforeunload', handler);
        return () => window.removeEventListener('beforeunload', handler);
      }, [dirty]);

      if (loading) return html`<${EditorSkeleton} />`;

      return html`
        ${showImagePicker ? html`<${ImagePicker}
          onSelect=${(id) => {
            if (imagePickerTarget === 'image') { update('image', id); }
            else if (imagePickerTarget?.startsWith('photo:')) {
              const idx = parseInt(imagePickerTarget.split(':')[1]);
              const photos = [...(data.photos || [])];
              photos[idx] = { ...photos[idx], id };
              update('photos', photos);
            }
            setShowImagePicker(false);
          }}
          onClose=${() => setShowImagePicker(false)}
        />` : null}
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <button onClick=${() => { if (dirty && !confirm('You have unsaved changes. Leave?')) return; onBack(); }}>Events</button>
          <span class="sep">›</span>
          <span class="current">${slug ? data.title || 'Edit' : 'New Event'}</span>
        </nav>
        <div class="page-header">
          <h2>${slug ? 'Edit Event' : 'New Event'}</h2>
          <button class="btn btn-primary" onClick=${handleSave} disabled=${saving}>
            ${saving ? 'Saving...' : 'Save & Publish'}
          </button>
        </div>

        <div class="card" style="margin-bottom: 1rem;">
          <h3 style="margin-bottom: 1rem;">Event Details</h3>
          <div class="form-row" style="margin-bottom: 1.25rem;">
            <div class="form-group">
              <span class="form-label">Title *</span>
              <input class="form-input" type="text" value=${data.title}
                onInput=${e => update('title', e.target.value)} placeholder="Spring Gala 2026" />
            </div>
            <div class="form-group">
              <span class="form-label">Slug</span>
              <input class="form-input" type="text" value=${data.slug}
                onInput=${e => update('slug', e.target.value)} placeholder="spring-gala-2026" />
              <span class="form-hint">/events/ page item</span>
            </div>
          </div>
          <div class="form-row" style="margin-bottom: 1.25rem;">
            <div class="form-group">
              <span class="form-label">Date *</span>
              <input class="form-input" type="date" value=${data.date}
                onInput=${e => update('date', e.target.value)} />
            </div>
            <div class="form-group">
              <span class="form-label">End Date</span>
              <input class="form-input" type="date" value=${data.endDate || ''}
                onInput=${e => update('endDate', e.target.value)} />
              <span class="form-hint">Optional, for multi-day events</span>
            </div>
          </div>
          <div class="form-row" style="margin-bottom: 1.25rem;">
            <div class="form-group">
              <span class="form-label">Time</span>
              <input class="form-input" type="text" value=${data.time || ''}
                onInput=${e => update('time', e.target.value)} placeholder="6:00 PM – 10:00 PM" />
            </div>
            <div class="form-group">
              <span class="form-label">Ticket Price</span>
              <input class="form-input" type="text" value=${data.ticketPrice || ''}
                onInput=${e => update('ticketPrice', e.target.value)} placeholder="$150 per person" />
            </div>
          </div>
          <div class="form-row" style="margin-bottom: 1.25rem;">
            <div class="form-group">
              <span class="form-label">Location *</span>
              <input class="form-input" type="text" value=${data.location}
                onInput=${e => update('location', e.target.value)} placeholder="The Estate at River Run" />
            </div>
            <div class="form-group">
              <span class="form-label">Address</span>
              <input class="form-input" type="text" value=${data.address || ''}
                onInput=${e => update('address', e.target.value)} placeholder="1050 River Run Blvd, Roswell, GA 30076" />
            </div>
          </div>
          <div class="form-group" style="margin-bottom: 1.25rem;">
            <span class="form-label">Ticket / Registration URL</span>
            <input class="form-input" type="url" value=${data.ticketUrl || ''}
              onInput=${e => update('ticketUrl', e.target.value)} placeholder="https://..." />
          </div>
          <div class="form-group" style="margin-bottom: 1.25rem;">
            <span class="form-label">Short Description *</span>
            <textarea class="form-textarea" rows="3" value=${data.description}
              onInput=${e => update('description', e.target.value)}
              placeholder="Brief description shown in event cards..." />
            <span class="form-hint">${(data.description || '').length}/300 characters</span>
          </div>
          <div class="form-group" style="margin-bottom: 1.25rem;">
            <span class="form-label">Extended Details (HTML, optional)</span>
            <textarea class="form-textarea" rows="5" style="font-family: monospace; font-size: 0.85rem;"
              value=${data.body || ''}
              onInput=${e => update('body', e.target.value)}
              placeholder="<p>Additional event details...</p>" />
          </div>
          <div class="form-row" style="margin-bottom: 1.25rem;">
            <div class="form-group">
              <span class="form-label">Category</span>
              <select class="form-select" value=${data.category}
                onChange=${e => update('category', e.target.value)}>
                ${EVENT_CATEGORIES.map(c => html`<option key=${c} value=${c}>${EVENT_CAT_LABELS[c] || c}</option>`)}
              </select>
            </div>
            <div class="form-group">
              <span class="form-label">Status</span>
              <select class="form-select" value=${data.status}
                onChange=${e => update('status', e.target.value)}>
                ${EVENT_STATUSES.map(s => html`<option key=${s} value=${s}>${s.charAt(0).toUpperCase() + s.slice(1)}</option>`)}
              </select>
            </div>
          </div>
          <div class="form-group" style="margin-bottom: 1.25rem;">
            <span class="form-label">Event Card Image</span>
            ${data.image ? html`
              <div style="margin-bottom: 0.75rem; border-radius: 8px; overflow: hidden; max-width: 400px; position: relative;">
                <img src=${'https://imagedelivery.net/ROYFuPmfN2vPS6mt5sCkZQ/' + data.image + '/w=400'}
                  alt="Event image preview" style="width: 100%; height: 180px; object-fit: cover; display: block;" />
                <button class="btn btn-ghost btn-sm" style="position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); color: white; border-radius: 6px; padding: 0.25rem 0.5rem;"
                  onClick=${() => update('image', null)}>✕ Remove</button>
              </div>
            ` : html`
              <${DropZone} onFiles=${handleImageUpload} multiple=${false} accept="image/*" label="JPG, PNG, WebP — drag or click to upload" />
              <div style="margin-top: 0.5rem; text-align: center;">
                <button class="btn btn-ghost btn-sm" type="button" onClick=${() => { setImagePickerTarget('image'); setShowImagePicker(true); }}>Browse Image Library</button>
              </div>
            `}
            ${imageUploading ? html`
              <div style="display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; padding: 0.5rem 0.75rem; background: rgba(255,218,36,0.12); border-radius: 6px;">
                <span class="spinner" />
                <span style="font-size: 0.85rem;">Uploading image...</span>
              </div>
            ` : null}
          </div>
        </div>

        <!-- Video & Photos -->
        <div class="card" style="margin-bottom: 1rem;">
          <h3 style="margin-bottom: 1rem;">Video</h3>
          <div class="form-group" style="margin-bottom: 1.25rem;">
            <span class="form-label">Event Video</span>
            ${data.streamVideoId ? html`
              <div style="margin-bottom: 0.75rem; border-radius: 8px; overflow: hidden; max-width: 480px; aspect-ratio: 16/9; background: #000;">
                <iframe src=${'https://iframe.videodelivery.net/' + data.streamVideoId}
                  style="width: 100%; height: 100%; border: none;" allow="autoplay; fullscreen" allowfullscreen />
              </div>
              <div style="display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; background: rgba(255,218,36,0.08); border-radius: 8px; border: 1px solid rgba(255,218,36,0.25);">
                <div style="flex: 1; min-width: 0;">
                  <div style="font-weight: 600; font-size: 0.9rem;">Stream video linked</div>
                  <div style="font-size: 0.8rem; color: rgba(0,0,0,0.45); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${data.streamVideoId}</div>
                </div>
                <button class="btn btn-ghost btn-sm" style="font-size: 0.85rem;" onClick=${removeVideo}>Remove</button>
              </div>
            ` : html`
              <${DropZone} onFiles=${handleVideoUpload} multiple=${false} accept="video/*" label="MP4, MOV, WebM — upload event video" />
            `}
            ${videoUploading ? html`
              <div style="display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; padding: 0.5rem 0.75rem; background: rgba(255,218,36,0.12); border-radius: 6px;">
                <span class="spinner" />
                <span style="font-size: 0.85rem;">Uploading video to Cloudflare Stream...</span>
              </div>
            ` : null}
            <span class="form-hint" style="display: block; margin-top: 0.5rem;">Uploaded videos play on your site with no ads.</span>
          </div>
          <div class="form-group" style="margin-bottom: 1.25rem;">
            <span class="form-label">YouTube URL (fallback)</span>
            <input class="form-input" type="url" value=${data.videoUrl || ''}
              onInput=${e => update('videoUrl', e.target.value || null)} placeholder="https://youtube.com/watch?v=..." />
            <span class="form-hint">Used only if no Stream video is uploaded.</span>
          </div>
        </div>

        <div class="card" style="margin-bottom: 1rem;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h3>Event Photos (${(data.photos || []).length})</h3>
          </div>
          <${DropZone} onFiles=${handlePhotoUpload} label="JPG, PNG, WebP — upload event photos" />
          <div style="margin-top: 0.5rem; text-align: center;">
            <button class="btn btn-ghost btn-sm" type="button" onClick=${() => {
              const idx = (data.photos || []).length;
              update('photos', [...(data.photos || []), { id: '', alt: '' }]);
              setImagePickerTarget('photo:' + idx);
              setShowImagePicker(true);
            }}>Browse Image Library</button>
          </div>
          ${(data.photos || []).length > 0 ? html`
            <div class="photo-grid" style="margin-top: 1rem;">
              ${(data.photos || []).map((photo, idx) => html`
                <div key=${idx} style="position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 4/3; background: #f0f0f0;">
                  <img src=${photo.id && photo.id.startsWith('blob:') ? photo.id : 'https://imagedelivery.net/ROYFuPmfN2vPS6mt5sCkZQ/' + photo.id + '/w=300'}
                    alt=${photo.alt || ''} style="width: 100%; height: 100%; object-fit: cover; display: block;" loading="lazy" />
                  ${uploading[photo._tempId] ? html`
                    <div style="position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center;">
                      <span class="spinner" style="border-color: rgba(255,255,255,0.3); border-top-color: white;" />
                    </div>
                  ` : null}
                  <div style="position: absolute; top: 4px; right: 4px; display: flex; gap: 4px;">
                    <button class="btn btn-ghost btn-sm" style="background: rgba(0,0,0,0.6); color: white; border-radius: 6px; padding: 0.2rem 0.4rem; font-size: 0.75rem;"
                      onClick=${() => removePhoto(idx)} title="Remove">✕</button>
                  </div>
                  <div style="position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.5); padding: 4px 8px;">
                    <input type="text" value=${photo.alt || ''} placeholder="Alt text..."
                      style="width: 100%; background: transparent; border: none; color: white; font-size: 0.75rem; outline: none;"
                      onInput=${e => {
                        const photos = [...(data.photos || [])];
                        photos[idx] = { ...photos[idx], alt: e.target.value };
                        update('photos', photos);
                      }} />
                  </div>
                </div>
              `)}
            </div>
          ` : null}
        </div>

        <div class="card" style="margin-bottom: 1rem;">
          <div class="form-row">
            <div class="form-group">
              <span class="form-label">Display Order</span>
              <input class="form-input" type="number" value=${data.order || 0}
                onInput=${e => update('order', Number(e.target.value))} />
            </div>
            <div class="form-group" style="display: flex; align-items: end; padding-bottom: 0.3rem;">
              <label class="checkbox-label">
                <input type="checkbox" checked=${data.featured}
                  onChange=${e => update('featured', e.target.checked)} />
                Featured event (highlighted on events page)
              </label>
            </div>
          </div>
        </div>
      `;
    }

    // PRESS LIST
    // ═══════════════════════════════════════════
    function PressList({ press, onEdit, onAdd, onDelete }) {
      const [search, setSearch] = useState('');
      const filtered = useMemo(() => {
        if (!search) return press;
        const q = search.toLowerCase();
        return press.filter(p =>
          p.title.toLowerCase().includes(q) ||
          p.outlet.toLowerCase().includes(q) ||
          (p.category || '').toLowerCase().includes(q)
        );
      }, [press, search]);

      return html`
        <div class="page-header">
          <h2>Press & Media (${press.length})</h2>
          <button class="btn btn-primary" onClick=${onAdd}>+ Add Article</button>
        </div>
        <div class="card" style="margin-bottom: 1rem; padding: 0.75rem 1rem;">
          <div class="search-bar" style="max-width: 100%;">
            <span class="search-icon">${icons.search}</span>
            <input placeholder="Search by title, outlet, or category..."
              value=${search} onInput=${e => setSearch(e.target.value)} />
          </div>
        </div>
        <div class="card">
          <div class="table-wrap"><table>
            <thead><tr><th>Image</th><th>Title</th><th>Outlet</th><th>Date</th><th>Category</th><th>Featured</th><th></th></tr></thead>
            <tbody>
              ${filtered.length === 0 ? html`<tr><td colspan="7"><${EmptyState}
                icon="📰" title=${search ? 'No press articles match your search' : 'No press coverage yet'}
                description=${search ? 'Try a different search term.' : 'Add press mentions or check the Press Monitor.'}
                actionLabel=${search ? null : 'Add Press Article'} onAction=${onAdd} /></td></tr>` : null}
              ${filtered.map(p => html`<tr key=${p.slug}>
                <td style="width: 64px; padding: 0.4rem 0.5rem;">
                  ${p.image ? html`<img src=${p.image + '/nav'}
                    alt="" style="width: 56px; height: 36px; object-fit: cover; border-radius: 4px; display: block;" />` : html`<div style="width: 56px; height: 36px; background: #eee; border-radius: 4px;" />`}
                </td>
                <td><strong>${p.title.length > 55 ? p.title.slice(0, 55) + '…' : p.title}</strong></td>
                <td class="text-sm">${p.outlet}</td>
                <td class="text-sm">${p.date || '—'}</td>
                <td><span class="badge badge-accent">${PRESS_CAT_LABELS[p.category] || p.category}</span></td>
                <td>${p.featured ? icons.star : '—'}</td>
                <td style="white-space: nowrap;">
                  <button class="btn btn-ghost btn-sm" onClick=${() => onEdit(p.slug)}>Edit</button>
                  <button class="btn btn-ghost btn-sm" style="color: #E53E3E;" onClick=${(ev) => { ev.stopPropagation(); onDelete({ ...p, name: p.title }); }}>Delete</button>
                </td>
              </tr>`)}
            </tbody>
          </table></div>
        </div>
      `;
    }

    // ═══════════════════════════════════════════
    // PRESS EDITOR
    // ═══════════════════════════════════════════
    function PressEditor({ slug, onBack, addToast }) {
      const [loading, setLoading] = useState(!!slug);
      const [saving, setSaving] = useState(false);
      const [sha, setSha] = useState(null);
      const [dirty, setDirty] = useState(false);
      const [showImagePicker, setShowImagePicker] = useState(false);
      const CF_BASE = 'https://imagedelivery.net/ROYFuPmfN2vPS6mt5sCkZQ';
      const [data, setData] = useState(() => {
        // Check for pre-filled data from Press Monitor
        const prefill = sessionStorage.getItem('press-prefill');
        if (prefill && !slug) {
          sessionStorage.removeItem('press-prefill');
          try { return { ...JSON.parse(prefill) }; } catch {}
        }
        return {
          outlet: '', outletLogo: '', category: 'print',
          title: '', slug: '', date: new Date().toISOString().split('T')[0],
          url: '', excerpt: '', image: null,
          featured: false, order: 0,
        };
      });

      useEffect(() => {
        if (!slug) return;
        (async () => {
          try {
            const res = await api.readContent(`src/content/press/${slug}.json`);
            if (res.success && res.content) {
              const parsed = typeof res.content === 'string' ? JSON.parse(res.content) : res.content;
              if (!parsed.slug) parsed.slug = slug;
              setData(parsed);
              setSha(res.sha);
            } else {
              addToast('Press article not found', 'error');
              onBack();
            }
          } catch (err) {
            addToast(`Load error: ${err.message}`, 'error');
          }
          setLoading(false);
        })();
      }, [slug]);

      const update = (key, val) => {
        setData(d => {
          const updated = { ...d, [key]: val };
          if (key === 'outlet' && !slug) {
            const yr = (d.date || '').split('-')[0] || '';
            updated.slug = slugify(val + (yr ? ' ' + yr : ''));
          }
          if (key === 'date' && !slug && d.outlet) {
            const yr = (val || '').split('-')[0] || '';
            updated.slug = slugify(d.outlet + (yr ? ' ' + yr : ''));
          }
          return updated;
        });
        setDirty(true);
      };

      const handleSave = async () => {
        if (!data.title) { addToast('Title is required', 'error'); return; }
        if (!data.outlet) { addToast('Outlet is required', 'error'); return; }
        if (!data.slug) {
          const yr = (data.date || '').split('-')[0] || '';
          data.slug = slugify(data.outlet + (yr ? ' ' + yr : ''));
        }
        setSaving(true);
        try {
          const saveData = { ...data };
          const fileSlug = saveData.slug;
          delete saveData.slug;
          const path = `src/content/press/${fileSlug}.json`;
          const content = JSON.stringify(saveData, null, 2);
          const message = slug ? `Update press: ${saveData.title}` : `Add press: ${saveData.title}`;
          const res = await api.saveContent(path, content, message, sha || undefined);
          if (res.success) {
            setSha(res.sha);
            setDirty(false);
            addToast('Press article saved & published!', 'success');
            logActivity(slug ? 'published' : 'created', 'press article', data.title);
          } else {
            addToast(`Save failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Save error: ${err.message}`, 'error');
        }
        setSaving(false);
      };

      useEffect(() => {
        const handler = (e) => { if (dirty) { e.preventDefault(); e.returnValue = ''; } };
        window.addEventListener('beforeunload', handler);
        return () => window.removeEventListener('beforeunload', handler);
      }, [dirty]);

      if (loading) return html`<${EditorSkeleton} />`;

      return html`
        ${showImagePicker ? html`<${ImagePicker}
          onSelect=${(id) => { update('image', CF_BASE + '/' + id); setShowImagePicker(false); setDirty(true); }}
          onClose=${() => setShowImagePicker(false)}
        />` : null}
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <button onClick=${() => { if (dirty && !confirm('You have unsaved changes. Leave?')) return; onBack(); }}>Press & Media</button>
          <span class="sep">›</span>
          <span class="current">${slug ? data.title || 'Edit' : 'New Article'}</span>
        </nav>
        <div class="page-header">
          <h2>${slug ? 'Edit Press Article' : 'New Press Article'}</h2>
          <button class="btn btn-primary" onClick=${handleSave} disabled=${saving}>
            ${saving ? 'Saving...' : 'Save & Publish'}
          </button>
        </div>

        <div class="card" style="margin-bottom: 1rem;">
          <h3 style="margin-bottom: 1rem;">Article Details</h3>
          <div class="form-group" style="margin-bottom: 1.25rem;">
            <span class="form-label">Article Title *</span>
            <input class="form-input" type="text" value=${data.title}
              onInput=${e => update('title', e.target.value)} placeholder="How SOARD Transforms Homes and Lives" />
          </div>
          <div class="form-row" style="margin-bottom: 1.25rem;">
            <div class="form-group">
              <span class="form-label">Outlet *</span>
              <input class="form-input" type="text" value=${data.outlet}
                onInput=${e => update('outlet', e.target.value)} placeholder="11Alive (NBC Atlanta)" />
            </div>
            <div class="form-group">
              <span class="form-label">Outlet Logo Key</span>
              <input class="form-input" type="text" value=${data.outletLogo || ''}
                onInput=${e => update('outletLogo', e.target.value)} placeholder="11alive" />
              <span class="form-hint">Used for logo matching on the page</span>
            </div>
          </div>
          <div class="form-row" style="margin-bottom: 1.25rem;">
            <div class="form-group">
              <span class="form-label">Date *</span>
              <input class="form-input" type="date" value=${data.date}
                onInput=${e => update('date', e.target.value)} />
            </div>
            <div class="form-group">
              <span class="form-label">Category</span>
              <select class="form-select" value=${data.category}
                onChange=${e => update('category', e.target.value)}>
                ${PRESS_CATEGORIES.map(c => html`<option key=${c} value=${c}>${PRESS_CAT_LABELS[c]}</option>`)}
              </select>
            </div>
          </div>
          <div class="form-group" style="margin-bottom: 1.25rem;">
            <span class="form-label">Slug</span>
            <input class="form-input" type="text" value=${data.slug || ''}
              onInput=${e => { setData(d => ({ ...d, slug: e.target.value })); setDirty(true); }}
              placeholder="11alive-2025" />
            <span class="form-hint">File name — auto-generated from outlet + year</span>
          </div>
          <div class="form-group" style="margin-bottom: 1.25rem;">
            <span class="form-label">Article URL *</span>
            <input class="form-input" type="url" value=${data.url}
              onInput=${e => update('url', e.target.value)} placeholder="https://www.11alive.com/article/..." />
          </div>
          <div class="form-group" style="margin-bottom: 1.25rem;">
            <span class="form-label">Excerpt *</span>
            <textarea class="form-textarea" rows="3" value=${data.excerpt}
              onInput=${e => update('excerpt', e.target.value)}
              placeholder="Brief summary of the coverage..." />
            <span class="form-hint">${(data.excerpt || '').length}/300 characters</span>
          </div>
        </div>

        <div class="card" style="margin-bottom: 1rem;">
          <h3 style="margin-bottom: 1rem;">Image</h3>
          <div class="form-group" style="margin-bottom: 1.25rem;">
            <span class="form-label">Cloudflare Image URL</span>
            <div style="display: flex; gap: 0.5rem;">
              <input class="form-input" type="text" style="flex: 1;" value=${data.image || ''}
                onInput=${e => update('image', e.target.value || null)}
                placeholder="https://imagedelivery.net/ROYFuPmfN2vPS6mt5sCkZQ/press/11alive-2025" />
              <button class="btn btn-ghost" type="button" onClick=${() => setShowImagePicker(true)}>Browse</button>
            </div>
            <span class="form-hint">Full Cloudflare Images base URL (without variant). Leave blank for no image.</span>
            ${data.image ? html`
              <div style="margin-top: 0.75rem; border-radius: 8px; overflow: hidden; max-width: 400px;">
                <img src=${data.image + '/public'}
                  alt="Article image preview" style="width: 100%; height: 200px; object-fit: cover; display: block;"
                  onError=${e => { e.target.style.display = 'none'; }} />
              </div>
            ` : null}
          </div>
        </div>

        <div class="card">
          <h3 style="margin-bottom: 1rem;">Display Options</h3>
          <div class="form-row">
            <div class="form-group">
              <span class="form-label">Display Order</span>
              <input class="form-input" type="number" value=${data.order || 0}
                onInput=${e => update('order', Number(e.target.value))} />
              <span class="form-hint">Lower = higher priority in featured section</span>
            </div>
            <div class="form-group" style="display: flex; align-items: end; padding-bottom: 0.3rem;">
              <label class="checkbox-label">
                <input type="checkbox" checked=${data.featured}
                  onChange=${e => update('featured', e.target.checked)} />
                Featured article (shown in highlighted section)
              </label>
            </div>
          </div>
        </div>
      `;
    }

    // ═══════════════════════════════════════════
    // PRESS MONITOR — Discover new media mentions
    // ═══════════════════════════════════════════
    function PressMonitor({ existingPress, addToast, onApprove }) {
      const [scanning, setScanning] = useState(false);
      const [mentions, setMentions] = useState([]);
      const [dismissed, setDismissed] = useState(() => {
        try { return JSON.parse(localStorage.getItem('soard-press-dismissed') || '[]'); } catch { return []; }
      });
      const [lastScan, setLastScan] = useState(() => localStorage.getItem('soard-press-last-scan') || null);

      // Build set of existing press URLs for dedup
      const existingUrls = useMemo(() => {
        const urls = new Set();
        for (const p of existingPress) {
          if (p.url) {
            try {
              const u = new URL(p.url);
              urls.add(u.hostname.replace(/^www\./, '') + u.pathname.replace(/\/$/, ''));
            } catch { urls.add(p.url); }
          }
        }
        return urls;
      }, [existingPress]);

      const dismissedSet = useMemo(() => new Set(dismissed), [dismissed]);

      const filteredMentions = useMemo(() => {
        return mentions.filter(m => {
          // Filter out already-published entries — check both RSS link and resolved URL
          const urlsToCheck = [m.link, m.resolvedUrl].filter(Boolean);
          for (const url of urlsToCheck) {
            try {
              const u = new URL(url);
              const norm = u.hostname.replace(/^www\./, '') + u.pathname.replace(/\/$/, '');
              if (existingUrls.has(norm)) return false;
              if (dismissedSet.has(norm)) return false;
            } catch {}
          }
          return true;
        });
      }, [mentions, existingUrls, dismissedSet]);

      const doScan = async () => {
        setScanning(true);
        try {
          const res = await fetch('/api/press-scan');
          const data = await res.json();
          if (data.success) {
            setMentions(data.mentions);
            const now = new Date().toLocaleString();
            setLastScan(now);
            localStorage.setItem('soard-press-last-scan', now);
            addToast(`Found ${data.mentions.length} results, ${filteredMentions.length || '—'} new`, 'success');
          } else {
            addToast(`Scan failed: ${data.error}`, 'error');
          }
        } catch (err) {
          addToast(`Scan error: ${err.message}`, 'error');
        }
        setScanning(false);
      };

      const dismiss = (mention) => {
        const urls = [mention.link, mention.resolvedUrl].filter(Boolean);
        const norms = [];
        for (const url of urls) {
          try {
            const u = new URL(url);
            norms.push(u.hostname.replace(/^www\./, '') + u.pathname.replace(/\/$/, ''));
          } catch {}
        }
        if (norms.length) {
          const updated = [...dismissed, ...norms];
          setDismissed(updated);
          localStorage.setItem('soard-press-dismissed', JSON.stringify(updated));
        }
      };

      const clearDismissed = () => {
        setDismissed([]);
        localStorage.removeItem('soard-press-dismissed');
        addToast('Dismissed list cleared', 'success');
      };

      const handleApprove = (mention) => {
        const slug = mention.source
          ? mention.source.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') + '-' + (mention.date || 'new')
          : 'press-' + Date.now();

        onApprove({
          outlet: mention.source || '',
          outletLogo: mention.source ? mention.source.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') : '',
          category: 'print',
          title: mention.title || '',
          slug,
          date: mention.date || new Date().toISOString().split('T')[0],
          url: mention.resolvedUrl || mention.link || '',
          excerpt: mention.description || '',
          featured: false,
          order: 99,
        });
      };

      return html`
        <div class="page-header">
          <div>
            <h2>Press Monitor</h2>
            <p class="text-sm text-muted" style="margin-top: 0.25rem;">
              Scans Google News for SOARD media mentions. Approve to create press entries.
            </p>
          </div>
          <div style="display: flex; gap: 0.5rem; align-items: center;">
            ${dismissed.length > 0 ? html`
              <button class="btn btn-ghost btn-sm" onClick=${clearDismissed}>
                Clear ${dismissed.length} dismissed
              </button>
            ` : null}
            <button class="btn btn-primary" onClick=${doScan} disabled=${scanning}>
              ${scanning ? html`<span class="spinner" style="width:16px;height:16px;border-width:2px;margin-right:0.5rem;" />` : null}
              ${scanning ? 'Scanning…' : 'Scan for Mentions'}
            </button>
          </div>
        </div>

        ${lastScan ? html`
          <p class="text-sm text-muted" style="margin-bottom: 1rem;">Last scan: ${lastScan}</p>
        ` : null}

        <div class="card" style="margin-bottom: 1rem; padding: 1rem;">
          <p class="text-sm" style="margin: 0; color: #6B6C72;">
            <strong>Search queries:</strong> "Sunshine on a Ranney Day", "SOARD" charity, "Peter Ranney" nonprofit, "Holly Ranney", "Sunny and Ranney", "sunshineonaranneyday"
          </p>
        </div>

        ${mentions.length > 0 ? html`
          <div class="card" style="margin-bottom: 0.75rem; padding: 0.75rem 1rem;">
            <span class="text-sm">
              <strong>${mentions.length}</strong> total results · 
              <strong>${filteredMentions.length}</strong> new · 
              <strong>${mentions.length - filteredMentions.length}</strong> already tracked or dismissed
            </span>
          </div>
        ` : null}

        ${!scanning && mentions.length === 0 ? html`
          <div class="card" style="padding: 3rem; text-align: center; color: #6B6C72;">
            <p style="font-size: 2rem; margin-bottom: 0.5rem;">📡</p>
            <p>Click <strong>Scan for Mentions</strong> to search for new press coverage.</p>
          </div>
        ` : null}

        ${scanning ? html`
          <div class="card" style="padding: 3rem; text-align: center;">
            <div class="spinner" style="width: 32px; height: 32px; border-width: 3px; margin: 0 auto 1rem;" />
            <p class="text-muted">Searching Google News RSS feeds…</p>
          </div>
        ` : null}

        ${filteredMentions.length > 0 ? html`
          <div class="card">
            <div class="table-wrap"><table>
              <thead><tr><th>Title</th><th>Source</th><th>Date</th><th>Matched Query</th><th style="width: 190px;"></th></tr></thead>
              <tbody>
                ${filteredMentions.map(m => html`<tr key=${m.link}>
                  <td>
                    <a href=${m.resolvedUrl || m.link} target="_blank" rel="noopener" style="color: var(--c-dark); text-decoration: underline; text-underline-offset: 2px;">
                      ${m.title.length > 70 ? m.title.slice(0, 70) + '…' : m.title}
                    </a>
                    ${m.resolvedUrl ? html`<br /><span class="text-sm text-muted" style="word-break: break-all;">${(() => { try { const u = new URL(m.resolvedUrl); return u.hostname + u.pathname; } catch { return ''; } })()}</span>` : m.description ? html`<br /><span class="text-sm text-muted">${m.description.length > 100 ? m.description.slice(0, 100) + '…' : m.description}</span>` : null}
                  </td>
                  <td class="text-sm">${m.source || '—'}</td>
                  <td class="text-sm" style="white-space: nowrap;">${m.date || '—'}</td>
                  <td><span class="badge" style="font-size: 0.7rem;">${m.query.replace(/"/g, '')}</span></td>
                  <td style="white-space: nowrap;">
                    <button class="btn btn-primary btn-sm" onClick=${() => handleApprove(m)}>Approve</button>
                    <button class="btn btn-ghost btn-sm" style="color: #999;" onClick=${() => dismiss(m)}>Dismiss</button>
                  </td>
                </tr>`)}
              </tbody>
            </table></div>
          </div>
        ` : mentions.length > 0 && !scanning ? html`
          <div class="card" style="padding: 2rem; text-align: center; color: #6B6C72;">
            <p>All ${mentions.length} results are already tracked or dismissed.</p>
          </div>
        ` : null}
      `;
    }

    // ═══════════════════════════════════════════
    // COMMUNITY PROJECTS LIST

      const CF = 'https://imagedelivery.net/ROYFuPmfN2vPS6mt5sCkZQ';
      const filtered = useMemo(() => {
        if (!search) return projects;
        const q = search.toLowerCase();
        return projects.filter(p =>
          p.name.toLowerCase().includes(q) ||
          (p.description || '').toLowerCase().includes(q) ||
          (p.year + '').includes(q)
        );
      }, [projects, search]);

      return html`
        <div class="page-header">
          <h2>Community Projects (${projects.length})</h2>
          <button class="btn btn-primary" onClick=${onAdd}>+ Add Project</button>

        <div class="card" style="margin-bottom: 1rem; padding: 0.75rem 1rem;">
          <div class="search-bar" style="max-width: 100%;">
            <span class="search-icon">${icons.search}</span>
            <input placeholder="Search by name, description, or year..."
              value=${search} onInput=${e => setSearch(e.target.value)} />

        </div>
        <div class="card">
          <div class="table-wrap"><table>
            <thead><tr><th></th><th>Name</th><th>Year</th><th>Impact</th><th>Badge</th><th>Photos</th><th>Order</th><th></th></tr></thead>
            <tbody>
              ${filtered.length === 0 ? html`<tr><td colspan="8"><${EmptyState}
                icon="🏠" title=${search ? 'No projects match your search' : 'No community projects yet'}
                description=${search ? 'Try a different search term.' : 'Add your first community project.'}
                actionLabel=${search ? null : 'Add Project'} onAction=${onAdd} /></td></tr>` : null}
              ${filtered.map(p => html`<tr key=${p.slug}>
                <td>${p.imageId
                  ? html`<img class="td-thumb" src="${CF}/${p.imageId}/w=88,h=88,fit=cover" alt="" style="border-radius: 6px;" />`
                  : html`<div class="td-thumb" style="background: ${p.color}; border-radius: 6px;" />`}</td>
                <td>
                  <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <span style="width: 12px; height: 12px; border-radius: 50%; background: ${p.color}; flex-shrink: 0;" />
                    <strong>${p.name}</strong>
                  </div>
                </td>
                <td class="text-sm">${p.year}</td>
                <td class="text-sm">${p.impact} ${p.impactLabel}</td>
                <td>${p.badge ? html`<span class="badge badge-yellow">${p.badge}</span>` : '—'}</td>
                <td>${(p.photos || []).length || (p.imageId ? 1 : 0)}</td>
                <td class="text-sm">${p.order || 0}</td>
                <td style="white-space: nowrap;">
                  <button class="btn btn-ghost btn-sm" onClick=${() => onEdit(p.slug)}>Edit</button>
                  <button class="btn btn-ghost btn-sm" style="color: #E53E3E;" onClick=${(ev) => { ev.stopPropagation(); onDelete(p); }}>Delete</button>
                </td>
              </tr>`)}
            </tbody>
          </table></div>
        </div>
      `;
    }

    // ═══════════════════════════════════════════
    // COMMUNITY PROJECT EDITOR
    // ═══════════════════════════════════════════
    function CommunityEditor({ slug, onBack, addToast }) {
      const [loading, setLoading] = useState(!!slug);
      const [saving, setSaving] = useState(false);
      const [deleting, setDeleting] = useState(false);
      const [showDeleteModal, setShowDeleteModal] = useState(false);
      const [sha, setSha] = useState(null);
      const [dirty, setDirty] = useState(false);
      const [uploading, setUploading] = useState({});
      const [data, setData] = useState({
        name: '', slug: '', impact: '', impactLabel: 'children impacted yearly',
        year: new Date().getFullYear().toString(), description: '',
        color: '#373A36', imageId: '', imageAlt: '', badge: '', order: 0,
        photos: [], heroImage: '',
      });

      const CF = 'https://imagedelivery.net/ROYFuPmfN2vPS6mt5sCkZQ';
      const PRESET_COLORS = ['#2E7D32', '#1565C0', '#6A1B9A', '#C62828', '#E65100', '#00838F', '#373A36', '#AD1457'];

      useEffect(() => {
        if (!slug) return;
        (async () => {
          try {
            const res = await api.readContent(`src/content/community/${slug}.json`);
            if (res.success && res.content) {
              const parsed = typeof res.content === 'string' ? JSON.parse(res.content) : res.content;
              // Migrate: if imageId exists but no photos array, create one
              if (parsed.imageId && (!parsed.photos || parsed.photos.length === 0)) {
                parsed.photos = [{ url: `${CF}/${parsed.imageId}/public`, alt: parsed.imageAlt || '', cfImageId: parsed.imageId }];
                parsed.heroImage = parsed.heroImage || `${CF}/${parsed.imageId}/public`;
              }
              if (!parsed.photos) parsed.photos = [];
              setData(parsed);
              setSha(res.sha);
            } else {
              addToast('Project not found', 'error');
              onBack();
            }
          } catch (err) {
            addToast(`Load error: ${err.message}`, 'error');
          }
          setLoading(false);
        })();
      }, [slug]);

      const update = (key, val) => {
        setData(d => {
          const updated = { ...d, [key]: val };
          if (key === 'name' && !slug) {
            updated.slug = slugify(val);
          }
          return updated;
        });
        setDirty(true);
      };

      // Warn on browser close/refresh with unsaved changes
      useEffect(() => {
        const handler = (e) => { if (dirty) { e.preventDefault(); e.returnValue = ''; } };
        window.addEventListener('beforeunload', handler);
        return () => window.removeEventListener('beforeunload', handler);
      }, [dirty]);

      const safeBack = () => {
        if (dirty && !confirm('You have unsaved changes. Leave without saving?')) return;
        onBack();
      };

      const handleDelete = async () => {
        if (!slug || !sha) return;
        setDeleting(true);
        try {
          const res = await api.deleteContent(
            `src/content/community/${slug}.json`, sha, `Delete community project: ${data.name}`
          );
          if (res.success) {
            addToast(`${data.name} deleted`, 'success');
            logActivity('deleted', 'community project', data.name);
            setDirty(false);
            onBack();
          } else {
            addToast(`Delete failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Delete error: ${err.message}`, 'error');
        }
        setDeleting(false);
        setShowDeleteModal(false);
      };

      const handlePhotoUpload = async (files) => {
        setDirty(true);
        for (const file of files) {
          const tempId = Date.now() + '-' + file.name;
          const localUrl = URL.createObjectURL(file);
          setData(d => ({
            ...d,
            photos: [...(d.photos || []), { url: localUrl, alt: '', _tempId: tempId }],
          }));
          setUploading(u => ({ ...u, [tempId]: true }));

          try {
            const cfId = `community/${data.slug || 'new'}/${Date.now()}-${file.name.replace(/[^a-z0-9.]/gi, '-')}`;
            const res = await api.uploadImage(file, cfId);
            if (res.success) {
              setData(d => ({
                ...d,
                photos: (d.photos || []).map(p =>
                  p._tempId === tempId
                    ? { url: res.imageUrl, alt: '', cfImageId: res.imageId }
                    : p
                ),
                // Auto-set imageId from first upload if not set
                imageId: d.imageId || res.imageId,
                heroImage: d.heroImage || res.imageUrl,
              }));
              addToast(`Uploaded ${file.name}`, 'success');
            } else {
              addToast(`Failed: ${res.error}`, 'error');
              setData(d => ({
                ...d,
                photos: (d.photos || []).filter(p => p._tempId !== tempId),
              }));
            }
          } catch (err) {
            addToast(`Upload error: ${err.message}`, 'error');
          }
          setUploading(u => { const n = { ...u }; delete n[tempId]; return n; });
        }
      };

      const removePhoto = (index) => {
        setDirty(true);
        setData(d => {
          const newPhotos = (d.photos || []).filter((_, i) => i !== index);
          const removedUrl = (d.photos || [])[index]?.url;
          return {
            ...d,
            photos: newPhotos,
            heroImage: d.heroImage === removedUrl ? (newPhotos[0]?.url || '') : d.heroImage,
            imageId: newPhotos.length === 0 ? '' : d.imageId,
          };
        });
      };

      const setHero = (index) => {
        setDirty(true);
        const photo = (data.photos || [])[index];
        if (photo) {
          setData(d => ({
            ...d,
            heroImage: photo.url,
            imageId: photo.cfImageId || d.imageId,
          }));
        }
      };

      const handleSave = async () => {
        if (!data.name) { addToast('Name is required', 'error'); return; }

          if (res.success) {
            setSha(res.sha);
            setDirty(false);
            addToast('Project saved & published!', 'success');
            logActivity(slug ? 'published' : 'created', 'community project', data.name);
          } else {
            addToast(`Save failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Save error: ${err.message}`, 'error');
        }
        setSaving(false);
      };

      if (loading) return html`<${EditorSkeleton} />`;

      return html`
        ${showDeleteModal ? html`<${ConfirmModal}
          title="Delete ${data.name}?"
          message="This will permanently remove this community project from the site. This cannot be undone."
          danger=${true}
          onConfirm=${handleDelete}

        />` : null}
        <nav class="breadcrumb" aria-label="Breadcrumb">

    // FAQ MANAGEMENT
    // ═══════════════════════════════════════════
    function FAQManager({ addToast }) {
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [sha, setSha] = useState(null);
      const [data, setData] = useState({ categories: [], items: [] });
      const [editItem, setEditItem] = useState(null); // null=list, 'new'=new, {id}=editing
      const [editCat, setEditCat] = useState(null);
      const [dragIdx, setDragIdx] = useState(null);

      useEffect(() => {
        (async () => {
          try {
            const res = await api.readContent('src/content/site/faq.json');
            if (res.success) {
              setData(JSON.parse(res.content));
              setSha(res.sha);
            }
          } catch {}
          setLoading(false);
        })();
      }, []);

      const handleSave = async () => {
        setSaving(true);
        try {
          const content = JSON.stringify(data, null, 2);
          const res = await api.saveContent(
            'src/content/site/faq.json', content,
            'Update FAQ content', sha
          );
          if (res.success) {
            setSha(res.sha);
            addToast('FAQs saved & published!', 'success');
            logActivity('updated', 'FAQs', '');
          } else {
            addToast(`Failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Error: ${err.message}`, 'error');
        }
        setSaving(false);
      };

      // ── Category helpers ──
      const addCategory = () => {
        const id = `cat-${Date.now()}`;
        setData(d => ({
          ...d,
          categories: [...d.categories, { id, label: 'New Category', showOnDonatePage: false }],
        }));
        setEditCat(id);
      };

      const updateCategory = (id, field, value) => {
        setData(d => ({
          ...d,
          categories: d.categories.map(c => c.id === id ? { ...c, [field]: value } : c),
        }));
      };

      const deleteCategory = (id) => {
        const hasItems = data.items.some(i => i.category === id);
        if (hasItems) {
          addToast('Move or delete all FAQs in this category first.', 'error');
          return;
        }
        setData(d => ({
          ...d,
          categories: d.categories.filter(c => c.id !== id),
        }));
        setEditCat(null);
      };

      // ── Item helpers ──
      const addItem = (categoryId) => {
        const id = `faq-${Date.now()}`;
        const catItems = data.items.filter(i => i.category === categoryId);
        const maxOrder = catItems.reduce((m, i) => Math.max(m, i.order || 0), 0);
        const newItem = {
          id,
          question: '',
          answer: '',
          category: categoryId,
          order: maxOrder + 1,
        };
        setData(d => ({ ...d, items: [...d.items, newItem] }));
        setEditItem(id);
      };

      const updateItem = (id, field, value) => {
        setData(d => ({
          ...d,
          items: d.items.map(i => i.id === id ? { ...i, [field]: value } : i),
        }));
      };

      const deleteItem = (id) => {
        setData(d => ({ ...d, items: d.items.filter(i => i.id !== id) }));
        if (editItem === id) setEditItem(null);
      };

      const moveItem = (id, direction) => {
        setData(d => {
          const item = d.items.find(i => i.id === id);
          if (!item) return d;
          const catItems = d.items
            .filter(i => i.category === item.category)
            .sort((a, b) => (a.order || 0) - (b.order || 0));
          const idx = catItems.findIndex(i => i.id === id);
          const swapIdx = idx + direction;
          if (swapIdx < 0 || swapIdx >= catItems.length) return d;
          const swapItem = catItems[swapIdx];
          return {
            ...d,
            items: d.items.map(i => {
              if (i.id === id) return { ...i, order: swapItem.order };
              if (i.id === swapItem.id) return { ...i, order: item.order };
              return i;
            }),
          };
        });
      };

      if (loading) return html`<${EditorSkeleton} />`;

      // ── Edit single FAQ item ──
      if (editItem) {
        const item = data.items.find(i => i.id === editItem);
        if (!item) { setEditItem(null); return null; }
        return html`
          <div class="page-header">
            <div style="display: flex; align-items: center; gap: 0.75rem;">
              <button class="btn btn-ghost btn-sm" onClick=${() => setEditItem(null)}>${icons.arrowLeft} Back</button>
              <h2>${item.question ? 'Edit FAQ' : 'New FAQ'}</h2>
            </div>
            <button class="btn btn-primary" onClick=${handleSave} disabled=${saving}>
              ${saving ? html`<span class="spinner" />` : null} ${saving ? 'Saving...' : 'Save All'}
            </button>
          </div>
          <div class="card">
            <div class="form-group">
              <label class="form-label">Question *</label>
              <input class="form-input" value=${item.question}
                placeholder="e.g. Is my donation tax-deductible?"
                onInput=${e => updateItem(item.id, 'question', e.target.value)} />
            </div>
            <div class="form-group">
              <label class="form-label">Answer *</label>
              <textarea class="form-input" rows="5" value=${item.answer}
                placeholder="Write the answer here. HTML links are supported: <a href='/page'>Link text</a>"
                onInput=${e => updateItem(item.id, 'answer', e.target.value)} />
              <p class="text-sm text-muted" style="margin-top: 0.35rem;">Supports basic HTML for links. Example: &lt;a href="/donate"&gt;Donate page&lt;/a&gt;</p>
            </div>
            <div class="form-group">
              <label class="form-label">Category</label>
              <select class="form-input" value=${item.category}
                onChange=${e => updateItem(item.id, 'category', e.target.value)}>
                ${data.categories.map(c => html`<option value=${c.id}>${c.label}</option>`)}
              </select>
            </div>
          </div>
          <div style="margin-top: 1rem;">
            <button class="btn btn-ghost" style="color: #e53e3e;" onClick=${() => { deleteItem(item.id); }}>
              ${icons.trash} Delete this FAQ
            </button>
          </div>
        `;
      }

      // ── Main FAQ list view ──
      return html`
        <div class="page-header">
          <h2>FAQs</h2>
          <div style="display: flex; gap: 0.5rem;">
            <button class="btn btn-ghost btn-sm" onClick=${addCategory}>+ Category</button>
            <button class="btn btn-primary" onClick=${handleSave} disabled=${saving}>
              ${saving ? html`<span class="spinner" />` : null} ${saving ? 'Saving...' : 'Save & Publish'}
            </button>
          </div>
        </div>
        <p class="text-sm text-muted" style="margin-bottom: 1rem;">Manage FAQ questions shown on the Donate page and the FAQ page. Categories marked with a star appear on the Donate page.</p>

        ${data.categories.map(cat => {
          const catItems = data.items
            .filter(i => i.category === cat.id)
            .sort((a, b) => (a.order || 0) - (b.order || 0));

          return html`
            <div class="card" key=${cat.id} style="margin-bottom: 1rem;">
              <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;">
                ${editCat === cat.id ? html`
                  <div style="display: flex; align-items: center; gap: 0.5rem; flex: 1;">
                    <input class="form-input" value=${cat.label} style="max-width: 240px;"
                      onInput=${e => updateCategory(cat.id, 'label', e.target.value)} 
                      onKeyDown=${e => { if (e.key === 'Enter') setEditCat(null); }} />
                    <label style="display: flex; align-items: center; gap: 0.35rem; font-size: 0.85rem; color: rgba(45,46,51,0.6); white-space: nowrap; cursor: pointer;">
                      <input type="checkbox" checked=${cat.showOnDonatePage}
                        onChange=${e => updateCategory(cat.id, 'showOnDonatePage', e.target.checked)} />
                      Show on Donate page
                    </label>
                    <button class="btn btn-ghost btn-sm" onClick=${() => setEditCat(null)}>Done</button>
                    <button class="btn btn-ghost btn-sm" style="color: #e53e3e;" onClick=${() => deleteCategory(cat.id)}>Delete</button>
                  </div>
                ` : html`
                  <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <h3 style="margin: 0;">${cat.showOnDonatePage ? html`${icons.star} ` : ''}${cat.label}</h3>
                    <span class="text-sm text-muted">(${catItems.length})</span>
                    <button class="btn btn-ghost btn-sm" onClick=${() => setEditCat(cat.id)} title="Edit category">${icons.pencil}</button>
                  </div>
                `}
                <button class="btn btn-ghost btn-sm" onClick=${() => addItem(cat.id)}>+ Add FAQ</button>
              </div>

              ${catItems.length === 0 ? html`
                <div class="empty-state" style="padding: 2rem;">
                  <p class="text-sm text-muted">No questions in this category yet.</p>
                </div>
              ` : html`
                <div class="table-wrap"><table>
                  <thead><tr><th style="width: 50px;">#</th><th>Question</th><th style="width: 120px;">Actions</th></tr></thead>
                  <tbody>
                    ${catItems.map((item, idx) => html`
                      <tr key=${item.id}>
                        <td class="text-muted">
                          <div style="display: flex; flex-direction: column; align-items: center; gap: 2px;">
                            <button class="btn btn-ghost btn-sm" style="padding: 0; min-height: auto; font-size: 0.7rem; opacity: ${idx === 0 ? 0.2 : 0.6};"
                              onClick=${() => moveItem(item.id, -1)} disabled=${idx === 0} title="Move up">▲</button>
                            <span style="font-size: 0.85rem;">${String(idx + 1).padStart(2, '0')}</span>
                            <button class="btn btn-ghost btn-sm" style="padding: 0; min-height: auto; font-size: 0.7rem; opacity: ${idx === catItems.length - 1 ? 0.2 : 0.6};"
                              onClick=${() => moveItem(item.id, 1)} disabled=${idx === catItems.length - 1} title="Move down">▼</button>
                          </div>
                        </td>
                        <td>
                          <strong style="cursor: pointer;" onClick=${() => setEditItem(item.id)}>${item.question || '(untitled)'}</strong>
                          <div class="text-sm text-muted" style="margin-top: 0.2rem; max-width: 500px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                            ${item.answer.replace(/<[^>]+>/g, '').slice(0, 80)}${item.answer.length > 80 ? '…' : ''}
                          </div>
                        </td>
                        <td>
                          <div style="display: flex; gap: 0.25rem;">
                            <button class="btn btn-ghost btn-sm" onClick=${() => setEditItem(item.id)}>Edit</button>
                            <button class="btn btn-ghost btn-sm" style="color: #e53e3e;" onClick=${() => deleteItem(item.id)}>${icons.trash}</button>
                          </div>
                        </td>
                      </tr>
                    `)}
                  </tbody>
                </table></div>
              `}
            </div>
          `;
        })}

        ${data.categories.length === 0 ? html`
          <div class="card">
            <div class="empty-state">
              <div class="empty-state-icon">❓</div>
              <p>No FAQ categories yet.</p>
              <p class="text-sm text-muted">Click "+ Category" to create your first one.</p>
            </div>
          </div>
        ` : null}
      `;
    }

    // IMAGE PICKER MODAL
    // ═══════════════════════════════════════════
    function ImagePicker({ onSelect, onClose }) {
      const CF = 'https://imagedelivery.net/ROYFuPmfN2vPS6mt5sCkZQ';
      const [allImages, setAllImages] = useState([]);
      const [loading, setLoading] = useState(true);
      const [progress, setProgress] = useState({ loaded: 0, total: 0 });
      const [search, setSearch] = useState('');
      const [category, setCategory] = useState('kids');
      const [displayPage, setDisplayPage] = useState(1);
      const THUMBS_PER_PAGE = 60;

      // Load ALL images on mount by paginating through CF API
      useEffect(() => {
        let cancelled = false;
        (async () => {
          try {
            // First call: get total count
            const first = await api.listImages(1, 100);
            if (!first.success || cancelled) return;
            const total = first.totalCount || 0;
            const totalPages = Math.ceil(total / 100);
            let collected = [...(first.images || [])];
            setProgress({ loaded: collected.length, total });

            // Fetch remaining pages in batches of 6
            for (let batch = 1; batch < totalPages; batch += 6) {
              const promises = [];
              for (let p = batch + 1; p <= Math.min(batch + 6, totalPages); p++) {
                promises.push(api.listImages(p, 100));
              }
              const results = await Promise.all(promises);
              if (cancelled) return;
              for (const res of results) {
                if (res.success) collected = collected.concat(res.images || []);
              }
              setProgress({ loaded: collected.length, total });
              setAllImages([...collected]);
            }

            setAllImages(collected);
          } catch (err) {
            console.error('Image load error', err);
          }
          if (!cancelled) setLoading(false);
        })();
        return () => { cancelled = true; };
      }, []);

      // Filter images by category and search
      const filtered = useMemo(() => {
        let list = allImages;
        if (category === 'kids') list = list.filter(img => img.id.startsWith('kids/'));
        else if (category === 'logos') list = list.filter(img => img.id.startsWith('logos/'));
        else if (category === 'other') list = list.filter(img => !img.id.startsWith('kids/') && !img.id.startsWith('logos/'));
        if (search.trim()) {
          const q = search.toLowerCase().trim();
          list = list.filter(img => img.id.toLowerCase().includes(q));
        }
        return list;
      }, [allImages, category, search]);

      // Extract kid names for quick-pick buttons
      const kidNames = useMemo(() => {
        const names = new Set();
        allImages.forEach(img => {
          if (img.id.startsWith('kids/')) {
            const name = img.id.split('/')[1];
            if (name) names.add(name);
          }
        });
        return [...names].sort();
      }, [allImages]);

      const pageCount = Math.ceil(filtered.length / THUMBS_PER_PAGE);
      const pageImages = filtered.slice((displayPage - 1) * THUMBS_PER_PAGE, displayPage * THUMBS_PER_PAGE);

      // Reset to page 1 when filters change
      useEffect(() => { setDisplayPage(1); }, [search, category]);

            <span class="text-sm text-muted" style="white-space: nowrap;">

          ${category === 'kids' && kidNames.length > 0 && !search ? html`

          <div class="img-picker-grid">

                  <div>Loading images... ${progress.loaded} of ${progress.total}</div>

              : pageImages.length === 0
              ? html`<div class="img-picker-empty">No images match "${search || category}". ${loading ? 'Still loading more...' : ''}</div>`

                <div key=${img.id} class="img-picker-thumb" title=${img.id}
                  onClick=${() => { onSelect(img.id); onClose(); }}>

            }
          </div>
          ${pageCount > 1 ? html`
            <div class="img-picker-pager">
              <button class="btn btn-ghost btn-sm" disabled=${displayPage <= 1} onClick=${() => setDisplayPage(p => p - 1)}>${icons.chevLeft} Prev</button>

              <button class="btn btn-ghost btn-sm" disabled=${displayPage >= pageCount} onClick=${() => setDisplayPage(p => p + 1)}>Next →</button>
            </div>
          ` : null}
        </div>
      </div>`;

    function ShopCollections({ selected, onChange }) {
      const [collections, setCollections] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      useEffect(() => {
        (async () => {
          try {
            const res = await fetch('/api/shopify', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                query: 'query{collections(first:50){edges{node{id handle title image{url}products(first:1){edges{node{featuredImage{url}}}}}}}}'
              })
            });
            const json = await res.json();
            if (json.data?.collections?.edges) {
              setCollections(json.data.collections.edges.map(e => e.node));
            }
          } catch (err) {
            setError('Could not load Shopify collections');
          }
          setLoading(false);
        })();
      }, []);

      const toggle = (handle) => {
        const current = selected || [];
        if (current.includes(handle)) {
          onChange(current.filter(h => h !== handle));
        } else {
          onChange([...current, handle]);
        }
      };

      const isSelected = (handle) => !selected || selected.length === 0 || selected.includes(handle);

      return html`
        <div class="card">
          <h3 style="margin-bottom: 0.5rem;">Shop Collections</h3>
          <p class="text-sm text-muted mb-1">Choose which Shopify collections appear on the shop page. If none are selected, all collections with products will show.</p>
          ${loading ? html`<div style="padding: 1rem; text-align: center;"><div class="spinner" style="width: 24px; height: 24px;" /></div>` : null}
          ${error ? html`<p class="text-sm" style="color: #c00;">${error}</p>` : null}
          ${!loading && !error ? html`
            <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-top: 1rem;">
              ${collections.map(c => {
                const img = c.image?.url || c.products?.edges?.[0]?.node?.featuredImage?.url;
                const checked = isSelected(c.handle);
                const productCount = c.products?.edges?.length || 0;
                return html`
                  <label style="display: flex; gap: 10px; align-items: center; padding: 10px 12px; border-radius: 10px; border: 2px solid ${selected?.includes(c.handle) ? 'var(--accent)' : 'var(--border)'}; cursor: pointer; transition: all 0.15s ease; background: ${selected?.includes(c.handle) ? 'rgba(255,218,36,0.06)' : 'transparent'};">
                    <input type="checkbox" checked=${selected?.includes(c.handle)} onChange=${() => toggle(c.handle)}
                      style="width: 18px; height: 18px; flex-shrink: 0; accent-color: var(--accent);" />
                    ${img ? html`<img src="${img}&width=80" alt="" style="width: 40px; height: 40px; border-radius: 6px; object-fit: cover; flex-shrink: 0;" />` : null}
                    <div style="min-width: 0;">
                      <div style="font-weight: 600; font-size: 0.875rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${c.title}</div>
                      <div class="text-sm text-muted">${c.handle}</div>
                    </div>
                  </label>
                `;
              })}
            </div>
            <p class="text-sm text-muted" style="margin-top: 0.75rem;">${selected?.length ? selected.length + ' selected' : 'All collections shown (none explicitly selected)'}</p>
          ` : null}
        </div>
      `;
    }

    function SiteSettings({ addToast, kids: allKids = [], partners: allPartners = [] }) {
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [sha, setSha] = useState(null);
      const [data, setData] = useState({});

      // Sorted kids for dropdown
      const sortedKids = useMemo(() =>
        [...allKids].sort((a, b) => (a.name || '').localeCompare(b.name || '')),
        [allKids]
      );
      // Sorted partners for dropdown
      const sortedPartners = useMemo(() =>
        [...allPartners].sort((a, b) => (a.name || '').localeCompare(b.name || '')),
        [allPartners]
      );
      const extractCfId = (url) => {
        if (!url) return '';
        const m = url.match(/ROYFuPmfN2vPS6mt5sCkZQ\/(.+?)\/[^/]+$/);
        return m ? m[1] : '';
      };
      const handleKidSelect = (index, slug) => {
        const kid = allKids.find(k => k.slug === slug);
        setData(d => {
          const arr = [...(d.kidShowcase || [])];
          arr[index] = { slug, cfId: kid ? extractCfId(kid.heroImage) : '' };
          return { ...d, kidShowcase: arr };
        });
      };
      const handlePartnerSelect = (index, slug) => {
        const partner = allPartners.find(p => p.slug === slug);
        setData(d => {
          const arr = [...(d.partnerLogos || [])];
          arr[index] = { name: partner?.name || '', id: partner ? extractCfId(partner.logo) : '' };
          return { ...d, partnerLogos: arr };
        });
      };

      // Image picker state
      const [showImagePicker, setShowImagePicker] = useState(false);
      const [imagePickerTarget, setImagePickerTarget] = useState(null);
      const openImagePicker = (target) => {
        setImagePickerTarget(target);
        setShowImagePicker(true);
      };

      useEffect(() => {
        (async () => {
          const res = await api.readContent('src/content/site/settings.json');
          if (res.success) {
            setData(JSON.parse(res.content));
            setSha(res.sha);
          }
          setLoading(false);
        })();
      }, []);

      const updateField = (path, value) => {
        setData(d => {
          const copy = JSON.parse(JSON.stringify(d));
          const keys = path.split('.');
          let obj = copy;
          for (let i = 0; i < keys.length - 1; i++) {
            if (!obj[keys[i]] || typeof obj[keys[i]] !== 'object') obj[keys[i]] = {};
            obj = obj[keys[i]];
          }
          obj[keys[keys.length - 1]] = value;
          return copy;
        });
      };

      const addToArray = (key, item) => {
        setData(d => ({ ...d, [key]: [...(d[key] || []), item] }));
      };
      const removeFromArray = (key, index) => {
        setData(d => ({ ...d, [key]: (d[key] || []).filter((_, i) => i !== index) }));
      };
      const updateArrayItem = (key, index, field, value) => {
        setData(d => {
          const arr = [...(d[key] || [])];
          arr[index] = { ...arr[index], [field]: value };
          return { ...d, [key]: arr };
        });
      };
      const moveArrayItem = (key, from, to) => {
        setData(d => {
          const arr = [...(d[key] || [])];
          const [item] = arr.splice(from, 1);
          arr.splice(to, 0, item);
          return { ...d, [key]: arr };
        });
      };

      const handleSave = async () => {
        setSaving(true);
        try {
          const content = JSON.stringify(data, null, 2);
          const res = await api.saveContent(
            'src/content/site/settings.json', content,
            'Update site settings', sha
          );
          if (res.success) {
            setSha(res.sha);
            addToast('Settings saved!', 'success');
            logActivity('updated', 'site settings', '');
          } else {
            addToast(`Failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Error: ${err.message}`, 'error');
        }
        setSaving(false);
      };

      if (loading) return html`<${EditorSkeleton} />`;

      const CF = 'https://imagedelivery.net/ROYFuPmfN2vPS6mt5sCkZQ';
      const renderPhotoField = (label, fieldPath, currentId) => html`
        <div class="form-group">
          <label class="form-label">${label}</label>
          ${currentId ? html`
            <div style="margin-bottom: 0.5rem; border-radius: 8px; overflow: hidden; max-height: 100px;">
              <img src="${CF}/${currentId}/w=300" alt="Preview" style="width: 100%; height: 100px; object-fit: cover; display: block;" />
            </div>
          ` : null}
          <div style="display: flex; gap: 0.5rem;">
            <input class="form-input" style="flex:1; font-size: 0.85rem;" value=${currentId || ''}
              onInput=${e => updateField(fieldPath, e.target.value)} />
            <button class="btn btn-ghost" type="button" onClick=${() => openImagePicker(fieldPath)}>Browse</button>
          </div>
        </div>
      `;

      return html`
        ${showImagePicker ? html`<${ImagePicker}
          onSelect=${(id) => { updateField(imagePickerTarget, id); setShowImagePicker(false); }}
          onClose=${() => setShowImagePicker(false)}
        />` : null}
        <div class="page-header">
          <h2>Site Settings</h2>
          <button class="btn btn-primary" onClick=${handleSave} disabled=${saving}>
            ${saving ? html`<span class="spinner" />` : null} ${saving ? 'Saving...' : 'Save & Publish'}
          </button>
