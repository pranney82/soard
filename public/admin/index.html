      { type: 'partnersList',   label: 'Partners List',    icon: icons.user,     group: 'content' },
      { type: 'signature',      label: 'Founder Signature',icon: icons.user,     group: 'content' },
      { type: 'divider',        label: 'Divider',          icon: icons.menu,     group: 'layout' },
      { type: 'spacer',         label: 'Spacer',           icon: icons.menu,     group: 'layout' },
    ];

    const PERSONALIZATION_TOKENS = [
      { token: '{{{FIRST_NAME|there}}}', label: 'First Name' },
      { token: '{{{LAST_NAME}}}',         label: 'Last Name' },
      { token: '{{{EMAIL}}}',             label: 'Email' },
      { token: '{{{RESEND_UNSUBSCRIBE_URL}}}', label: 'Unsubscribe URL' },
    ];

    function newBlockId() { return 'b' + Math.random().toString(36).slice(2, 9); }

    function makeBlock(type) {
      const id = newBlockId();
      switch (type) {
        case 'hero':           return { id, type, src: '', alt: '', link: '', fullBleed: false };
        case 'heroPortrait':   return { id, type, src: '', alt: '', link: '', name: '', age: '', badge: '', badgeVariant: 'yellow' };
        case 'photo':          return { id, type, src: '', alt: '', caption: '', variant: 'normal' };
        case 'photoGrid':      return { id, type, items: [{ src: '', alt: '' }, { src: '', alt: '' }] };
        case 'beforeAfter':    return { id, type, before: { src: '', alt: '' }, after: { src: '', alt: '' }, beforeLabel: 'Before', afterLabel: 'After' };
        case 'headline':       return { id, type, text: 'Your headline here', align: 'left', size: 'large' };
        case 'subheadline':    return { id, type, text: 'A supporting subhead', align: 'left' };
        case 'sectionLabel':   return { id, type, text: 'Section', variant: 'dark' };
        case 'paragraph':      return { id, type, text: 'Write your message. **Bold**, *italic*, and [links](https://example.com) work via markdown.', align: 'left', style: 'normal', muted: false };
        case 'transitionLine': return { id, type, text: 'That all *changed*.' };
        case 'quote':          return { id, type, text: 'A quote from a family or partner.', cite: '' };
        case 'detailChips':    return { id, type, items: [{ label: 'Diagnosis', value: '' }, { label: 'Rooms', value: '' }, { label: 'Year', value: '' }] };
        case 'numberedCard':   return { id, type, number: '01', title: 'Room Type', body: 'Describe what we built or are building here.' };
        case 'button':         return { id, type, label: 'Donate Now', href: 'https://sunshineonaranneyday.com/donate', variant: 'primary', align: 'center' };
        case 'donationTiers':  return { id, type, featured: { amount: '500', label: 'Furniture & Flooring', description: 'Adaptive furniture or accessible flooring — the structural pieces that change a child’s daily life.', badge: 'Most Popular', href: '' }, small: [ { amount: '60', label: 'Paint & Supplies', description: 'Transforms walls into a child’s dream canvas.', href: '' }, { amount: '125', label: 'Bedding & Decor', description: 'The details that make a room feel like home.', href: '' } ] };
        case 'trustSignals':   return { id, type, items: ['Tax-Deductible', 'Zero Platform Fees', '501(c)(3)'] };
        case 'kidCard':        return { id, type, slug: '', label: '', linkLabel: '' };
        case 'revealInvite':   return { id, type, slug: '', image: '', headline: '', intro: '', date: '', time: '', endTime: '', location: '', address: '', tz: 'America/New_York', label: '', profileLabel: '' };
        case 'eventCard':      return { id, type, name: '', date: '', url: '', description: '' };
        case 'stats':          return { id, type, items: [{ value: '182', label: 'Kids Served' }, { value: '247', label: 'Rooms Built' }, { value: '13', label: 'Years' }] };
        case 'partnersList':   return { id, type, label: 'Our Partners', headline: 'Made possible by *incredible* partners', intro: 'This project wouldn’t exist without the generosity of partners who show up, project after project, with heart and hands ready to build.', partners: [] };
        case 'signature':      return { id, type, note: '', from: 'Peter & Holly Ranney', team: 'Sunshine Team', title: 'Founders, Sunshine on a Ranney Day' };
        case 'divider':        return { id, type, size: 'small' };
        case 'spacer':         return { id, type, height: 24 };
        default:               return { id, type };
      }
    }

    function defaultCustomBlocks() {
      return [
        { ...makeBlock('headline'), text: 'A note from Sunshine on a Ranney Day' },
        { ...makeBlock('paragraph') },
        { ...makeBlock('button') },
        { ...makeBlock('signature') },
      ];
    }

    // ─── Block editor (per-type prop forms) ──
    function BlockEditor({ block, onChange, onPickImage, kids, events, focusInput, setFocusInput }) {
      const update = (patch) => onChange({ ...block, ...patch });
      const updateItem = (idx, patch) => {
        const items = [...(block.items || [])];
        items[idx] = { ...items[idx], ...patch };
        update({ items });
      };
      const insertToken = (token) => {
        // Insert into the focused input within this block, if any
        if (!focusInput || focusInput.blockId !== block.id) return;
        const key = focusInput.key;
        const cur = block[key] || '';
        const el = focusInput.el;
        if (el && typeof el.selectionStart === 'number') {
          const s = el.selectionStart, e = el.selectionEnd;
          const next = cur.slice(0, s) + token + cur.slice(e);
          update({ [key]: next });
          requestAnimationFrame(() => { el.focus(); el.setSelectionRange(s + token.length, s + token.length); });
        } else {
          update({ [key]: cur + token });
        }
      };
      const trackFocus = (key) => (e) => setFocusInput({ blockId: block.id, key, el: e.target });

      const tokenBar = (visible) => visible ? html`
        <div style="display: flex; flex-wrap: wrap; gap: 0.25rem; margin-top: 0.35rem;">
          <span style="font-size: 0.7rem; color: var(--color-text-muted); align-self: center; margin-right: 0.25rem;">Insert:</span>
          ${PERSONALIZATION_TOKENS.map(t => html`
            <button key=${t.token} type="button" onClick=${() => insertToken(t.token)}
              style="font-size: 0.7rem; padding: 0.15rem 0.45rem; border-radius: 4px; border: 1px solid var(--color-border); background: var(--color-bg-card); cursor: pointer; color: var(--color-text);">
              ${t.label}
            </button>
          `)}
        </div>
      ` : null;

      const isFocused = (key) => focusInput && focusInput.blockId === block.id && focusInput.key === key;

      switch (block.type) {
        case 'hero':
        case 'photo': {
          const isHero = block.type === 'hero';
          return html`<div>
            <div class="form-group" style="margin-bottom: 0.6rem;">
              <label class="form-label">Image</label>
              ${block.src ? html`
                <div style="display: flex; gap: 0.5rem; align-items: flex-start;">
                  <img src=${cfThumb(block.src, 'w=200,h=140,fit=cover,q=70')} style="width: 96px; height: 64px; object-fit: cover; border-radius: 6px; border: 1px solid var(--color-border);" />
                  <div style="flex: 1; display: flex; flex-direction: column; gap: 0.35rem;">
                    <button class="btn btn-sm btn-ghost" type="button" onClick=${() => onPickImage({ blockId: block.id, key: 'src' })}>Replace</button>
                    <button class="btn btn-sm btn-ghost" type="button" onClick=${() => update({ src: '' })} style="color: #c00;">Remove</button>
                  </div>
                </div>
              ` : html`
                <button class="btn btn-ghost btn-sm" type="button" onClick=${() => onPickImage({ blockId: block.id, key: 'src' })}>Browse Image Library</button>
              `}
            </div>
            <div class="form-group" style="margin-bottom: 0.6rem;">
              <label class="form-label" style="font-size: 0.78rem;">Alt Text</label>
              <input class="form-input" type="text" value=${block.alt || ''} onInput=${e => update({ alt: e.target.value })} placeholder="Describe the image (for accessibility)" />
            </div>
            ${isHero ? html`
              <div class="form-group" style="margin-bottom: 0.6rem;">
                <label class="form-label" style="font-size: 0.78rem;">Click-Through URL <span style="font-weight: 400; color: var(--color-text-muted);">(optional)</span></label>
                <input class="form-input" type="url" value=${block.link || ''} onInput=${e => update({ link: e.target.value })} placeholder="https://..." />
              </div>
              <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; cursor: pointer;">
                <input type="checkbox" checked=${!!block.fullBleed} onChange=${e => update({ fullBleed: e.target.checked })} />
                Full-bleed (no side margins)
              </label>
            ` : html`
              <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label" style="font-size: 0.78rem;">Caption <span style="font-weight: 400; color: var(--color-text-muted);">(optional)</span></label>
                <input class="form-input" type="text" value=${block.caption || ''} onInput=${e => update({ caption: e.target.value })} />
              </div>
            `}
          </div>`;
        }

        case 'photoGrid': {
          const items = block.items || [];
          return html`<div>
            <div class="form-group" style="margin-bottom: 0.5rem;">
              <label class="form-label" style="font-size: 0.78rem;">Columns</label>
              <div style="display: flex; gap: 0.4rem;">
                ${[2, 3].map(n => html`
                  <button key=${n} type="button" onClick=${() => {
                    const cur = items.slice();
                    while (cur.length < n) cur.push({ src: '', alt: '' });
                    while (cur.length > n) cur.pop();
                    update({ items: cur });
                  }}
                    style="padding: 0.4rem 0.8rem; border-radius: 6px; border: 1.5px solid ${items.length === n ? 'var(--color-primary)' : 'var(--color-border)'}; background: ${items.length === n ? 'var(--color-primary-bg)' : 'var(--color-bg-card)'}; cursor: pointer; font-size: 0.85rem; font-weight: 600;">
                    ${n}-up
                  </button>
                `)}
              </div>
            </div>
            ${items.map((it, i) => html`
              <div key=${i} style="display: flex; gap: 0.5rem; padding: 0.6rem; background: var(--color-bg-secondary); border-radius: 6px; margin-bottom: 0.5rem;">
                ${it.src ? html`<img src=${cfThumb(it.src, 'w=200,h=140,fit=cover,q=70')} style="width: 64px; height: 48px; object-fit: cover; border-radius: 4px;" />` : html`<div style="width: 64px; height: 48px; background: var(--color-border); border-radius: 4px;"></div>`}
                <div style="flex: 1; display: flex; flex-direction: column; gap: 0.3rem;">
                  <button class="btn btn-sm btn-ghost" type="button" onClick=${() => onPickImage({ blockId: block.id, key: 'items', idx: i })} style="justify-content: flex-start;">${it.src ? 'Replace' : 'Pick image'}</button>
                  <input class="form-input" type="text" value=${it.alt || ''} onInput=${e => updateItem(i, { alt: e.target.value })} placeholder="Alt text" style="font-size: 0.8rem;" />
                </div>
              </div>
            `)}
          </div>`;
        }

        case 'headline':
        case 'subheadline': {
          return html`<div>
            <div class="form-group" style="margin-bottom: 0.6rem;">
              <label class="form-label" style="font-size: 0.78rem;">Text</label>
              <input class="form-input" type="text" value=${block.text || ''} onInput=${e => update({ text: e.target.value })}
                onFocus=${trackFocus('text')} />
              ${tokenBar(isFocused('text'))}
            </div>
            <div style="display: grid; grid-template-columns: 1fr ${block.type === 'headline' ? '1fr' : ''}; gap: 0.5rem;">
              <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label" style="font-size: 0.78rem;">Align</label>
                <select class="form-input" value=${block.align || 'left'} onChange=${e => update({ align: e.target.value })}>
                  <option value="left">Left</option><option value="center">Center</option><option value="right">Right</option>
                </select>
              </div>
              ${block.type === 'headline' ? html`
                <div class="form-group" style="margin-bottom: 0;">
                  <label class="form-label" style="font-size: 0.78rem;">Size</label>
                  <select class="form-input" value=${block.size || 'large'} onChange=${e => update({ size: e.target.value })}>
                    <option value="small">Small</option><option value="medium">Medium</option><option value="large">Large</option>
                  </select>
                </div>
              ` : null}
            </div>
          </div>`;
        }

        case 'sectionLabel': {
          return html`<div>
            <div class="form-group" style="margin-bottom: 0.6rem;">
              <label class="form-label" style="font-size: 0.78rem;">Label Text</label>
              <input class="form-input" type="text" value=${block.text || ''} onInput=${e => update({ text: e.target.value })} />
            </div>
            <div class="form-group" style="margin-bottom: 0;">
              <label class="form-label" style="font-size: 0.78rem;">Variant</label>
              <select class="form-input" value=${block.variant || 'dark'} onChange=${e => update({ variant: e.target.value })}>
                <option value="dark">Dark on cream</option>
                <option value="yellow">Yellow accent</option>
                <option value="light">Light on dark</option>
              </select>
            </div>
          </div>`;
        }

        case 'paragraph': {
          return html`<div>
            <div class="form-group" style="margin-bottom: 0.4rem;">
              <label class="form-label" style="font-size: 0.78rem;">Body <span style="font-weight: 400; color: var(--color-text-muted);">— **bold**, *italic*, [link](url)</span></label>
              <textarea class="form-input" rows="4" value=${block.text || ''} onInput=${e => update({ text: e.target.value })}
                onFocus=${trackFocus('text')} style="resize: vertical; font-family: inherit;" />
              ${tokenBar(isFocused('text'))}
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 0.4rem;">
              <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label" style="font-size: 0.78rem;">Align</label>
                <select class="form-input" value=${block.align || 'left'} onChange=${e => update({ align: e.target.value })}>
                  <option value="left">Left</option><option value="center">Center</option><option value="right">Right</option>
                </select>
              </div>
              <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label" style="font-size: 0.78rem;">Style</label>
                <select class="form-input" value=${block.style || 'normal'} onChange=${e => update({ style: e.target.value })}>
                  <option value="normal">Body</option>
                  <option value="lede">Lede (serif, larger)</option>
                </select>
              </div>
            </div>
            <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; cursor: pointer;">
              <input type="checkbox" checked=${!!block.muted} onChange=${e => update({ muted: e.target.checked })} />
              Muted (lighter color)
            </label>
          </div>`;
        }

        case 'button': {
          return html`<div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 0.6rem;">
              <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label" style="font-size: 0.78rem;">Label</label>
                <input class="form-input" type="text" value=${block.label || ''} onInput=${e => update({ label: e.target.value })} />
              </div>
              <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label" style="font-size: 0.78rem;">Variant</label>
                <select class="form-input" value=${block.variant || 'primary'} onChange=${e => update({ variant: e.target.value })}>
                  <option value="primary">Primary (yellow)</option>
                  <option value="dark">Dark</option>
                </select>
              </div>
            </div>
            <div class="form-group" style="margin-bottom: 0.6rem;">
              <label class="form-label" style="font-size: 0.78rem;">Link URL</label>
              <input class="form-input" type="url" value=${block.href || ''} onInput=${e => update({ href: e.target.value })} placeholder="https://..." />
            </div>
            <div class="form-group" style="margin-bottom: 0;">
              <label class="form-label" style="font-size: 0.78rem;">Align</label>
              <select class="form-input" value=${block.align || 'center'} onChange=${e => update({ align: e.target.value })}>
                <option value="left">Left</option><option value="center">Center</option><option value="right">Right</option>
              </select>
            </div>
          </div>`;
        }

        case 'kidCard': {
          const allKids = (kids || []).slice().sort((a, b) => (a.name || '').localeCompare(b.name || ''));
          return html`<div>
            <div class="form-group" style="margin-bottom: 0.6rem;">
              <label class="form-label" style="font-size: 0.78rem;">Featured Kid</label>
              <select class="form-input" value=${block.slug || ''} onChange=${e => update({ slug: e.target.value })}>
                <option value="">— Select a kid —</option>
                ${allKids.map(k => html`<option key=${k.slug} value=${k.slug}>${k.name}${k.year ? ` (${k.year})` : ''} — ${k.status}</option>`)}
              </select>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
              <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label" style="font-size: 0.78rem;">Label Override</label>
                <input class="form-input" type="text" value=${block.label || ''} onInput=${e => update({ label: e.target.value })} placeholder="Auto" />
              </div>
              <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label" style="font-size: 0.78rem;">Link Label</label>
                <input class="form-input" type="text" value=${block.linkLabel || ''} onInput=${e => update({ linkLabel: e.target.value })} placeholder="Auto" />
              </div>
            </div>
          </div>`;
        }

        case 'revealInvite': {
          const allKids = (kids || []).slice().sort((a, b) => (a.name || '').localeCompare(b.name || ''));
          return html`<div>
            <div class="form-group" style="margin-bottom: 0.6rem;">
              <label class="form-label" style="font-size: 0.78rem;">Featured Kid <span style="font-weight: 400; color: var(--color-text-muted);">(links to profile, fills hero photo)</span></label>
              <select class="form-input" value=${block.slug || ''} onChange=${e => update({ slug: e.target.value })}>
                <option value="">— Select a kid —</option>
                ${allKids.map(k => html`<option key=${k.slug} value=${k.slug}>${k.name}${k.year ? ` (${k.year})` : ''} — ${k.status}</option>`)}
              </select>
            </div>
            <div class="form-group" style="margin-bottom: 0.6rem;">
              <label class="form-label" style="font-size: 0.78rem;">Hero Image <span style="font-weight: 400; color: var(--color-text-muted);">(optional — defaults to kid's hero)</span></label>
              ${block.image ? html`
                <div style="display: flex; gap: 0.5rem; align-items: flex-start;">
                  <img src=${cfThumb(block.image, 'w=200,h=140,fit=cover,q=70')} style="width: 96px; height: 64px; object-fit: cover; border-radius: 6px; border: 1px solid var(--color-border);" />
                  <div style="flex: 1; display: flex; flex-direction: column; gap: 0.35rem;">
                    <button class="btn btn-sm btn-ghost" type="button" onClick=${() => onPickImage({ blockId: block.id, key: 'image' })}>Replace</button>
                    <button class="btn btn-sm btn-ghost" type="button" onClick=${() => update({ image: '' })} style="color: #c00;">Remove</button>
                  </div>
                </div>
              ` : html`
                <button class="btn btn-ghost btn-sm" type="button" onClick=${() => onPickImage({ blockId: block.id, key: 'image' })}>Browse Image Library</button>
              `}
            </div>
            <div class="form-group" style="margin-bottom: 0.5rem;">
              <label class="form-label" style="font-size: 0.78rem;">Headline <span style="font-weight: 400; color: var(--color-text-muted);">(optional)</span></label>
              <input class="form-input" type="text" value=${block.headline || ''} onInput=${e => update({ headline: e.target.value })} placeholder="You're Invited to [Name]'s Reveal Day" />
            </div>
            <div class="form-group" style="margin-bottom: 0.5rem;">
              <label class="form-label" style="font-size: 0.78rem;">Intro <span style="font-weight: 400; color: var(--color-text-muted);">(optional)</span></label>
              <textarea class="form-input" rows="2" onInput=${e => update({ intro: e.target.value })} placeholder="Auto">${block.intro || ''}</textarea>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem; margin-bottom: 0.5rem;">
              <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label" style="font-size: 0.78rem;">Date</label>
                <input class="form-input" type="date" value=${block.date || ''} onInput=${e => update({ date: e.target.value })} />
              </div>
              <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label" style="font-size: 0.78rem;">Start Time <span style="font-weight: 400; color: var(--color-text-muted);">(blank = all-day)</span></label>
                <input class="form-input" type="text" value=${block.time || ''} onInput=${e => update({ time: e.target.value })} placeholder="3:00 PM" />
              </div>
              <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label" style="font-size: 0.78rem;">End Time</label>
                <input class="form-input" type="text" value=${block.endTime || ''} onInput=${e => update({ endTime: e.target.value })} placeholder="5:00 PM" />
              </div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 0.5rem;">
              <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label" style="font-size: 0.78rem;">Location Name</label>
                <input class="form-input" type="text" value=${block.location || ''} onInput=${e => update({ location: e.target.value })} placeholder="The Smith Family Home" />
              </div>
              <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label" style="font-size: 0.78rem;">Timezone</label>
                <select class="form-input" value=${block.tz || 'America/New_York'} onChange=${e => update({ tz: e.target.value })}>
                  <option value="America/New_York">Eastern (New York)</option>
                  <option value="America/Chicago">Central (Chicago)</option>
                  <option value="America/Denver">Mountain (Denver)</option>
                  <option value="America/Phoenix">Arizona (no DST)</option>
                  <option value="America/Los_Angeles">Pacific (Los Angeles)</option>
                  <option value="America/Anchorage">Alaska</option>
                  <option value="Pacific/Honolulu">Hawaii</option>
                </select>
              </div>
            </div>
            <div class="form-group" style="margin-bottom: 0.5rem;">
              <label class="form-label" style="font-size: 0.78rem;">Address <span style="font-weight: 400; color: var(--color-text-muted);">(used in calendar invite)</span></label>
              <input class="form-input" type="text" value=${block.address || ''} onInput=${e => update({ address: e.target.value })} placeholder="123 Main St, Roswell, GA 30076" />
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
              <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label" style="font-size: 0.78rem;">Section Label</label>
                <input class="form-input" type="text" value=${block.label || ''} onInput=${e => update({ label: e.target.value })} placeholder="You're Invited" />
              </div>
              <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label" style="font-size: 0.78rem;">Profile Button Label</label>
                <input class="form-input" type="text" value=${block.profileLabel || ''} onInput=${e => update({ profileLabel: e.target.value })} placeholder="See [Name]'s Story" />
              </div>
            </div>
          </div>`;
        }

        case 'eventCard': {
          const eventOptions = (events || []).filter(e => e.status === 'published');
          return html`<div>
            ${eventOptions.length > 0 ? html`
              <div class="form-group" style="margin-bottom: 0.6rem;">

    const STARTER_ICONS = { star: 'star', sparkle: 'sparkle', barChart: 'barChart', events: 'events' };

    function withBlockIds(blocks) {
      return (blocks || []).map(b => ({ ...b, id: b.id || newBlockId() }));
    }

    function blockSummary(b, kids) {
      switch (b.type) {
        case 'hero':           return b.src ? 'Hero image set' : 'No image yet';
        case 'heroPortrait':   return b.src ? `${b.name || 'Portrait'}${b.badge ? ` · ${b.badge}` : ''}` : 'No image yet';
        case 'photo':          return b.src ? (b.caption || (b.variant === 'reveal' ? 'Reveal photo' : 'Photo')) : 'No image yet';
        case 'photoGrid':      return `${(b.items || []).filter(i => i.src).length}/${(b.items || []).length} images`;
        case 'beforeAfter':    return (b.before?.src && b.after?.src) ? 'Before / After set' : 'Add both images';
        case 'headline':       return (b.text || '').slice(0, 60) || '(empty)';
        case 'subheadline':    return (b.text || '').slice(0, 60) || '(empty)';
        case 'sectionLabel':   return (b.text || '').slice(0, 40) || '(empty)';
        case 'paragraph':      return (b.text || '').slice(0, 70).replace(/\s+/g, ' ') || '(empty)';
        case 'transitionLine': return (b.text || '').slice(0, 60) || '(empty)';
        case 'quote':          return (b.text || '').slice(0, 60) || '(empty)';
        case 'detailChips':    return (b.items || []).filter(i => i.value).map(i => i.value).join(' · ') || '(empty)';
        case 'numberedCard':   return `${b.number || '?'} · ${b.title || '(no title)'}`;
        case 'button':         return `${b.label || '(no label)'} → ${b.href ? new URL(b.href, 'https://x').pathname : '(no link)'}`;
        case 'donationTiers':  return `$${b.featured?.amount || '?'} featured + ${(b.small || []).filter(t => t.amount).length} tiers`;
        case 'trustSignals':   return (b.items || []).join(' · ') || 'Tax-Deductible · Zero Platform Fees · 501(c)(3)';
        case 'kidCard':        { const k = (kids || []).find(x => x.slug === b.slug); return k ? k.name : '(pick a kid)'; }
        case 'revealInvite':   { const k = (kids || []).find(x => x.slug === b.slug); const who = k ? k.name : '(pick a kid)'; return b.date ? `${who} · ${b.date}` : who; }
        case 'eventCard':      return b.name || '(pick an event)';
        case 'stats':          return (b.items || []).map(i => i.value).filter(Boolean).join(' · ') || '(empty)';
        case 'partnersList':   return `${(b.partners || []).length} partners`;
        case 'signature':      return b.from || 'Signature';
        case 'divider':        return 'Divider';
        case 'spacer':         return `${b.height || 24}px`;
        default:               return b.type;
      }
    }

    // ─── Email Composer ─────────────────────
    function EmailComposer({ kids, events, addToast }) {
      const [view, setView] = useState('list'); // 'list' | 'editor'
      const [emailTab, setEmailTab] = useState('templates'); // 'templates' | 'history'
      const [templates, setTemplates] = useState([]);
      const [loading, setLoading] = useState(true);
      const [broadcasts, setBroadcasts] = useState([]);
      const [historyLoading, setHistoryLoading] = useState(false);

      // Editor state
      const [editing, setEditing] = useState(null); // currently-open template { slug, isStarter }
      const [eName, setEName] = useState('');
      const [eSubject, setESubject] = useState('');
      const [ePreheader, setEPreheader] = useState('');
      const [eBlocks, setEBlocks] = useState([]);
      const [eDirty, setEDirty] = useState(false);
      const [eSelected, setESelected] = useState(null);
      const [showAddBlock, setShowAddBlock] = useState(false);
      const [imgPickerFor, setImgPickerFor] = useState(null);
      const [focusInput, setFocusInput] = useState(null);
      const [showPreview, setShowPreview] = useState(false);
      const [previewHtml, setPreviewHtml] = useState('');
      const [previewMode, setPreviewMode] = useState('desktop');
      const previewRef = useRef(null);
      const firstPreviewRef = useRef(true); // 0ms on first show, 600ms on subsequent edits

      // Action state
      const [saving, setSaving] = useState(false);
      const [pushing, setPushing] = useState(false);
      const [sendingTest, setSendingTest] = useState(false);
      const [testEmail, setTestEmail] = useState('');
      const [sendingDirect, setSendingDirect] = useState(false);
      const [directRecipients, setDirectRecipients] = useState('');
      const [pushResult, setPushResult] = useState(null);
      const [confirmDelete, setConfirmDelete] = useState(null);

      // Load templates from site_config (merged with starters)
      const loadTemplates = useCallback(async () => {
        setLoading(true);
        try {
          const res = await api.listContent('src/content/site');
          const items = (res.items || []).filter(it => (it.name || '').startsWith('email-template-'));
          const saved = items.map(it => {
            const slug = it.name.replace(/^email-template-/, '').replace(/\.json$/, '');
            const c = it.content || {};
            return { ...c, slug };
          });
          const savedSlugs = new Set(saved.map(t => t.slug));
          const starters = EMAIL_STARTERS.filter(s => !savedSlugs.has(s.slug)).map(s => ({ ...s, isStarter: true }));
          setTemplates([...saved, ...starters]);
        } catch (e) {
          addToast?.('Failed to load templates', 'error');
        }
        setLoading(false);
      }, []);

      const loadHistory = async () => {
        setHistoryLoading(true);
        try {
          const res = await fetch('/api/create-broadcast');
          const data = await res.json();
          if (data.ok) setBroadcasts(data.broadcasts || []);
        } catch (e) {
          addToast?.('Failed to load broadcast history', 'error');
        }
        setHistoryLoading(false);
      };

      useEffect(() => { loadTemplates(); }, []);
      useEffect(() => { if (emailTab === 'history') loadHistory(); }, [emailTab]);

      // Open / close editor — preview opens by default so editing is WYSIWYG
      const openEditor = (tpl) => {
        setEditing({ slug: tpl.slug, isStarter: !!tpl.isStarter });
        setEName(tpl.name || '');
        setESubject(tpl.subject || '');
        setEPreheader(tpl.preheader || '');
        setEBlocks(withBlockIds(tpl.blocks));
        setEDirty(false);
        setESelected(null);
        setShowAddBlock(false);
        setShowPreview(true);
        setPreviewHtml('');
        setPushResult(null);
        setView('editor');
      };

      const newTemplate = () => {
        openEditor({ slug: '', name: 'Untitled Template', subject: '', preheader: '', blocks: defaultCustomBlocks() });
      };

      const closeEditor = () => {
        if (eDirty && !confirm('You have unsaved changes. Discard them?')) return;
        setView('list');
        setEditing(null);
        setShowPreview(false);
        setPushResult(null);
      };

      const updateBlocks = (next) => {
        setEBlocks(typeof next === 'function' ? next(eBlocks) : next);
        setEDirty(true);
      };

      // Build broadcast body (resolves kid slugs)
      const buildBody = async () => {
        if (!eBlocks.length) throw new Error('Add at least one block.');
        if (!eSubject.trim()) throw new Error('Subject is required.');
        const resolved = await Promise.all(eBlocks.map(async (b) => {
          if ((b.type === 'kidCard' || b.type === 'revealInvite') && b.slug) {
            try {
              const r = await api.readContent(`src/content/kids/${b.slug}.json`);
              if (r.success) {
                const kid = typeof r.content === 'string' ? JSON.parse(r.content) : r.content;
                return { ...b, kid };
              }
            } catch (_) { /* fall through */ }
            const k = (kids || []).find(x => x.slug === b.slug);
            return { ...b, kid: k || null };
          }
          return b;
        }));
        return {
          template: 'custom',
          data: { blocks: resolved },
          opts: {
            subject: eSubject,
            ...(ePreheader ? { preheader: ePreheader } : {}),
            ...(eName ? { name: eName } : {}),
          },
        };
      };

      const slugify = (s) => (s || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');

      const saveTemplate = async () => {
        if (!eName.trim()) { addToast?.('Name is required', 'error'); return; }
        if (!eSubject.trim()) { addToast?.('Subject is required', 'error'); return; }
        setSaving(true);
        try {
          let slug = editing.slug;
          if (!slug) {
            slug = slugify(eName) || `template-${Date.now().toString(36)}`;
            const existing = templates.map(t => t.slug);
            let i = 1, base = slug;
            while (existing.includes(slug)) slug = `${base}-${++i}`;
          }
          const data = {
            name: eName.trim(),
            subject: eSubject.trim(),
            preheader: ePreheader.trim(),
            blocks: eBlocks,
            updatedAt: new Date().toISOString(),
          };
          const res = await api.saveContent(
            `src/content/site/email-template-${slug}.json`,
            JSON.stringify(data),
            `Update email template: ${data.name}`
          );
          if (res.success) {
            addToast?.('Template saved', 'success');
            setEditing({ slug, isStarter: false });
            setEDirty(false);
            await loadTemplates();
          } else {
            addToast?.(res.error || 'Save failed', 'error');
          }
        } catch (e) {
          addToast?.(e.message || 'Save failed', 'error');
        }
        setSaving(false);
      };

      const deleteTemplate = async (tpl) => {
        try {
          const path = `src/content/site/email-template-${tpl.slug}.json`;
          const res = await api.deleteContent(path, '', `Delete email template: ${tpl.name}`);
          if (res.success) {
            addToast?.('Template deleted', 'success');
            await loadTemplates();
          } else {
            addToast?.(res.error || 'Delete failed', 'error');
          }
        } catch (e) {
          addToast?.(e.message || 'Delete failed', 'error');
        }
        setConfirmDelete(null);
      };

      const pushToResend = async () => {
        setPushing(true); setPushResult(null);
        try {
          const body = await buildBody();
          const res = await fetch('/api/create-broadcast', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          const data = await res.json();
          if (data.ok) {
            setPushResult(data);
            setPreviewHtml(data.previewHtml || '');
            setShowPreview(true);
            addToast?.('Draft pushed to Resend!', 'success');
          } else {
            addToast?.(data.error || 'Push failed', 'error');
          }
        } catch (e) {
          addToast?.(e.message || 'Push failed', 'error');
        }
        setPushing(false);
      };

      const handleTestSend = async () => {
        if (!testEmail || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(testEmail)) {
          addToast?.('Enter a valid test email address', 'error');
          return;
        }
        setSendingTest(true);
        try {
          const body = await buildBody();
          const res = await fetch('/api/send-test-email', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ...body, testEmail }),
          });
          const data = await res.json();
          if (data.ok) addToast?.(`Test sent to ${testEmail}`, 'success');
          else addToast?.(data.error || 'Test send failed', 'error');
        } catch (e) {
          addToast?.(e.message || 'Test send failed', 'error');
        }
        setSendingTest(false);
      };

      // Parse the recipients textarea: split on commas/semicolons/newlines/whitespace,
      // dedupe, drop empties. Returns the cleaned list.
      const parseRecipients = (raw) => {
        return Array.from(new Set(
          String(raw || '')
            .split(/[\s,;]+/)
            .map(s => s.trim().toLowerCase())
            .filter(Boolean)
        ));
      };
      const directList = parseRecipients(directRecipients);
      const directInvalid = directList.filter(e => !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e));

      const handleDirectSend = async () => {
        if (!directList.length) {
          addToast?.('Add at least one recipient', 'error');
          return;
        }
        if (directInvalid.length) {
          addToast?.(`Invalid: ${directInvalid.slice(0, 3).join(', ')}`, 'error');
          return;
        }
        if (!confirm(`Send "${eSubject}" to ${directList.length} recipient${directList.length === 1 ? '' : 's'}?\n\nThis sends real emails immediately.`)) return;
        setSendingDirect(true);
        try {
          const body = await buildBody();
          const res = await fetch('/api/send-direct', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ...body, recipients: directList }),
          });
          const data = await res.json();
          if (data.ok) {
            addToast?.(`Sent to ${data.count} recipient${data.count === 1 ? '' : 's'}`, 'success');
            setDirectRecipients('');
          } else {
            addToast?.(data.error || 'Send failed', 'error');
          }
        } catch (e) {
          addToast?.(e.message || 'Send failed', 'error');
        }
        setSendingDirect(false);
      };

      const handlePreview = async () => {
        try {
          const body = await buildBody();
          const res = await fetch('/api/create-broadcast', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ...body, preview: true }),
          });
          const data = await res.json();
          if (data.ok) {
            setPreviewHtml(data.previewHtml || '');
            setShowPreview(true);
          } else {
            addToast?.(data.error || 'Preview failed', 'error');
          }
        } catch (e) {
          addToast?.(e.message || 'Something went wrong', 'error');
        }
      };

      // Live preview — fires immediately on editor open, then debounced while editing
      useEffect(() => {
        if (view !== 'editor' || !showPreview) {
          firstPreviewRef.current = true;
          return;
        }
        if (!eBlocks.length || !eSubject) return;
        const delay = firstPreviewRef.current ? 0 : 600;
        firstPreviewRef.current = false;
        const t = setTimeout(async () => {
          try {
            const body = await buildBody();
            const r = await fetch('/api/create-broadcast', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ ...body, preview: true }),
            });
            const d = await r.json();
            if (d.ok) setPreviewHtml(d.previewHtml || '');
          } catch (_) { /* swallow */ }
        }, delay);
        return () => clearTimeout(t);
      }, [view, showPreview, eBlocks, eSubject, ePreheader]);

      // Update iframe contents when previewHtml changes
      useEffect(() => {
        if (previewRef.current && previewHtml) {
          const doc = previewRef.current.contentDocument;
          doc.open(); doc.write(previewHtml); doc.close();
        }
      }, [previewHtml, showPreview]);

      const broadcastStatusColor = {
        draft: { bg: '#FEFCBF', color: '#744210' },
        sent: { bg: '#C6F6D5', color: '#22543D' },
        queued: { bg: '#BEE3F8', color: '#2A4365' },
        cancelled: { bg: '#FED7D7', color: '#742A2A' },
      };

      const renderList = () => html`
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;">
          <div>
            <h2 style="margin: 0 0 0.25rem; display: flex; align-items: center; gap: 0.5rem;">${icons.mail} Email</h2>
            <p style="margin: 0; color: var(--color-text-secondary); font-size: 0.9rem;">Edit on-brand templates here, then push them to Resend as drafts.</p>
          </div>
          <a href="https://resend.com/broadcasts" target="_blank" rel="noopener noreferrer" class="btn btn-ghost" style="font-size: 0.8rem; padding: 0.4rem 0.8rem; gap: 0.35rem;">
            ${icons.mail} Resend Dashboard ↗
          </a>
        </div>

        <div class="hub-tabs" style="margin-bottom: 1.5rem;">
          <button class="hub-tab ${emailTab === 'templates' ? 'active' : ''}" onClick=${() => setEmailTab('templates')}>Templates</button>
          <button class="hub-tab ${emailTab === 'history' ? 'active' : ''}" onClick=${() => setEmailTab('history')}>
            History${broadcasts.length > 0 ? html` <span style="margin-left: 0.35rem; min-width: 18px; height: 18px; border-radius: 9px; background: var(--color-bg); font-size: 0.7rem; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; padding: 0 5px; color: var(--color-text-muted);">${broadcasts.length}</span>` : null}
          </button>
        </div>

        ${emailTab === 'history' ? html`
          ${historyLoading ? html`
            <div style="text-align: center; padding: 3rem;">
              <div class="spinner" style="margin: 0 auto 1rem;" />
              <p style="color: var(--color-text-muted); font-size: 0.85rem;">Loading broadcast history...</p>
            </div>
          ` : broadcasts.length === 0 ? html`
            <div class="card" style="padding: 3rem; text-align: center;">
              <div style="margin-bottom: 0.75rem; color: var(--color-text-muted);">${icons.mail}</div>
              <p style="font-weight: 600; margin: 0 0 0.25rem;">No broadcasts yet</p>
              <p style="font-size: 0.85rem; color: var(--color-text-muted); margin: 0;">Push a template to Resend to see it here.</p>
            </div>
          ` : html`
            <div class="card" style="padding: 0;">
              <div class="table-wrap">
                <table style="width: 100%; border-collapse: collapse;">
                  <thead><tr>
                    <th style="text-align: left; padding: 0.75rem 1rem; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-text-muted); border-bottom: 1px solid var(--color-border);">Name</th>

      const [filterSearch, setFilterSearch] = useState('');

            setTotal(data.total);
            setOffset(newOffset);

          addToast?.('Failed to load audit log', 'error');
        }
        setLoading(false);
      }, [filterAction, filterType, filterUser, filterSearch]);

      useEffect(() => { loadEntries(0); }, [loadEntries]);

      const totalPages = Math.ceil(total / limit);
      const currentPage = Math.floor(offset / limit) + 1;

      const uniqueUsers = [...new Set(entries.map(e => e.user_email).filter(Boolean))];

    // ─── Completeness Score ────────────────
    const COMPLETENESS_FIELD_LABELS = {
      name: 'Name', slug: 'Slug', age: 'Age', diagnosis: 'Diagnosis',
      year: 'Year', bio: 'Bio', heroImage: 'Hero Image',
      shortDescription: 'Short Description', quote: 'Quote', photos: 'Photos (3+)',
    };

    function getCompleteness(kid, detailed) {
      const fields = [
        { k: 'name', w: 1 }, { k: 'slug', w: 1 }, { k: 'age', w: 0.5 },
        { k: 'diagnosis', w: 0.5 }, { k: 'year', w: 0.5 }, { k: 'bio', w: 1 },
        { k: 'heroImage', w: 1 }, { k: 'shortDescription', w: 0.5 },
        { k: 'quote', w: 0.5 },
      ];
      const photoScore = Math.min((kid.photoCount || 0) / 3, 1);
      let earned = 0, total = 0;
      const missing = [];
      fields.forEach(f => {
        total += f.w;
        if (kid[f.k]) earned += f.w;
        else missing.push(COMPLETENESS_FIELD_LABELS[f.k] || f.k);
      });
      total += 1;
      earned += photoScore;
      if (photoScore < 1) missing.push(COMPLETENESS_FIELD_LABELS.photos);
      const pct = Math.round((earned / total) * 100);
      return detailed ? { pct, missing } : pct;
    }

    function CompletenessRing({ pct, missing, size = 28 }) {
      const r = (size - 4) / 2;
      const circ = 2 * Math.PI * r;
      const offset = circ - (pct / 100) * circ;
      const color = pct >= 80 ? '#38A169' : pct >= 50 ? '#D69E2E' : '#E53E3E';
      const tip = pct >= 100 ? '100% complete!'
        : `${pct}% complete — Missing: ${missing && missing.length ? missing.join(', ') : 'nothing'}`;
      return html`
        <span class="completeness-ring" title="${tip}">
          <svg width=${size} height=${size}>
            <circle cx=${size/2} cy=${size/2} r=${r} fill="none" stroke="#E5E4E0" stroke-width="3" />
            <circle cx=${size/2} cy=${size/2} r=${r} fill="none" stroke=${color} stroke-width="3"
              stroke-dasharray=${circ} stroke-dashoffset=${offset} stroke-linecap="round" />
          </svg>
          <span class="completeness-pct" style="color: ${color};">${pct}</span>
        </span>
      `;
    }

    // ─── Community Completeness ─────────────
    const COMMUNITY_COMPLETENESS_LABELS = {

    function getCommunityCompleteness(project, detailed) {

      ];
      const photoScore = Math.min(((project.photos || []).length || (project.imageId ? 1 : 0)) / 2, 1);
      let earned = 0, total = 0;
      const missing = [];
      fields.forEach(f => {

    // ─── Favorites ──────────────────────────
    const FAVS_KEY = 'soard_favorites';
    function getFavorites() {
      try { return JSON.parse(localStorage.getItem(FAVS_KEY) || '[]'); } catch (e) { return []; }
    }
    function toggleFavorite(type, slug) {
      const favs = getFavorites();
      const key = `${type}:${slug}`;
      const idx = favs.indexOf(key);
      if (idx >= 0) favs.splice(idx, 1); else favs.push(key);
      localStorage.setItem(FAVS_KEY, JSON.stringify(favs));
      return favs;
    }
    function isFavorite(type, slug) {
      return getFavorites().includes(`${type}:${slug}`);
    }

    // ─── Slug Helper ────────────────────────
    function slugify(text) {
      return text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    }

    // ─── Rich Text Editor ─────────────────────
    function RichTextEditor({ value, onChange, onCounts, placeholder, minHeight = 200 }) {
      const containerRef = useRef(null);
      const editorRef = useRef(null);
      const isUpdating = useRef(false);
      const [activeStates, setActiveStates] = useState({});
      const [counts, setCounts] = useState({ chars: 0, words: 0, paragraphs: 0 });
      const [showLinkInput, setShowLinkInput] = useState(false);
      const [linkUrl, setLinkUrl] = useState('');
      const linkInputRef = useRef();
      const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
      const mod = isMac ? '⌘' : 'Ctrl+';

      const updateActiveStates = (editor) => {
        setActiveStates({
          bold: editor.isActive('bold'),
          italic: editor.isActive('italic'),
          underline: editor.isActive('underline'),
          heading: editor.isActive('heading', { level: 3 }),
          blockquote: editor.isActive('blockquote'),
          bulletList: editor.isActive('bulletList'),
          orderedList: editor.isActive('orderedList'),
          link: editor.isActive('link'),
        });
      };

      const updateCounts = (editor) => {
        const text = editor.state.doc.textContent;
        const words = text.trim() ? text.trim().split(/\s+/).length : 0;
        const chars = editor.storage.characterCount.characters();
        let paragraphs = 0;
        editor.state.doc.forEach(node => {
          if (node.type.name === 'paragraph' && node.textContent.trim()) paragraphs++;
        });
        const c = { chars, words, paragraphs };
        setCounts(c);
        onCounts?.(c);
      };

      // Mount TipTap
      useEffect(() => {
        if (!containerRef.current || editorRef.current) return;
        const editor = new Editor({
          element: containerRef.current,
          extensions: [
            StarterKit.configure({
              heading: { levels: [3] },
              strike: false,
              code: false,
              codeBlock: false,
              horizontalRule: false,
            }),
            TiptapUnderline,
            TiptapLink.configure({
              openOnClick: false,
              HTMLAttributes: { target: '_blank', rel: 'noopener noreferrer' },
            }),
            Placeholder.configure({ placeholder: placeholder || '' }),
            CharacterCount,
          ],
          content: value || '',
          editorProps: {
            transformPastedHTML: (html) => DOMPurify.sanitize(html, {
              ALLOWED_TAGS: ['b', 'i', 'u', 'em', 'strong', 'a', 'p', 'br', 'ul', 'ol', 'li', 'h3', 'blockquote'],
              ALLOWED_ATTR: ['href', 'target', 'rel'],
            }),
          },
          onUpdate: ({ editor }) => {
            isUpdating.current = true;
            onChange(editor.getHTML());
            updateCounts(editor);
            requestAnimationFrame(() => { isUpdating.current = false; });
          },
          onSelectionUpdate: ({ editor }) => updateActiveStates(editor),
          onTransaction: ({ editor }) => updateActiveStates(editor),
        });
        editorRef.current = editor;
        updateCounts(editor);
        updateActiveStates(editor);
        return () => { editor.destroy(); editorRef.current = null; };
      }, []);

      // Sync external value (e.g. loading from API)
      useEffect(() => {
        if (isUpdating.current || !editorRef.current) return;
        if (value && editorRef.current.isEmpty) {
          editorRef.current.commands.setContent(value);
          updateCounts(editorRef.current);
        }
      }, [value]);

      const cmd = (fn) => () => { fn(editorRef.current?.chain().focus())?.run(); };

      const insertLink = () => {
        const existing = editorRef.current?.getAttributes('link')?.href || '';
        setLinkUrl(existing);
        setShowLinkInput(true);
        setTimeout(() => linkInputRef.current?.focus(), 50);
      };
      const applyLink = () => {
        if (linkUrl) {
          editorRef.current?.chain().focus().extendMarkRange('link').setLink({ href: linkUrl, target: '_blank' }).run();
        } else {
          editorRef.current?.chain().focus().extendMarkRange('link').unsetLink().run();
        }
        setShowLinkInput(false);
      };
      const removeLink = () => {
        editorRef.current?.chain().focus().extendMarkRange('link').unsetLink().run();
        setShowLinkInput(false);
      };

      const e = editorRef.current;

      return html`
        <div class="rte-wrap">
          <div class="rte-toolbar">
            <button type="button" class="rte-btn ${activeStates.bold ? 'active' : ''}"
              onClick=${cmd(c => c.toggleBold())} title="Bold (${mod}B)"><b>B</b></button>
            <button type="button" class="rte-btn ${activeStates.italic ? 'active' : ''}"
              onClick=${cmd(c => c.toggleItalic())} title="Italic (${mod}I)"><i>I</i></button>
            <button type="button" class="rte-btn ${activeStates.underline ? 'active' : ''}"
              onClick=${cmd(c => c.toggleUnderline())} title="Underline (${mod}U)"><u>U</u></button>
            <div class="rte-sep" />
            <button type="button" class="rte-btn ${activeStates.heading ? 'active' : ''}"
              onClick=${cmd(c => c.toggleHeading({ level: 3 }))} title="Heading (${mod}Alt+3)">H</button>
            <button type="button" class="rte-btn ${activeStates.blockquote ? 'active' : ''}"
              onClick=${cmd(c => c.toggleBlockquote())} title="Quote (${mod}Shift+B)">"</button>
            <div class="rte-sep" />
            <button type="button" class="rte-btn ${activeStates.bulletList ? 'active' : ''}"
              onClick=${cmd(c => c.toggleBulletList())} title="Bullet list (${mod}Shift+8)">•</button>
            <button type="button" class="rte-btn ${activeStates.orderedList ? 'active' : ''}"
              onClick=${cmd(c => c.toggleOrderedList())} title="Numbered list (${mod}Shift+7)">1.</button>
            <div class="rte-sep" />
            <button type="button" class="rte-btn ${activeStates.link ? 'active' : ''}"
              onClick=${insertLink} title="Insert link (${mod}K)">🔗</button>
            <button type="button" class="rte-btn"
              onClick=${cmd(c => c.unsetAllMarks().clearNodes())} title="Clear formatting">✕</button>
            <div class="rte-sep" />
            <button type="button" class="rte-btn"
              onClick=${cmd(c => c.undo())} disabled=${!e?.can().undo()}
              title="Undo (${mod}Z)">↩</button>
            <button type="button" class="rte-btn"
              onClick=${cmd(c => c.redo())} disabled=${!e?.can().redo()}
              title="Redo (${mod}Shift+Z)">↪</button>
            ${showLinkInput ? html`
              <div style="display: flex; align-items: center; gap: 0.35rem; margin-left: 0.25rem;">
                <input ref=${linkInputRef} type="url" value=${linkUrl} onInput=${e => setLinkUrl(e.target.value)}
                  onKeyDown=${e => { if (e.key === 'Enter') { e.preventDefault(); applyLink(); } if (e.key === 'Escape') setShowLinkInput(false); }}
                  placeholder="https://..."
                  style="width: 180px; padding: 2px 6px; font-size: 0.8rem; border: 1px solid #E5E4E0; border-radius: 4px; height: 26px;" />
                <button type="button" class="rte-btn" style="width: 26px; height: 26px; font-size: 0.75rem;" onClick=${applyLink} title="Apply">✓</button>
                ${activeStates.link ? html`
                  <button type="button" class="rte-btn" style="width: 26px; height: 26px; font-size: 0.75rem; color: var(--color-danger);" onClick=${removeLink} title="Remove link">✕</button>
                ` : html`
                  <button type="button" class="rte-btn" style="width: 26px; height: 26px; font-size: 0.75rem;" onClick=${() => setShowLinkInput(false)} title="Cancel">✕</button>
                `}
              </div>
            ` : null}
          </div>
          <div ref=${containerRef} style="min-height: ${minHeight}px;" />
          <div class="rte-counts">
            <span class="rte-para-count">${counts.paragraphs} paragraph${counts.paragraphs !== 1 ? 's' : ''}</span>
            <span>${counts.words} word${counts.words !== 1 ? 's' : ''}</span>
            <span>${counts.chars} character${counts.chars !== 1 ? 's' : ''}</span>
          </div>
        </div>
      `;
    }

    // ─── Sortable Table Hook ──────────────────
    function useSortable(items, defaultKey = null, defaultDir = 'asc') {
      const [sortKey, setSortKey] = useState(defaultKey);
      const [sortDir, setSortDir] = useState(defaultDir);

      const toggleSort = (key) => {
        if (sortKey === key) {
          setSortDir(d => d === 'asc' ? 'desc' : 'asc');
        } else {
          setSortKey(key);
          setSortDir('asc');
        }
      };

      const sorted = useMemo(() => {
        if (!sortKey) return items;
        return [...items].sort((a, b) => {
          let va = a[sortKey], vb = b[sortKey];
          if (va == null) va = '';
          if (vb == null) vb = '';
          if (typeof va === 'number' && typeof vb === 'number') {
            return sortDir === 'asc' ? va - vb : vb - va;
          }
          va = String(va).toLowerCase();
          vb = String(vb).toLowerCase();
          if (va < vb) return sortDir === 'asc' ? -1 : 1;
          if (va > vb) return sortDir === 'asc' ? 1 : -1;
          return 0;
        });
      }, [items, sortKey, sortDir]);

      const SortHeader = ({ field, children }) => html`
        <th class="sortable ${sortKey === field ? 'sorted' : ''}" onClick=${() => toggleSort(field)}>
          ${children}
          <span class="sort-icon">${sortKey === field ? (sortDir === 'asc' ? '▲' : '▼') : '↕'}</span>
        </th>
      `;

      return { sorted, sortKey, sortDir, toggleSort, SortHeader };
    }

    // ─── Editor Hook ────────────────────────
    // Shared state + logic for all CRUD editors.
    //   Slug-based:  useEditor({ slug, type: 'kids', nameField: 'name', defaults: {...}, addToast, onBack })
    //   Site-config: useEditor({ path: 'src/content/site/media.json', label: 'Media Kit', addToast })
    function useEditor({ slug, type, path: fixedPath, nameField = 'name', slugField = 'name', defaults = {}, addToast, onBack, label, commitPrefix, onLoad, existingSlugs = [] }) {
      const isSlugBased = !fixedPath;
      const [data, setData] = useState({ ...defaults });
      const [sha, setSha] = useState(null);
      const [loading, setLoading] = useState(isSlugBased ? !!slug : true);
      const [saving, setSaving] = useState(false);
      const [dirty, setDirty] = useState(false);
      const [deleting, setDeleting] = useState(false);
      const [showDeleteModal, setShowDeleteModal] = useState(false);

      const filePath = isSlugBased
        ? `src/content/${type}/${slug || data.slug}.json`
        : fixedPath;

      const displayName = () => data[nameField] || label || type;
      const prefix = commitPrefix || (isSlugBased ? type.replace(/s$/, '') : label || type);

      // Slug collision detection (prevents silent overwrites on create)
      const slugExists = isSlugBased && !slug && data.slug && existingSlugs.includes(data.slug);

      const dedupeSlug = (base) => {
        if (!existingSlugs.includes(base)) return base;
        const withYear = `${base}-${new Date().getFullYear()}`;
        if (!existingSlugs.includes(withYear)) return withYear;
        let n = 2;
        while (existingSlugs.includes(`${withYear}-${n}`)) n++;
        return `${withYear}-${n}`;
      };

      // Warn on unsaved changes
      useEffect(() => {
        if (!isSlugBased) return;
        const handler = (e) => { if (dirty) { e.preventDefault(); e.returnValue = ''; } };
        window.addEventListener('beforeunload', handler);
        return () => window.removeEventListener('beforeunload', handler);
      }, [dirty]);

      // Load data
      const mountedRef = useRef(true);
      useEffect(() => () => { mountedRef.current = false; }, []);
      useEffect(() => {
        if (isSlugBased && !slug) return;
        (async () => {
          const res = await api.readContent(isSlugBased ? `src/content/${type}/${slug}.json` : fixedPath);
          if (!mountedRef.current) return; // prevent stale updates on rapid navigation
          if (res.success) {
            const parsed = typeof res.content === 'string' ? JSON.parse(res.content) : res.content;
            setData(onLoad ? onLoad(parsed) : parsed);
            setSha(res.sha);
            setDirty(false);
          }
          setLoading(false);
        })();
      }, isSlugBased ? [slug] : []);

      // Flat field update (most editors)
      const updateField = (field, value) => {
        setDirty(true);
        setData(d => {
          const updated = { ...d, [field]: value };
          if (field === slugField && !slug) updated.slug = dedupeSlug(slugify(value));
          return updated;
        });
      };

      // Dot-path field update (site-config editors with nested objects)
      const updateNestedField = (path, value) => {
        setDirty(true);
        setData(d => {
          const copy = JSON.parse(JSON.stringify(d));
          const keys = path.split('.');
          let obj = copy;
          for (let i = 0; i < keys.length - 1; i++) {
            if (!obj[keys[i]] || typeof obj[keys[i]] !== 'object') obj[keys[i]] = {};
            obj = obj[keys[i]];
          }
          obj[keys[keys.length - 1]] = value;
          return copy;
        });
      };

      const handleSave = async (preprocess) => {
        if (isSlugBased && !data[nameField]) { addToast(`${nameField.charAt(0).toUpperCase() + nameField.slice(1)} is required`, 'error'); return false; }
        if (slugExists) { addToast(`A ${prefix} with slug "${data.slug}" already exists. Change the name or edit the slug.`, 'error'); return false; }
        setSaving(true);
        try {
          const saveData = typeof preprocess === 'function' ? preprocess({ ...data }) : data;
          console.log('[handleSave]', type, slug, 'photo:', saveData.photo, 'keys:', Object.keys(saveData));
          const savePath = isSlugBased ? `src/content/${type}/${saveData.slug || slug}.json` : fixedPath;
          const content = JSON.stringify(saveData, null, 2);
          const message = isSlugBased
            ? `${slug ? 'Update' : 'Add'} ${prefix}: ${displayName()}`
            : `Update ${label || prefix}`;
          const res = await api.saveContent(savePath, content, message, sha || undefined);
          if (res.success) {
            setSha(res.sha);
            setDirty(false);
            addToast(`${displayName()} saved!`, 'success');
            logActivity(slug ? 'updated' : 'created', prefix, displayName());
            setSaving(false);
            return true;
          } else {
            addToast(`Save failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Save error: ${err.message}`, 'error');
        }
        setSaving(false);
        return false;
      };

      const handleDelete = async () => {
        if (!slug || !sha) return;
        setDeleting(true);
        try {
          const res = await api.deleteContent(filePath, sha, `Delete ${prefix}: ${displayName()}`);
          if (res.success) {
            addToast(`${displayName()} deleted`, 'success');
            logActivity('deleted', prefix, displayName());
            setDirty(false);
            onBack?.();
          } else {
            addToast(`Delete failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Delete error: ${err.message}`, 'error');
        }
        setDeleting(false);
        setShowDeleteModal(false);
      };

      const safeBack = () => {
        if (dirty && !confirm('You have unsaved changes. Leave without saving?')) return;
        onBack?.();
      };

      return {
        data, setData, sha, loading, saving, dirty, setDirty, deleting,
        showDeleteModal, setShowDeleteModal, slugExists,
        updateField, updateNestedField, handleSave, handleDelete, safeBack,
      };
    }

    // ─── Toast System ───────────────────────
    let toastId = 0;
    function ToastContainer({ toasts }) {
      return html`<div class="toast-container" role="status" aria-live="polite" aria-atomic="true">
        ${toasts.map(t => html`<div key=${t.id} class="toast toast-${t.type}" role="alert">
          ${t.action ? html`<span class="toast-action">
            <span>${t.msg}</span>
            <button class="toast-undo" onClick=${t.action.fn}>${t.action.label}</button>
          </span>` : t.msg}
        </div>`)}

    }

    // ─── Confirm Modal ──────────────────────
    function ConfirmModal({ title, message, onConfirm, onCancel, danger, loading }) {
      // Trap focus, handle Escape, lock body scroll
      const modalRef = useRef();
      useEffect(() => {
        document.body.classList.add('modal-open');
        const handler = (e) => { if (e.key === 'Escape') onCancel(); };
        window.addEventListener('keydown', handler);
        modalRef.current?.querySelector('button')?.focus();
        return () => { window.removeEventListener('keydown', handler); document.body.classList.remove('modal-open'); };
      }, []);

      return html`<div class="modal-overlay" onClick=${onCancel} role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal" ref=${modalRef} onClick=${e => e.stopPropagation()}>
          <h3 id="modal-title">${title}</h3>
          <p>${message}</p>
          <div class="modal-buttons">
            <button class="btn btn-ghost" onClick=${onCancel} disabled=${loading}>Cancel</button>
            <button class="btn ${danger ? 'btn-danger' : 'btn-primary'}" onClick=${onConfirm} disabled=${loading}>
              ${loading ? html`<span class="spinner" /> Deleting...` : danger ? 'Delete' : 'Confirm'}
            </button>
          </div>
        </div>
      </div>`;
    }

    // ─── useImageUpload hook ────────────────
    // Reusable upload-with-placeholder logic used by every editor's photo/logo upload.
    // Returns { uploading, upload } where upload() handles the full lifecycle:
    //   blob preview → CF upload → swap URL or remove on failure → revoke blob.
    function useImageUpload({ setData, setDirty, addToast, buildCfId, arrayKey = 'photos', makeEntry, replaceEntry, countKey, onSuccess }) {
      const [uploading, setUploading] = useState({});

      const upload = async (files) => {
        setDirty(true);
        for (const file of files) {
          const tempId = Date.now() + '-' + file.name;
          const localUrl = URL.createObjectURL(file);
          const entry = makeEntry(localUrl, file, tempId);

          setData(d => ({
            ...d,
            [arrayKey]: [...(d[arrayKey] || []), entry],
            ...(countKey ? { [countKey]: (d[countKey] || 0) + 1 } : {}),
          }));
          setUploading(u => ({ ...u, [tempId]: true }));

          try {
            const cfId = buildCfId(file);
            const res = await api.uploadImage(file, cfId);
            if (res.success) {
              setData(d => {
                const updated = {
                  ...d,
                  [arrayKey]: (d[arrayKey] || []).map(item =>
                    item._tempId === tempId ? replaceEntry(item, res) : item
                  ),
                };
                return onSuccess ? onSuccess(updated, res) : updated;
              });
              addToast(`Uploaded ${file.name}`, 'success');
            } else {
              addToast(`Failed: ${res.error}`, 'error');
              setData(d => ({
                ...d,
                [arrayKey]: (d[arrayKey] || []).filter(item => item._tempId !== tempId),
                ...(countKey ? { [countKey]: (d[countKey] || 0) - 1 } : {}),
              }));
            }
          } catch (err) {
            addToast(`Upload error: ${err.message}`, 'error');
            setData(d => ({
              ...d,
              [arrayKey]: (d[arrayKey] || []).filter(item => item._tempId !== tempId),
              ...(countKey ? { [countKey]: (d[countKey] || 0) - 1 } : {}),
            }));
          }
          URL.revokeObjectURL(localUrl);
          setUploading(u => { const n = { ...u }; delete n[tempId]; return n; });
        }
      };

      return { uploading, upload };
    }

    // ─── useDragReorder hook ─────────────────
    // Reusable drag-to-reorder for any array field in data.
    function useDragReorder({ setData, setDirty, arrayKey = 'photos' }) {
      const dragIdx = useRef(null);

      const reorder = (fromIdx, toIdx) => {
        if (fromIdx === toIdx) return;
        setDirty(true);
        setData(d => {
          const items = [...(d[arrayKey] || [])];
          const [moved] = items.splice(fromIdx, 1);
          items.splice(toIdx, 0, moved);
          return { ...d, [arrayKey]: items };
        });
      };

      const dragHandlers = (i) => ({
        draggable: true,
        onDragStart: (e) => { dragIdx.current = i; e.currentTarget.classList.add('dragging'); },
        onDragEnd: (e) => { dragIdx.current = null; e.currentTarget.classList.remove('dragging'); },
        onDragOver: (e) => { e.preventDefault(); e.currentTarget.classList.add('drag-over'); },
        onDragLeave: (e) => { e.currentTarget.classList.remove('drag-over'); },
        onDrop: (e) => { e.preventDefault(); e.currentTarget.classList.remove('drag-over'); if (dragIdx.current !== null) reorder(dragIdx.current, i); },
      });

      return { dragHandlers, reorder };
    }

    // ─── Extract Cloudflare image ID from a delivery URL ────────
    function extractCfImageId(src) {
      if (!src) return null;
      // Already a bare ID
      if (!src.startsWith('http')) return src;
      if (!src.includes('imagedelivery.net')) return null;
      let id = src.replace(CF_LEGACY + '/', '');
      const lastSlash = id.lastIndexOf('/');
      if (lastSlash > 0) {
        const suffix = id.slice(lastSlash + 1);
        if (NAMED_VARIANTS.has(suffix) || suffix.includes('=')) id = id.slice(0, lastSlash);
      }
      return id || null;
    }

    // ─── useSingleUpload hook ────────────────
    // For editors that upload a single image (partner logo, team photo, etc.)
    // Returns { uploading, preview, upload, clear } — preview holds blob URL during upload, then real URL.
    function useSingleUpload({ setData, setDirty, addToast, buildCfId, field }) {
      const [uploading, setUploading] = useState(false);
      const [preview, setPreview] = useState(null);

      const upload = async (files) => {
        const file = files[0];
        if (!file) return;
        setDirty(true);
        const blobUrl = URL.createObjectURL(file);
        setPreview(blobUrl);
        setUploading(true);
        try {
          const cfId = buildCfId(file);
          const res = await api.uploadImage(file, cfId);
          console.log('[useSingleUpload] field:', field, 'res:', JSON.stringify(res));
          if (res.success) {
            setData(d => {
              const next = { ...d, [field]: res.imageUrl };
              console.log('[useSingleUpload] setData — old:', d[field], '→ new:', res.imageUrl);
              return next;
            });
            setPreview(res.imageUrl);
            addToast('Uploaded', 'success');
          } else {
            addToast(`Upload failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Upload error: ${err.message}`, 'error');
        }
        URL.revokeObjectURL(blobUrl);
        setUploading(false);
      };

      const clear = async () => {
        setDirty(true);
        const currentUrl = preview;
        setPreview(null);
        setData(d => ({ ...d, [field]: '' }));
        // Try to delete from Cloudflare Images
        const imageId = extractCfImageId(currentUrl);
        if (imageId) {
          try { await api.deleteImage(imageId); } catch {}
        }
        addToast('Image removed', 'success');
      };

      // Sync preview with loaded data
      const syncPreview = (url) => { if (url && !preview) setPreview(url); };

      return { uploading, preview, upload, clear, setPreview, syncPreview };
    }

    // ─── Drop Zone ──────────────────────────
    function DropZone({ onFiles, multiple = true, accept = 'image/*', label }) {
      const [dragOver, setDragOver] = useState(false);
      const inputRef = useRef();

      const handleDrop = (e) => {
        e.preventDefault();
        setDragOver(false);
        const files = Array.from(e.dataTransfer.files);
        if (files.length) onFiles(multiple ? files : [files[0]]);
      };

      const handleChange = (e) => {
        const files = Array.from(e.target.files);
        if (files.length) onFiles(multiple ? files : [files[0]]);
        e.target.value = '';
      };

      return html`
        <div class="dropzone ${dragOver ? 'drag-over' : ''}"
          onDragOver=${e => { e.preventDefault(); setDragOver(true); }}
          onDragLeave=${() => setDragOver(false)}
          onDrop=${handleDrop}
          onClick=${() => inputRef.current?.click()}
        >
          <div class="dropzone-icon">${accept.includes('pdf') ? icons.fileText : icons.camera}</div>
          <div class="dropzone-text">
            <strong>Click to browse</strong> or drag files here
            <br/>${label || (multiple ? 'Upload multiple files' : 'Upload a file')}
          </div>
          <input ref=${inputRef} type="file" accept=${accept}
            multiple=${multiple} style="display:none" onChange=${handleChange} />
        </div>
      `;
    }

    }
