# SOARD Press Monitor — Cloudflare Worker
# ========================================
# Scans for new SOARD media mentions twice a month
# and emails you when new articles are found.
#
# Deploy:  cd workers/press-monitor && npx wrangler deploy
# Test:    curl https://soard-press-monitor.<your-subdomain>.workers.dev/run

name = "soard-press-monitor"
main = "worker.js"
compatibility_date = "2025-09-27"
compatibility_flags = ["nodejs_compat"]

# ─── Cron: 1st and 15th of every month at 2pm UTC (10am ET) ─────
[triggers]
crons = ["0 14 1,15 * *"]

# ─── D1 Database (same as main SOARD site) ──────────────────────
[[d1_databases]]
binding = "DB"
database_name = "soard-db"
database_id = "71ac037d-2682-4336-9cf7-234e97c5b462"

# ─── Secrets (set via wrangler secret put) ──────────────────────
# Run these commands after first deploy:
#
#   cd workers/press-monitor
#   npx wrangler secret put GITHUB_TOKEN
#   npx wrangler secret put RESEND_API_KEY
#   npx wrangler secret put NOTIFY_EMAIL
#
# GITHUB_TOKEN  → your GitHub PAT (already have this)
# RESEND_API_KEY → sign up free at https://resend.com, create API key
# NOTIFY_EMAIL  → email address to receive notifications (e.g. peter@ranneyblair.com)
