          <p class="text-sm text-muted mb-1">The text content displayed on the homepage hero section.</p>

          <div class="form-row">

              <input class="form-input" value=${data.homeHero?.headlineLine1 || ''}
                placeholder="Building <em>dreams</em>,"
                onInput=${e => updateField('homeHero.headlineLine1', e.target.value)} />
            </div>
            <div class="form-group">
              <label class="form-label">Headline Line 2</label>
              <input class="form-input" value=${data.homeHero?.headlineLine2 || ''}

                onInput=${e => updateField('homeHero.headlineLine2', e.target.value)} />

          </div>
          <div class="form-group">

              placeholder="We create life-changing spaces..."

          </div>
          <p class="text-sm text-muted" style="margin: 0.75rem 0 0.25rem;">You can use &lt;em&gt; in headlines and &lt;strong&gt; in the lead for emphasis.</p>
          <div class="form-row" style="margin-top: 1rem;">
            <div class="form-group">
              <label class="form-label">Primary CTA Label</label>

      const [imagePickerTarget, setImagePickerTarget] = useState(null);

      useEffect(() => {
        (async () => {
          const res = await api.readContent('src/content/site/our-story.json');
          if (res.success) {
            setData(JSON.parse(res.content));
            setSha(res.sha);
          }
          setLoading(false);
        })();
      }, []);

      const updateField = (path, value) => {
        setData(d => {
          const copy = JSON.parse(JSON.stringify(d));
          const keys = path.split('.');
          let obj = copy;
          for (let i = 0; i < keys.length - 1; i++) {
            if (!obj[keys[i]] || typeof obj[keys[i]] !== 'object') obj[keys[i]] = {};
            obj = obj[keys[i]];
          }
          obj[keys[keys.length - 1]] = value;
          return copy;
        });
      };

      const updateParagraph = (section, index, value) => {
        setData(d => {
          const copy = JSON.parse(JSON.stringify(d));
          copy[section].paragraphs[index] = value;
          return copy;
        });
      };

      const addParagraph = (section) => {
        setData(d => {
          const copy = JSON.parse(JSON.stringify(d));
          copy[section].paragraphs.push('');
          return copy;
        });
      };

      const removeParagraph = (section, index) => {
        setData(d => {
          const copy = JSON.parse(JSON.stringify(d));
          copy[section].paragraphs.splice(index, 1);
          return copy;
        });
      };

      const updateMilestone = (index, field, value) => {
        setData(d => {
          const copy = JSON.parse(JSON.stringify(d));
          copy.milestones[index][field] = value;
          return copy;
        });
      };

      const addMilestone = () => {
        setData(d => ({
          ...d,
          milestones: [...(d.milestones || []), { year: '', title: '', desc: '', image: '' }],
        }));
      };

      const removeMilestone = (index) => {
        setData(d => {
          const copy = JSON.parse(JSON.stringify(d));
          copy.milestones.splice(index, 1);
          return copy;
        });
      };

      const moveMilestone = (index, dir) => {
        setData(d => {
          const copy = JSON.parse(JSON.stringify(d));
          const newIdx = index + dir;
          if (newIdx < 0 || newIdx >= copy.milestones.length) return d;
          [copy.milestones[index], copy.milestones[newIdx]] = [copy.milestones[newIdx], copy.milestones[index]];

    // ═══════════════════════════════════════════
    // DEPLOYS
    // ═══════════════════════════════════════════
    function Deploys({ addToast }) {
      const [deploys, setDeploys] = useState([]);
      const [source, setSource] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      const loadDeploys = async () => {
        setLoading(true);
        setError(null);
        try {
          const r = await fetch('/api/deployments');
          const data = await r.json();
          if (data.success) {
            setDeploys(data.deploys || []);
            setSource(data.source);
          } else {
            setError(data.error || 'Failed to load deployments');
          }
        } catch (err) {
          setError(err.message);
        }
        setLoading(false);
      };

      useEffect(() => { loadDeploys(); }, []);

      const timeAgo = (dateStr) => {
        if (!dateStr) return '';
        const now = Date.now();
        const then = new Date(dateStr).getTime();
        const diff = Math.floor((now - then) / 1000);
        if (diff < 60) return 'just now';
        if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
        if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
        if (diff < 604800) return `${Math.floor(diff / 86400)}d ago`;
        return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      };

      const statusBadge = (status) => {
        const map = {
          success: { cls: 'badge-green', label: '● Success' },
          active: { cls: 'badge-blue', label: '◉ Building' },
          failure: { cls: 'badge-red', label: 'Failed' },
          canceled: { cls: 'badge-gray', label: '— Canceled' },
          unknown: { cls: 'badge-gray', label: '? Unknown' },
        };
        const s = map[status] || map.unknown;
        return html`<span class="badge ${s.cls}" style="font-size: 0.72rem;">${s.label}</span>`;
      };

      const formatDuration = (start, end) => {
        if (!start || !end) return null;
        const ms = new Date(end) - new Date(start);
        const secs = Math.floor(ms / 1000);
        if (secs < 60) return `${secs}s`;
        return `${Math.floor(secs / 60)}m ${secs % 60}s`;
      };

      if (loading) {
        return html`
          <div class="page-header"><h2>Deploys</h2></div>
          <div style="text-align: center; padding: 4rem;">
            <div class="spinner" style="width: 40px; height: 40px; border-width: 3px;" />
            <p class="mt-2 text-muted">Loading deployment history...</p>
          </div>`;
      }

      if (error) {
        return html`
          <div class="page-header"><h2>Deploys</h2></div>
          <div class="card" style="text-align: center; padding: 2rem;">
            <p style="color: #E53E3E; margin-bottom: 1rem;">${icons.warning} ${error}</p>
            <button class="btn btn-primary" onClick=${loadDeploys}>Retry</button>
          </div>`;
      }

      return html`
        <div class="page-header">
          <h2>Deploys (${deploys.length})</h2>
          <div style="display: flex; gap: 0.5rem; align-items: center;">
            ${source === 'github' ? html`<span class="badge badge-gray" style="font-size: 0.72rem;">via GitHub commits</span>` : null}
            ${source === 'cloudflare' ? html`<span class="badge badge-blue" style="font-size: 0.72rem;">via Cloudflare Pages</span>` : null}
            <button class="btn btn-ghost btn-sm" onClick=${loadDeploys}>↻ Refresh</button>
          </div>
        </div>

        ${source === 'github' ? html`
          <div class="card" style="padding: 0.75rem 1rem; margin-bottom: 1rem; background: #FEFCF5; border-left: 3px solid #FFD500;">
            <p class="text-sm" style="margin: 0;">
              <strong>Tip:</strong> To see build status and preview URLs, add a <code>CF_PAGES_TOKEN</code> environment variable
              in your Cloudflare Pages settings with Pages:Read permission.
            </p>
          </div>
        ` : null}

        <div class="card" style="padding: 0;">
          ${deploys.length === 0
            ? html`<div style="padding: 2rem; text-align: center; color: #6B6C72;">No deployments found</div>`
            : deploys.map(d => html`
              <div class="deploy-item" key=${d.id}>
                ${d.avatar
                  ? html`<img class="deploy-avatar" src="${d.avatar}" alt="" />`
                  : html`<div class="deploy-avatar" style="display:flex;align-items:center;justify-content:center;font-size:0.8rem;color:#6B6C72;">${icons.user}</div>`
                }
                <div class="deploy-body">
                  <div class="deploy-msg" title=${d.commitMessage || ''}>${d.commitMessage || 'No commit message'}</div>
                  <div class="deploy-meta">
                    ${d.author ? html`<span>${d.author}</span>` : null}
                    ${d.commitHash ? html`<a class="deploy-sha" href=${d.commitUrl || `https://github.com/pranney82/soard/commit/${d.commitHash}`} target="_blank" rel="noopener">${d.commitHash.slice(0, 7)}</a>` : null}
                    ${d.branch && d.branch !== 'main' ? html`<span class="badge badge-accent" style="font-size:0.7rem;">${d.branch}</span>` : null}
                    ${d.createdOn ? html`<span title=${new Date(d.createdOn).toLocaleString()}>${timeAgo(d.createdOn)}</span>` : null}
                    ${formatDuration(d.startedOn, d.endedOn) ? html`<span>⏱ ${formatDuration(d.startedOn, d.endedOn)}</span>` : null}
                    ${d.url ? html`<a class="deploy-link" href=${d.url} target="_blank" rel="noopener">Preview ↗</a>` : null}
                  </div>
                </div>
                <div class="deploy-status">${statusBadge(d.status)}</div>
              </div>
            `)
          }
        </div>
      `;
    }

    // ═══════════════════════════════════════════
    // MAIN APP

    // ═══════════════════════════════════════════
    // COMMAND PALETTE (Cmd+K)
    // ═══════════════════════════════════════════
    function CommandPalette({ open, onClose, onNavigate, kids, partners, team, articles, events, communityProjects, press }) {
      const [query, setQuery] = useState('');
      const [activeIdx, setActiveIdx] = useState(0);
      const inputRef = useRef();

      useEffect(() => {
        if (open) { setQuery(''); setActiveIdx(0); setTimeout(() => inputRef.current?.focus(), 50); }
      }, [open]);

      const allItems = useMemo(() => {
        const pages = [
          { type: 'page', label: 'Dashboard', id: 'dashboard', section: 'Pages' },
          { type: 'page', label: 'Kids', id: 'kids', section: 'Pages' },
          { type: 'page', label: 'Partners', id: 'partners', section: 'Pages' },
          { type: 'page', label: 'Team', id: 'team', section: 'Pages' },
          { type: 'page', label: 'Articles', id: 'articles', section: 'Pages' },
          { type: 'page', label: 'Events', id: 'events', section: 'Pages' },
          { type: 'page', label: 'Community Projects', id: 'community', section: 'Pages' },
          { type: 'page', label: 'Press & Media', id: 'press', section: 'Pages' },
          { type: 'page', label: 'FAQs', id: 'faq', section: 'Pages' },
          { type: 'page', label: 'Financials', id: 'financials', section: 'Pages' },
          { type: 'page', label: 'Site Settings', id: 'settings', section: 'Pages' },
          { type: 'page', label: 'Our Story', id: 'ourstory', section: 'Pages' },
          { type: 'page', label: 'Media Kit', id: 'mediakit', section: 'Pages' },
          { type: 'page', label: 'Press Monitor', id: 'press-monitor', section: 'Pages' },
          { type: 'page', label: 'Deploys', id: 'deploys', section: 'Pages' },
        ];
        const actions = [
          { type: 'action', label: 'Add New Kid', id: 'kids', slug: '', section: 'Actions' },
          { type: 'action', label: 'Add New Partner', id: 'partners', slug: '', section: 'Actions' },
          { type: 'action', label: 'Add New Team Member', id: 'team', slug: '', section: 'Actions' },
          { type: 'action', label: 'Add New Article', id: 'articles', slug: '', section: 'Actions' },
          { type: 'action', label: 'Add New Event', id: 'events', slug: '', section: 'Actions' },
        ];
        const content = [
          ...(kids || []).map(k => ({ type: 'content', label: k.name, meta: `Kid · ${k.year || ''}`, id: 'kids', slug: k.slug, section: 'Content' })),
          ...(partners || []).map(p => ({ type: 'content', label: p.name, meta: `Partner · ${p.tier || ''}`, id: 'partners', slug: p.slug, section: 'Content' })),
          ...(team || []).map(t => ({ type: 'content', label: t.name, meta: `Team · ${t.title || ''}`, id: 'team', slug: t.slug, section: 'Content' })),
          ...(articles || []).map(a => ({ type: 'content', label: a.title || a.name, meta: 'Article', id: 'articles', slug: a.slug, section: 'Content' })),
          ...(events || []).map(e => ({ type: 'content', label: e.title || e.name, meta: `Event · ${e.date || ''}`, id: 'events', slug: e.slug, section: 'Content' })),
          ...(communityProjects || []).map(c => ({ type: 'content', label: c.name, meta: `Community · ${c.year || ''}`, id: 'community', slug: c.slug, section: 'Content' })),
          ...(press || []).map(p => ({ type: 'content', label: p.title || p.name, meta: `Press · ${p.outlet || ''}`, id: 'press', slug: p.slug, section: 'Content' })),
        ];
        return [...pages, ...actions, ...content];
      }, [kids, partners, team, articles, events, communityProjects, press]);

      const filtered = useMemo(() => {
        if (!query) return allItems.slice(0, 20);
        const q = query.toLowerCase();
        return allItems.filter(item =>
          item.label.toLowerCase().includes(q) ||
          (item.meta || '').toLowerCase().includes(q) ||
          item.section.toLowerCase().includes(q)
        ).slice(0, 20);
      }, [query, allItems]);

      useEffect(() => { setActiveIdx(0); }, [query]);

      const handleSelect = (item) => {
        if (item.type === 'action') {
          onNavigate(item.id, '');
        } else if (item.type === 'content') {
          onNavigate(item.id, item.slug);
        } else {
          onNavigate(item.id);
        }
        onClose();
      };

      const handleKeyDown = (e) => {
        if (e.key === 'ArrowDown') { e.preventDefault(); setActiveIdx(i => Math.min(i + 1, filtered.length - 1)); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); setActiveIdx(i => Math.max(i - 1, 0)); }
        else if (e.key === 'Enter' && filtered[activeIdx]) { handleSelect(filtered[activeIdx]); }
        else if (e.key === 'Escape') { onClose(); }
      };

      if (!open) return null;

      // Group by section
      const grouped = [];
      let lastSection = null;
      filtered.forEach((item, i) => {
        if (item.section !== lastSection) {
          grouped.push({ type: 'section', label: item.section });
          lastSection = item.section;
        }
        grouped.push({ ...item, flatIdx: i });
      });

      const typeIcon = (type) => {
        if (type === 'page') return html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg>`;
        if (type === 'action') return html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>`;
        return html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>`;
      };

      return html`
        <div class="cmd-palette-overlay" onClick=${onClose}>
          <div class="cmd-palette" onClick=${e => e.stopPropagation()}>
            <div class="cmd-palette-input-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
              <input ref=${inputRef} class="cmd-palette-input"
                placeholder="Search pages, content, actions..."
                value=${query} onInput=${e => setQuery(e.target.value)}
                onKeyDown=${handleKeyDown} />
              <kbd style="font-size: 0.7rem; padding: 2px 6px; background: #f0f0f0; border: 1px solid #ddd; border-radius: 4px; color: #999;">esc</kbd>
            </div>
            <div class="cmd-palette-results">
              ${filtered.length === 0 ? html`<div style="padding: 2rem; text-align: center; color: #9B9CA0;">No results for "${query}"</div>` : null}
              ${grouped.map(item => {
                if (item.type === 'section') return html`<div class="cmd-palette-section">${item.label}</div>`;
                return html`<button key=${item.label + item.id}
                  class="cmd-palette-item ${item.flatIdx === activeIdx ? 'active' : ''}"
                  onClick=${() => handleSelect(item)}
                  onMouseEnter=${() => setActiveIdx(item.flatIdx)}>
                  ${typeIcon(item.type)}
                  <span>${item.label}</span>
                  ${item.meta ? html`<span class="cmd-meta">${item.meta}</span>` : null}
                </button>`;
              })}
            </div>
            <div class="cmd-palette-footer">
              <span><kbd>↑</kbd><kbd>↓</kbd> navigate</span>
              <span><kbd>↵</kbd> open</span>
              <span><kbd>esc</kbd> close</span>
            </div>
          </div>
        </div>
      `;
    }

    // ═══════════════════════════════════════════
    // KEYBOARD SHORTCUTS MODAL
    // ═══════════════════════════════════════════
    function KeyboardShortcuts({ open, onClose }) {
      useEffect(() => {
        if (!open) return;
        const handler = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [open]);

      if (!open) return null;

      const isMac = navigator.platform.includes('Mac');
      const mod = isMac ? '⌘' : 'Ctrl';

      const shortcuts = [
        { keys: [mod, 'K'], label: 'Command palette' },
        { keys: [mod, 'S'], label: 'Save current item' },
        { keys: ['?'], label: 'Keyboard shortcuts' },
        { keys: ['Esc'], label: 'Close modal / palette' },
        { keys: ['↑', '↓'], label: 'Navigate palette results' },
        { keys: ['Enter'], label: 'Select palette result' },
        { keys: ['Tab'], label: 'Next form field' },
        { keys: [mod, 'B'], label: 'Bold (rich text)' },
        { keys: [mod, 'I'], label: 'Italic (rich text)' },
        { keys: [mod, 'U'], label: 'Underline (rich text)' },
      ];

      return html`
        <div class="modal-overlay" onClick=${onClose}>
          <div class="modal" style="max-width: 520px;" onClick=${e => e.stopPropagation()}>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
              <h3 style="margin: 0;">Keyboard Shortcuts</h3>
              <button class="btn btn-ghost btn-sm" onClick=${onClose}>Close</button>
            </div>
            <div class="shortcuts-grid">
              ${shortcuts.map(s => html`
                <div class="shortcut-item">
                  <span style="font-size: 0.9rem;">${s.label}</span>
                  <div class="shortcut-keys">
                    ${s.keys.map(k => html`<kbd>${k}</kbd>`)}
                  </div>
                </div>
              `)}
            </div>
            <div style="margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid #f0f0f0; font-size: 0.8rem; color: #9B9CA0; text-align: center;">
              Press <kbd style="display: inline; padding: 1px 5px; background: #f0f0f0; border: 1px solid #ddd; border-radius: 3px; font-size: 0.75rem;">?</kbd> anywhere to show this dialog
            </div>
          </div>
        </div>
      `;
    }

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 2rem;">

    // ═══════════════════════════════════════════
    // MINI SPARKLINE CHART
    // ═══════════════════════════════════════════
    function MiniChart({ data, color = '#FFD500', height = 40, width = 120 }) {
      if (!data || data.length < 2) return null;
      const max = Math.max(...data);
      const min = Math.min(...data);
      const range = max - min || 1;
      const step = width / (data.length - 1);
      const points = data.map((v, i) => {
        const x = i * step;
        const y = height - ((v - min) / range) * (height - 4) - 2;
        return `${x},${y}`;
      }).join(' ');
      // Area fill
      const areaPoints = `0,${height} ${points} ${width},${height}`;

      return html`
        <svg width=${width} height=${height} viewBox="0 0 ${width} ${height}" style="display: block;">
          <polygon points=${areaPoints} fill=${color} opacity="0.15" />
          <polyline points=${points} fill="none" stroke=${color} stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      `;
    }

      const [editSlug, setEditSlug] = useState(null);

      const [team, setTeam] = useState([]);
      const [articles, setArticles] = useState([]);
      const [events, setEvents] = useState([]);

      // Load all content
      const loadData = async () => {

          const kidsRes = await api.bulkListContent('src/content/kids');
          if (kidsRes.success) {
            setKids(kidsRes.items.map(i => i.content).filter(Boolean)
              .sort((a, b) => (b.year || 0) - (a.year || 0)));

          // Load partners (bulk — one API call)

          if (partRes.success) {
            setPartners(partRes.items.map(i => i.content).filter(Boolean)
              .sort((a, b) => a.name.localeCompare(b.name)));
          }

          // Load team (bulk — one API call)
          const teamRes = await api.bulkListContent('src/content/team');
          if (teamRes.success) {
            setTeam(teamRes.items.map(i => i.content).filter(Boolean)
              .sort((a, b) => (a.order || 0) - (b.order || 0)));
          }

          // Load articles (bulk — one API call)
          const artRes = await api.bulkListContent('src/content/articles');
          if (artRes.success) {
            setArticles(artRes.items.map(i => i.content).filter(Boolean)
              .sort((a, b) => (a.order || 0) - (b.order || 0)));
          }

          // Load events (bulk — one API call)
          const evRes = await api.bulkListContent('src/content/events');
          if (evRes.success) {
            setEvents(evRes.items.map(i => i.content).filter(Boolean)
              .sort((a, b) => new Date(a.date || 0) - new Date(b.date || 0)));
          }

          // Load community projects (bulk — one API call)
          const cpRes = await api.bulkListContent('src/content/community');
          if (cpRes.success) {
            setCommunityProjects(cpRes.items.map(i => i.content).filter(Boolean)

          }

          // Load press (bulk — one API call)
          const pressRes = await api.bulkListContent('src/content/press');
          if (pressRes.success) {
            setPress(pressRes.items.map(i => {
              const c = i.content;
              if (c && !c.slug) c.slug = i.name.replace(/\.json$/, '');
              return c;
            }).filter(Boolean)
              .sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0)));
          }

          addToast('Failed to load content. Check API settings.', 'error');
        }
        setLoading(false);
      };

      useEffect(() => { loadData(); }, []);

      // Global keyboard shortcuts
      useEffect(() => {
        const handler = (e) => {
          // Cmd/Ctrl+K — command palette
          if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
            e.preventDefault();
            setCmdPaletteOpen(o => !o);
            return;
          }
          // Cmd/Ctrl+S — save
          if ((e.metaKey || e.ctrlKey) && e.key === 's') {
            e.preventDefault();
            const btns = document.querySelectorAll('.btn-primary:not(:disabled)');
            if (btns.length) btns[btns.length - 1].click();
            return;
          }
          // ? — keyboard shortcuts (only when not typing in an input)
          if (e.key === '?' && !['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName) && !e.target.isContentEditable) {
            e.preventDefault();
            setShortcutsOpen(o => !o);
          }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);

        if (!deleteModal) return;
        setDeleteLoading(true);
        const { type, item } = deleteModal;
        const dir = type === 'kid' ? 'kids' : type === 'partner' ? 'partners' : type === 'team member' ? 'team' : type === 'article' ? 'articles' : type === 'event' ? 'events' : type === 'community project' ? 'community' : type === 'press article' ? 'press' : 'partners';

        try {
          const fileRes = await api.readContent(filePath);
          if (!fileRes.success) {
            addToast(`Could not find file for ${item.name}`, 'error');
            setDeleteLoading(false);
            setDeleteModal(null);
            return;
          }
          // Cache content for undo
          const cachedContent = fileRes.content;
          const res = await api.deleteContent(filePath, fileRes.sha, `Delete ${type}: ${item.name}`);
          if (res.success) {
            logActivity('deleted', type, item.name);
            loadData();
            // Undo action: re-save the file
            const undoFn = async () => {
              try {
                const r = await api.saveContent(filePath, typeof cachedContent === 'string' ? cachedContent : JSON.stringify(cachedContent, null, 2), `Undo delete: ${item.name}`);
                if (r.success) { addToast(`${item.name} restored!`, 'success'); logActivity('created', type, item.name); loadData(); }
                else addToast(`Restore failed: ${r.error}`, 'error');
              } catch (e) { addToast(`Restore error: ${e.message}`, 'error'); }
            };
            addToast(`${item.name} deleted`, 'success', { label: 'Undo', fn: undoFn });
          } else {
            addToast(`Delete failed: ${res.error}`, 'error');
          }

          addToast(`Delete error: ${err.message}`, 'error');

      `;
    }

    // ─── Mount ──────────────────────────────
    render(html`<${App} />`, document.getElementById('app'));
  </script>
</body>
</html>
