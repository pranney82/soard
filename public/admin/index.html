    // ─── Slug Helper ────────────────────────
    function slugify(text) {
      return text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    }

    // ─── Rich Text Editor ─────────────────────
    function RichTextEditor({ value, onChange, placeholder, minHeight = 200 }) {
      const editorRef = useRef();
      const isUpdating = useRef(false);
      const [showLinkInput, setShowLinkInput] = useState(false);
      const [linkUrl, setLinkUrl] = useState('');
      const linkInputRef = useRef();

      // Init content on mount
      useEffect(() => {
        if (editorRef.current && value && !editorRef.current.innerHTML) {
          editorRef.current.innerHTML = DOMPurify.sanitize(value);
        }
      }, []);

      // Sync external value changes (e.g. loading from API)
      useEffect(() => {
        if (isUpdating.current) return;
        if (editorRef.current && value !== undefined) {
          const current = editorRef.current.innerHTML;
          if (current === '' && value) editorRef.current.innerHTML = DOMPurify.sanitize(value);
        }
      }, [value]);

      const exec = (cmd, val = null) => {
        document.execCommand(cmd, false, val);
        editorRef.current?.focus();
        handleInput();
      };

      const handleInput = () => {
        isUpdating.current = true;
        onChange(editorRef.current?.innerHTML || '');
        requestAnimationFrame(() => { isUpdating.current = false; });
      };

      const handlePaste = (e) => {
        e.preventDefault();
        const raw = e.clipboardData.getData('text/html') || e.clipboardData.getData('text/plain');
        const clean = DOMPurify.sanitize(raw, {
          ALLOWED_TAGS: ['b', 'i', 'u', 'em', 'strong', 'a', 'p', 'br', 'ul', 'ol', 'li', 'h3', 'blockquote'],
          ALLOWED_ATTR: ['href', 'target', 'rel'],
        });
        document.execCommand('insertHTML', false, clean);
        handleInput();
      };

      const insertLink = () => {
        setShowLinkInput(true);
        setLinkUrl('');
        setTimeout(() => linkInputRef.current?.focus(), 50);
      };
      const applyLink = () => {
        if (linkUrl) { editorRef.current?.focus(); exec('createLink', linkUrl); }
        setShowLinkInput(false);
      };

      return html`
        <div class="rte-wrap">
          <div class="rte-toolbar">
            <button type="button" class="rte-btn" onClick=${() => exec('bold')} title="Bold"><b>B</b></button>
            <button type="button" class="rte-btn" onClick=${() => exec('italic')} title="Italic"><i>I</i></button>
            <button type="button" class="rte-btn" onClick=${() => exec('underline')} title="Underline"><u>U</u></button>
            <div class="rte-sep" />
            <button type="button" class="rte-btn" onClick=${() => exec('formatBlock', '<h3>')} title="Heading">H</button>
            <button type="button" class="rte-btn" onClick=${() => exec('formatBlock', '<blockquote>')} title="Quote">"</button>
            <div class="rte-sep" />
            <button type="button" class="rte-btn" onClick=${() => exec('insertUnorderedList')} title="Bullet list">•</button>
            <button type="button" class="rte-btn" onClick=${() => exec('insertOrderedList')} title="Numbered list">1.</button>
            <div class="rte-sep" />
            <button type="button" class="rte-btn" onClick=${insertLink} title="Insert link">🔗</button>
            <button type="button" class="rte-btn" onClick=${() => exec('removeFormat')} title="Clear formatting">✕</button>
            ${showLinkInput ? html`
              <div style="display: flex; align-items: center; gap: 0.35rem; margin-left: 0.25rem;">
                <input ref=${linkInputRef} type="url" value=${linkUrl} onInput=${e => setLinkUrl(e.target.value)}
                  onKeyDown=${e => { if (e.key === 'Enter') { e.preventDefault(); applyLink(); } if (e.key === 'Escape') setShowLinkInput(false); }}
                  placeholder="https://..."
                  style="width: 180px; padding: 2px 6px; font-size: 0.8rem; border: 1px solid #E5E4E0; border-radius: 4px; height: 26px;" />
                <button type="button" class="rte-btn" style="width: 26px; height: 26px; font-size: 0.75rem;" onClick=${applyLink} title="Apply">✓</button>
                <button type="button" class="rte-btn" style="width: 26px; height: 26px; font-size: 0.75rem;" onClick=${() => setShowLinkInput(false)} title="Cancel">✕</button>
              </div>
            ` : null}
          </div>
          <div class="rte-body" ref=${editorRef}
            contenteditable="true"
            style="min-height: ${minHeight}px;"
            data-placeholder=${placeholder || ''}
            onInput=${handleInput}
            onPaste=${handlePaste}
          />
        </div>
      `;
    }

    // ─── Sortable Table Hook ──────────────────
    function useSortable(items, defaultKey = null, defaultDir = 'asc') {
      const [sortKey, setSortKey] = useState(defaultKey);
      const [sortDir, setSortDir] = useState(defaultDir);

      const toggleSort = (key) => {
        if (sortKey === key) {
          setSortDir(d => d === 'asc' ? 'desc' : 'asc');
        } else {
          setSortKey(key);
          setSortDir('asc');
        }
      };

      const sorted = useMemo(() => {
        if (!sortKey) return items;
        return [...items].sort((a, b) => {
          let va = a[sortKey], vb = b[sortKey];
          if (va == null) va = '';
          if (vb == null) vb = '';
          if (typeof va === 'number' && typeof vb === 'number') {
            return sortDir === 'asc' ? va - vb : vb - va;
          }
          va = String(va).toLowerCase();
          vb = String(vb).toLowerCase();
          if (va < vb) return sortDir === 'asc' ? -1 : 1;
          if (va > vb) return sortDir === 'asc' ? 1 : -1;
          return 0;
        });
      }, [items, sortKey, sortDir]);

      const SortHeader = ({ field, children }) => html`
        <th class="sortable ${sortKey === field ? 'sorted' : ''}" onClick=${() => toggleSort(field)}>
          ${children}
          <span class="sort-icon">${sortKey === field ? (sortDir === 'asc' ? '▲' : '▼') : '↕'}</span>
        </th>
      `;

      return { sorted, sortKey, sortDir, toggleSort, SortHeader };
    }

    // ─── Editor Hook ────────────────────────
    // Shared state + logic for all CRUD editors.
    //   Slug-based:  useEditor({ slug, type: 'kids', nameField: 'name', defaults: {...}, addToast, onBack })
    //   Site-config: useEditor({ path: 'src/content/site/media.json', label: 'Media Kit', addToast })
    function useEditor({ slug, type, path: fixedPath, nameField = 'name', slugField = 'name', defaults = {}, addToast, onBack, label, commitPrefix, onLoad, existingSlugs = [] }) {
      const isSlugBased = !fixedPath;
      const [data, setData] = useState({ ...defaults });
      const [sha, setSha] = useState(null);
      const [loading, setLoading] = useState(isSlugBased ? !!slug : true);
      const [saving, setSaving] = useState(false);
      const [dirty, setDirty] = useState(false);
      const [deleting, setDeleting] = useState(false);
      const [showDeleteModal, setShowDeleteModal] = useState(false);

      const filePath = isSlugBased
        ? `src/content/${type}/${slug || data.slug}.json`
        : fixedPath;

      const displayName = () => data[nameField] || label || type;
      const prefix = commitPrefix || (isSlugBased ? type.replace(/s$/, '') : label || type);

      // Slug collision detection (prevents silent overwrites on create)
      const slugExists = isSlugBased && !slug && data.slug && existingSlugs.includes(data.slug);

      const dedupeSlug = (base) => {
        if (!existingSlugs.includes(base)) return base;
        const withYear = `${base}-${new Date().getFullYear()}`;
        if (!existingSlugs.includes(withYear)) return withYear;
        let n = 2;
        while (existingSlugs.includes(`${withYear}-${n}`)) n++;
        return `${withYear}-${n}`;
      };

      // Warn on unsaved changes
      useEffect(() => {
        if (!isSlugBased) return;
        const handler = (e) => { if (dirty) { e.preventDefault(); e.returnValue = ''; } };
        window.addEventListener('beforeunload', handler);
        return () => window.removeEventListener('beforeunload', handler);
      }, [dirty]);

      // Load data
      const mountedRef = useRef(true);
      useEffect(() => () => { mountedRef.current = false; }, []);
      useEffect(() => {
        if (isSlugBased && !slug) return;
        (async () => {
          const res = await api.readContent(isSlugBased ? `src/content/${type}/${slug}.json` : fixedPath);
          if (!mountedRef.current) return; // prevent stale updates on rapid navigation
          if (res.success) {
            const parsed = typeof res.content === 'string' ? JSON.parse(res.content) : res.content;
            setData(onLoad ? onLoad(parsed) : parsed);
            setSha(res.sha);
            setDirty(false);
          }
          setLoading(false);
        })();
      }, isSlugBased ? [slug] : []);

      // Flat field update (most editors)
      const updateField = (field, value) => {
        setDirty(true);
        setData(d => {
          const updated = { ...d, [field]: value };
          if (field === slugField && !slug) updated.slug = dedupeSlug(slugify(value));
          return updated;
        });
      };

      // Dot-path field update (site-config editors with nested objects)
      const updateNestedField = (path, value) => {
        setDirty(true);
        setData(d => {
          const copy = JSON.parse(JSON.stringify(d));
          const keys = path.split('.');
          let obj = copy;
          for (let i = 0; i < keys.length - 1; i++) {
            if (!obj[keys[i]] || typeof obj[keys[i]] !== 'object') obj[keys[i]] = {};
            obj = obj[keys[i]];
          }
          obj[keys[keys.length - 1]] = value;
          return copy;
        });
      };

      const handleSave = async (preprocess) => {
        if (isSlugBased && !data[nameField]) { addToast(`${nameField.charAt(0).toUpperCase() + nameField.slice(1)} is required`, 'error'); return false; }
        if (slugExists) { addToast(`A ${prefix} with slug "${data.slug}" already exists. Change the name or edit the slug.`, 'error'); return false; }
        setSaving(true);
        try {
          const saveData = typeof preprocess === 'function' ? preprocess({ ...data }) : data;
          console.log('[handleSave]', type, slug, 'photo:', saveData.photo, 'keys:', Object.keys(saveData));
          const savePath = isSlugBased ? `src/content/${type}/${saveData.slug || slug}.json` : fixedPath;
          const content = JSON.stringify(saveData, null, 2);
          const message = isSlugBased
            ? `${slug ? 'Update' : 'Add'} ${prefix}: ${displayName()}`
            : `Update ${label || prefix}`;
          const res = await api.saveContent(savePath, content, message, sha || undefined);
          if (res.success) {
            setSha(res.sha);
            setDirty(false);
            addToast(`${displayName()} saved!`, 'success');
            logActivity(slug ? 'updated' : 'created', prefix, displayName());
            setSaving(false);
            return true;
          } else {
            addToast(`Save failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Save error: ${err.message}`, 'error');
        }
        setSaving(false);
        return false;
      };

      const handleDelete = async () => {
        if (!slug || !sha) return;
        setDeleting(true);
        try {
          const res = await api.deleteContent(filePath, sha, `Delete ${prefix}: ${displayName()}`);
          if (res.success) {
            addToast(`${displayName()} deleted`, 'success');
            logActivity('deleted', prefix, displayName());
            setDirty(false);
            onBack?.();
          } else {
            addToast(`Delete failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Delete error: ${err.message}`, 'error');
        }
        setDeleting(false);
        setShowDeleteModal(false);
      };

      const safeBack = () => {
        if (dirty && !confirm('You have unsaved changes. Leave without saving?')) return;
        onBack?.();
      };

      return {
        data, setData, sha, loading, saving, dirty, setDirty, deleting,
        showDeleteModal, setShowDeleteModal, slugExists,
        updateField, updateNestedField, handleSave, handleDelete, safeBack,
      };
    }

    // ─── Toast System ───────────────────────
    let toastId = 0;
    function ToastContainer({ toasts }) {
      return html`<div class="toast-container" role="status" aria-live="polite" aria-atomic="true">
        ${toasts.map(t => html`<div key=${t.id} class="toast toast-${t.type}" role="alert">
          ${t.action ? html`<span class="toast-action">
            <span>${t.msg}</span>
            <button class="toast-undo" onClick=${t.action.fn}>${t.action.label}</button>
          </span>` : t.msg}
        </div>`)}
      </div>`;
    }

    // ─── Confirm Modal ──────────────────────
    function ConfirmModal({ title, message, onConfirm, onCancel, danger, loading }) {
      // Trap focus, handle Escape, lock body scroll
      const modalRef = useRef();
      useEffect(() => {
        document.body.classList.add('modal-open');
        const handler = (e) => { if (e.key === 'Escape') onCancel(); };
        window.addEventListener('keydown', handler);
        modalRef.current?.querySelector('button')?.focus();
        return () => { window.removeEventListener('keydown', handler); document.body.classList.remove('modal-open'); };
      }, []);

      return html`<div class="modal-overlay" onClick=${onCancel} role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal" ref=${modalRef} onClick=${e => e.stopPropagation()}>
          <h3 id="modal-title">${title}</h3>
          <p>${message}</p>
          <div class="modal-buttons">
            <button class="btn btn-ghost" onClick=${onCancel} disabled=${loading}>Cancel</button>
            <button class="btn ${danger ? 'btn-danger' : 'btn-primary'}" onClick=${onConfirm} disabled=${loading}>
              ${loading ? html`<span class="spinner" /> Deleting...` : danger ? 'Delete' : 'Confirm'}
            </button>
          </div>
        </div>
      </div>`;
    }

    // ─── useImageUpload hook ────────────────
    // Reusable upload-with-placeholder logic used by every editor's photo/logo upload.
    // Returns { uploading, upload } where upload() handles the full lifecycle:
    //   blob preview → CF upload → swap URL or remove on failure → revoke blob.
    function useImageUpload({ setData, setDirty, addToast, buildCfId, arrayKey = 'photos', makeEntry, replaceEntry, countKey, onSuccess }) {
      const [uploading, setUploading] = useState({});

      const upload = async (files) => {
        setDirty(true);
        for (const file of files) {
          const tempId = Date.now() + '-' + file.name;
          const localUrl = URL.createObjectURL(file);
          const entry = makeEntry(localUrl, file, tempId);

          setData(d => ({
            ...d,
            [arrayKey]: [...(d[arrayKey] || []), entry],
            ...(countKey ? { [countKey]: (d[countKey] || 0) + 1 } : {}),
          }));
          setUploading(u => ({ ...u, [tempId]: true }));

          try {
            const cfId = buildCfId(file);
            const res = await api.uploadImage(file, cfId);
            if (res.success) {
              setData(d => {
                const updated = {
                  ...d,
                  [arrayKey]: (d[arrayKey] || []).map(item =>
                    item._tempId === tempId ? replaceEntry(item, res) : item
                  ),
                };
                return onSuccess ? onSuccess(updated, res) : updated;
              });
              addToast(`Uploaded ${file.name}`, 'success');
            } else {
              addToast(`Failed: ${res.error}`, 'error');
              setData(d => ({
                ...d,
                [arrayKey]: (d[arrayKey] || []).filter(item => item._tempId !== tempId),
                ...(countKey ? { [countKey]: (d[countKey] || 0) - 1 } : {}),
              }));
            }
          } catch (err) {
            addToast(`Upload error: ${err.message}`, 'error');
            setData(d => ({
              ...d,
              [arrayKey]: (d[arrayKey] || []).filter(item => item._tempId !== tempId),
              ...(countKey ? { [countKey]: (d[countKey] || 0) - 1 } : {}),
            }));
          }
          URL.revokeObjectURL(localUrl);
          setUploading(u => { const n = { ...u }; delete n[tempId]; return n; });
        }
      };

      return { uploading, upload };
    }

    // ─── useDragReorder hook ─────────────────
    // Reusable drag-to-reorder for any array field in data.
    function useDragReorder({ setData, setDirty, arrayKey = 'photos' }) {
      const dragIdx = useRef(null);

      const reorder = (fromIdx, toIdx) => {
        if (fromIdx === toIdx) return;
        setDirty(true);
        setData(d => {
          const items = [...(d[arrayKey] || [])];
          const [moved] = items.splice(fromIdx, 1);
          items.splice(toIdx, 0, moved);
          return { ...d, [arrayKey]: items };
        });
      };

      const dragHandlers = (i) => ({
        draggable: true,
        onDragStart: (e) => { dragIdx.current = i; e.currentTarget.classList.add('dragging'); },
        onDragEnd: (e) => { dragIdx.current = null; e.currentTarget.classList.remove('dragging'); },
        onDragOver: (e) => { e.preventDefault(); e.currentTarget.classList.add('drag-over'); },
        onDragLeave: (e) => { e.currentTarget.classList.remove('drag-over'); },
        onDrop: (e) => { e.preventDefault(); e.currentTarget.classList.remove('drag-over'); if (dragIdx.current !== null) reorder(dragIdx.current, i); },
      });

      return { dragHandlers, reorder };
    }

    // ─── Extract Cloudflare image ID from a delivery URL ────────
    function extractCfImageId(src) {
      if (!src) return null;
      // Already a bare ID
      if (!src.startsWith('http')) return src;
      if (!src.includes('imagedelivery.net')) return null;
      let id = src.replace(CF_LEGACY + '/', '');
      const lastSlash = id.lastIndexOf('/');
      if (lastSlash > 0) {
        const suffix = id.slice(lastSlash + 1);
        if (NAMED_VARIANTS.has(suffix) || suffix.includes('=')) id = id.slice(0, lastSlash);
      }
      return id || null;
    }

    // ─── useSingleUpload hook ────────────────
    // For editors that upload a single image (partner logo, team photo, etc.)
    // Returns { uploading, preview, upload, clear } — preview holds blob URL during upload, then real URL.
    function useSingleUpload({ setData, setDirty, addToast, buildCfId, field }) {
      const [uploading, setUploading] = useState(false);
      const [preview, setPreview] = useState(null);

      const upload = async (files) => {
        const file = files[0];
        if (!file) return;
        setDirty(true);
        const blobUrl = URL.createObjectURL(file);
        setPreview(blobUrl);
        setUploading(true);
        try {
          const cfId = buildCfId(file);
          const res = await api.uploadImage(file, cfId);
          console.log('[useSingleUpload] field:', field, 'res:', JSON.stringify(res));
          if (res.success) {
            setData(d => {
              const next = { ...d, [field]: res.imageId };
              console.log('[useSingleUpload] setData — old:', d[field], '→ new:', res.imageId);
              return next;
            });
            setPreview(cfThumb(res.imageId));
            addToast('Uploaded', 'success');
          } else {
            addToast(`Upload failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Upload error: ${err.message}`, 'error');
        }
        URL.revokeObjectURL(blobUrl);
        setUploading(false);
      };

      const clear = async () => {
        setDirty(true);
        const currentUrl = preview;
        setPreview(null);
        setData(d => ({ ...d, [field]: '' }));
        // Try to delete from Cloudflare Images
        const imageId = extractCfImageId(currentUrl);
        if (imageId) {
          try { await api.deleteImage(imageId); } catch {}
        }
        addToast('Image removed', 'success');
      };

      // Sync preview with loaded data
      const syncPreview = (url) => { if (url && !preview) setPreview(url); };

      return { uploading, preview, upload, clear, setPreview, syncPreview };
    }

    // ─── Drop Zone ──────────────────────────
    function DropZone({ onFiles, multiple = true, accept = 'image/*', label }) {
      const [dragOver, setDragOver] = useState(false);
      const inputRef = useRef();

      const handleDrop = (e) => {
        e.preventDefault();
        setDragOver(false);
        const files = Array.from(e.dataTransfer.files);
        if (files.length) onFiles(multiple ? files : [files[0]]);
      };

      const handleChange = (e) => {
        const files = Array.from(e.target.files);
        if (files.length) onFiles(multiple ? files : [files[0]]);
        e.target.value = '';
      };

      return html`
        <div class="dropzone ${dragOver ? 'drag-over' : ''}"
          onDragOver=${e => { e.preventDefault(); setDragOver(true); }}
          onDragLeave=${() => setDragOver(false)}
          onDrop=${handleDrop}
          onClick=${() => inputRef.current?.click()}
        >
          <div class="dropzone-icon">${accept.includes('pdf') ? icons.fileText : icons.camera}</div>
          <div class="dropzone-text">
            <strong>Click to browse</strong> or drag files here
            <br/>${label || (multiple ? 'Upload multiple files' : 'Upload a file')}
          </div>
          <input ref=${inputRef} type="file" accept=${accept}
            multiple=${multiple} style="display:none" onChange=${handleChange} />
        </div>
      `;
    }

                    <div style="display: flex; align-items: baseline; gap: 0.5rem; font-size: 0.75rem; padding: 0.35rem 0.5rem; background: #FAFAF6; border-radius: 6px; cursor: pointer;"
                      onClick=${() => onNavigate('kids-hub', x.kid.slug)}>
                      <${CompletenessRing} pct=${x.pct} missing=${x.missing} size=${22} />
                      <strong style="min-width: 100px; color: var(--color-text);">${x.kid.name}</strong>
                      <span style="color: var(--color-text-muted);">Missing: ${x.missing.join(', ')}</span>
                    </div>
                  `)}
                </div>
              </details>
            `;
          })()}
        </div>

        ${yearData ? html`
          <div class="chart-container" style="margin-bottom: 1.75rem;">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.25rem;">
              <div class="chart-title">Growth Over Time</div>
              <div style="display: flex; gap: 0.5rem;">
                ${(() => {
                  const total = yearData.cumulative[yearData.cumulative.length - 1] || 0;
                  const prevYear = yearData.perYear[yearData.perYear.length - 2] || 0;
                  const curYear = yearData.perYear[yearData.perYear.length - 1] || 0;
                  const delta = prevYear ? Math.round(((curYear - prevYear) / prevYear) * 100) : 0;
                  return html`
                    <div class="chart-stat-highlight">
                      <span class="big">${total}</span>
                      <span style="font-size: 0.8rem; color: var(--color-text-secondary);">total kids</span>
                      ${delta !== 0 ? html`<span class="delta ${delta >= 0 ? 'up' : 'down'}">${delta > 0 ? '+' : ''}${delta}% YoY</span>` : null}
                    </div>
                  `;
                })()}
              </div>
            </div>

            <div style="display: flex; gap: 2.5rem; flex-wrap: wrap; margin-top: 1rem;">
              <!-- Bar Chart: Kids per Year -->
              <div class="chart-panel">
                <div class="chart-subtitle">Kids per year</div>
                <div class="chart-bar-group">
                  ${(() => {
                    const max = Math.max(...yearData.perYear);
                    const gridLines = [0.25, 0.5, 0.75, 1].map(f => Math.round(max * f));
                    return gridLines.map(v => {
                      const bottom = 28 + ((v / max) * 120);
                      return html`<div class="chart-gridline" style="bottom: ${bottom}px;"></div>`;
                    });
                  })()}
                  ${yearData.years.map((y, i) => {
                    const max = Math.max(...yearData.perYear);
                    const h = Math.max(6, (yearData.perYear[i] / max) * 120);
                    const delay = i * 0.04;
                    return html`<div key=${y} class="chart-bar-col">
                      <div class="chart-bar-value" style="animation-delay: ${delay + 0.4}s;">${yearData.perYear[i]}</div>
                      <div class="chart-bar" style="height: ${h}px; background: linear-gradient(to top, #F0C000, #FFD500, #FFE14D); animation-delay: ${delay}s; box-shadow: 0 1px 4px rgba(255,213,0,0.25);" title="${y}: ${yearData.perYear[i]} kids"></div>
                      <div class="chart-bar-label">'${y.toString().slice(-2)}</div>
                    </div>`;
                  })}
                </div>
              </div>

              <!-- Line Chart: Cumulative Growth -->
              <div class="chart-panel">
                <div class="chart-subtitle">Cumulative growth</div>
                ${(() => {
                  const d = yearData.cumulative;
                  const w = 320, h = 140, padTop = 20, padBot = 24, padLeft = 36;
                  const chartW = w - padLeft;
                  const chartH = h - padTop - padBot;
                  const max = Math.max(...d);
                  const min = 0;
                  const range = max - min || 1;
                  const step = chartW / (d.length - 1);
                  const pts = d.map((v, i) => ({
                    x: padLeft + i * step,
                    y: padTop + chartH - ((v - min) / range) * chartH
                  }));

                  // Smooth bezier path
                  const pathD = pts.reduce((acc, p, i) => {
                    if (i === 0) return 'M ' + p.x + ',' + p.y;
                    const prev = pts[i - 1];
                    const cpx = (prev.x + p.x) / 2;
                    return acc + ' C ' + cpx + ',' + prev.y + ' ' + cpx + ',' + p.y + ' ' + p.x + ',' + p.y;
                  }, '');
                  const areaD = pathD + ' L ' + pts[pts.length - 1].x + ',' + (padTop + chartH) + ' L ' + pts[0].x + ',' + (padTop + chartH) + ' Z';

                  // Y-axis gridlines
                  const gridCount = 4;
                  const gridLines = Array.from({ length: gridCount + 1 }, (_, i) => {
                    const val = Math.round((max / gridCount) * i);
                    const y = padTop + chartH - ((val - min) / range) * chartH;
                    return { val, y };
                  });

                  return html`<svg width="100%" height=${h} viewBox="0 0 ${w} ${h}" class="chart-line-svg" preserveAspectRatio="xMidYMid meet">
                    <defs>
                      <linearGradient id="cumGrad" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#FFD500" stop-opacity="0.25" />
                        <stop offset="80%" stop-color="#FFD500" stop-opacity="0.03" />
                        <stop offset="100%" stop-color="#FFD500" stop-opacity="0" />
                      </linearGradient>
                      <filter id="glowDot">
                        <feGaussianBlur stdDeviation="2" result="blur" />
                        <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
                      </filter>
                    </defs>

                    <!-- Grid lines -->
                    ${gridLines.map(g => html`
                      <line x1=${padLeft} y1=${g.y} x2=${w} y2=${g.y} stroke="#E5E4E0" stroke-width="1" stroke-dasharray="4 3" />
                      <text x=${padLeft - 6} y=${g.y + 3.5} text-anchor="end" font-size="9" fill="#737580" font-weight="500">${g.val}</text>
                    `)}

                    <!-- Area fill -->
                    <path d=${areaD} fill="url(#cumGrad)" class="chart-line-area" />

                    <!-- Line -->
                    <path d=${pathD} fill="none" stroke="#FFD500" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="chart-line-path" />

                    <!-- Data points & labels -->
                    ${pts.map((p, i) => html`
                      <circle cx=${p.x} cy=${p.y} r="4" fill="#FFD500" filter="url(#glowDot)" class="chart-line-dot" style="animation-delay: ${0.6 + i * 0.06}s;">
                        <title>${yearData.years[i]}: ${d[i]} kids</title>
                      </circle>
                      <text x=${p.x} y=${p.y - 10} text-anchor="middle" font-size="10" font-weight="700" fill="var(--color-text)" style="opacity: 0; animation: chartFadeUp 0.3s ease ${0.8 + i * 0.06}s both;">${d[i]}</text>
                      <text x=${p.x} y=${padTop + chartH + 14} text-anchor="middle" font-size="9" fill="#737580" font-weight="500">'${yearData.years[i].toString().slice(-2)}</text>
                    `)}
                  </svg>`;
                })()}
              </div>
            </div>

            <!-- Legend -->
            <div class="chart-legend">
              <div class="chart-legend-item">
                <div class="chart-legend-dot" style="background: #FFD500;"></div>
                Kids sponsored
              </div>
              <div class="chart-legend-item">
                <div class="chart-legend-dot" style="background: #38A169;"></div>
                Rooms completed
              </div>
              <div class="chart-legend-item" style="margin-left: auto; font-size: 0.7rem; color: var(--color-text-muted);">
                Since ${yearData.years[0]}
              </div>
            </div>
          </div>
        ` : null}

        <!-- Bottom Two-Column: Recent Kids + Activity -->
        <div class="dash-bottom-grid">
          <div class="card dashboard-recent">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;">
              <h3>Recent Kids</h3>
              <button class="btn btn-ghost btn-sm" onClick=${() => onNavigate('kids-hub')}>View All →</button>
            </div>
            <div class="table-wrap"><table>
              <thead><tr><th></th><th>Name</th><th>Year</th><th>Status</th><th>Photos</th></tr></thead>
              <tbody>
                ${kids.slice(0, 8).map(k => html`<tr key=${k.slug} style="cursor: pointer;" onClick=${() => onNavigate('kids-hub', k.slug)}>
                  <td>${k.heroImage ? html`<img class="td-thumb" src="${k.heroImage}" alt="" />` : '—'}</td>
                  <td><strong>${k.name}</strong></td>
                  <td>${k.year || '—'}</td>
                  <td><span class="badge ${k.status === 'completed' ? 'badge-green' : 'badge-yellow'}">${k.status}</span></td>
                  <td>${k.photoCount || 0}</td>
                </tr>`)}
              </tbody>
            </table></div>
          </div>
          <div>
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem;">
              <h3>Recent Activity</h3>
            </div>
            <${ActivityLog} onViewAll=${() => onNavigate?.('audit-log')} />
          </div>
        </div>
      `;
    }

    // KIDS LIST
    // ═══════════════════════════════════════════
    function KidsList({ kids, onEdit, onAdd, onDelete, addToast, onReload, dashboardFilter, onClearFilter }) {
      const [search, setSearch] = useState('');
      const [statusFilter, setStatusFilter] = useState('all');
      const [selected, setSelected] = useState(new Set());
      const [favs, setFavs] = useState(getFavorites());
      const [inlineEdit, setInlineEdit] = useState(null); // { slug, field, value }
      const filtered = useMemo(() => {
        let result = kids;
        // Apply dashboard filter first
        if (dashboardFilter === 'missing-photos') {
          result = result.filter(k => !k.heroImage);
        } else if (dashboardFilter === 'incomplete') {
          result = result.filter(k => {
            const s = getCompleteness(k);
            return s < 70;
          });
        } else if (dashboardFilter === 'in-progress') {
          result = result.filter(k => k.status === 'in-progress');
        } else if (dashboardFilter === 'completed') {
          result = result.filter(k => k.status === 'completed');
        }
        // Apply status filter
        if (statusFilter !== 'all') {
          result = result.filter(k => k.status === statusFilter);
        }
        // Then apply search
        if (search) {
          const q = search.toLowerCase();
          result = result.filter(k =>
            k.name.toLowerCase().includes(q) ||
            (k.diagnosis || '').toLowerCase().includes(q) ||
            (k.year + '').includes(q)
          );
        }
        return result;
      }, [kids, search, dashboardFilter, statusFilter]);

      const { sorted, SortHeader } = useSortable(filtered, 'year', 'desc');

      const toggleSelect = (slug) => {
        setSelected(s => { const n = new Set(s); n.has(slug) ? n.delete(slug) : n.add(slug); return n; });
      };
      const toggleAll = () => {
        if (selected.size === sorted.length) setSelected(new Set());
        else setSelected(new Set(sorted.map(k => k.slug)));
      };
      const [showBulkDeleteModal, setShowBulkDeleteModal] = useState(false);
      const [bulkDeleting, setBulkDeleting] = useState(false);
      const bulkDelete = () => setShowBulkDeleteModal(true);
      const confirmBulkDelete = async () => {
        setBulkDeleting(true);
        const toDelete = sorted.filter(k => selected.has(k.slug));
        let deleted = 0;
        for (const k of toDelete) {
          try {
            const filePath = `src/content/kids/${k.slug}.json`;
            const fileRes = await api.readContent(filePath);
            if (!fileRes.success) continue;
            const res = await api.deleteContent(filePath, fileRes.sha, `Delete kid: ${k.name}`);
            if (res.success) deleted++;
          } catch {}
        }
        setBulkDeleting(false);
        setSelected(new Set());
        setShowBulkDeleteModal(false);
        if (deleted > 0) {
          addToast?.(`Deleted ${deleted} kid${deleted > 1 ? 's' : ''}`, 'success');
          onReload?.();
        }
      };

      const handleToggleFav = (slug) => {
        const updated = toggleFavorite('kid', slug);
        setFavs([...updated]);
      };

      // Inline edit save
      const saveInlineEdit = async () => {
        if (!inlineEdit) return;
        const { slug, field, value } = inlineEdit;
        try {
          const fileRes = await api.readContent(`src/content/kids/${slug}.json`);
          if (!fileRes.success) { addToast?.('Could not load file', 'error'); setInlineEdit(null); return; }
          const content = typeof fileRes.content === 'string' ? JSON.parse(fileRes.content) : fileRes.content;
          content[field] = field === 'year' ? Number(value) || null : field === 'age' ? (String(value).includes(',') ? String(value).split(',').map(s => Number(s.trim())).filter(n => !isNaN(n) && n > 0) : Number(value) || null) : value;
          const res = await api.saveContent(`src/content/kids/${slug}.json`, JSON.stringify(content, null, 2), `Quick edit ${field}: ${content.name}`, fileRes.sha);
          if (res.success) { addToast?.(`Updated ${field}`, 'success'); logActivity('updated', 'kid', content.name); onReload?.(); }
          else addToast?.(`Save failed: ${res.error}`, 'error');
        } catch (e) { addToast?.(`Error: ${e.message}`, 'error'); }
        setInlineEdit(null);
      };

      const startInlineEdit = (e, slug, field, value) => {
        e.stopPropagation();
        setInlineEdit({ slug, field, value: value || '' });
      };

      return html`
        ${showBulkDeleteModal ? html`<${ConfirmModal}
          title="Delete ${selected.size} kid${selected.size > 1 ? 's' : ''}?"
          message="This will permanently remove the selected profiles from the site. This cannot be undone."
          danger=${true}
          loading=${bulkDeleting}
          onConfirm=${confirmBulkDelete}
          onCancel=${() => { if (!bulkDeleting) setShowBulkDeleteModal(false); }}
        />` : null}
        <div class="page-header">
          <h2>Kids (${kids.length})</h2>
          <button class="btn btn-primary" onClick=${onAdd}>+ Add Kid</button>
        </div>
        <div class="card" style="margin-bottom: 1rem; padding: 0.75rem 1rem;">
          <div style="display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;">
            <div class="search-bar" style="flex: 1; min-width: 200px;">
              <span class="search-icon">${icons.search}</span>
              <input placeholder="Search by name, diagnosis, or year..."
                value=${search} onInput=${e => setSearch(e.target.value)} />
            </div>
            <select value=${statusFilter} onChange=${e => setStatusFilter(e.target.value)}
              style="padding: 0.45rem 0.75rem; border: 1px solid var(--color-border); border-radius: var(--radius-sm); background: var(--color-bg-card); font-size: 0.85rem; color: var(--color-text); cursor: pointer; ${statusFilter !== 'all' ? 'border-color: var(--color-primary); background: var(--color-primary-bg);' : ''}">
              <option value="all">All Statuses</option>
              <option value="completed">Completed</option>
              <option value="in-progress">In Progress</option>
            </select>
            ${dashboardFilter ? html`
              <button onClick=${onClearFilter} style="display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.35rem 0.75rem; background: var(--color-primary-bg); border: 1px solid var(--color-primary); border-radius: 20px; font-size: 0.8rem; font-weight: 600; color: var(--color-text); cursor: pointer; white-space: nowrap;">
                ${{
                  'missing-photos': 'Missing Photos',
                  'incomplete': 'Incomplete Profiles',
                  'in-progress': 'In Progress',
                  'completed': 'Completed',
                }[dashboardFilter]} (${filtered.length})
                <span style="font-size: 1rem; line-height: 1;">×</span>
              </button>
            ` : null}
          </div>
        </div>
        ${selected.size > 0 ? html`
          <div class="bulk-bar">
            <span style="font-weight: 600;">${selected.size} selected</span>
            <button class="btn btn-danger btn-sm" onClick=${bulkDelete}>Delete Selected</button>
            <button class="btn btn-ghost btn-sm" style="color: #fff; border-color: rgba(255,255,255,0.2);" onClick=${() => setSelected(new Set())}>Clear</button>
          </div>
        ` : null}
        <div class="card">
          <div class="table-wrap"><table>
            <thead><tr>
              <th style="width: 36px;"><input type="checkbox" checked=${selected.size === sorted.length && sorted.length > 0}
                onChange=${toggleAll} style="width: 16px; height: 16px; accent-color: #FFD500;" /></th>
              <th style="width: 28px;"></th>
              <th></th>
              <${SortHeader} field="name">Name<//>
              <th style="width: 32px;" title="Completeness"></th>
              <${SortHeader} field="age">Age(s)<//>
              <th>Diagnosis</th>
              <${SortHeader} field="year">Year<//>
              <${SortHeader} field="status">Status<//>
              <${SortHeader} field="photoCount">Photos<//>
              <th></th>
            </tr></thead>
            <tbody>
              ${sorted.length === 0 ? html`<tr><td colspan="11"><${EmptyState}
                icon="👦" title=${search ? 'No kids match your search' : 'No kids yet'}
                description=${search ? 'Try a different search term.' : 'Add your first kid to get started.'}
                actionLabel=${search ? null : 'Add Kid'} onAction=${onAdd} /></td></tr>` : null}
              ${sorted.map(k => {
                const { pct, missing } = getCompleteness(k, true);
                return html`<tr key=${k.slug} onClick=${() => onEdit(k.slug)} style="cursor: pointer; ${selected.has(k.slug) ? 'background: rgba(255,213,0,0.06);' : ''}">
                  <td onClick=${e => e.stopPropagation()}><input type="checkbox" checked=${selected.has(k.slug)}
                    onChange=${() => toggleSelect(k.slug)} style="width: 16px; height: 16px; accent-color: #FFD500;" /></td>
                  <td><button class="fav-btn ${favs.includes('kid:' + k.slug) ? 'is-fav' : ''}"
                    onClick=${(e) => { e.stopPropagation(); handleToggleFav(k.slug); }}
                    title=${favs.includes('kid:' + k.slug) ? 'Remove from favorites' : 'Add to favorites'}>
                    ${favs.includes('kid:' + k.slug) ? '★' : '☆'}
                  </button></td>
                  <td>${k.heroImage ? html`<img class="td-thumb" src="${k.heroImage}" alt="" />` : html`<div class="td-thumb" />`}</td>
                  <td>
                    ${inlineEdit?.slug === k.slug && inlineEdit?.field === 'name'
                      ? html`<input class="inline-edit-input" value=${inlineEdit.value}
                          onInput=${e => setInlineEdit({ ...inlineEdit, value: e.target.value })}
                          onBlur=${saveInlineEdit}
                          onKeyDown=${e => { if (e.key === 'Enter') saveInlineEdit(); if (e.key === 'Escape') setInlineEdit(null); }}
                          ref=${el => el && el.focus()} />`
                      : html`<strong onDblClick=${e => startInlineEdit(e, k.slug, 'name', k.name)} style="cursor: text;" title="Double-click to edit">${k.name}</strong>`}
                    ${k.featured ? html` <span class="badge" style="background: #FFDA24; color: #373A36; font-size: 0.65rem; padding: 1px 6px; margin-left: 4px;">★</span>` : ''}
                  </td>
                  <td><${CompletenessRing} pct=${pct} missing=${missing} /></td>
                  <td>${Array.isArray(k.age) ? k.age.join(', ') : (k.age || '—')}</td>
                  <td class="text-sm">${(k.diagnosis || '—').slice(0, 50)}${(k.diagnosis || '').length > 50 ? '…' : ''}</td>
                  <td>
                    ${inlineEdit?.slug === k.slug && inlineEdit?.field === 'year'
                      ? html`<input class="inline-edit-input" type="number" value=${inlineEdit.value}
                          onInput=${e => setInlineEdit({ ...inlineEdit, value: e.target.value })}
                          onBlur=${saveInlineEdit}
                          onKeyDown=${e => { if (e.key === 'Enter') saveInlineEdit(); if (e.key === 'Escape') setInlineEdit(null); }}
                          ref=${el => el && el.focus()} style="width: 70px;" />`
                      : html`<span onDblClick=${e => startInlineEdit(e, k.slug, 'year', k.year)} style="cursor: text;" title="Double-click to edit">${k.year || '—'}</span>`}
                  </td>
                  <td><span class="badge ${k.status === 'completed' ? 'badge-green' : 'badge-yellow'}">${k.status}</span>${k.publishStatus === 'draft' ? html` <span class="draft-badge-draft" style="font-size: 0.65rem;">Draft</span>` : ''}</td>
                  <td>${k.photoCount || 0}</td>
                  <td style="white-space: nowrap;">
                    <button class="btn btn-ghost btn-sm" style="color: #E53E3E;" onClick=${(e) => { e.stopPropagation(); onDelete(k); }}>Delete</button>
                  </td>
                </tr>`;
              })}
            </tbody>
          </table></div>
        </div>
      `;
    }

    // ═══════════════════════════════════════════
    // KID EDITOR
    // ═══════════════════════════════════════════
    function KidEditor({ slug, onBack, addToast, partners = [], existingSlugs = [] }) {
      const [loading, setLoading] = useState(!!slug);
      const [saving, setSaving] = useState(false);
      const [deleting, setDeleting] = useState(false);
      const [showDeleteModal, setShowDeleteModal] = useState(false);
      const [showScheduleModal, setShowScheduleModal] = useState(false);
      const [scheduleDate, setScheduleDate] = useState('');
      const [dirty, setDirty] = useState(false);
      const [touched, setTouched] = useState({});
      const [sha, setSha] = useState(null);
      const [data, setData] = useState({
        name: '', slug: '', age: '', diagnosis: '', roomTypes: [],
        year: new Date().getFullYear(), status: 'completed', bio: '',
        quote: '', heroImage: '', photos: [], photoCount: 0,
        videoUrl: '', streamVideoId: '', photographer: '', partnerLogos: [],
        shortDescription: '', metaDescription: '', fundraisingUrl: '',
        roomCount: 1, childCount: 1,
        bedroomCount: 0, bathroomCount: 0, therapyRoomCount: 0,
        featured: false, caseStudy: null,
      });
      const [videoUploading, setVideoUploading] = useState(false);
      const [videoProgress, setVideoProgress] = useState(0);
      const [generatingSeo, setGeneratingSeo] = useState(false);
      const [generatingAlt, setGeneratingAlt] = useState(false);
      const [showCsImagePicker, setShowCsImagePicker] = useState(false);
      const [csImagePickerTarget, setCsImagePickerTarget] = useState(null);
      const [showPreview, setShowPreview] = useState(false);
      const [previewDevice, setPreviewDevice] = useState('desktop');
      const [lastSaved, setLastSaved] = useState(null);

      // ─── Photo upload + reorder hooks ──────
      const { uploading, upload: uploadPhotos } = useImageUpload({
        setData, setDirty, addToast,
        buildCfId: (file) => `kids/${data.slug || 'new'}/${Date.now()}-${file.name.replace(/[^a-z0-9.]/gi, '-')}`,
        arrayKey: 'photos', countKey: 'photoCount',
        makeEntry: (localUrl, file, tempId) => ({ url: localUrl, alt: '', _tempId: tempId }),
        replaceEntry: (item, res) => ({ url: res.imageId, alt: '' }),
      });
      const { dragHandlers: photoDragHandlers } = useDragReorder({ setData, setDirty, arrayKey: 'photos' });

      // ─── Partner logo upload + reorder hooks ──────
      const { uploading: partnerLogoUploading, upload: uploadPartnerLogos } = useImageUpload({
        setData, setDirty, addToast,
        buildCfId: (file) => `kids/${data.slug || 'new'}/partner-${Date.now()}-${file.name.replace(/[^a-z0-9.]/gi, '-')}`,
        arrayKey: 'partnerLogos',
        makeEntry: (localUrl, file, tempId) => ({ url: localUrl, name: file.name.replace(/\.[^.]+$/, ''), _tempId: tempId }),
        replaceEntry: (item, res) => ({ url: res.imageId, name: item.name }),
      });
      const { dragHandlers: partnerDragHandlers } = useDragReorder({ setData, setDirty, arrayKey: 'partnerLogos' });

      // Generate SEO fields with AI
      const handleGenerateSeo = async () => {
        if (!data.name) { addToast('Add a name first', 'error'); return; }
        setGeneratingSeo(true);
        try {
          const res = await api.generate('seo', data);
          if (res.success) {
            setDirty(true);
            setData(d => ({
              ...d,
              shortDescription: res.shortDescription || d.shortDescription,
              metaDescription: res.metaDescription || d.metaDescription,
            }));
            addToast('SEO fields generated', 'success');
          } else {
            addToast(`Generation failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Error: ${err.message}`, 'error');
        }
        setGeneratingSeo(false);
      };

      // Generate alt text for all photos with AI
      const handleGenerateAlt = async () => {
        if (!data.photos?.length) { addToast('Upload photos first', 'error'); return; }
        setGeneratingAlt(true);
        try {
          const res = await api.generate('alt-text', data);
          if (res.success && res.altTexts) {
            setDirty(true);
            setData(d => ({
              ...d,
              photos: d.photos.map((p, i) => ({
                ...p,
                alt: res.altTexts[i] || p.alt || '',
              })),
            }));
            addToast(`Generated alt text for ${res.altTexts.filter(Boolean).length} photos`, 'success');
          } else {
            addToast(`Generation failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Error: ${err.message}`, 'error');
        }
        setGeneratingAlt(false);
      };

      // Update a single photo's alt text
      const updatePhotoAlt = (index, alt) => {
        setDirty(true);
        setData(d => ({
          ...d,
          photos: d.photos.map((p, i) => i === index ? { ...p, alt } : p),
        }));
      };

      // ─── Partner Linking ──────────────────
      const [partnerSearch, setPartnerSearch] = useState('');

      const isPartnerLinked = (partner) => {
        return (data.partnerLogos || []).some(pl => pl.url === partner.logo);
      };

      const togglePartner = (partner) => {
        setDirty(true);
        setData(d => {
          const existing = d.partnerLogos || [];
          const linked = existing.some(pl => pl.url === partner.logo);
          if (linked) {
            return { ...d, partnerLogos: existing.filter(pl => pl.url !== partner.logo) };
          } else {
            return { ...d, partnerLogos: [...existing, { url: partner.logo, name: partner.name }] };
          }
        });
      };

      const removePartnerLogo = (index) => {
        setDirty(true);
        setData(d => ({
          ...d,
          partnerLogos: d.partnerLogos.filter((_, i) => i !== index),
        }));
      };

      // Auto-generate SEO fields when enough context is filled in (new kids only)
      const seoAutoRan = useRef(false);
      useEffect(() => {
        if (slug) return; // editing existing kid — don't auto-run
        if (seoAutoRan.current || generatingSeo) return;
        if (!data.name || (!data.diagnosis && !data.bio)) return;
        if (data.shortDescription || data.metaDescription) return;
        seoAutoRan.current = true;
        handleGenerateSeo();
      }, [data.name, data.diagnosis, data.bio]);

      // Auto-generate alt text when all uploads finish
      const prevUploadCount = useRef(0);
      useEffect(() => {
        const count = Object.keys(uploading).length;
        if (prevUploadCount.current > 0 && count === 0) {
          const hasBlankAlt = data.photos.some(p => p.url && !p._tempId && !p.alt);
          if (hasBlankAlt && !generatingAlt) {
            handleGenerateAlt();
          }
        }
        prevUploadCount.current = count;
      }, [uploading]);

      // Warn on browser close/refresh with unsaved changes
      useEffect(() => {
        const handler = (e) => { if (dirty) { e.preventDefault(); e.returnValue = ''; } };
        window.addEventListener('beforeunload', handler);
        return () => window.removeEventListener('beforeunload', handler);
      }, [dirty]);

      // Auto-save to localStorage every 5s when dirty
      const draftKey = `soard-draft-kid-${slug || 'new'}`;
      useEffect(() => {
        if (!dirty) return;
        const timer = setTimeout(() => {
          try { localStorage.setItem(draftKey, JSON.stringify(data)); } catch (e) {}
        }, 5000);
        return () => clearTimeout(timer);
      }, [dirty, data]);

      // Recover draft on mount
      const [hasDraft, setHasDraft] = useState(false);
      useEffect(() => {
        if (loading) return;
        try {
          const saved = localStorage.getItem(draftKey);
          if (saved) setHasDraft(true);
        } catch (e) {}
      }, [loading]);

      const restoreDraft = () => {
        try {
          const saved = JSON.parse(localStorage.getItem(draftKey));
          if (saved) { setData(saved); setDirty(true); setHasDraft(false); addToast('Draft restored', 'success'); }
        } catch (e) { addToast('Could not restore draft', 'error'); }
      };
      const dismissDraft = () => { localStorage.removeItem(draftKey); setHasDraft(false); };
      const clearDraft = () => { try { localStorage.removeItem(draftKey); } catch (e) {} };

      const safeBack = () => {
        if (dirty && !confirm('You have unsaved changes. Leave without saving?')) return;
        clearDraft();
        onBack();
      };

      const handleDelete = async () => {
        if (!slug || !sha) return;
        setDeleting(true);
        try {
          const res = await api.deleteContent(
            `src/content/kids/${slug}.json`, sha, `Delete kid: ${data.name}`
          );
          if (res.success) {
            addToast(`${data.name} deleted`, 'success');
            logActivity('deleted', 'kid', data.name);
            setDirty(false);
            onBack();
          } else {
            addToast(`Delete failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Delete error: ${err.message}`, 'error');
        }
        setDeleting(false);
        setShowDeleteModal(false);
      };

      // Load existing kid
      useEffect(() => {
        if (!slug) return;
        (async () => {
          const res = await api.readContent(`src/content/kids/${slug}.json`);
          if (res.success) {
            const parsed = JSON.parse(res.content);
            setData(parsed);
            setSha(res.sha);
          } else {
            addToast('Failed to load kid data', 'error');
          }
          setLoading(false);
        })();
      }, [slug]);

      const dedupeSlug = (base) => {
        if (!existingSlugs.includes(base)) return base;
        // Append year first, then increment
        const withYear = `${base}-${new Date().getFullYear()}`;
        if (!existingSlugs.includes(withYear)) return withYear;
        let n = 2;
        while (existingSlugs.includes(`${withYear}-${n}`)) n++;
        return `${withYear}-${n}`;
      };

      const updateField = (field, value) => {
        setDirty(true);
        setData(d => {
          const updated = { ...d, [field]: value };
          // Auto-generate slug from name for new kids
          if (field === 'name' && !slug) {
            updated.slug = dedupeSlug(slugify(value));
          }
          return updated;
        });
      };

      const handlePhotoUpload = async (files) => {
        const largeFiles = files.filter(f => f.size > 5 * 1024 * 1024);
        if (largeFiles.length) {
          addToast(`${largeFiles.map(f => f.name + ' (' + (f.size / 1024 / 1024).toFixed(1) + 'MB)').join(', ')} — large files may slow upload. Consider under 5MB.`, 'info');
        }
        uploadPhotos(files);
      };

      const removePhoto = (index) => {
        const photoUrl = (data.photos || [])[index]?.url;
        setDirty(true);
        setData(d => ({
          ...d,
          photos: d.photos.filter((_, i) => i !== index),
          photoCount: d.photoCount - 1,
        }));
        // Delete from Cloudflare Images in the background
        const imageId = extractCfImageId(photoUrl);
        if (imageId) { api.deleteImage(imageId).catch(() => {}); }
      };

      const setHero = (index) => {
        setDirty(true);
        setData(d => ({ ...d, heroImage: d.photos[index]?.url || '' }));
      };

      const handleVideoUpload = async (files) => {
        const file = files[0];
        if (!file) return;
        setVideoUploading(true);
        setVideoProgress(0);
        try {
          const videoName = data.name ? `${data.name} - Room Reveal` : file.name;
          const res = await api.uploadVideo(file, videoName, {
            onProgress: (pct) => setVideoProgress(pct),
          });
          updateField('streamVideoId', res.videoId);
          addToast('Video uploaded to Stream! It may take a few minutes to process.', 'success');
        } catch (err) {
          addToast(`Video upload failed: ${err.message}`, 'error');
        }
        setVideoUploading(false);
        setVideoProgress(0);
      };

      const removeVideo = () => {
        setData(d => ({ ...d, streamVideoId: '' }));
        addToast('Stream video removed (video still exists in Cloudflare dashboard)', 'info');
      };

      const handleSave = async (asDraft = false) => {
        setTouched({ name: true });
        if (!data.name || !data.slug) {
          addToast('Name is required', 'error');
          return;
        }
        // Prevent overwriting an existing kid when creating new
        if (!slug && existingSlugs.includes(data.slug)) {
          addToast(`A kid with the URL slug "${data.slug}" already exists. Change the name or edit the slug to make it unique.`, 'error');
          return;
        }
        setSaving(true);
        try {
          // Clean up temp fields before saving
          const saveData = {
            ...data,
            publishStatus: asDraft ? 'draft' : 'published',
            age: data.age ? (String(data.age).includes(',') ? String(data.age).split(',').map(s => Number(s.trim())).filter(n => !isNaN(n) && n > 0) : Number(data.age) || null) : null,
            year: data.year ? Number(data.year) : null,
            streamVideoId: data.streamVideoId || null,
            videoUrl: data.videoUrl || null,
            fundraisingUrl: data.fundraisingUrl || null,
            photos: data.photos.map(({ _tempId, ...p }) => p),
            partnerLogos: (data.partnerLogos || []).map(({ _tempId, ...p }) => p),
            photoCount: data.photos.length,
          };
          const path = `src/content/kids/${data.slug}.json`;
          const content = JSON.stringify(saveData, null, 2);
          const message = asDraft
            ? `Draft: ${data.name}`
            : slug ? `Update kid: ${data.name}` : `Add kid: ${data.name}`;
          const res = await api.saveContent(path, content, message, sha || undefined);
          if (res.success) {
            setSha(res.sha);
            setDirty(false);
            clearDraft();
            setData(d => ({ ...d, publishStatus: asDraft ? 'draft' : 'published' }));
            addToast(asDraft ? `${data.name} saved as draft` : `${data.name} published! Site rebuilding...`, 'success');
            logActivity(asDraft ? 'drafted' : (slug ? 'updated' : 'created'), 'kid', data.name);
            setLastSaved(new Date());
          } else {
            addToast(`Save failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Save error: ${err.message}`, 'error');
        }
        setSaving(false);
      };

      if (loading) return html`<${EditorSkeleton} />`;

      return html`
        ${showCsImagePicker ? html`<${ImagePicker}
          onSelect=${(id) => {
            const url = CF + '/' + id + '/public';
            if (csImagePickerTarget) {
              const { section, index, field } = csImagePickerTarget;
              const cs = { ...(data.caseStudy || {}) };
              if (section === 'gallery') {
                cs.gallery = [...(cs.gallery || [])];
                cs.gallery[index] = { ...cs.gallery[index], [field]: url };
              } else {
                cs[section] = { ...(cs[section] || {}) };
                cs[section].photos = [...(cs[section].photos || [])];
                cs[section].photos[index] = { ...cs[section].photos[index], [field]: url };
              }
              updateField('caseStudy', cs);
            }
            setShowCsImagePicker(false);
          }}
          onClose=${() => setShowCsImagePicker(false)}
        />` : null}
        ${showDeleteModal ? html`<${ConfirmModal}
          title="Delete ${data.name}?"
          message="This will permanently remove this kid's profile and all associated data from the site. This cannot be undone."
          danger=${true}
          onConfirm=${handleDelete}
          onCancel=${() => setShowDeleteModal(false)}
        />` : null}
        ${showScheduleModal ? html`<div class="modal-overlay" onClick=${() => setShowScheduleModal(false)}>
          <div class="modal" onClick=${e => e.stopPropagation()} style="max-width: 380px;">
            <h3 style="margin-bottom: 0.75rem;">Schedule Publish</h3>
            <p style="margin-bottom: 1rem;">Choose when this profile should go live.</p>
            <div class="form-group" style="margin-bottom: 1.25rem;">
              <label class="form-label">Date & Time</label>
              <input type="datetime-local" class="form-input" value=${scheduleDate}
                onInput=${e => setScheduleDate(e.target.value)}
                min=${new Date().toISOString().slice(0, 16)} />
            </div>
            <div class="modal-buttons">
              <button class="btn btn-ghost" onClick=${() => setShowScheduleModal(false)}>Cancel</button>
              <button class="btn btn-primary" onClick=${() => {
                const d = new Date(scheduleDate);
                if (!scheduleDate || isNaN(d.getTime())) { addToast('Please select a valid date', 'error'); return; }
                if (d <= new Date()) { addToast('Date must be in the future', 'error'); return; }
                updateField('scheduledPublish', d.toISOString());
                addToast('Publish scheduled for ' + d.toLocaleString(), 'success');
                setShowScheduleModal(false);
              }}>Schedule</button>
            </div>
          </div>
        </div>` : null}
        ${hasDraft ? html`
          <div style="display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; background: #FEFCF5; border: 1px solid #FFD500; border-radius: 10px; margin-bottom: 1rem;">
            <span style="font-size: 1.1rem;">${icons.warning}</span>
            <span style="flex: 1; font-size: 0.9rem;">You have an unsaved draft from a previous session.</span>
            <button class="btn btn-primary btn-sm" onClick=${restoreDraft}>Restore</button>
            <button class="btn btn-ghost btn-sm" onClick=${dismissDraft}>Dismiss</button>
          </div>
        ` : null}
        <div style="display: flex; align-items: center; justify-content: space-between;">
          <nav class="breadcrumb" aria-label="Breadcrumb">
            <button onClick=${safeBack}>Kids</button>
            <span class="sep">›</span>
            <span class="current">${slug ? data.name || 'Edit' : 'New Kid'}</span>
          </nav>
          <div class="save-status">
            ${saving
              ? html`<span class="save-status-dot saving"></span> Saving...`
              : dirty
                ? html`<span class="save-status-dot unsaved"></span> Unsaved changes`
                : lastSaved
                  ? html`<span class="save-status-dot saved"></span> Saved ${lastSaved.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`
                  : slug
                    ? html`<span class="save-status-dot saved"></span> All changes saved`
                    : null
            }
          </div>
        </div>
        <div class="page-header">
          <h2 style="display: flex; align-items: center; gap: 0.5rem;">
            ${slug ? `Edit: ${data.name}` : 'Add New Kid'}
            ${slug ? html`<span class=${data.publishStatus === 'draft' ? 'draft-badge-draft' : 'draft-badge-published'}>
              ${data.publishStatus === 'draft' ? 'Draft' : 'Published'}
            </span>` : null}
          </h2>
          <div class="flex gap-1 items-center">
            ${slug ? html`<button class="btn btn-ghost btn-sm" onClick=${() => setShowPreview(true)}>Preview</button>` : null}
            ${slug ? html`<button class="btn btn-danger btn-sm" onClick=${() => setShowDeleteModal(true)} disabled=${deleting}>
              ${deleting ? html`<span class="spinner" />` : null} Delete
            </button>` : null}
            ${slug ? html`<button class="btn btn-ghost btn-sm" onClick=${() => setShowScheduleModal(true)}>Schedule</button>` : null}
            <button class="btn btn-ghost" onClick=${() => handleSave(true)} disabled=${saving}>
              ${saving ? 'Saving...' : 'Save Draft'}
            </button>
            <button class="btn btn-primary" onClick=${() => handleSave(false)} disabled=${saving}>
              ${saving ? html`<span class="spinner" />` : null}
              ${saving ? 'Saving...' : 'Save & Publish'}
            </button>
          </div>
        </div>

        ${data.scheduledPublish ? html`
          <div class="schedule-bar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            <span style="flex: 1;">Scheduled to publish <strong>${new Date(data.scheduledPublish).toLocaleString()}</strong></span>
            <button class="btn btn-ghost btn-sm" onClick=${() => { updateField('scheduledPublish', null); }}>Cancel Schedule</button>
          </div>
        ` : null}

        <div class="card">
          <h3 style="margin-bottom: 1rem;">Basic Info</h3>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Name *</label>
              <input class="form-input ${touched.name && !data.name ? 'is-invalid' : ''}" value=${data.name}
                onInput=${e => updateField('name', e.target.value)}
                onBlur=${() => setTouched(t => ({ ...t, name: true }))}
                placeholder="e.g., Amari" />
              ${touched.name && !data.name ? html`<div class="form-error">Name is required</div>` : null}
            </div>
            <div class="form-group">
              <label class="form-label">Slug</label>
              <input class="form-input ${!slug && data.slug && existingSlugs.includes(data.slug) ? 'is-invalid' : ''}" value=${data.slug}
                onInput=${e => { setDirty(true); setData(d => ({ ...d, slug: slugify(e.target.value) })); }}
                placeholder="auto-generated" ${slug ? 'disabled' : ''} />
              <div class="form-hint">URL path: /kids/${data.slug || '...'}</div>
              ${!slug && data.slug && existingSlugs.includes(data.slug) ? html`<div class="form-error">A kid with this slug already exists — saving will be blocked</div>` : null}
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Age(s)</label>
              <input class="form-input" type="text" value=${Array.isArray(data.age) ? data.age.join(', ') : (data.age || '')}
                onInput=${e => updateField('age', e.target.value)} placeholder="e.g., 10 or 7, 9, 12" />
            </div>
            <div class="form-group">
              <label class="form-label">Year</label>
              <input class="form-input" type="number" value=${data.year || ''}
                onInput=${e => updateField('year', e.target.value)} />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Diagnosis</label>
            <input class="form-input" value=${data.diagnosis || ''}
              onInput=${e => updateField('diagnosis', e.target.value)}
              placeholder="e.g., Cerebral Palsy" />
          </div>
          <div class="form-group">
            <label class="form-label">Room Types</label>
            <${RoomTypePicker} value=${data.roomTypes || []} onChange=${v => updateField('roomTypes', v)} />
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select class="form-select" value=${data.status}
              onChange=${e => updateField('status', e.target.value)}>
              <option value="completed">Completed</option>
              <option value="in-progress">In Progress</option>
            </select>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Room Count</label>
              <input class="form-input" type="number" min="1" value=${data.roomCount || 1}
                onInput=${e => updateField('roomCount', parseInt(e.target.value) || 1)} />
              <div class="form-hint">Total rooms built for this kid (auto-counted in site stats)</div>
            </div>
            <div class="form-group">
              <label class="form-label">Child Count</label>
              <input class="form-input" type="number" min="1" value=${data.childCount || 1}
                onInput=${e => updateField('childCount', parseInt(e.target.value) || 1)} />
              <div class="form-hint">Number of children in this profile (>1 for siblings)</div>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Bedrooms</label>
              <input class="form-input" type="number" min="0" value=${data.bedroomCount || 0}
                onInput=${e => updateField('bedroomCount', parseInt(e.target.value) || 0)} />
            </div>
            <div class="form-group">
              <label class="form-label">Bathrooms</label>
              <input class="form-input" type="number" min="0" value=${data.bathroomCount || 0}
                onInput=${e => updateField('bathroomCount', parseInt(e.target.value) || 0)} />
            </div>
            <div class="form-group">
              <label class="form-label">Therapy Rooms</label>
              <input class="form-input" type="number" min="0" value=${data.therapyRoomCount || 0}
                onInput=${e => updateField('therapyRoomCount', parseInt(e.target.value) || 0)} />
            </div>
          </div>
          <div class="form-hint" style="margin-top: -0.5rem;">Breakdown by room type</div>
        </div>

        <div class="card">
          <h3 style="margin-bottom: 1rem;">Story</h3>
          <div class="form-group">
            <label class="form-label">Bio</label>
            <${RichTextEditor} value=${data.bio || ''}
              onChange=${v => updateField('bio', v)}
              placeholder="Tell this child's story..."
              minHeight=${200} />
          </div>
          <div class="form-group">
            <label class="form-label">Quote (optional)</label>
            <input class="form-input" value=${data.quote || ''}
              onInput=${e => updateField('quote', e.target.value)} />
          </div>
          <div class="form-group">
            <label class="form-label">YouTube URL (optional)</label>
            <input class="form-input" value=${data.videoUrl || ''}
              onInput=${e => updateField('videoUrl', e.target.value)}
              placeholder="https://youtu.be/..." />
            <small style="color: rgba(0,0,0,0.45); margin-top: 0.25rem; display: block;">Used for sharing & SEO. Also used as site embed if no Stream video is uploaded.</small>
          </div>
          <div class="form-group">
            <label class="form-label">Cloudflare Stream Video (optional)</label>
            ${data.streamVideoId ? html`
              <div style="display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; background: rgba(122, 0, 223, 0.06); border-radius: 8px; border: 1px solid rgba(122, 0, 223, 0.15);">
                <span style="font-size: 1.5rem;">${icons.video}</span>
                <div style="flex: 1; min-width: 0;">
                  <div style="font-weight: 600; font-size: 0.9rem;">Stream video linked</div>
                  <div style="font-size: 0.8rem; color: rgba(0,0,0,0.45); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${data.streamVideoId}</div>
                </div>
                <button class="btn btn-ghost" style="font-size: 0.85rem; padding: 0.3rem 0.6rem;" onClick=${removeVideo}>Remove</button>
              </div>
            ` : html`
              <${DropZone} onFiles=${handleVideoUpload} multiple=${false} accept="video/*" label="MP4, MOV, WebM — upload reveal video" />
            `}
            ${videoUploading ? html`
              <div style="margin-top: 0.5rem; padding: 0.75rem; background: rgba(255,213,0,0.1); border-radius: 8px;">
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.4rem;">
                  <span style="font-size: 0.85rem; font-weight: 600;">
                    ${videoProgress < 100 ? 'Uploading video...' : 'Finalising...'}
                  </span>
                  <span style="font-size: 0.8rem; color: rgba(0,0,0,0.45);">${videoProgress}%</span>
                </div>
                <div style="height: 6px; background: rgba(0,0,0,0.08); border-radius: 3px; overflow: hidden;">
                  <div style="height: 100%; width: ${videoProgress}%; background: var(--color-primary); border-radius: 3px; transition: width 0.3s ease;" />
                </div>
                <div style="font-size: 0.75rem; color: rgba(0,0,0,0.35); margin-top: 0.3rem;">
                  Resumable upload — you can close and re-open without losing progress
                </div>
              </div>
            ` : null}
            <small style="color: rgba(0,0,0,0.45); margin-top: 0.25rem; display: block;">Uploaded videos play on your site with no ads. Best performance for donors.</small>
          </div>
          <div class="form-group">
            <label class="form-label">Photographer (optional)</label>
            <input class="form-input" value=${data.photographer || ''}
              onInput=${e => updateField('photographer', e.target.value)} />
          </div>
          <div class="form-group">
            <label class="form-label">Zeffy Fundraising Link (optional)</label>
            <input class="form-input" value=${data.fundraisingUrl || ''}
              onInput=${e => updateField('fundraisingUrl', e.target.value)}

    function PartnersList({ partners, onEdit, onAdd, onDelete }) {
      const [search, setSearch] = useState('');
      const filtered = useMemo(() => {
        if (!search) return partners;
        const q = search.toLowerCase();
        return partners.filter(p =>
          p.name.toLowerCase().includes(q) ||
          (p.level || '').toLowerCase().includes(q) ||
          [].concat(p.category || []).join(' ').toLowerCase().includes(q) ||
          (p.website || '').toLowerCase().includes(q)
        );
      }, [partners, search]);

      return html`
        <div class="page-header">
          <h2>Partners (${partners.length})</h2>
          <button class="btn btn-primary" onClick=${onAdd}>+ Add Partner</button>
        </div>
        <div class="card" style="margin-bottom: 1rem; padding: 0.75rem 1rem;">
          <div class="search-bar" style="max-width: 100%;">
            <span class="search-icon">${icons.search}</span>
            <input placeholder="Search by name, level, category, or website..."
              value=${search} onInput=${e => setSearch(e.target.value)} />
          </div>
        </div>
        <div class="card">
          <div class="table-wrap"><table>
            <thead><tr><th></th><th>Name</th><th>Level</th><th>Category</th><th>Featured</th><th></th></tr></thead>
            <tbody>

    // ═══════════════════════════════════════════
    // FINANCIAL SNAPSHOT (homepage + financials page data)
    // ═══════════════════════════════════════════
    function FinancialSnapshot({ addToast }) {
      const snapshotDefaults = {
        year: 2024, totalRevenue: 0, totalExpenses: 0,
        programExpenses: 0, managementExpenses: 0, fundraisingExpenses: 0,
        contributions: 0, storeRevenue: 0, netAssets: 0,
        employees: 0, volunteers: 0,
        programPct: 0, managementPct: 0, fundraisingPct: 0,
      };
      const {
        data, setData, loading, saving, handleSave, updateField: update,
      } = useEditor({
        path: 'src/content/site/financial-snapshot.json', label: 'financial snapshot',
        commitPrefix: 'financials', addToast, defaults: snapshotDefaults,
        onLoad: (parsed) => ({ ...snapshotDefaults, ...parsed }),
      });

      const updateNum = (field, value) => {
        const n = value === '' ? 0 : Number(value);
        if (!isNaN(n)) update(field, n);
      };

      const recalcPcts = (prog, mgmt, fund) => {
        const total = prog + mgmt + fund;
        if (total === 0) return;
        setData(d => ({
          ...d,
          programExpenses: prog, managementExpenses: mgmt, fundraisingExpenses: fund,
          totalExpenses: total,
          programPct: Math.round((prog / total) * 100),
          managementPct: Math.round((mgmt / total) * 100),
          fundraisingPct: Math.round((fund / total) * 100),
        }));
      };

      if (loading) return html`<div style="text-align:center;padding:3rem"><span class="spinner" /></div>`;

      const fmt = (n) => n ? '$' + n.toLocaleString() : '$0';

      return html`

          <div>
            <h2 style="margin:0">Financial Snapshot</h2>
            <p style="margin:4px 0 0;color:var(--muted);font-size:14px">

          <button class="btn btn-primary" onClick=${handleSave} disabled=${saving}>

        <div class="card" style="margin-bottom:1.5rem">
          <h3 style="margin:0 0 1rem">Reporting Year</h3>

            <label class="form-label">Year (e.g. 2024 = FY2024 990 data)</label>

        <div class="card" style="margin-bottom:1.5rem">
          <h3 style="margin:0 0 1rem">Expense Breakdown <span style="font-weight:400;color:var(--muted);font-size:13px">(from Part IX of 990)</span></h3>
          <p style="color:var(--muted);font-size:13px;margin:0 0 1rem">Enter dollar amounts — percentages auto-calculate.</p>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem">
            <div class="form-group">
              <label class="form-label">Program Expenses</label>
              <input class="form-input" type="number" value=${data.programExpenses}
                onInput=${e => recalcPcts(Number(e.target.value) || 0, data.managementExpenses, data.fundraisingExpenses)} />
              <span style="font-size:12px;color:var(--muted)">${data.programPct}%</span>

            <div class="form-group">
              <label class="form-label">Management & General</label>

            <div class="form-group">
              <label class="form-label">Fundraising</label>

          </div>
          <div class="form-group" style="margin-top:0.5rem">
            <label class="form-label">Total Expenses (auto-calculated)</label>
            <input class="form-input" type="text" disabled value=${fmt(data.totalExpenses)} style="max-width:200px;background:var(--bg-alt)" />

        <div class="card" style="margin-bottom:1.5rem">
          <h3 style="margin:0 0 1rem">Revenue & Assets</h3>

            <div class="form-group">
              <label class="form-label">Total Revenue</label>
              <input class="form-input" type="number" value=${data.totalRevenue}
                onInput=${e => updateNum('totalRevenue', e.target.value)} />

            <div class="form-group">
              <label class="form-label">Contributions & Grants</label>
              <input class="form-input" type="number" value=${data.contributions}
                onInput=${e => updateNum('contributions', e.target.value)} />
