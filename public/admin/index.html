            <div class="form-group">
              <label class="form-label">Store Revenue (net)</label>
              <input class="form-input" type="number" value=${data.storeRevenue}
                onInput=${e => updateNum('storeRevenue', e.target.value)} />

            <div class="form-group">
              <label class="form-label">Net Assets (end of year)</label>
              <input class="form-input" type="number" value=${data.netAssets}
                onInput=${e => updateNum('netAssets', e.target.value)} />

          </div>
        </div>

        <div class="card">
          <h3 style="margin:0 0 1rem">Organization Stats</h3>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;max-width:400px">
            <div class="form-group">
              <label class="form-label">Employees</label>
              <input class="form-input" type="number" value=${data.employees}
                onInput=${e => updateNum('employees', e.target.value)} />
            </div>
            <div class="form-group">
              <label class="form-label">Volunteers</label>
              <input class="form-input" type="number" value=${data.volunteers}

          <strong>Preview:</strong> Homepage will show "${data.programPct}% Program Services".
          Financials page will show FY${data.year} data with ${fmt(data.totalRevenue)} revenue, ${fmt(data.netAssets)} net assets.

      `;

    // ═══════════════════════════════════════════
    // FINANCIALS (Documents)
    // ═══════════════════════════════════════════
    function Financials({ addToast }) {
      const [files, setFiles] = useState([]);
      const [data, setData] = useState({ documents: [], annualReports: [] });
      const [dataSha, setDataSha] = useState(null);
      const [loading, setLoading] = useState(true);
      const [uploading, setUploading] = useState(false);
      const [saving, setSaving] = useState(false);
      const [tab, setTab] = useState('documents'); // documents | annual-reports | upload
      const [showAddDoc, setShowAddDoc] = useState(false);
      const [pendingRemove, setPendingRemove] = useState(null); // { type: 'doc'|'report', idx }
      const [showAddReport, setShowAddReport] = useState(false);
      const [newDoc, setNewDoc] = useState({ title: '', year: new Date().getFullYear(), type: '990', url: '', source: 'local' });
      const [newReport, setNewReport] = useState({ title: '', year: new Date().getFullYear(), url: '', coverImage: '', description: '' });

      const loadAll = async () => {
        setLoading(true);
        try {
          // Load uploaded files
          const filesRes = await api.listContent('public/financials');
          if (filesRes.success) setFiles(filesRes.files);
          else setFiles([]);
          // Load JSON metadata
          const jsonRes = await api.readContent('src/content/site/financials.json');
          if (jsonRes.success) {
            const parsed = JSON.parse(jsonRes.content);
            setData(parsed);
            setDataSha(jsonRes.sha);
          }
        } catch { /* ignore */ }
        setLoading(false);
      };

      useEffect(() => { loadAll(); }, []);

      const saveData = async (newData) => {
        setSaving(true);
        try {
          const res = await api.saveContent(
            'src/content/site/financials.json',
            JSON.stringify(newData, null, 2),
            'Update financial documents metadata',
            dataSha || undefined
          );
          if (res.success) {
            setData(newData);
            setDataSha(res.sha || dataSha);
            addToast('Financials saved!', 'success');
            logActivity('updated', 'financials', '');
          } else {
            addToast('Save failed: ' + (res.error || 'Unknown'), 'error');
          }
        } catch (err) {
          addToast('Error: ' + err.message, 'error');
        }
        setSaving(false);
      };

      const handleUpload = async (fileList) => {
        setUploading(true);
        let lastUploaded = null;
        for (const file of fileList) {
          const safeName = file.name.replace(/[^a-z0-9._-]/gi, '-');
          const path = 'public/financials/' + safeName;
          try {
            const res = await api.uploadFile(file, path, 'Upload financial doc: ' + file.name);
            if (res.success) {
              addToast('Uploaded ' + file.name, 'success');
              lastUploaded = { name: safeName, downloadUrl: 'https://files.sunshineonaranneyday.com/financials/' + safeName };
            }
            else addToast('Failed: ' + res.error, 'error');
          } catch (err) { addToast('Error: ' + err.message, 'error'); }
        }
        setUploading(false);
        await loadAll();
        // Auto-open the add document form with the uploaded file's URL pre-filled
        if (lastUploaded && fileList.length === 1) {
          const cleanName = lastUploaded.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
          const yearMatch = lastUploaded.name.match(/\d{4}/);
          setNewDoc({ title: cleanName, year: parseInt(yearMatch?.[0]) || new Date().getFullYear(), type: '990', url: lastUploaded.downloadUrl, source: 'r2' });
          setTab('documents');
          setShowAddDoc(true);
        }
      };

      const addDocument = () => {
        if (!newDoc.title || !newDoc.url) { addToast('Title and URL required', 'error'); return; }
        const updated = { ...data, documents: [...data.documents, { ...newDoc }] };
        saveData(updated);
        setNewDoc({ title: '', year: new Date().getFullYear(), type: '990', url: '', source: 'local' });
        setShowAddDoc(false);
      };

      const removeDocument = (idx) => {
        setPendingRemove({ type: 'doc', idx });
      };
      const confirmRemove = () => {
        if (!pendingRemove) return;
        if (pendingRemove.type === 'doc') {
          saveData({ ...data, documents: data.documents.filter((_, i) => i !== pendingRemove.idx) });
        } else {
          saveData({ ...data, annualReports: (data.annualReports || []).filter((_, i) => i !== pendingRemove.idx) });
        }
        setPendingRemove(null);
      };

      const addReport = () => {
        if (!newReport.title || !newReport.url) { addToast('Title and URL required', 'error'); return; }
        const updated = { ...data, annualReports: [...(data.annualReports || []), { ...newReport }] };
        saveData(updated);
        setNewReport({ title: '', year: new Date().getFullYear(), url: '', coverImage: '', description: '' });
        setShowAddReport(false);
      };

      const removeReport = (idx) => {
        setPendingRemove({ type: 'report', idx });
      };

      const docs990 = data.documents.filter(d => d.type === '990').sort((a, b) => b.year - a.year);
      const docsAudit = data.documents.filter(d => d.type === 'audit').sort((a, b) => b.year - a.year);
      const docsOther = data.documents.filter(d => d.type === 'other').sort((a, b) => b.year - a.year);
      const reports = (data.annualReports || []).sort((a, b) => b.year - a.year);

      if (loading) return html`<${EditorSkeleton} />`;

      return html`
        ${pendingRemove ? html`<${ConfirmModal}
          title="Remove ${pendingRemove.type === 'doc' ? 'document' : 'annual report'}?"
          message="This will remove this entry from the financials page. The uploaded file will not be deleted."
          danger=${true}
          onConfirm=${confirmRemove}
          onCancel=${() => setPendingRemove(null)}
        />` : null}
        <div class="page-header">
          <h2>Financial Documents</h2>
          <p class="text-sm text-muted">Manages the <a href="/about/financials/" target="_blank">/about/financials/</a> page</p>
        </div>

        <!-- Tab Nav -->
        <div style="display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap;">
          ${['documents', 'annual-reports', 'upload'].map(t => html`
            <button key=${t} class="btn ${tab === t ? 'btn-primary' : 'btn-ghost'} btn-sm"
              onClick=${() => setTab(t)}>
              ${t === 'documents' ? html`${icons.fileText} 990s & Audits` : t === 'annual-reports' ? html`${icons.barChart} Annual Reports` : html`${icons.folder} Upload Files`}
            </button>
          `)}
        </div>

        <!-- Documents Tab -->
        ${tab === 'documents' ? html`
          <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
              <h3>990 Tax Returns (${docs990.length})</h3>
              <button class="btn btn-primary btn-sm" onClick=${() => { setNewDoc({...newDoc, type: '990'}); setShowAddDoc(true); }}>+ Add 990</button>
            </div>
            ${docs990.length === 0 ? html`<p class="text-sm text-muted">No 990s yet.</p>` : html`
              <div class="table-wrap"><table>
                <thead><tr><th>Year</th><th>Title</th><th>Source</th><th></th></tr></thead>
                <tbody>${docs990.map((d, i) => {
                  const realIdx = data.documents.indexOf(d);
                  return html`<tr key=${i}>
                    <td><strong>${d.year}</strong></td>
                    <td class="text-sm">${d.title}</td>
                    <td><span class="badge ${d.source === 'local' ? 'badge-green' : 'badge-gray'}">${d.source}</span></td>
                    <td style="text-align:right;">
                      <a href=${d.url} target="_blank" class="btn btn-ghost btn-sm">View ↗</a>
                      <button class="btn btn-ghost btn-sm" style="color:#c00;" onClick=${() => removeDocument(realIdx)}>${icons.x}</button>
                    </td>
                  </tr>`;
                })}</tbody>
              </table></div>
            `}
          </div>

          <div class="card mt-2">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
              <h3>Audited Financials (${docsAudit.length})</h3>
              <button class="btn btn-primary btn-sm" onClick=${() => { setNewDoc({...newDoc, type: 'audit'}); setShowAddDoc(true); }}>+ Add Audit</button>
            </div>
            ${docsAudit.length === 0 ? html`<p class="text-sm text-muted">No audits yet.</p>` : html`
              <div class="table-wrap"><table>
                <thead><tr><th>Year</th><th>Title</th><th>Source</th><th></th></tr></thead>
                <tbody>${docsAudit.map((d, i) => {
                  const realIdx = data.documents.indexOf(d);
                  return html`<tr key=${i}>
                    <td><strong>${d.year}</strong></td>
                    <td class="text-sm">${d.title}</td>
                    <td><span class="badge ${d.source === 'local' ? 'badge-green' : 'badge-gray'}">${d.source}</span></td>
                    <td style="text-align:right;">
                      <a href=${d.url} target="_blank" class="btn btn-ghost btn-sm">View ↗</a>
                      <button class="btn btn-ghost btn-sm" style="color:#c00;" onClick=${() => removeDocument(realIdx)}>${icons.x}</button>
                    </td>
                  </tr>`;
                })}</tbody>
              </table></div>
            `}
          </div>

          ${docsOther.length > 0 ? html`
            <div class="card mt-2">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
                <h3>Other Documents (${docsOther.length})</h3>
                <button class="btn btn-primary btn-sm" onClick=${() => { setNewDoc({...newDoc, type: 'other'}); setShowAddDoc(true); }}>+ Add</button>
              </div>
              <div class="table-wrap"><table>
                <thead><tr><th>Title</th><th>Source</th><th></th></tr></thead>
                <tbody>${docsOther.map((d, i) => {
                  const realIdx = data.documents.indexOf(d);
                  return html`<tr key=${i}>
                    <td><strong>${d.title}</strong></td>
                    <td><span class="badge ${d.source === 'local' ? 'badge-green' : 'badge-gray'}">${d.source}</span></td>
                    <td style="text-align:right;">
                      <a href=${d.url} target="_blank" class="btn btn-ghost btn-sm">View ↗</a>
                      <button class="btn btn-ghost btn-sm" style="color:#c00;" onClick=${() => removeDocument(realIdx)}>${icons.x}</button>
                    </td>
                  </tr>`;
                })}</tbody>
              </table></div>
            </div>
          ` : null}

          <!-- Add Document Modal -->
          ${showAddDoc ? html`
            <div class="modal-overlay" onClick=${() => setShowAddDoc(false)}>
              <div class="modal-content" onClick=${e => e.stopPropagation()}>
                <h3 style="margin-bottom:1rem;">Add Financial Document</h3>
                <div class="form-group">
                  <label>Type</label>
                  <select value=${newDoc.type} onChange=${e => setNewDoc({...newDoc, type: e.target.value})}>
                    <option value="990">990 Tax Return</option>
                    <option value="audit">Audited Financials</option>
                    <option value="other">Other Document</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Year</label>
                  <input type="number" min="2012" max="2030" value=${newDoc.year}
                    onChange=${e => setNewDoc({...newDoc, year: parseInt(e.target.value)})} />
                </div>
                <div class="form-group">
                  <label>Title</label>
                  <input type="text" placeholder="e.g. 2024 990 Tax Return" value=${newDoc.title}
                    onChange=${e => setNewDoc({...newDoc, title: e.target.value})} />
                </div>
                <div class="form-group">
                  <label>URL / Path</label>
                  <input type="text" placeholder="Auto-filled from upload, or paste a URL" value=${newDoc.url}
                    onChange=${e => setNewDoc({...newDoc, url: e.target.value, source: e.target.value.startsWith('http') ? 'external' : 'local'})} />
                  <small class="text-sm text-muted">This is auto-filled when you upload a file. You can also paste an external URL.</small>
                </div>
                <div style="display:flex;gap:0.75rem;margin-top:1.25rem;">
                  <button class="btn btn-primary btn-sm" onClick=${addDocument} disabled=${saving}>
                    ${saving ? html`<span class="spinner" />` : 'Add Document'}
                  </button>
                  <button class="btn btn-ghost btn-sm" onClick=${() => setShowAddDoc(false)}>Cancel</button>
                </div>
              </div>
            </div>
          ` : null}
        ` : null}

        <!-- Annual Reports Tab -->
        ${tab === 'annual-reports' ? html`
          <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
              <h3>Annual Reports (${reports.length})</h3>
              <button class="btn btn-primary btn-sm" onClick=${() => setShowAddReport(true)}>+ Add Report</button>
            </div>
            ${reports.length === 0 ? html`
              <div class="empty-state">
                <div class="empty-state-icon">${icons.barChart}</div>
                <p>No annual reports yet.</p>
                <p class="text-sm">Add your first annual report with a cover image and PDF link.</p>
              </div>
            ` : html`
              <div class="table-wrap"><table>
                <thead><tr><th>Year</th><th>Title</th><th>Cover</th><th></th></tr></thead>
                <tbody>${reports.map((r, i) => html`<tr key=${i}>
                  <td><strong>${r.year}</strong></td>
                  <td>
                    <div>${r.title}</div>
                    ${r.description ? html`<div class="text-sm text-muted">${r.description}</div>` : null}
                  </td>
                  <td>${r.coverImage ? html`<img src=${r.coverImage} alt="" style="width:40px;height:52px;object-fit:cover;border-radius:4px;" />` : html`<span class="text-sm text-muted">—</span>`}</td>
                  <td style="text-align:right;">
                    <a href=${r.url} target="_blank" class="btn btn-ghost btn-sm">View ↗</a>
                    <button class="btn btn-ghost btn-sm" style="color:#c00;" onClick=${() => removeReport(i)}>${icons.x}</button>
                  </td>
                </tr>`)}</tbody>
              </table></div>
            `}
          </div>

          <!-- Add Report Modal -->
          ${showAddReport ? html`
            <div class="modal-overlay" onClick=${() => setShowAddReport(false)}>
              <div class="modal-content" onClick=${e => e.stopPropagation()}>
                <h3 style="margin-bottom:1rem;">Add Annual Report</h3>
                <div class="form-group">
                  <label>Year</label>
                  <input type="number" min="2012" max="2030" value=${newReport.year}
                    onChange=${e => setNewReport({...newReport, year: parseInt(e.target.value)})} />
                </div>
                <div class="form-group">
                  <label>Title</label>
                  <input type="text" placeholder="e.g. 2024 Annual Report" value=${newReport.title}
                    onChange=${e => setNewReport({...newReport, title: e.target.value})} />
                </div>
                <div class="form-group">
                  <label>PDF URL</label>
                  <input type="text" placeholder="/financials/annual-report-2024.pdf" value=${newReport.url}
                    onChange=${e => setNewReport({...newReport, url: e.target.value})} />
                </div>
                <div class="form-group">
                  <label>Cover Image URL <span class="text-sm text-muted">(optional)</span></label>
                  <input type="text" placeholder="Cloudflare Images URL for cover" value=${newReport.coverImage}
                    onChange=${e => setNewReport({...newReport, coverImage: e.target.value})} />
                </div>
                <div class="form-group">
                  <label>Description <span class="text-sm text-muted">(optional)</span></label>
                  <input type="text" placeholder="Short description" value=${newReport.description}
                    onChange=${e => setNewReport({...newReport, description: e.target.value})} />
                </div>
                <div style="display:flex;gap:0.75rem;margin-top:1.25rem;">
                  <button class="btn btn-primary btn-sm" onClick=${addReport} disabled=${saving}>
                    ${saving ? html`<span class="spinner" />` : 'Add Report'}
                  </button>
                  <button class="btn btn-ghost btn-sm" onClick=${() => setShowAddReport(false)}>Cancel</button>
                </div>
              </div>
            </div>
          ` : null}
        ` : null}

        <!-- Upload Tab -->
        ${tab === 'upload' ? html`
          <div class="card">
            <p class="text-sm text-muted mb-1">Upload a PDF and you'll be prompted to add it to the site. Or use the "Create Entry" button on any previously uploaded file.</p>
            <${DropZone} onFiles=${handleUpload} accept=".pdf,.doc,.docx"
              label="PDF files — 990s, annual reports, audits" />
            ${uploading ? html`<div class="mt-2 text-sm"><span class="spinner" /> Uploading...</div>` : null}
          </div>
          <div class="card mt-2">
            <h3 style="margin-bottom: 1rem;">Uploaded Files (${files.length})</h3>
            ${files.length === 0 ? html`
              <div class="empty-state">
                <div class="empty-state-icon">${icons.folderOpen}</div>
                <p>No files uploaded yet.</p>
              </div>
            ` : html`
              <div class="table-wrap"><table>
                <thead><tr><th>File</th><th>Size</th><th>Path</th><th>Link</th></tr></thead>
                <tbody>
                  ${files.map(f => html`<tr key=${f.name}>
                    <td>${icons.fileText} <strong>${f.name}</strong></td>
                    <td class="text-sm text-muted">${(f.size / 1024).toFixed(0)} KB</td>
                    <td class="text-sm" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"><code>${f.name}</code></td>
                    <td style="display:flex;gap:0.25rem;">
                      <a href=${'https://files.sunshineonaranneyday.com/financials/' + f.name} target="_blank" class="btn btn-ghost btn-sm">View ↗</a>
                      <button class="btn btn-primary btn-sm" onClick=${() => { setNewDoc({title: f.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' '), year: parseInt(f.name.match(/\d{4}/)?.[0]) || new Date().getFullYear(), type: '990', url: 'https://files.sunshineonaranneyday.com/financials/' + f.name, source: 'local'}); setTab('documents'); setShowAddDoc(true); }}>+ Create Entry</button>
                    </td>
                  </tr>`)}
                </tbody>
              </table></div>
            `}
          </div>
        ` : null}
      `;
    }

    // TEAM LIST
    // ═══════════════════════════════════════════
    function TeamList({ team, group, onEdit, onAdd, onDelete }) {
      const [search, setSearch] = useState('');
      const members = useMemo(() => {
        const byGroup = team.filter(t => t.group === group);
        if (!search) return byGroup;
        const q = search.toLowerCase();
        return byGroup.filter(t =>
          t.name.toLowerCase().includes(q) ||
          (t.title || '').toLowerCase().includes(q) ||
          (t.organization || '').toLowerCase().includes(q)
        );
      }, [team, group, search]);
      const label = group === 'board' ? 'Board' : 'Team';

      return html`
        <div class="page-header">
          <h2>${label} (${members.length})</h2>
          <button class="btn btn-primary" onClick=${onAdd}>+ Add Member</button>
        </div>
        <div class="card" style="margin-bottom: 1rem; padding: 0.75rem 1rem;">
          <div class="search-bar" style="max-width: 100%;">

                  <td>${t.photo ? html`<img class="td-thumb" src="${t.photo}" alt="" style="border-radius: 50%;" />` : html`<div class="td-thumb" style="border-radius: 50%; background: #E5E4E0; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">${icons.user}</div>`}</td>

        data, setData, loading, saving, dirty, setDirty, deleting,
        showDeleteModal, setShowDeleteModal, slugExists, updateField, handleSave, handleDelete, safeBack,

        slug, type: 'team', commitPrefix: 'team member', addToast, onBack, existingSlugs,

      const { uploading, preview: photoPreview, upload: handlePhotoUpload, clear: clearPhoto, syncPreview: syncPhoto } = useSingleUpload({

        <div class="card">

        return articles.filter(a =>
          (a.title || '').toLowerCase().includes(q) ||

      return html`

          <h2>Resource Articles (${articles.length})</h2>

        <div class="card" style="margin-bottom: 1rem; padding: 0.75rem 1rem;">
          <div class="search-bar" style="max-width: 100%;">

          ${filtered.length === 0 ? html`
            <p class="text-sm text-muted" style="padding: 1rem;">${search ? 'No articles match your search.' : 'No articles yet. Click "+ Add Article" to create your first resource guide.'}</p>
          ` : html`
            <div class="table-wrap table-resources"><table>
              <thead><tr><th>Title</th><th>Tag</th><th>Published</th><th>FAQs</th><th>Order</th><th></th></tr></thead>

                ${filtered.map(a => html`<tr key=${a.slug} onClick=${() => onEdit(a.slug)} style="cursor: pointer;">
                  <td><strong>${a.title}</strong><br/><span class="text-sm text-muted">/resources/${a.slug}/</span></td>
                  <td><span style="background: #FFD500; color: #2D2E33; padding: 0.15rem 0.5rem; border-radius: 100px; font-size: 0.75rem; font-weight: 600;">${a.tag || 'Guide'}</span></td>
                  <td class="text-sm td-hide-mobile">${a.datePublished || '—'}</td>

    // ═══════════════════════════════════════════
    // ARTICLE EDITOR
    // ═══════════════════════════════════════════
    function ArticleEditor({ slug, onBack, addToast, existingSlugs = [] }) {
      const [loading, setLoading] = useState(!!slug);
      const [saving, setSaving] = useState(false);
      const [sha, setSha] = useState(null);
      const [dirty, setDirty] = useState(false);
      const [data, setData] = useState({
        title: '', slug: '', description: '', tag: 'Guide',
        datePublished: new Date().toISOString().split('T')[0],
        dateModified: new Date().toISOString().split('T')[0],
        heroImage: null, heroLead: '', aboutTopics: [],
        body: '', faqs: [],
        ctaHeading: 'Need help with your home?',
        ctaText: 'Sunshine on a Ranney Day builds accessible bathrooms, dream bedrooms, and therapy rooms for children with special needs — at no cost to families in the greater Atlanta area.',
        ctaPrimaryLink: '/apply/', ctaPrimaryLabel: 'Apply for a Makeover',
        ctaSecondaryLink: '/donate/', ctaSecondaryLabel: 'Support Our Mission',
        featured: false, order: 0,
      });

      useEffect(() => {
        if (!slug) return;
        (async () => {
          try {
            const res = await api.readContent(`src/content/articles/${slug}.json`);
            if (res.success && res.content) {
              setData(res.content);
              setSha(res.sha);
            } else {
              addToast('Article not found', 'error');
              onBack();
            }
          } catch (err) {
            addToast(`Load error: ${err.message}`, 'error');
          }
          setLoading(false);
        })();
      }, [slug]);

      const update = (key, val) => {
        setData(d => ({ ...d, [key]: val }));
        setDirty(true);
      };

      const autoSlug = (title) => title.toLowerCase()
        .replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').substring(0, 60);

      const handleSave = async () => {
        if (!data.title) { addToast('Title is required', 'error'); return; }
        const saveSlug = data.slug || autoSlug(data.title);
        if (!data.slug) setData(d => ({ ...d, slug: saveSlug }));
        if (!slug && existingSlugs.includes(saveSlug)) {
          addToast(`An article with slug "${saveSlug}" already exists. Change the title or edit the slug.`, 'error'); return;
        }
        const saveData = { ...data, slug: saveSlug, dateModified: new Date().toISOString().split('T')[0] };
        setSaving(true);
        try {
          const path = `src/content/articles/${saveSlug}.json`;
          const content = JSON.stringify(saveData, null, 2);
          const message = slug ? `Update article: ${data.title}` : `Add article: ${data.title}`;
          const res = await api.saveContent(path, content, message, sha || undefined);
          if (res.success) {
            setSha(res.sha);
            setDirty(false);
            addToast(`Article saved & published!`, 'success');
            logActivity(slug ? 'published' : 'created', 'article', data.title);
          } else {
            addToast(`Save failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Save error: ${err.message}`, 'error');
        }
        setSaving(false);
      };

      const addFaq = () => {
        update('faqs', [...(data.faqs || []), { question: '', answer: '' }]);
      };
      const updateFaq = (idx, key, val) => {
        const faqs = [...(data.faqs || [])];
        faqs[idx] = { ...faqs[idx], [key]: val };
        update('faqs', faqs);
      };
      const removeFaq = (idx) => {
        update('faqs', (data.faqs || []).filter((_, i) => i !== idx));
      };

      if (loading) return html`<${EditorSkeleton} />`;

      return html`
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <button onClick=${onBack}>Articles</button>
          <span class="sep">›</span>
          <span class="current">${slug ? data.title || 'Edit' : 'New Article'}</span>
        </nav>
        <div class="page-header">
          <h2>${slug ? 'Edit Article' : 'New Article'}</h2>
          <button class="btn btn-primary" onClick=${handleSave} disabled=${saving}>
            ${saving ? 'Saving...' : dirty ? 'Save & Publish' : 'Save & Publish'}
          </button>
        </div>

        <div class="card" style="margin-bottom: 1rem;">
          <h3 style="margin-bottom: 1rem;">Article Details</h3>
          <div class="form-grid">
            <label class="form-group span-2">
              <span class="form-label">Title *</span>
              <input type="text" value=${data.title} onInput=${e => { update('title', e.target.value); if (!slug) update('slug', autoSlug(e.target.value)); }} placeholder="Guide to Accessible Home Design for Children with Disabilities" />
            </label>
            <label class="form-group">
              <span class="form-label">Slug</span>
              <input type="text" value=${data.slug} onInput=${e => update('slug', e.target.value)} placeholder="accessible-home-design" />
              <span class="text-sm text-muted">/resources/${data.slug || '...'}/</span>
            </label>
            <label class="form-group">
              <span class="form-label">Tag / Category</span>
              <input type="text" value=${data.tag} onInput=${e => update('tag', e.target.value)} placeholder="Accessibility" />
            </label>
            <label class="form-group span-2">
              <span class="form-label">Hero Lead Text</span>
              <textarea rows="2" value=${data.heroLead} onInput=${e => update('heroLead', e.target.value)} placeholder="The subtitle shown below the title on the page" />
            </label>
            <label class="form-group">
              <span class="form-label">Date Published</span>
              <input type="date" value=${data.datePublished} onInput=${e => update('datePublished', e.target.value)} />
            </label>
            <label class="form-group">
              <span class="form-label">Display Order</span>
              <input type="number" value=${data.order} onInput=${e => update('order', Number(e.target.value))} />
            </label>
          </div>
        </div>

        <div class="card" style="margin-bottom: 1rem;">
          <h3 style="margin-bottom: 0.5rem;">Article Body (HTML)</h3>
          <p class="text-sm text-muted" style="margin-bottom: 1rem;">Write the article content as HTML. Use &lt;h2&gt; for main sections, &lt;h3&gt; for subsections, &lt;p&gt; for paragraphs, &lt;strong&gt; for bold, and &lt;a href="..."&gt; for links.</p>
          <textarea
            style="width: 100%; min-height: 400px; font-family: monospace; font-size: 0.85rem; line-height: 1.6; padding: 1rem; border: 1px solid #E5E4E0; border-radius: 8px; resize: vertical;"
            value=${data.body}
            onInput=${e => update('body', e.target.value)}
            placeholder="<h2>Section Title</h2>\n<p>Your content here...</p>"
          />
          <span class="text-sm text-muted">${(data.body || '').length.toLocaleString()} characters</span>
        </div>

        <div class="card" style="margin-bottom: 1rem;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h3>FAQs (${(data.faqs || []).length})</h3>
            <button class="btn btn-ghost btn-sm" onClick=${addFaq}>+ Add FAQ</button>
          </div>
          <p class="text-sm text-muted" style="margin-bottom: 1rem;">FAQs generate FAQPage schema for Google rich results. Each FAQ appears as an expandable accordion at the bottom of the article.</p>
          ${(data.faqs || []).map((faq, idx) => html`
            <div key=${idx} style="border: 1px solid #E5E4E0; border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem;">
              <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 0.5rem;">
                <strong class="text-sm">FAQ #${idx + 1}</strong>
                <button class="btn btn-ghost btn-sm" style="color: #E53E3E; font-size: 0.8rem;" onClick=${() => removeFaq(idx)}>Remove</button>
              </div>
              <label class="form-group" style="margin-bottom: 0.5rem;">
                <span class="form-label">Question</span>
                <input type="text" value=${faq.question} onInput=${e => updateFaq(idx, 'question', e.target.value)} placeholder="How much does it cost to..." />
              </label>
              <label class="form-group">
                <span class="form-label">Answer</span>
                <textarea rows="3" value=${faq.answer} onInput=${e => updateFaq(idx, 'answer', e.target.value)} placeholder="Plain text answer..." />
              </label>
            </div>
          `)}
          ${(data.faqs || []).length === 0 && html`<p class="text-sm text-muted">No FAQs yet. Click "+ Add FAQ" above.</p>`}
        </div>

        <div class="card" style="margin-bottom: 1rem;">
          <h3 style="margin-bottom: 1rem;">Call-to-Action Section</h3>
          <div class="form-grid">
            <label class="form-group span-2">
              <span class="form-label">CTA Heading</span>
              <input type="text" value=${data.ctaHeading} onInput=${e => update('ctaHeading', e.target.value)} />
            </label>
            <label class="form-group span-2">
              <span class="form-label">CTA Text</span>
              <textarea rows="2" value=${data.ctaText} onInput=${e => update('ctaText', e.target.value)} />
            </label>
            <label class="form-group">
              <span class="form-label">Primary Button Label</span>
              <input type="text" value=${data.ctaPrimaryLabel} onInput=${e => update('ctaPrimaryLabel', e.target.value)} />
            </label>
            <label class="form-group">
              <span class="form-label">Primary Button Link</span>
              <input type="text" value=${data.ctaPrimaryLink} onInput=${e => update('ctaPrimaryLink', e.target.value)} />
            </label>
            <label class="form-group">
              <span class="form-label">Secondary Button Label</span>
              <input type="text" value=${data.ctaSecondaryLabel} onInput=${e => update('ctaSecondaryLabel', e.target.value)} />
            </label>
            <label class="form-group">
              <span class="form-label">Secondary Button Link</span>
              <input type="text" value=${data.ctaSecondaryLink} onInput=${e => update('ctaSecondaryLink', e.target.value)} />
            </label>
          </div>
        </div>
      `;
    }

    // ═══════════════════════════════════════════
    // EVENTS LIST
    // ═══════════════════════════════════════════
    const EVENT_CATEGORIES = ['fundraiser', 'volunteer', 'reveal', 'community', 'other'];
    const EVENT_STATUSES = ['upcoming', 'past', 'cancelled'];
    const EVENT_CAT_LABELS = { fundraiser: 'Fundraiser', volunteer: 'Volunteer', reveal: 'Room Reveal', community: 'Community', other: 'Other' };

    const PRESS_CATEGORIES = ['national-tv', 'local-tv', 'print', 'magazine', 'entertainment'];
    const PRESS_CAT_LABELS = { 'national-tv': 'National TV', 'local-tv': 'Local TV', 'print': 'Print & News', 'magazine': 'Magazine', 'entertainment': 'Entertainment' };

    function EventsList({ events, onEdit, onAdd, onDelete, dashboardFilter, onClearFilter }) {
      const [search, setSearch] = useState('');
      const filtered = useMemo(() => {
        let result = events;
        if (dashboardFilter === 'upcoming') {
          result = result.filter(e => e.status === 'upcoming');
        }
        if (search) {
          const q = search.toLowerCase();
          result = result.filter(e =>
            e.title.toLowerCase().includes(q) ||
            (e.location || '').toLowerCase().includes(q) ||
            (e.category || '').toLowerCase().includes(q)
          );
        }
        return result;
      }, [events, search, dashboardFilter]);

      return html`
        <div class="page-header">
          <h2>Events (${events.length})</h2>
          <button class="btn btn-primary" onClick=${onAdd}>+ Add Event</button>
        </div>
        <div class="card" style="margin-bottom: 1rem; padding: 0.75rem 1rem;">
          <div style="display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;">
            <div class="search-bar" style="flex: 1; min-width: 200px;">
              <span class="search-icon">${icons.search}</span>
              <input placeholder="Search by title, location, or category..."
                value=${search} onInput=${e => setSearch(e.target.value)} />
            </div>
            ${dashboardFilter ? html`
              <button onClick=${onClearFilter} style="display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.35rem 0.75rem; background: var(--color-primary-bg); border: 1px solid var(--color-primary); border-radius: 20px; font-size: 0.8rem; font-weight: 600; color: var(--color-text); cursor: pointer; white-space: nowrap;">
                ${{ 'upcoming': 'Upcoming Events' }[dashboardFilter]} (${filtered.length})
                <span style="font-size: 1rem; line-height: 1;">×</span>
              </button>
            ` : null}
          </div>
        </div>
        <div class="card">
          <div class="table-wrap"><table>
            <thead><tr><th>Title</th><th>Date</th><th>Location</th><th>Category</th><th>Status</th><th>Featured</th><th></th></tr></thead>
            <tbody>
              ${filtered.length === 0 ? html`<tr><td colspan="7"><${EmptyState}
                icon="📅" title=${search ? 'No events match your search' : 'No events yet'}
                description=${search ? 'Try a different search term.' : 'Create your first event.'}
                actionLabel=${search ? null : 'Add Event'} onAction=${onAdd} /></td></tr>` : null}
              ${filtered.map(e => html`<tr key=${e.slug} onClick=${() => onEdit(e.slug)} style="cursor: pointer;">
                <td><strong>${e.title}</strong><span class="team-title-sub text-sm" style="display: none; color: var(--color-text-secondary);">${e.date || ''}${e.location ? ` · ${e.location.slice(0, 30)}` : ''}</span></td>
                <td class="text-sm td-hide-mobile">${e.date || '—'}</td>
                <td class="text-sm td-hide-mobile">${(e.location || '—').slice(0, 30)}${(e.location || '').length > 30 ? '…' : ''}</td>
                <td class="td-hide-mobile"><span class="badge badge-accent">${EVENT_CAT_LABELS[e.category] || e.category}</span></td>
                <td><span class="badge ${e.status === 'upcoming' ? 'badge-green' : e.status === 'cancelled' ? 'badge-red' : 'badge-gray'}">${e.status}</span></td>
                <td class="td-hide-mobile">${e.featured ? icons.star : '—'}</td>
                <td style="white-space: nowrap;">
                  <button class="btn btn-ghost btn-sm" style="color: #E53E3E;" onClick=${(ev) => { ev.stopPropagation(); onDelete(e); }}>Delete</button>
                </td>
              </tr>`)}
            </tbody>
          </table></div>
        </div>
      `;
    }

    // ═══════════════════════════════════════════
    // EVENT EDITOR
    // ═══════════════════════════════════════════
    function EventEditor({ slug, onBack, addToast, existingSlugs = [] }) {
      const [loading, setLoading] = useState(!!slug);
      const [saving, setSaving] = useState(false);
      const [sha, setSha] = useState(null);
      const [dirty, setDirty] = useState(false);
      const [showImagePicker, setShowImagePicker] = useState(false);
      const [imagePickerTarget, setImagePickerTarget] = useState(null);
      const [videoUploading, setVideoUploading] = useState(false);
      const [videoProgress, setVideoProgress] = useState(0);
      const [imageUploading, setImageUploading] = useState(false);
      const [data, setData] = useState({
        title: '', slug: '', date: new Date().toISOString().split('T')[0],
        endDate: '', time: '', location: '', address: '',
        description: '', body: '', image: null,
        streamVideoId: null, videoUrl: null, photos: [],
        ticketUrl: '', ticketPrice: '',
        category: 'other', featured: false, status: 'upcoming', order: 0,
      });

      useEffect(() => {
        if (!slug) return;
        (async () => {
          try {
            const res = await api.readContent(`src/content/events/${slug}.json`);
            if (res.success && res.content) {
              const parsed = typeof res.content === 'string' ? JSON.parse(res.content) : res.content;
              setData(parsed);
              setSha(res.sha);
            } else {
              addToast('Event not found', 'error');
              onBack();
            }
          } catch (err) {
            addToast(`Load error: ${err.message}`, 'error');
          }
          setLoading(false);
        })();
      }, [slug]);

      const update = (key, val) => {
        setData(d => {
          const updated = { ...d, [key]: val };
          if (key === 'title' && !slug) {
            updated.slug = slugify(val);
          }
          return updated;
        });
        setDirty(true);
      };

      // ── Photo upload + reorder hooks ──
      const { uploading, upload: uploadEventPhotos } = useImageUpload({
        setData, setDirty, addToast,
        buildCfId: (file) => `events/${data.slug || 'new'}/${Date.now()}-${file.name.replace(/[^a-z0-9.]/gi, '-')}`,
        arrayKey: 'photos',
        makeEntry: (localUrl, file, tempId) => ({ id: localUrl, alt: '', _tempId: tempId }),
        replaceEntry: (item, res) => ({ id: res.imageId, alt: '' }),
      });
      const { dragHandlers: eventPhotoDragHandlers } = useDragReorder({ setData, setDirty, arrayKey: 'photos' });

      // ── Event Image Upload ──
      const handleImageUpload = async (files) => {
        const file = files[0];
        if (!file) return;
        setImageUploading(true);
        try {
          const cfId = `events/${data.slug || 'new'}/${Date.now()}-${file.name.replace(/[^a-z0-9.]/gi, '-')}`;
          const res = await api.uploadImage(file, cfId);
          if (res.success) {
            update('image', res.imageId);
            addToast('Event image uploaded!', 'success');
          } else {
            addToast(`Image upload failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Upload error: ${err.message}`, 'error');
        }
        setImageUploading(false);
      };

      // ── Video Upload ──
      const handleVideoUpload = async (files) => {
        const file = files[0];
        if (!file) return;
        setVideoUploading(true);
        setVideoProgress(0);
        try {
          const videoName = data.title ? `${data.title} - Event` : file.name;
          const res = await api.uploadVideo(file, videoName, {
            onProgress: (pct) => setVideoProgress(pct),
          });
          update('streamVideoId', res.videoId);
          addToast('Video uploaded to Stream! It may take a few minutes to process.', 'success');
        } catch (err) {
          addToast(`Video upload failed: ${err.message}`, 'error');
        }
        setVideoUploading(false);
        setVideoProgress(0);
      };

      const removeVideo = () => {
        update('streamVideoId', null);
        addToast('Video removed (still exists in Cloudflare dashboard)', 'info');
      };

      const removePhoto = (index) => {
        const photoUrl = (data.photos || [])[index]?.url;
        setDirty(true);
        setData(d => ({ ...d, photos: (d.photos || []).filter((_, i) => i !== index) }));
        const imageId = extractCfImageId(photoUrl);
        if (imageId) { api.deleteImage(imageId).catch(() => {}); }
      };

      const handleSave = async () => {
        if (!data.title) { addToast('Title is required', 'error'); return; }
        if (!data.date) { addToast('Date is required', 'error'); return; }
        if (!data.location) { addToast('Location is required', 'error'); return; }
        if (!data.description) { addToast('Short description is required', 'error'); return; }
        const saveSlug = data.slug || slugify(data.title);
        if (!data.slug) setData(d => ({ ...d, slug: saveSlug }));
        if (!slug && existingSlugs.includes(saveSlug)) {
          addToast(`An event with slug "${saveSlug}" already exists. Change the title or edit the slug.`, 'error'); return;
        }
        setSaving(true);
        try {
          // Clean temp fields before saving
          const saveData = {
            ...data,
            slug: saveSlug,
            streamVideoId: data.streamVideoId || null,
            videoUrl: data.videoUrl || null,
            image: data.image || null,
            photos: (data.photos || []).map(({ _tempId, ...p }) => p).filter(p => p.id && !p.id.startsWith('blob:')),
          };
          const path = `src/content/events/${saveSlug}.json`;
          const content = JSON.stringify(saveData, null, 2);
          const message = slug ? `Update event: ${data.title}` : `Add event: ${data.title}`;
          const res = await api.saveContent(path, content, message, sha || undefined);
          if (res.success) {
            setSha(res.sha);
            setDirty(false);
            addToast('Event saved & published!', 'success');
            logActivity(slug ? 'published' : 'created', 'event', data.title);
          } else {
            addToast(`Save failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Save error: ${err.message}`, 'error');
        }
        setSaving(false);
      };

      useEffect(() => {
        const handler = (e) => { if (dirty) { e.preventDefault(); e.returnValue = ''; } };
        window.addEventListener('beforeunload', handler);
        return () => window.removeEventListener('beforeunload', handler);
      }, [dirty]);

      if (loading) return html`<${EditorSkeleton} />`;

      return html`
        ${showImagePicker ? html`<${ImagePicker}
          onSelect=${(id) => {
            if (imagePickerTarget === 'image') { update('image', id); }
            else if (imagePickerTarget?.startsWith('photo:')) {
              const idx = parseInt(imagePickerTarget.split(':')[1]);
              const photos = [...(data.photos || [])];
              photos[idx] = { ...photos[idx], id };
              update('photos', photos);
            }
            setShowImagePicker(false);
          }}
          onClose=${() => setShowImagePicker(false)}
        />` : null}
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <button onClick=${() => { if (dirty && !confirm('You have unsaved changes. Leave?')) return; onBack(); }}>Events</button>
          <span class="sep">›</span>
          <span class="current">${slug ? data.title || 'Edit' : 'New Event'}</span>
        </nav>
        <div class="page-header">
          <h2>${slug ? 'Edit Event' : 'New Event'}</h2>
          <button class="btn btn-primary" onClick=${handleSave} disabled=${saving}>
            ${saving ? 'Saving...' : 'Save & Publish'}
          </button>
        </div>

        <div class="card" style="margin-bottom: 1rem;">
          <h3 style="margin-bottom: 1rem;">Event Details</h3>
          <div class="form-row" style="margin-bottom: 1.25rem;">
            <div class="form-group">
              <span class="form-label">Title *</span>
              <input class="form-input" type="text" value=${data.title}
                onInput=${e => update('title', e.target.value)} placeholder="Spring Gala 2026" />
            </div>
            <div class="form-group">
              <span class="form-label">Slug</span>
              <input class="form-input" type="text" value=${data.slug}
                onInput=${e => update('slug', e.target.value)} placeholder="spring-gala-2026" />
              <span class="form-hint">/events/ page item</span>
            </div>
          </div>
          <div class="form-row" style="margin-bottom: 1.25rem;">
            <div class="form-group">
              <span class="form-label">Date *</span>
              <input class="form-input" type="date" value=${data.date}
                onInput=${e => update('date', e.target.value)} />
            </div>
            <div class="form-group">
              <span class="form-label">End Date</span>
              <input class="form-input" type="date" value=${data.endDate || ''}
                onInput=${e => update('endDate', e.target.value)} />
              <span class="form-hint">Optional, for multi-day events</span>
            </div>
          </div>
          <div class="form-row" style="margin-bottom: 1.25rem;">
            <div class="form-group">
              <span class="form-label">Time</span>
              <input class="form-input" type="text" value=${data.time || ''}
                onInput=${e => update('time', e.target.value)} placeholder="6:00 PM – 10:00 PM" />
            </div>
            <div class="form-group">
              <span class="form-label">Ticket Price</span>
              <input class="form-input" type="text" value=${data.ticketPrice || ''}
                onInput=${e => update('ticketPrice', e.target.value)} placeholder="$150 per person" />
            </div>
          </div>
          <div class="form-row" style="margin-bottom: 1.25rem;">
            <div class="form-group">
              <span class="form-label">Location *</span>
              <input class="form-input" type="text" value=${data.location}
                onInput=${e => update('location', e.target.value)} placeholder="The Estate at River Run" />
            </div>
            <div class="form-group">
              <span class="form-label">Address</span>
              <input class="form-input" type="text" value=${data.address || ''}
                onInput=${e => update('address', e.target.value)} placeholder="1050 River Run Blvd, Roswell, GA 30076" />
            </div>
          </div>
          <div class="form-group" style="margin-bottom: 1.25rem;">
            <span class="form-label">Ticket / Registration URL</span>
            <input class="form-input" type="url" value=${data.ticketUrl || ''}
              onInput=${e => update('ticketUrl', e.target.value)} placeholder="https://..." />
          </div>
          <div class="form-group" style="margin-bottom: 1.25rem;">
            <span class="form-label">Short Description *</span>
            <textarea class="form-textarea" rows="3" value=${data.description}
              onInput=${e => update('description', e.target.value)}
              placeholder="Brief description shown in event cards..." />
            <span class="form-hint">${(data.description || '').length}/300 characters</span>
          </div>
          <div class="form-group" style="margin-bottom: 1.25rem;">
            <span class="form-label">Extended Details (HTML, optional)</span>
            <textarea class="form-textarea" rows="5" style="font-family: monospace; font-size: 0.85rem;"
              value=${data.body || ''}
              onInput=${e => update('body', e.target.value)}
              placeholder="<p>Additional event details...</p>" />
          </div>
          <div class="form-row" style="margin-bottom: 1.25rem;">
            <div class="form-group">
              <span class="form-label">Category</span>
              <select class="form-select" value=${data.category}
                onChange=${e => update('category', e.target.value)}>
                ${EVENT_CATEGORIES.map(c => html`<option key=${c} value=${c}>${EVENT_CAT_LABELS[c] || c}</option>`)}
              </select>
            </div>
            <div class="form-group">
              <span class="form-label">Status</span>
              <select class="form-select" value=${data.status}
                onChange=${e => update('status', e.target.value)}>
                ${EVENT_STATUSES.map(s => html`<option key=${s} value=${s}>${s.charAt(0).toUpperCase() + s.slice(1)}</option>`)}
              </select>
            </div>
          </div>
          <div class="form-group" style="margin-bottom: 1.25rem;">
            <span class="form-label">Event Card Image</span>
            ${data.image ? html`
              <div style="margin-bottom: 0.75rem; border-radius: 8px; overflow: hidden; max-width: 400px; position: relative;">
                <img src=${cfThumb(data.image)}
                  alt="Event image preview" style="width: 100%; height: 180px; object-fit: cover; display: block;" />
                <button class="btn btn-ghost btn-sm" style="position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); color: white; border-radius: 6px; padding: 0.25rem 0.5rem;"
                  onClick=${() => update('image', null)}>✕ Remove</button>
              </div>
            ` : html`
              <${DropZone} onFiles=${handleImageUpload} multiple=${false} accept="image/*" label="JPG, PNG, WebP — drag or click to upload" />
              <div style="margin-top: 0.5rem; text-align: center;">
                <button class="btn btn-ghost btn-sm" type="button" onClick=${() => { setImagePickerTarget('image'); setShowImagePicker(true); }}>Browse Image Library</button>
              </div>
            `}
            ${imageUploading ? html`
              <div style="display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; padding: 0.5rem 0.75rem; background: rgba(255,218,36,0.12); border-radius: 6px;">
                <span class="spinner" />
                <span style="font-size: 0.85rem;">Uploading image...</span>
              </div>
            ` : null}
          </div>
        </div>

        <!-- Video & Photos -->
        <div class="card" style="margin-bottom: 1rem;">
          <h3 style="margin-bottom: 1rem;">Video</h3>
          <div class="form-group" style="margin-bottom: 1.25rem;">
            <span class="form-label">Event Video</span>
            ${data.streamVideoId ? html`
              <div style="margin-bottom: 0.75rem; border-radius: 8px; overflow: hidden; max-width: 480px; aspect-ratio: 16/9; background: #000;">
                <iframe src=${'https://iframe.videodelivery.net/' + data.streamVideoId}
                  style="width: 100%; height: 100%; border: none;" allow="autoplay; fullscreen" allowfullscreen />
              </div>
              <div style="display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; background: rgba(255,218,36,0.08); border-radius: 8px; border: 1px solid rgba(255,218,36,0.25);">
                <div style="flex: 1; min-width: 0;">
                  <div style="font-weight: 600; font-size: 0.9rem;">Stream video linked</div>
                  <div style="font-size: 0.8rem; color: rgba(0,0,0,0.45); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${data.streamVideoId}</div>
                </div>
                <button class="btn btn-ghost btn-sm" style="font-size: 0.85rem;" onClick=${removeVideo}>Remove</button>
              </div>
            ` : html`
              <${DropZone} onFiles=${handleVideoUpload} multiple=${false} accept="video/*" label="MP4, MOV, WebM — upload event video" />
            `}
            ${videoUploading ? html`
              <div style="margin-top: 0.5rem; padding: 0.75rem; background: rgba(255,218,36,0.1); border-radius: 8px;">
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.4rem;">
                  <span style="font-size: 0.85rem; font-weight: 600;">
                    ${videoProgress < 100 ? 'Uploading video...' : 'Finalising...'}
                  </span>
                  <span style="font-size: 0.8rem; color: rgba(0,0,0,0.45);">${videoProgress}%</span>
                </div>
                <div style="height: 6px; background: rgba(0,0,0,0.08); border-radius: 3px; overflow: hidden;">
                  <div style="height: 100%; width: ${videoProgress}%; background: var(--color-primary); border-radius: 3px; transition: width 0.3s ease;" />
                </div>
                <div style="font-size: 0.75rem; color: rgba(0,0,0,0.35); margin-top: 0.3rem;">
                  Resumable upload — you can close and re-open without losing progress
                </div>
              </div>
            ` : null}
            <span class="form-hint" style="display: block; margin-top: 0.5rem;">Uploaded videos play on your site with no ads.</span>
          </div>
          <div class="form-group" style="margin-bottom: 1.25rem;">
            <span class="form-label">YouTube URL (fallback)</span>
            <input class="form-input" type="url" value=${data.videoUrl || ''}
              onInput=${e => update('videoUrl', e.target.value || null)} placeholder="https://youtube.com/watch?v=..." />
            <span class="form-hint">Used only if no Stream video is uploaded.</span>
          </div>
        </div>

        <div class="card" style="margin-bottom: 1rem;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h3>Event Photos (${(data.photos || []).length})</h3>
          </div>
          <${DropZone} onFiles=${uploadEventPhotos} label="JPG, PNG, WebP — upload event photos" />
          <div style="margin-top: 0.5rem; text-align: center;">
            <button class="btn btn-ghost btn-sm" type="button" onClick=${() => {
              const idx = (data.photos || []).length;
              update('photos', [...(data.photos || []), { id: '', alt: '' }]);
              setImagePickerTarget('photo:' + idx);
              setShowImagePicker(true);
            }}>Browse Image Library</button>
          </div>
          ${(data.photos || []).length > 0 ? html`
            <div class="photo-grid" style="margin-top: 1rem;">
              ${(data.photos || []).map((photo, idx) => html`
                <div key=${idx} class="photo-grid-item"
                  ...${uploading[photo._tempId] ? {} : eventPhotoDragHandlers(idx)}
                  style="position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 4/3; background: #f0f0f0;">
                  <img src=${photo.id && photo.id.startsWith('blob:') ? photo.id : cfThumb(photo.id, 'w=300')}
                    alt=${photo.alt || ''} style="width: 100%; height: 100%; object-fit: cover; display: block;" loading="lazy" />
                  ${uploading[photo._tempId] ? html`
                    <div style="position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center;">
                      <span class="spinner" style="border-color: rgba(255,255,255,0.3); border-top-color: white;" />
                    </div>
                  ` : null}
                  <div style="position: absolute; top: 4px; right: 4px; display: flex; gap: 4px;">
                    <button class="btn btn-ghost btn-sm" style="background: rgba(0,0,0,0.6); color: white; border-radius: 6px; padding: 0.2rem 0.4rem; font-size: 0.75rem;"
                      onClick=${() => removePhoto(idx)} title="Remove">✕</button>
                  </div>
                  <div style="position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.5); padding: 4px 8px;">
                    <input type="text" value=${photo.alt || ''} placeholder="Alt text..."
                      style="width: 100%; background: transparent; border: none; color: white; font-size: 0.75rem; outline: none;"
                      onInput=${e => {
                        const photos = [...(data.photos || [])];
                        photos[idx] = { ...photos[idx], alt: e.target.value };
                        update('photos', photos);
                      }} />
                  </div>
                </div>
              `)}
            </div>
            <p class="text-sm text-muted mt-1">Drag photos to reorder.</p>
          ` : null}
        </div>

        <div class="card" style="margin-bottom: 1rem;">
          <div class="form-row">
            <div class="form-group">
              <span class="form-label">Display Order</span>
              <input class="form-input" type="number" value=${data.order || 0}
                onInput=${e => update('order', Number(e.target.value))} />
            </div>
            <div class="form-group" style="display: flex; align-items: end; padding-bottom: 0.3rem;">
              <label class="checkbox-label">
                <input type="checkbox" checked=${data.featured}
                  onChange=${e => update('featured', e.target.checked)} />
                Featured event (highlighted on events page)
              </label>
            </div>
          </div>
        </div>
      `;
    }

    // ═══════════════════════════════════════════
    // PRESS LIST
    // ═══════════════════════════════════════════
    function PressList({ press, onEdit, onAdd, onDelete }) {
      const [search, setSearch] = useState('');
      const filtered = useMemo(() => {
        if (!search) return press;
        const q = search.toLowerCase();
        return press.filter(p =>
          p.title.toLowerCase().includes(q) ||
          p.outlet.toLowerCase().includes(q) ||
          (p.category || '').toLowerCase().includes(q)
        );
      }, [press, search]);

      return html`
        <div class="page-header">
          <h2>Press & Media (${press.length})</h2>
          <button class="btn btn-primary" onClick=${onAdd}>+ Add Article</button>
        </div>
        <div class="card" style="margin-bottom: 1rem; padding: 0.75rem 1rem;">
          <div class="search-bar" style="max-width: 100%;">
            <span class="search-icon">${icons.search}</span>
            <input placeholder="Search by title, outlet, or category..."
              value=${search} onInput=${e => setSearch(e.target.value)} />
          </div>
        </div>
        <div class="card">
          <div class="table-wrap"><table>
            <thead><tr><th>Image</th><th>Title</th><th>Outlet</th><th>Date</th><th>Category</th><th>Featured</th><th></th></tr></thead>
            <tbody>
              ${filtered.length === 0 ? html`<tr><td colspan="7"><${EmptyState}
                icon="📰" title=${search ? 'No press articles match your search' : 'No press coverage yet'}
                description=${search ? 'Try a different search term.' : 'Add press mentions or check the Press Monitor.'}
                actionLabel=${search ? null : 'Add Press Article'} onAction=${onAdd} /></td></tr>` : null}
              ${filtered.map(p => html`<tr key=${p.slug} onClick=${() => onEdit(p.slug)} style="cursor: pointer;">
                <td style="width: 64px; padding: 0.4rem 0.5rem;">
                  ${p.image ? html`<img src=${p.image + '/nav'}
                    alt="" style="width: 56px; height: 36px; object-fit: cover; border-radius: 4px; display: block;" />` : html`<div style="width: 56px; height: 36px; background: #eee; border-radius: 4px;" />`}
                </td>
                <td><strong>${p.title.length > 55 ? p.title.slice(0, 55) + '…' : p.title}</strong><span class="team-title-sub text-sm" style="display: none; color: var(--color-text-secondary);">${p.outlet || ''}${p.date ? ` · ${p.date}` : ''}</span></td>
                <td class="text-sm td-hide-mobile">${p.outlet}</td>
                <td class="text-sm td-hide-mobile">${p.date || '—'}</td>
                <td class="td-hide-mobile"><span class="badge badge-accent">${PRESS_CAT_LABELS[p.category] || p.category}</span></td>
                <td class="td-hide-mobile">${p.featured ? icons.star : '—'}</td>
                <td style="white-space: nowrap;">
                  <button class="btn btn-ghost btn-sm" style="color: #E53E3E;" onClick=${(ev) => { ev.stopPropagation(); onDelete({ ...p, name: p.title }); }}>Delete</button>
                </td>
              </tr>`)}
            </tbody>
          </table></div>
        </div>
      `;
    }

    // ═══════════════════════════════════════════
    // PRESS EDITOR
    // ═══════════════════════════════════════════
    function PressEditor({ slug, onBack, addToast, existingSlugs = [] }) {
      const [loading, setLoading] = useState(!!slug);
      const [saving, setSaving] = useState(false);
      const [sha, setSha] = useState(null);
      const [dirty, setDirty] = useState(false);
      const [showImagePicker, setShowImagePicker] = useState(false);
      const CF_PRESS = CF; // Use same base as rest of admin
      const [data, setData] = useState(() => {
        // Check for pre-filled data from Press Monitor
        const prefill = sessionStorage.getItem('press-prefill');
        if (prefill && !slug) {
          sessionStorage.removeItem('press-prefill');
          try { return { ...JSON.parse(prefill) }; } catch {}
        }
        return {
          outlet: '', outletLogo: '', category: 'print',
          title: '', slug: '', date: new Date().toISOString().split('T')[0],
          url: '', excerpt: '', image: null,
          featured: false, order: 0,
          videoId: null, featuredHeadline: null, featuredDescription: null,
        };
      });

      useEffect(() => {
        if (!slug) return;
        (async () => {
          try {
            const res = await api.readContent(`src/content/press/${slug}.json`);
            if (res.success && res.content) {
              const parsed = typeof res.content === 'string' ? JSON.parse(res.content) : res.content;
              if (!parsed.slug) parsed.slug = slug;
              setData(parsed);
              setSha(res.sha);
            } else {
              addToast('Press article not found', 'error');
              onBack();
            }
          } catch (err) {
            addToast(`Load error: ${err.message}`, 'error');
          }
          setLoading(false);
        })();
      }, [slug]);

      const update = (key, val) => {
        setData(d => {
          const updated = { ...d, [key]: val };
          if (key === 'outlet' && !slug) {
            const yr = (d.date || '').split('-')[0] || '';
            updated.slug = slugify(val + (yr ? ' ' + yr : ''));
          }
          if (key === 'date' && !slug && d.outlet) {
            const yr = (val || '').split('-')[0] || '';
            updated.slug = slugify(d.outlet + (yr ? ' ' + yr : ''));
          }
          return updated;
        });
        setDirty(true);
      };

      const handleSave = async () => {
        if (!data.title) { addToast('Title is required', 'error'); return; }
        if (!data.outlet) { addToast('Outlet is required', 'error'); return; }
        const fileSlug = data.slug || (() => {
          const yr = (data.date || '').split('-')[0] || '';
          return slugify(data.outlet + (yr ? ' ' + yr : ''));
        })();
        if (!data.slug) setData(d => ({ ...d, slug: fileSlug }));
        if (!slug && existingSlugs.includes(fileSlug)) {
          addToast(`A press article with slug "${fileSlug}" already exists. Edit the slug to make it unique.`, 'error'); return;
        }
        setSaving(true);
        try {
          const saveData = { ...data };
          delete saveData.slug;
          if (!saveData.videoId) delete saveData.videoId;
          if (!saveData.featuredHeadline) delete saveData.featuredHeadline;
          if (!saveData.featuredDescription) delete saveData.featuredDescription;
          const path = `src/content/press/${fileSlug}.json`;
          const content = JSON.stringify(saveData, null, 2);
          const message = slug ? `Update press: ${saveData.title}` : `Add press: ${saveData.title}`;
          const res = await api.saveContent(path, content, message, sha || undefined);
          if (res.success) {
            setSha(res.sha);
            setDirty(false);
            addToast('Press article saved & published!', 'success');
            logActivity(slug ? 'published' : 'created', 'press article', data.title);
          } else {
            addToast(`Save failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Save error: ${err.message}`, 'error');
        }
        setSaving(false);
      };

      useEffect(() => {
        const handler = (e) => { if (dirty) { e.preventDefault(); e.returnValue = ''; } };
        window.addEventListener('beforeunload', handler);
        return () => window.removeEventListener('beforeunload', handler);
      }, [dirty]);

      if (loading) return html`<${EditorSkeleton} />`;

      return html`
        ${showImagePicker ? html`<${ImagePicker}
          onSelect=${(id) => { update('image', id); setShowImagePicker(false); setDirty(true); }}
          onClose=${() => setShowImagePicker(false)}
        />` : null}
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <button onClick=${() => { if (dirty && !confirm('You have unsaved changes. Leave?')) return; onBack(); }}>Press & Media</button>
          <span class="sep">›</span>
          <span class="current">${slug ? data.title || 'Edit' : 'New Article'}</span>
        </nav>
        <div class="page-header">
          <h2>${slug ? 'Edit Press Article' : 'New Press Article'}</h2>
          <button class="btn btn-primary" onClick=${handleSave} disabled=${saving}>
            ${saving ? 'Saving...' : 'Save & Publish'}
          </button>
        </div>

        <div class="card" style="margin-bottom: 1rem;">
          <h3 style="margin-bottom: 1rem;">Article Details</h3>
          <div class="form-group" style="margin-bottom: 1.25rem;">
            <span class="form-label">Article Title *</span>
            <input class="form-input" type="text" value=${data.title}
              onInput=${e => update('title', e.target.value)} placeholder="How SOARD Transforms Homes and Lives" />
          </div>
          <div class="form-row" style="margin-bottom: 1.25rem;">
            <div class="form-group">
              <span class="form-label">Outlet *</span>
              <input class="form-input" type="text" value=${data.outlet}
                onInput=${e => update('outlet', e.target.value)} placeholder="11Alive (NBC Atlanta)" />
            </div>
            <div class="form-group">
              <span class="form-label">Outlet Logo Key</span>
              <input class="form-input" type="text" value=${data.outletLogo || ''}
                onInput=${e => update('outletLogo', e.target.value)} placeholder="11alive" />
              <span class="form-hint">Used for logo matching on the page</span>
            </div>
          </div>
          <div class="form-row" style="margin-bottom: 1.25rem;">
            <div class="form-group">
              <span class="form-label">Date *</span>
              <input class="form-input" type="date" value=${data.date}
                onInput=${e => update('date', e.target.value)} />
            </div>
            <div class="form-group">
              <span class="form-label">Category</span>
              <select class="form-select" value=${data.category}
                onChange=${e => update('category', e.target.value)}>
                ${PRESS_CATEGORIES.map(c => html`<option key=${c} value=${c}>${PRESS_CAT_LABELS[c]}</option>`)}
              </select>
            </div>
          </div>
          <div class="form-group" style="margin-bottom: 1.25rem;">
            <span class="form-label">Slug</span>
            <input class="form-input" type="text" value=${data.slug || ''}
              onInput=${e => { setData(d => ({ ...d, slug: e.target.value })); setDirty(true); }}
              placeholder="11alive-2025" />
            <span class="form-hint">File name — auto-generated from outlet + year</span>
          </div>
          <div class="form-group" style="margin-bottom: 1.25rem;">
            <span class="form-label">Article URL *</span>
            <input class="form-input" type="url" value=${data.url}
              onInput=${e => update('url', e.target.value)} placeholder="https://www.11alive.com/article/..." />
          </div>
          <div class="form-group" style="margin-bottom: 1.25rem;">
            <span class="form-label">Excerpt *</span>
            <textarea class="form-textarea" rows="3" value=${data.excerpt}
              onInput=${e => update('excerpt', e.target.value)}
              placeholder="Brief summary of the coverage..." />
            <span class="form-hint">${(data.excerpt || '').length}/300 characters</span>
          </div>
        </div>

        <div class="card" style="margin-bottom: 1rem;">
          <h3 style="margin-bottom: 1rem;">Image</h3>
          <div class="form-group" style="margin-bottom: 1.25rem;">
            <span class="form-label">Cloudflare Image URL</span>
            <div style="display: flex; gap: 0.5rem;">
              <input class="form-input" type="text" style="flex: 1;" value=${data.image || ''}
                onInput=${e => update('image', e.target.value || null)}
                placeholder="press/11alive-2025" />
              <button class="btn btn-ghost" type="button" onClick=${() => setShowImagePicker(true)}>Browse</button>
            </div>
            <span class="form-hint">Cloudflare Images ID (e.g. press/11alive-2025). Leave blank for no image.</span>
            ${data.image ? html`
              <div style="margin-top: 0.75rem; border-radius: 8px; overflow: hidden; max-width: 400px;">
                <img src=${data.image + '/public'}

                  onError=${e => { e.target.style.display = 'none'; }} />
              </div>
            ` : null}
          </div>
        </div>

        <div class="card" style="margin-bottom: 1rem;">

        ${data.featured ? html`

          <div class="form-group" style="margin-bottom: 1.25rem;">
            <span class="form-label">Featured Headline</span>

          </div>
          <div class="form-group">
            <span class="form-label">YouTube Video ID</span>
            <input class="form-input" type="text" value=${data.videoId || ''}
              onInput=${e => update('videoId', e.target.value || null)}
