      const [uploading, setUploading] = useState({});
      const [videoUploading, setVideoUploading] = useState(false);
      const [generatingSeo, setGeneratingSeo] = useState(false);
      const [generatingAlt, setGeneratingAlt] = useState(false);
      const [showCsImagePicker, setShowCsImagePicker] = useState(false);
      const [csImagePickerTarget, setCsImagePickerTarget] = useState(null);
      const [showPreview, setShowPreview] = useState(false);
      const [previewDevice, setPreviewDevice] = useState('desktop');
      const [lastSaved, setLastSaved] = useState(null);
      const CF = 'https://imagedelivery.net/ROYFuPmfN2vPS6mt5sCkZQ';

      // Generate SEO fields with AI
      const handleGenerateSeo = async () => {
        if (!data.name) { addToast('Add a name first', 'error'); return; }
        setGeneratingSeo(true);
        try {
          const res = await api.generate('seo', data);
          if (res.success) {
            setDirty(true);
            setData(d => ({
              ...d,
              shortDescription: res.shortDescription || d.shortDescription,
              metaDescription: res.metaDescription || d.metaDescription,
            }));
            addToast('SEO fields generated', 'success');
          } else {
            addToast(`Generation failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Error: ${err.message}`, 'error');
        }
        setGeneratingSeo(false);
      };

      // Generate alt text for all photos with AI
      const handleGenerateAlt = async () => {
        if (!data.photos?.length) { addToast('Upload photos first', 'error'); return; }
        setGeneratingAlt(true);
        try {
          const res = await api.generate('alt-text', data);
          if (res.success && res.altTexts) {
            setDirty(true);
            setData(d => ({
              ...d,
              photos: d.photos.map((p, i) => ({
                ...p,
                alt: res.altTexts[i] || p.alt || '',
              })),
            }));
            addToast(`Generated alt text for ${res.altTexts.filter(Boolean).length} photos`, 'success');
          } else {
            addToast(`Generation failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Error: ${err.message}`, 'error');
        }
        setGeneratingAlt(false);
      };

      // Update a single photo's alt text
      const updatePhotoAlt = (index, alt) => {
        setDirty(true);
        setData(d => ({
          ...d,
          photos: d.photos.map((p, i) => i === index ? { ...p, alt } : p),
        }));
      };

      // ─── Partner Linking ──────────────────
      const [partnerSearch, setPartnerSearch] = useState('');

      const isPartnerLinked = (partner) => {
        return (data.partnerLogos || []).some(pl => pl.url === partner.logo);
      };

      const togglePartner = (partner) => {
        setDirty(true);
        setData(d => {
          const existing = d.partnerLogos || [];
          const linked = existing.some(pl => pl.url === partner.logo);
          if (linked) {
            return { ...d, partnerLogos: existing.filter(pl => pl.url !== partner.logo) };
          } else {
            return { ...d, partnerLogos: [...existing, { url: partner.logo, name: partner.name }] };
          }
        });
      };

      const removePartnerLogo = (index) => {
        setDirty(true);
        setData(d => ({
          ...d,
          partnerLogos: d.partnerLogos.filter((_, i) => i !== index),
        }));
      };

      // Auto-generate SEO fields when enough context is filled in (new kids only)
      const seoAutoRan = useRef(false);
      useEffect(() => {
        if (slug) return; // editing existing kid — don't auto-run
        if (seoAutoRan.current || generatingSeo) return;
        if (!data.name || (!data.diagnosis && !data.bio)) return;
        if (data.shortDescription || data.metaDescription) return;
        seoAutoRan.current = true;
        handleGenerateSeo();
      }, [data.name, data.diagnosis, data.bio]);

      // Auto-generate alt text when all uploads finish
      const prevUploadCount = useRef(0);
      useEffect(() => {
        const count = Object.keys(uploading).length;
        if (prevUploadCount.current > 0 && count === 0) {
          const hasBlankAlt = data.photos.some(p => p.url && !p._tempId && !p.alt);
          if (hasBlankAlt && !generatingAlt) {
            handleGenerateAlt();
          }
        }
        prevUploadCount.current = count;
      }, [uploading]);

      // Warn on browser close/refresh with unsaved changes
      useEffect(() => {
        const handler = (e) => { if (dirty) { e.preventDefault(); e.returnValue = ''; } };
        window.addEventListener('beforeunload', handler);
        return () => window.removeEventListener('beforeunload', handler);
      }, [dirty]);

      // Auto-save to localStorage every 5s when dirty
      const draftKey = `soard-draft-kid-${slug || 'new'}`;
      useEffect(() => {
        if (!dirty) return;
        const timer = setTimeout(() => {
          try { localStorage.setItem(draftKey, JSON.stringify(data)); } catch (e) {}
        }, 5000);
        return () => clearTimeout(timer);
      }, [dirty, data]);

      // Recover draft on mount
      const [hasDraft, setHasDraft] = useState(false);
      useEffect(() => {
        if (loading) return;
        try {
          const saved = localStorage.getItem(draftKey);
          if (saved) setHasDraft(true);
        } catch (e) {}
      }, [loading]);

      const restoreDraft = () => {
        try {
          const saved = JSON.parse(localStorage.getItem(draftKey));
          if (saved) { setData(saved); setDirty(true); setHasDraft(false); addToast('Draft restored', 'success'); }
        } catch (e) { addToast('Could not restore draft', 'error'); }
      };
      const dismissDraft = () => { localStorage.removeItem(draftKey); setHasDraft(false); };
      const clearDraft = () => { try { localStorage.removeItem(draftKey); } catch (e) {} };

      const safeBack = () => {
        if (dirty && !confirm('You have unsaved changes. Leave without saving?')) return;
        clearDraft();
        onBack();
      };

      const handleDelete = async () => {
        if (!slug || !sha) return;
        setDeleting(true);
        try {
          const res = await api.deleteContent(
            `src/content/kids/${slug}.json`, sha, `Delete kid: ${data.name}`
          );
          if (res.success) {
            addToast(`${data.name} deleted`, 'success');
            logActivity('deleted', 'kid', data.name);
            setDirty(false);
            onBack();
          } else {
            addToast(`Delete failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Delete error: ${err.message}`, 'error');
        }
        setDeleting(false);
        setShowDeleteModal(false);
      };

      // Load existing kid
      useEffect(() => {
        if (!slug) return;
        (async () => {
          const res = await api.readContent(`src/content/kids/${slug}.json`);
          if (res.success) {
            const parsed = JSON.parse(res.content);
            setData(parsed);
            setSha(res.sha);
          } else {
            addToast('Failed to load kid data', 'error');
          }
          setLoading(false);
        })();
      }, [slug]);

      const updateField = (field, value) => {
        setDirty(true);
        setData(d => {
          const updated = { ...d, [field]: value };
          // Auto-generate slug from name for new kids
          if (field === 'name' && !slug) {
            updated.slug = slugify(value);
          }
          return updated;
        });
      };

      const handlePhotoUpload = async (files) => {
        setDirty(true);
        // Warn about large files
        const largeFiles = files.filter(f => f.size > 5 * 1024 * 1024);
        if (largeFiles.length) {
          addToast(`${largeFiles.map(f => f.name + ' (' + (f.size / 1024 / 1024).toFixed(1) + 'MB)').join(', ')} — large files may slow upload. Consider under 5MB.`, 'info');
        }
        for (const file of files) {
          const tempId = Date.now() + '-' + file.name;
          // Add placeholder with local preview
          const localUrl = URL.createObjectURL(file);
          setData(d => ({
            ...d,
            photos: [...d.photos, { url: localUrl, alt: '', _tempId: tempId }],
            photoCount: d.photoCount + 1,
          }));
          setUploading(u => ({ ...u, [tempId]: true }));

          try {
            const cfId = `kids/${data.slug || 'new'}/${Date.now()}-${file.name.replace(/[^a-z0-9.]/gi, '-')}`;
            const res = await api.uploadImage(file, cfId);
            if (res.success) {
              setData(d => ({
                ...d,
                photos: d.photos.map(p =>
                  p._tempId === tempId
                    ? { url: res.imageUrl, alt: '', cfImageId: res.imageId }
                    : p
                ),
              }));
              addToast(`Uploaded ${file.name}`, 'success');
            } else {
              addToast(`Failed: ${res.error}`, 'error');
              // Remove placeholder
              setData(d => ({
                ...d,
                photos: d.photos.filter(p => p._tempId !== tempId),
                photoCount: d.photoCount - 1,
              }));
            }
          } catch (err) {
            addToast(`Upload error: ${err.message}`, 'error');
          }
          setUploading(u => { const n = { ...u }; delete n[tempId]; return n; });
        }
      };

      const removePhoto = (index) => {
        setDirty(true);
        setData(d => ({
          ...d,
          photos: d.photos.filter((_, i) => i !== index),
          photoCount: d.photoCount - 1,
        }));
      };

      // Drag-to-reorder photos
      const dragIdx = useRef(null);
      const reorderPhotos = (fromIdx, toIdx) => {
        if (fromIdx === toIdx) return;
        setDirty(true);
        setData(d => {
          const photos = [...d.photos];
          const [moved] = photos.splice(fromIdx, 1);
          photos.splice(toIdx, 0, moved);
          return { ...d, photos };
        });
      };

      const setHero = (index) => {
        setDirty(true);
        setData(d => ({ ...d, heroImage: d.photos[index]?.url || '' }));
      };

      const handleVideoUpload = async (files) => {
        const file = files[0];
        if (!file) return;
        setVideoUploading(true);
        try {
          const videoName = data.name ? `${data.name} - Room Reveal` : file.name;
          const res = await api.uploadVideo(file, videoName);
          if (res.success) {
            updateField('streamVideoId', res.videoId);
            addToast('Video uploaded to Stream! It may take a few minutes to process.', 'success');
          } else {
            addToast(`Video upload failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Video upload error: ${err.message}`, 'error');
        }
        setVideoUploading(false);
      };

      const removeVideo = () => {
        setData(d => ({ ...d, streamVideoId: '' }));
        addToast('Stream video removed (video still exists in Cloudflare dashboard)', 'info');
      };

      const handleSave = async (asDraft = false) => {
        setTouched({ name: true });
        if (!data.name || !data.slug) {
          addToast('Name is required', 'error');
          return;
        }
        setSaving(true);
        try {
          // Clean up temp fields before saving
          const saveData = {
            ...data,
            publishStatus: asDraft ? 'draft' : 'published',
            age: data.age ? Number(data.age) : null,
            year: data.year ? Number(data.year) : null,
            streamVideoId: data.streamVideoId || null,
            videoUrl: data.videoUrl || null,
            fundraisingUrl: data.fundraisingUrl || null,
            photos: data.photos.map(({ _tempId, ...p }) => p),
            photoCount: data.photos.length,
          };
          const path = `src/content/kids/${data.slug}.json`;
          const content = JSON.stringify(saveData, null, 2);
          const message = asDraft
            ? `Draft: ${data.name}`
            : slug ? `Update kid: ${data.name}` : `Add kid: ${data.name}`;
          const res = await api.saveContent(path, content, message, sha || undefined);
          if (res.success) {
            setSha(res.sha);
            setDirty(false);
            clearDraft();
            updateField('publishStatus', asDraft ? 'draft' : 'published');
            addToast(asDraft ? `${data.name} saved as draft` : `${data.name} published! Site rebuilding...`, 'success');
            logActivity(asDraft ? 'drafted' : (slug ? 'updated' : 'created'), 'kid', data.name);
            setLastSaved(new Date());
          } else {
            addToast(`Save failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Save error: ${err.message}`, 'error');
        }
        setSaving(false);
      };

      if (loading) return html`<${EditorSkeleton} />`;

      return html`
        ${showCsImagePicker ? html`<${ImagePicker}
          onSelect=${(id) => {
            const url = CF + '/' + id + '/public';
            if (csImagePickerTarget) {
              const { section, index, field } = csImagePickerTarget;
              const cs = { ...(data.caseStudy || {}) };
              if (section === 'gallery') {
                cs.gallery = [...(cs.gallery || [])];
                cs.gallery[index] = { ...cs.gallery[index], [field]: url };
              } else {
                cs[section] = { ...(cs[section] || {}) };
                cs[section].photos = [...(cs[section].photos || [])];
                cs[section].photos[index] = { ...cs[section].photos[index], [field]: url };
              }
              updateField('caseStudy', cs);
            }
            setShowCsImagePicker(false);
          }}
          onClose=${() => setShowCsImagePicker(false)}
        />` : null}
        ${showDeleteModal ? html`<${ConfirmModal}
          title="Delete ${data.name}?"
          message="This will permanently remove this kid's profile and all associated data from the site. This cannot be undone."
          danger=${true}
          onConfirm=${handleDelete}
          onCancel=${() => setShowDeleteModal(false)}
        />` : null}
        ${hasDraft ? html`
          <div style="display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; background: #FEFCF5; border: 1px solid #FFD500; border-radius: 10px; margin-bottom: 1rem;">
            <span style="font-size: 1.1rem;">${icons.warning}</span>
            <span style="flex: 1; font-size: 0.9rem;">You have an unsaved draft from a previous session.</span>
            <button class="btn btn-primary btn-sm" onClick=${restoreDraft}>Restore</button>
            <button class="btn btn-ghost btn-sm" onClick=${dismissDraft}>Dismiss</button>
          </div>
        ` : null}
        <div style="display: flex; align-items: center; justify-content: space-between;">
          <nav class="breadcrumb" aria-label="Breadcrumb">
            <button onClick=${safeBack}>Kids</button>
            <span class="sep">›</span>
            <span class="current">${slug ? data.name || 'Edit' : 'New Kid'}</span>
          </nav>
          <div class="save-status">
            ${saving
              ? html`<span class="save-status-dot saving"></span> Saving...`
              : dirty
                ? html`<span class="save-status-dot unsaved"></span> Unsaved changes`
                : lastSaved
                  ? html`<span class="save-status-dot saved"></span> Saved ${lastSaved.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`
                  : slug
                    ? html`<span class="save-status-dot saved"></span> All changes saved`
                    : null
            }
          </div>
        </div>
        <div class="page-header">
          <h2 style="display: flex; align-items: center; gap: 0.5rem;">
            ${slug ? `Edit: ${data.name}` : 'Add New Kid'}
            ${slug ? html`<span class=${data.publishStatus === 'draft' ? 'draft-badge-draft' : 'draft-badge-published'}>
              ${data.publishStatus === 'draft' ? 'Draft' : 'Published'}
            </span>` : null}
          </h2>
          <div class="flex gap-1 items-center">
            ${slug ? html`<button class="btn btn-ghost btn-sm" onClick=${() => setShowPreview(true)}>Preview</button>` : null}
            ${slug ? html`<button class="btn btn-danger btn-sm" onClick=${() => setShowDeleteModal(true)} disabled=${deleting}>
              ${deleting ? html`<span class="spinner" />` : null} Delete
            </button>` : null}
            ${slug ? html`<button class="btn btn-ghost btn-sm" onClick=${() => {
              const dt = prompt('Schedule publish date/time (YYYY-MM-DD HH:MM):', '');
              if (dt) {
                const d = new Date(dt);
                if (isNaN(d.getTime())) { addToast('Invalid date format', 'error'); return; }
                if (d <= new Date()) { addToast('Scheduled date must be in the future', 'error'); return; }
                updateField('scheduledPublish', d.toISOString());
                addToast('Publish scheduled for ' + d.toLocaleString(), 'success');
              }
            }}>Schedule</button>` : null}
            <button class="btn btn-ghost" onClick=${() => handleSave(true)} disabled=${saving}>
              ${saving ? 'Saving...' : 'Save Draft'}
            </button>
            <button class="btn btn-primary" onClick=${() => handleSave(false)} disabled=${saving}>
              ${saving ? html`<span class="spinner" />` : null}
              ${saving ? 'Saving...' : 'Save & Publish'}
            </button>
          </div>
        </div>

        ${data.scheduledPublish ? html`
          <div class="schedule-bar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            <span style="flex: 1;">Scheduled to publish <strong>${new Date(data.scheduledPublish).toLocaleString()}</strong></span>
            <button class="btn btn-ghost btn-sm" onClick=${() => { updateField('scheduledPublish', null); }}>Cancel Schedule</button>
          </div>
        ` : null}

        <div class="card">
          <h3 style="margin-bottom: 1rem;">Basic Info</h3>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Name *</label>
              <input class="form-input ${touched.name && !data.name ? 'is-invalid' : ''}" value=${data.name}
                onInput=${e => updateField('name', e.target.value)}
                onBlur=${() => setTouched(t => ({ ...t, name: true }))}
                placeholder="e.g., Amari" />
              ${touched.name && !data.name ? html`<div class="form-error">Name is required</div>` : null}
            </div>
            <div class="form-group">
              <label class="form-label">Slug</label>
              <input class="form-input" value=${data.slug}
                onInput=${e => updateField('slug', e.target.value)}
                placeholder="auto-generated" ${slug ? 'disabled' : ''} />
              <div class="form-hint">URL path: /kids/${data.slug || '...'}</div>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Age</label>
              <input class="form-input" type="number" value=${data.age || ''}
                onInput=${e => updateField('age', e.target.value)} placeholder="e.g., 10" />
            </div>
            <div class="form-group">
              <label class="form-label">Year</label>
              <input class="form-input" type="number" value=${data.year || ''}
                onInput=${e => updateField('year', e.target.value)} />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Diagnosis</label>
            <input class="form-input" value=${data.diagnosis || ''}
              onInput=${e => updateField('diagnosis', e.target.value)}
              placeholder="e.g., Cerebral Palsy" />
          </div>
          <div class="form-group">
            <label class="form-label">Room Types</label>
            <${RoomTypePicker} value=${data.roomTypes || []} onChange=${v => updateField('roomTypes', v)} />
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select class="form-select" value=${data.status}
              onChange=${e => updateField('status', e.target.value)}>
              <option value="completed">Completed</option>
              <option value="in-progress">In Progress</option>
            </select>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Room Count</label>
              <input class="form-input" type="number" min="1" value=${data.roomCount || 1}
                onInput=${e => updateField('roomCount', parseInt(e.target.value) || 1)} />
              <div class="form-hint">Number of rooms built for this kid (auto-counted in site stats)</div>
            </div>
            <div class="form-group">
              <label class="form-label">Child Count</label>
              <input class="form-input" type="number" min="1" value=${data.childCount || 1}
                onInput=${e => updateField('childCount', parseInt(e.target.value) || 1)} />
              <div class="form-hint">Number of children in this profile (>1 for siblings)</div>
            </div>
          </div>
        </div>

        <div class="card">
          <h3 style="margin-bottom: 1rem;">Story</h3>
          <div class="form-group">
            <label class="form-label">Bio</label>
            <${RichTextEditor} value=${data.bio || ''}
              onChange=${v => updateField('bio', v)}
              placeholder="Tell this child's story..."
              minHeight=${200} />
          </div>
          <div class="form-group">
            <label class="form-label">Quote (optional)</label>
            <input class="form-input" value=${data.quote || ''}
              onInput=${e => updateField('quote', e.target.value)} />
          </div>
          <div class="form-group">
            <label class="form-label">YouTube URL (optional)</label>
            <input class="form-input" value=${data.videoUrl || ''}
              onInput=${e => updateField('videoUrl', e.target.value)}
              placeholder="https://youtu.be/..." />
            <small style="color: rgba(0,0,0,0.45); margin-top: 0.25rem; display: block;">Used for sharing & SEO. Also used as site embed if no Stream video is uploaded.</small>
          </div>
          <div class="form-group">
            <label class="form-label">Cloudflare Stream Video (optional)</label>
            ${data.streamVideoId ? html`
              <div style="display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; background: rgba(122, 0, 223, 0.06); border-radius: 8px; border: 1px solid rgba(122, 0, 223, 0.15);">
                <span style="font-size: 1.5rem;">${icons.video}</span>
                <div style="flex: 1; min-width: 0;">
                  <div style="font-weight: 600; font-size: 0.9rem;">Stream video linked</div>
                  <div style="font-size: 0.8rem; color: rgba(0,0,0,0.45); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${data.streamVideoId}</div>
                </div>
                <button class="btn btn-ghost" style="font-size: 0.85rem; padding: 0.3rem 0.6rem;" onClick=${removeVideo}>Remove</button>
              </div>
            ` : html`
              <${DropZone} onFiles=${handleVideoUpload} multiple=${false} accept="video/*" label="MP4, MOV, WebM — upload reveal video" />
            `}
            ${videoUploading ? html`
              <div style="display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; padding: 0.5rem 0.75rem; background: rgba(255,213,0,0.1); border-radius: 6px;">
                <span class="spinner" />
                <span style="font-size: 0.85rem;">Uploading video to Cloudflare Stream...</span>
              </div>
            ` : null}
            <small style="color: rgba(0,0,0,0.45); margin-top: 0.25rem; display: block;">Uploaded videos play on your site with no ads. Best performance for donors.</small>
          </div>
          <div class="form-group">
            <label class="form-label">Photographer (optional)</label>
            <input class="form-input" value=${data.photographer || ''}
              onInput=${e => updateField('photographer', e.target.value)} />
          </div>
          <div class="form-group">
            <label class="form-label">Zeffy Fundraising Link (optional)</label>
            <input class="form-input" value=${data.fundraisingUrl || ''}
              onInput=${e => updateField('fundraisingUrl', e.target.value)}
              placeholder="https://www.zeffy.com/..." />
            <small style="color: rgba(0,0,0,0.45); margin-top: 0.25rem; display: block;">Individual fundraising page for this child. Displays a "Help Fund This Room" button on their profile.</small>
          </div>
        </div>

        <div class="card">
          <div class="flex items-center justify-between mb-1">
            <h3>Photos</h3>
          </div>
          <p class="text-sm text-muted mb-1">Upload photos, click star for hero.</p>
          <${DropZone} onFiles=${handlePhotoUpload} label="JPG, PNG, WebP — upload as many as you need" />
          ${data.photos.length > 0 ? html`
            <div class="photo-grid">
              ${data.photos.map((photo, i) => html`
                <div key=${photo.url || i} class="photo-grid-item"
                  draggable=${!uploading[photo._tempId]}
                  onDragStart=${(e) => { dragIdx.current = i; e.currentTarget.classList.add('dragging'); }}
                  onDragEnd=${(e) => { dragIdx.current = null; e.currentTarget.classList.remove('dragging'); }}
                  onDragOver=${(e) => { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }}
                  onDragLeave=${(e) => { e.currentTarget.classList.remove('drag-over'); }}

    // PARTNERS LIST

    function PartnersList({ partners, onEdit, onAdd, onDelete }) {
      const [search, setSearch] = useState('');
      const filtered = useMemo(() => {
        if (!search) return partners;
        const q = search.toLowerCase();
        return partners.filter(p =>
          p.name.toLowerCase().includes(q) ||
          (p.tier || '').toLowerCase().includes(q) ||
          (p.website || '').toLowerCase().includes(q)
        );
      }, [partners, search]);

      return html`
        <div class="page-header">
          <h2>Partners (${partners.length})</h2>
          <button class="btn btn-primary" onClick=${onAdd}>+ Add Partner</button>
        </div>
        <div class="card" style="margin-bottom: 1rem; padding: 0.75rem 1rem;">
          <div class="search-bar" style="max-width: 100%;">
            <span class="search-icon">${icons.search}</span>
            <input placeholder="Search by name, tier, or website..."
              value=${search} onInput=${e => setSearch(e.target.value)} />
          </div>
        </div>
        <div class="card">
          <div class="table-wrap"><table>
            <thead><tr><th></th><th>Name</th><th>Tier</th><th>Featured</th><th></th></tr></thead>
            <tbody>
              ${filtered.length === 0 ? html`<tr><td colspan="5"><${EmptyState}
                icon="🤝" title=${search ? 'No partners match your search' : 'No partners yet'}
                description=${search ? 'Try a different search term.' : 'Add your first partner organization.'}
                actionLabel=${search ? null : 'Add Partner'} onAction=${onAdd} /></td></tr>` : null}
              ${filtered.map(p => html`<tr key=${p.slug}>
                <td>${p.logo ? html`<img class="td-thumb" src="${p.logo}" alt="" style="object-fit: contain; background: #fff;" />` : '—'}</td>
                <td><strong>${p.name}</strong></td>
                <td><span class="badge badge-accent">${p.tier}</span></td>
                <td>${p.featured ? icons.check : '—'}</td>
                <td style="white-space: nowrap;">
                  <button class="btn btn-ghost btn-sm" onClick=${() => onEdit(p.slug)}>Edit</button>
                  <button class="btn btn-ghost btn-sm" style="color: #E53E3E;" onClick=${(e) => { e.stopPropagation(); onDelete(p); }}>Delete</button>
                </td>
              </tr>`)}
            </tbody>
          </table></div>
        </div>
      `;
    }

      const [deleting, setDeleting] = useState(false);
      const [showDeleteModal, setShowDeleteModal] = useState(false);
      const [dirty, setDirty] = useState(false);
      const [sha, setSha] = useState(null);
      const [logoPreview, setLogoPreview] = useState('');
      const [uploading, setUploading] = useState(false);
      const [data, setData] = useState({
        name: '', slug: '', logo: '', website: '',
        tier: 'construction', featured: false,
      });

      // Warn on browser close/refresh with unsaved changes
      useEffect(() => {
        const handler = (e) => { if (dirty) { e.preventDefault(); e.returnValue = ''; } };
        window.addEventListener('beforeunload', handler);
        return () => window.removeEventListener('beforeunload', handler);
      }, [dirty]);

      const safeBack = () => {
        if (dirty && !confirm('You have unsaved changes. Leave without saving?')) return;
        onBack();
      };

      const handleDelete = async () => {
        if (!slug || !sha) return;
        setDeleting(true);
        try {
          const res = await api.deleteContent(
            `src/content/partners/${slug}.json`, sha, `Delete partner: ${data.name}`
          );
          if (res.success) {
            addToast(`${data.name} deleted`, 'success');
            logActivity('deleted', 'partner', data.name);
            setDirty(false);
            onBack();
          } else {
            addToast(`Delete failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Delete error: ${err.message}`, 'error');
        }
        setDeleting(false);
        setShowDeleteModal(false);
      };

      useEffect(() => {
        if (!slug) return;
        (async () => {
          const res = await api.readContent(`src/content/partners/${slug}.json`);
          if (res.success) {
            setData(JSON.parse(res.content));
            setSha(res.sha);
            setLogoPreview(JSON.parse(res.content).logo);
          }
          setLoading(false);
        })();
      }, [slug]);

      const updateField = (field, value) => {
        setDirty(true);
        setData(d => {
          const updated = { ...d, [field]: value };
          if (field === 'name' && !slug) updated.slug = slugify(value);
          return updated;
        });
      };

      const handleLogoUpload = async (files) => {
        setDirty(true);
        const file = files[0];
        setLogoPreview(URL.createObjectURL(file));
        setUploading(true);
        try {
          const cfId = `partners/${data.slug || slugify(data.name) || 'new'}/${Date.now()}`;
          const res = await api.uploadImage(file, cfId);
          if (res.success) {
            setData(d => ({ ...d, logo: res.imageUrl }));
            setLogoPreview(res.imageUrl);
            addToast('Logo uploaded', 'success');
          } else {
            addToast(`Upload failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Upload error: ${err.message}`, 'error');
        }
        setUploading(false);
      };

      const handleSave = async () => {
        if (!data.name) { addToast('Name is required', 'error'); return; }
        setSaving(true);
        try {
          const path = `src/content/partners/${data.slug}.json`;
          const content = JSON.stringify(data, null, 2);
          const message = slug ? `Update partner: ${data.name}` : `Add partner: ${data.name}`;
          const res = await api.saveContent(path, content, message, sha || undefined);
          if (res.success) {
            setSha(res.sha);
            setDirty(false);
            addToast(`${data.name} saved!`, 'success');
            logActivity(slug ? 'updated' : 'created', 'partner', data.name);
          } else {
            addToast(`Save failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Save error: ${err.message}`, 'error');
        }
        setSaving(false);
      };

      if (loading) return html`<${EditorSkeleton} />`;

      return html`
        ${showDeleteModal ? html`<${ConfirmModal}
          title="Delete ${data.name}?"
          message="This will permanently remove this partner from the site. This cannot be undone."
          danger=${true}
          onConfirm=${handleDelete}
          onCancel=${() => setShowDeleteModal(false)}
        />` : null}
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <button onClick=${safeBack}>Partners</button>
          <span class="sep">›</span>
          <span class="current">${slug ? data.name || 'Edit' : 'New Partner'}</span>
        </nav>
        <div class="page-header">
          <h2>${slug ? `Edit: ${data.name}` : 'Add New Partner'}</h2>
          <div class="flex gap-1 items-center">
            ${slug ? html`<button class="btn btn-danger btn-sm" onClick=${() => setShowDeleteModal(true)} disabled=${deleting}>
              ${deleting ? html`<span class="spinner" />` : null} Delete
            </button>` : null}
            <button class="btn btn-primary" onClick=${handleSave} disabled=${saving}>
              ${saving ? html`<span class="spinner" />` : null} ${saving ? 'Saving...' : 'Save & Publish'}
            </button>
          </div>
        </div>
        <div class="card">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Company Name *</label>
              <input class="form-input" value=${data.name}
                onInput=${e => updateField('name', e.target.value)} />
            </div>
            <div class="form-group">
              <label class="form-label">Slug</label>
              <input class="form-input" value=${data.slug}
                onInput=${e => updateField('slug', e.target.value)} ${slug ? 'disabled' : ''} />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Website URL</label>
            <input class="form-input" value=${data.website || ''}
              onInput=${e => updateField('website', e.target.value)} placeholder="https://..." />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Tier</label>
              <select class="form-select" value=${data.tier}
                onChange=${e => updateField('tier', e.target.value)}>
                <option value="top">Top</option>
                <option value="construction">Construction</option>
                <option value="design">Design</option>
                <option value="community">Community</option>
              </select>
            </div>
            <div class="form-group" style="display: flex; align-items: flex-end;">
              <label class="checkbox-label">
                <input type="checkbox" checked=${data.featured}
                  onChange=${e => updateField('featured', e.target.checked)} />
                Featured partner
              </label>
            </div>
          </div>
        </div>
        <div class="card">
          <h3 style="margin-bottom: 1rem;">Logo</h3>
          ${logoPreview ? html`
            <div style="margin-bottom: 1rem; text-align: center;">
              <img src=${logoPreview} alt="Logo preview"
                style="max-width: 200px; max-height: 120px; object-fit: contain;" />
              ${uploading ? html`<div class="text-sm text-muted mt-1"><span class="spinner" /> Uploading...</div>` : null}
            </div>
          ` : null}
          <${DropZone} onFiles=${handleLogoUpload} multiple=${false}
            accept="image/*" label="PNG or SVG recommended (transparent background)" />
        </div>
        <div class="editor-save-footer">
          <button class="btn btn-ghost" onClick=${safeBack}>Cancel</button>
          <button class="btn btn-primary" onClick=${handleSave} disabled=${saving}>
            ${saving ? 'Saving...' : 'Save & Publish'}
          </button>
        </div>
      `;
    }

    // ═══════════════════════════════════════════
    // FINANCIALS
    // ═══════════════════════════════════════════
    function Financials({ addToast }) {
      const [files, setFiles] = useState([]);
      const [data, setData] = useState({ documents: [], annualReports: [] });
      const [dataSha, setDataSha] = useState(null);
      const [loading, setLoading] = useState(true);
      const [uploading, setUploading] = useState(false);
      const [saving, setSaving] = useState(false);
      const [tab, setTab] = useState('documents'); // documents | annual-reports | upload
      const [showAddDoc, setShowAddDoc] = useState(false);
      const [showAddReport, setShowAddReport] = useState(false);
      const [newDoc, setNewDoc] = useState({ title: '', year: new Date().getFullYear(), type: '990', url: '', source: 'local' });
      const [newReport, setNewReport] = useState({ title: '', year: new Date().getFullYear(), url: '', coverImage: '', description: '' });

      const loadAll = async () => {
        setLoading(true);
        try {
          // Load uploaded files
          const filesRes = await api.listContent('public/financials');
          if (filesRes.success) setFiles(filesRes.files);
          else setFiles([]);
          // Load JSON metadata
          const jsonRes = await api.readContent('src/content/site/financials.json');
          if (jsonRes.success) {
            const parsed = JSON.parse(jsonRes.content);
            setData(parsed);
            setDataSha(jsonRes.sha);
          }
        } catch { /* ignore */ }
        setLoading(false);
      };

      useEffect(() => { loadAll(); }, []);

      const saveData = async (newData) => {
        setSaving(true);
        try {
          const res = await api.saveContent(
            'src/content/site/financials.json',
            JSON.stringify(newData, null, 2),
            'Update financial documents metadata',
            dataSha || undefined
          );
          if (res.success) {
            setData(newData);
            setDataSha(res.sha || dataSha);
            addToast('Financials saved!', 'success');
            logActivity('updated', 'financials', '');
          } else {
            addToast('Save failed: ' + (res.error || 'Unknown'), 'error');
          }
        } catch (err) {
          addToast('Error: ' + err.message, 'error');
        }
        setSaving(false);
      };

      const handleUpload = async (fileList) => {
        setUploading(true);
        for (const file of fileList) {
          const safeName = file.name.replace(/[^a-z0-9._-]/gi, '-');
          const path = 'public/financials/' + safeName;
          try {
            const res = await api.uploadFile(file, path, 'Upload financial doc: ' + file.name);
            if (res.success) addToast('Uploaded ' + file.name, 'success');
            else addToast('Failed: ' + res.error, 'error');
          } catch (err) { addToast('Error: ' + err.message, 'error'); }
        }
        setUploading(false);
        loadAll();
      };

      const addDocument = () => {
        if (!newDoc.title || !newDoc.url) { addToast('Title and URL required', 'error'); return; }
        const updated = { ...data, documents: [...data.documents, { ...newDoc }] };
        saveData(updated);
        setNewDoc({ title: '', year: new Date().getFullYear(), type: '990', url: '', source: 'local' });
        setShowAddDoc(false);
      };

      const removeDocument = (idx) => {
        if (!confirm('Remove this document entry?')) return;
        const updated = { ...data, documents: data.documents.filter((_, i) => i !== idx) };
        saveData(updated);
      };

      const addReport = () => {
        if (!newReport.title || !newReport.url) { addToast('Title and URL required', 'error'); return; }
        const updated = { ...data, annualReports: [...(data.annualReports || []), { ...newReport }] };
        saveData(updated);
        setNewReport({ title: '', year: new Date().getFullYear(), url: '', coverImage: '', description: '' });
        setShowAddReport(false);
      };

      const removeReport = (idx) => {
        if (!confirm('Remove this annual report?')) return;
        const updated = { ...data, annualReports: (data.annualReports || []).filter((_, i) => i !== idx) };
        saveData(updated);
      };

      const docs990 = data.documents.filter(d => d.type === '990').sort((a, b) => b.year - a.year);
      const docsAudit = data.documents.filter(d => d.type === 'audit').sort((a, b) => b.year - a.year);
      const docsOther = data.documents.filter(d => d.type === 'other').sort((a, b) => b.year - a.year);
      const reports = (data.annualReports || []).sort((a, b) => b.year - a.year);

      if (loading) return html`<${EditorSkeleton} />`;

      return html`
        <div class="page-header">
          <h2>Financial Documents</h2>
          <p class="text-sm text-muted">Manages the <a href="/about/financials/" target="_blank">/about/financials/</a> page</p>
        </div>

        <!-- Tab Nav -->
        <div style="display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap;">
          ${['documents', 'annual-reports', 'upload'].map(t => html`
            <button key=${t} class="btn ${tab === t ? 'btn-primary' : 'btn-ghost'} btn-sm"
              onClick=${() => setTab(t)}>
              ${t === 'documents' ? html`${icons.fileText} 990s & Audits` : t === 'annual-reports' ? html`${icons.barChart} Annual Reports` : html`${icons.folder} Upload Files`}
            </button>
          `)}
        </div>

        <!-- Documents Tab -->
        ${tab === 'documents' ? html`
          <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
              <h3>990 Tax Returns (${docs990.length})</h3>
              <button class="btn btn-primary btn-sm" onClick=${() => { setNewDoc({...newDoc, type: '990'}); setShowAddDoc(true); }}>+ Add 990</button>
            </div>
            ${docs990.length === 0 ? html`<p class="text-sm text-muted">No 990s yet.</p>` : html`
              <div class="table-wrap"><table>
                <thead><tr><th>Year</th><th>Title</th><th>Source</th><th></th></tr></thead>
                <tbody>${docs990.map((d, i) => {
                  const realIdx = data.documents.indexOf(d);
                  return html`<tr key=${i}>
                    <td><strong>${d.year}</strong></td>
                    <td class="text-sm">${d.title}</td>
                    <td><span class="badge ${d.source === 'local' ? 'badge-green' : 'badge-gray'}">${d.source}</span></td>
                    <td style="text-align:right;">
                      <a href=${d.url} target="_blank" class="btn btn-ghost btn-sm">View ↗</a>
                      <button class="btn btn-ghost btn-sm" style="color:#c00;" onClick=${() => removeDocument(realIdx)}>${icons.x}</button>
                    </td>
                  </tr>`;
                })}</tbody>
              </table></div>
            `}
          </div>

          <div class="card mt-2">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
              <h3>Audited Financials (${docsAudit.length})</h3>
              <button class="btn btn-primary btn-sm" onClick=${() => { setNewDoc({...newDoc, type: 'audit'}); setShowAddDoc(true); }}>+ Add Audit</button>
            </div>
            ${docsAudit.length === 0 ? html`<p class="text-sm text-muted">No audits yet.</p>` : html`
              <div class="table-wrap"><table>
                <thead><tr><th>Year</th><th>Title</th><th>Source</th><th></th></tr></thead>
                <tbody>${docsAudit.map((d, i) => {
                  const realIdx = data.documents.indexOf(d);
                  return html`<tr key=${i}>
                    <td><strong>${d.year}</strong></td>
                    <td class="text-sm">${d.title}</td>
                    <td><span class="badge ${d.source === 'local' ? 'badge-green' : 'badge-gray'}">${d.source}</span></td>
                    <td style="text-align:right;">
                      <a href=${d.url} target="_blank" class="btn btn-ghost btn-sm">View ↗</a>
                      <button class="btn btn-ghost btn-sm" style="color:#c00;" onClick=${() => removeDocument(realIdx)}>${icons.x}</button>
                    </td>
                  </tr>`;
                })}</tbody>
              </table></div>
            `}
          </div>

          ${docsOther.length > 0 ? html`
            <div class="card mt-2">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
                <h3>Other Documents (${docsOther.length})</h3>
                <button class="btn btn-primary btn-sm" onClick=${() => { setNewDoc({...newDoc, type: 'other'}); setShowAddDoc(true); }}>+ Add</button>
              </div>
              <div class="table-wrap"><table>
                <thead><tr><th>Title</th><th>Source</th><th></th></tr></thead>
                <tbody>${docsOther.map((d, i) => {
                  const realIdx = data.documents.indexOf(d);
                  return html`<tr key=${i}>
                    <td><strong>${d.title}</strong></td>
                    <td><span class="badge ${d.source === 'local' ? 'badge-green' : 'badge-gray'}">${d.source}</span></td>
                    <td style="text-align:right;">
                      <a href=${d.url} target="_blank" class="btn btn-ghost btn-sm">View ↗</a>
                      <button class="btn btn-ghost btn-sm" style="color:#c00;" onClick=${() => removeDocument(realIdx)}>${icons.x}</button>
                    </td>
                  </tr>`;
                })}</tbody>
              </table></div>
            </div>
          ` : null}

          <!-- Add Document Modal -->
          ${showAddDoc ? html`
            <div class="modal-overlay" onClick=${() => setShowAddDoc(false)}>
              <div class="modal-content" onClick=${e => e.stopPropagation()}>
                <h3 style="margin-bottom:1rem;">Add Financial Document</h3>
                <div class="form-group">
                  <label>Type</label>
                  <select value=${newDoc.type} onChange=${e => setNewDoc({...newDoc, type: e.target.value})}>
                    <option value="990">990 Tax Return</option>
                    <option value="audit">Audited Financials</option>
                    <option value="other">Other Document</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Year</label>
                  <input type="number" min="2012" max="2030" value=${newDoc.year}
                    onChange=${e => setNewDoc({...newDoc, year: parseInt(e.target.value)})} />
                </div>
                <div class="form-group">
                  <label>Title</label>
                  <input type="text" placeholder="e.g. 2024 990 Tax Return" value=${newDoc.title}
                    onChange=${e => setNewDoc({...newDoc, title: e.target.value})} />
                </div>
                <div class="form-group">
                  <label>URL / Path</label>
                  <input type="text" placeholder="/financials/filename.pdf or full URL" value=${newDoc.url}
                    onChange=${e => setNewDoc({...newDoc, url: e.target.value, source: e.target.value.startsWith('http') ? 'external' : 'local'})} />
                  <small class="text-sm text-muted">Use /financials/filename.pdf for uploaded files, or a full URL for external links.</small>
                </div>
                <div style="display:flex;gap:0.75rem;margin-top:1.25rem;">
                  <button class="btn btn-primary btn-sm" onClick=${addDocument} disabled=${saving}>
                    ${saving ? html`<span class="spinner" />` : 'Add Document'}
                  </button>
                  <button class="btn btn-ghost btn-sm" onClick=${() => setShowAddDoc(false)}>Cancel</button>
                </div>
              </div>
            </div>
          ` : null}
        ` : null}

        <!-- Annual Reports Tab -->
        ${tab === 'annual-reports' ? html`
          <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
              <h3>Annual Reports (${reports.length})</h3>
              <button class="btn btn-primary btn-sm" onClick=${() => setShowAddReport(true)}>+ Add Report</button>
            </div>
            ${reports.length === 0 ? html`
              <div class="empty-state">
                <div class="empty-state-icon">${icons.barChart}</div>
                <p>No annual reports yet.</p>
                <p class="text-sm">Add your first annual report with a cover image and PDF link.</p>
              </div>
            ` : html`
              <div class="table-wrap"><table>
                <thead><tr><th>Year</th><th>Title</th><th>Cover</th><th></th></tr></thead>
                <tbody>${reports.map((r, i) => html`<tr key=${i}>
                  <td><strong>${r.year}</strong></td>
                  <td>
                    <div>${r.title}</div>
                    ${r.description ? html`<div class="text-sm text-muted">${r.description}</div>` : null}
                  </td>
                  <td>${r.coverImage ? html`<img src=${r.coverImage} alt="" style="width:40px;height:52px;object-fit:cover;border-radius:4px;" />` : html`<span class="text-sm text-muted">—</span>`}</td>
                  <td style="text-align:right;">
                    <a href=${r.url} target="_blank" class="btn btn-ghost btn-sm">View ↗</a>
                    <button class="btn btn-ghost btn-sm" style="color:#c00;" onClick=${() => removeReport(i)}>${icons.x}</button>
                  </td>
                </tr>`)}</tbody>
              </table></div>
            `}
          </div>

          <!-- Add Report Modal -->
          ${showAddReport ? html`
            <div class="modal-overlay" onClick=${() => setShowAddReport(false)}>
              <div class="modal-content" onClick=${e => e.stopPropagation()}>
                <h3 style="margin-bottom:1rem;">Add Annual Report</h3>
                <div class="form-group">
                  <label>Year</label>
                  <input type="number" min="2012" max="2030" value=${newReport.year}
                    onChange=${e => setNewReport({...newReport, year: parseInt(e.target.value)})} />
                </div>
                <div class="form-group">
                  <label>Title</label>
                  <input type="text" placeholder="e.g. 2024 Annual Report" value=${newReport.title}
                    onChange=${e => setNewReport({...newReport, title: e.target.value})} />
                </div>
                <div class="form-group">
                  <label>PDF URL</label>
                  <input type="text" placeholder="/financials/annual-report-2024.pdf" value=${newReport.url}
                    onChange=${e => setNewReport({...newReport, url: e.target.value})} />
                </div>
                <div class="form-group">
                  <label>Cover Image URL <span class="text-sm text-muted">(optional)</span></label>
                  <input type="text" placeholder="Cloudflare Images URL for cover" value=${newReport.coverImage}
                    onChange=${e => setNewReport({...newReport, coverImage: e.target.value})} />
                </div>
                <div class="form-group">
                  <label>Description <span class="text-sm text-muted">(optional)</span></label>
                  <input type="text" placeholder="Short description" value=${newReport.description}
                    onChange=${e => setNewReport({...newReport, description: e.target.value})} />
                </div>
                <div style="display:flex;gap:0.75rem;margin-top:1.25rem;">
                  <button class="btn btn-primary btn-sm" onClick=${addReport} disabled=${saving}>
                    ${saving ? html`<span class="spinner" />` : 'Add Report'}
                  </button>
                  <button class="btn btn-ghost btn-sm" onClick=${() => setShowAddReport(false)}>Cancel</button>
                </div>
              </div>
            </div>
          ` : null}
        ` : null}

        <!-- Upload Tab -->
        ${tab === 'upload' ? html`
          <div class="card">
            <p class="text-sm text-muted mb-1">Upload PDFs to <code>/financials/</code>. After uploading, add a document entry in the 990s & Audits tab to make it appear on the page.</p>
            <${DropZone} onFiles=${handleUpload} accept=".pdf,.doc,.docx"
              label="PDF files — 990s, annual reports, audits" />
            ${uploading ? html`<div class="mt-2 text-sm"><span class="spinner" /> Uploading...</div>` : null}
          </div>
          <div class="card mt-2">
            <h3 style="margin-bottom: 1rem;">Uploaded Files (${files.length})</h3>
            ${files.length === 0 ? html`
              <div class="empty-state">
                <div class="empty-state-icon">${icons.folderOpen}</div>
                <p>No files uploaded yet.</p>
              </div>
            ` : html`
              <div class="table-wrap"><table>
                <thead><tr><th>File</th><th>Size</th><th>Path</th><th>Link</th></tr></thead>
                <tbody>
                  ${files.map(f => html`<tr key=${f.name}>
                    <td>${icons.fileText} <strong>${f.name}</strong></td>
                    <td class="text-sm text-muted">${(f.size / 1024).toFixed(0)} KB</td>
                    <td class="text-sm"><code>/financials/${f.name}</code></td>
                    <td><a href="/financials/${f.name}" target="_blank" class="btn btn-ghost btn-sm">View ↗</a></td>
                  </tr>`)}
                </tbody>
              </table></div>
            `}
          </div>
        ` : null}
      `;
    }

    // ═══════════════════════════════════════════
    // TEAM LIST
    // ═══════════════════════════════════════════
    function TeamList({ team, onEdit, onAdd, onDelete }) {
      const [search, setSearch] = useState('');
      const filtered = useMemo(() => {
        if (!search) return team;
        const q = search.toLowerCase();
        return team.filter(t =>
          t.name.toLowerCase().includes(q) ||
          (t.title || '').toLowerCase().includes(q) ||
          (t.organization || '').toLowerCase().includes(q)
        );
      }, [team, search]);
      const teamMembers = filtered.filter(t => t.group === 'team');
      const boardMembers = filtered.filter(t => t.group === 'board');

      const renderTable = (members, label) => html`
        <div class="card" style="margin-bottom: 1rem;">
          <h3 style="margin-bottom: 1rem;">${label} (${members.length})</h3>
          ${members.length === 0 ? html`
            <p class="text-sm text-muted">No ${label.toLowerCase()} ${search ? 'match your search' : 'added yet'}.</p>
          ` : html`
            <div class="table-wrap"><table>
              <thead><tr><th></th><th>Name</th><th>Title</th><th>Organization</th><th>Order</th><th></th></tr></thead>
              <tbody>
                ${members.map(t => html`<tr key=${t.slug}>
                  <td>${t.photo ? html`<img class="td-thumb" src="${t.photo}" alt="" style="border-radius: 50%;" />` : html`<div class="td-thumb" style="border-radius: 50%; background: #E5E4E0; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">${icons.user}</div>`}</td>
                  <td><strong>${t.name}</strong></td>
                  <td class="text-sm">${t.title || '—'}</td>
                  <td class="text-sm">${t.organization || '—'}</td>
                  <td>${t.order || 0}</td>
                  <td style="white-space: nowrap;">
                    <button class="btn btn-ghost btn-sm" onClick=${() => onEdit(t.slug)}>Edit</button>
                    <button class="btn btn-ghost btn-sm" style="color: #E53E3E;" onClick=${(e) => { e.stopPropagation(); onDelete(t); }}>Delete</button>
                  </td>
                </tr>`)}
              </tbody>
            </table></div>
          `}
        </div>
      `;

      return html`
        <div class="page-header">
          <h2>Team & Board (${team.length})</h2>
          <button class="btn btn-primary" onClick=${onAdd}>+ Add Member</button>
        </div>
        <div class="card" style="margin-bottom: 1rem; padding: 0.75rem 1rem;">
          <div class="search-bar" style="max-width: 100%;">
            <span class="search-icon">${icons.search}</span>
            <input placeholder="Search by name, title, or organization..."
              value=${search} onInput=${e => setSearch(e.target.value)} />
          </div>
        </div>
        ${renderTable(teamMembers, 'Team')}
        ${renderTable(boardMembers, 'Board')}
      `;
    }

    // ═══════════════════════════════════════════
    // TEAM EDITOR
    // ═══════════════════════════════════════════
    function TeamEditor({ slug, onBack, addToast }) {
      const [loading, setLoading] = useState(!!slug);
      const [saving, setSaving] = useState(false);
      const [deleting, setDeleting] = useState(false);
      const [showDeleteModal, setShowDeleteModal] = useState(false);
      const [dirty, setDirty] = useState(false);
      const [sha, setSha] = useState(null);
      const [photoPreview, setPhotoPreview] = useState('');
      const [uploading, setUploading] = useState(false);
      const [data, setData] = useState({
        name: '', slug: '', title: '', organization: '',
        photo: '', group: 'team', order: 0,
      });

      useEffect(() => {
        const handler = (e) => { if (dirty) { e.preventDefault(); e.returnValue = ''; } };
        window.addEventListener('beforeunload', handler);
        return () => window.removeEventListener('beforeunload', handler);
      }, [dirty]);

      const safeBack = () => {
        if (dirty && !confirm('You have unsaved changes. Leave without saving?')) return;
        onBack();
      };

      const handleDelete = async () => {
        if (!slug || !sha) return;
        setDeleting(true);
        try {
          const res = await api.deleteContent(
            `src/content/team/${slug}.json`, sha, `Delete team member: ${data.name}`
          );
          if (res.success) {
            addToast(`${data.name} deleted`, 'success');
            logActivity('deleted', 'team member', data.name);
            setDirty(false);
            onBack();
          } else {
            addToast(`Delete failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Delete error: ${err.message}`, 'error');
        }
        setDeleting(false);
        setShowDeleteModal(false);
      };

      useEffect(() => {
        if (!slug) return;
        (async () => {
          const res = await api.readContent(`src/content/team/${slug}.json`);
          if (res.success) {
            const parsed = JSON.parse(res.content);
            setData(parsed);
            setSha(res.sha);
            setPhotoPreview(parsed.photo || '');
          }
          setLoading(false);
        })();
      }, [slug]);

      const updateField = (field, value) => {
        setDirty(true);
        setData(d => {
          const updated = { ...d, [field]: value };
          if (field === 'name' && !slug) updated.slug = slugify(value);
          return updated;
        });
      };

      const handlePhotoUpload = async (files) => {
        setDirty(true);
        const file = files[0];
        setPhotoPreview(URL.createObjectURL(file));
        setUploading(true);
        try {
          const cfId = `team/${data.slug || slugify(data.name) || 'new'}/${Date.now()}`;
          const res = await api.uploadImage(file, cfId);
          if (res.success) {
            setData(d => ({ ...d, photo: res.imageUrl }));
            setPhotoPreview(res.imageUrl);
            addToast('Photo uploaded', 'success');
          } else {
            addToast(`Upload failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Upload error: ${err.message}`, 'error');
        }
        setUploading(false);
      };

      const handleSave = async () => {
        if (!data.name) { addToast('Name is required', 'error'); return; }
        setSaving(true);
        try {
          const saveData = { ...data, order: Number(data.order) || 0 };
          const path = `src/content/team/${data.slug}.json`;
          const content = JSON.stringify(saveData, null, 2);
          const message = slug ? `Update team member: ${data.name}` : `Add team member: ${data.name}`;
          const res = await api.saveContent(path, content, message, sha || undefined);
          if (res.success) {
            setSha(res.sha);
            setDirty(false);
            addToast(`${data.name} saved!`, 'success');
            logActivity(slug ? 'updated' : 'created', 'team member', data.name);
          } else {
            addToast(`Save failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Save error: ${err.message}`, 'error');
        }
        setSaving(false);
      };

      if (loading) return html`<${EditorSkeleton} />`;

      return html`
        ${showDeleteModal ? html`<${ConfirmModal}
          title="Delete ${data.name}?"
          message="This will permanently remove this team member from the site."
          danger=${true}
          onConfirm=${handleDelete}
          onCancel=${() => setShowDeleteModal(false)}
        />` : null}
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <button onClick=${safeBack}>Team</button>
          <span class="sep">›</span>
          <span class="current">${slug ? data.name || 'Edit' : 'New Member'}</span>
        </nav>
        <div class="page-header">
          <h2>${slug ? `Edit: ${data.name}` : 'Add Team Member'}</h2>
          <div class="flex gap-1 items-center">
            ${slug ? html`<button class="btn btn-danger btn-sm" onClick=${() => setShowDeleteModal(true)} disabled=${deleting}>Delete</button>` : null}
            <button class="btn btn-primary" onClick=${handleSave} disabled=${saving}>
              ${saving ? html`<span class="spinner" />` : null} ${saving ? 'Saving...' : 'Save & Publish'}
            </button>
          </div>
        </div>
        <div class="card">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Full Name *</label>
              <input class="form-input" value=${data.name}
                onInput=${e => updateField('name', e.target.value)} placeholder="e.g., Peter Ranney" />
            </div>
            <div class="form-group">
              <label class="form-label">Slug</label>
              <input class="form-input" value=${data.slug}
                onInput=${e => updateField('slug', e.target.value)} ${slug ? 'disabled' : ''} />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Title / Role *</label>
              <input class="form-input" value=${data.title}
                onInput=${e => updateField('title', e.target.value)}
                placeholder="e.g., Co-Founder & Program Director" />
            </div>
            <div class="form-group">
              <label class="form-label">Organization (optional)</label>
              <input class="form-input" value=${data.organization || ''}
                onInput=${e => updateField('organization', e.target.value)}
                placeholder="e.g., Ranney Blair Weidmann" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Group *</label>
              <select class="form-select" value=${data.group}
                onChange=${e => updateField('group', e.target.value)}>
                <option value="team">Team</option>
                <option value="board">Board</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Display Order</label>
              <input class="form-input" type="number" value=${data.order || 0}
                onInput=${e => updateField('order', e.target.value)} />
              <div class="form-hint">Lower numbers appear first</div>
            </div>
          </div>
        </div>
        <div class="card">
          <h3 style="margin-bottom: 1rem;">Headshot</h3>
          ${photoPreview ? html`
            <div style="margin-bottom: 1rem; text-align: center;">
              <img src=${photoPreview} alt="Photo preview"
                style="width: 120px; height: 120px; object-fit: cover; border-radius: 50%;" />
              ${uploading ? html`<div class="text-sm text-muted mt-1"><span class="spinner" /> Uploading...</div>` : null}
            </div>
          ` : null}
          <${DropZone} onFiles=${handlePhotoUpload} multiple=${false}
            accept="image/*" label="Square photo works best (will display as circle)" />
        </div>
        <div class="editor-save-footer">
          <button class="btn btn-ghost" onClick=${safeBack}>Cancel</button>
          <button class="btn btn-primary" onClick=${handleSave} disabled=${saving}>
            ${saving ? 'Saving...' : 'Save & Publish'}
          </button>
        </div>
      `;
    }

              <tbody>
                ${filtered.map(a => html`<tr key=${a.slug}>
                  <td><strong>${a.title}</strong><br/><span class="text-sm text-muted">/resources/${a.slug}/</span></td>
                  <td><span style="background: #FFD500; color: #2D2E33; padding: 0.15rem 0.5rem; border-radius: 100px; font-size: 0.75rem; font-weight: 600;">${a.tag || 'Guide'}</span></td>
                  <td class="text-sm">${a.datePublished || '—'}</td>
                  <td>${(a.faqs || []).length}</td>
                  <td>${a.order || 0}</td>

                    <button class="btn btn-ghost btn-sm" onClick=${() => onEdit(a.slug)}>Edit</button>

    // ═══════════════════════════════════════════
    // ARTICLE EDITOR
    // ═══════════════════════════════════════════
    function ArticleEditor({ slug, onBack, addToast }) {
      const [loading, setLoading] = useState(!!slug);
      const [saving, setSaving] = useState(false);
      const [sha, setSha] = useState(null);
      const [dirty, setDirty] = useState(false);
      const [data, setData] = useState({
        title: '', slug: '', description: '', tag: 'Guide',
        datePublished: new Date().toISOString().split('T')[0],
        dateModified: new Date().toISOString().split('T')[0],
        heroImage: null, heroLead: '', aboutTopics: [],
        body: '', faqs: [],
        ctaHeading: 'Need help with your home?',
        ctaText: 'Sunshine on a Ranney Day builds accessible bathrooms, dream bedrooms, and therapy rooms for children with special needs — at no cost to families in the greater Atlanta area.',
        ctaPrimaryLink: '/apply/', ctaPrimaryLabel: 'Apply for a Makeover',
        ctaSecondaryLink: '/donate/', ctaSecondaryLabel: 'Support Our Mission',
        featured: false, order: 0,
      });

      useEffect(() => {
        if (!slug) return;
        (async () => {
          try {
            const res = await api.readContent(`src/content/articles/${slug}.json`);
            if (res.success && res.content) {
              setData(res.content);
              setSha(res.sha);
            } else {
              addToast('Article not found', 'error');
              onBack();
            }
          } catch (err) {
            addToast(`Load error: ${err.message}`, 'error');
          }
          setLoading(false);
        })();
      }, [slug]);

      const update = (key, val) => {
        setData(d => ({ ...d, [key]: val }));
        setDirty(true);
      };

      const autoSlug = (title) => title.toLowerCase()
        .replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').substring(0, 60);

      const handleSave = async () => {
        if (!data.title) { addToast('Title is required', 'error'); return; }
        if (!data.slug) data.slug = autoSlug(data.title);
        data.dateModified = new Date().toISOString().split('T')[0];
        setSaving(true);
        try {
          const path = `src/content/articles/${data.slug}.json`;
          const content = JSON.stringify(data, null, 2);
          const message = slug ? `Update article: ${data.title}` : `Add article: ${data.title}`;
          const res = await api.saveContent(path, content, message, sha || undefined);
          if (res.success) {
            setSha(res.sha);
            setDirty(false);
            addToast(`Article saved & published!`, 'success');
            logActivity(slug ? 'published' : 'created', 'article', data.title);
          } else {
            addToast(`Save failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Save error: ${err.message}`, 'error');
        }
        setSaving(false);
      };

      const addFaq = () => {
        update('faqs', [...(data.faqs || []), { question: '', answer: '' }]);
      };
      const updateFaq = (idx, key, val) => {
        const faqs = [...(data.faqs || [])];
        faqs[idx] = { ...faqs[idx], [key]: val };
        update('faqs', faqs);
      };
      const removeFaq = (idx) => {
        update('faqs', (data.faqs || []).filter((_, i) => i !== idx));
      };

      if (loading) return html`<${EditorSkeleton} />`;

      return html`
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <button onClick=${onBack}>Articles</button>
          <span class="sep">›</span>
          <span class="current">${slug ? data.title || 'Edit' : 'New Article'}</span>
        </nav>
        <div class="page-header">
          <h2>${slug ? 'Edit Article' : 'New Article'}</h2>
          <button class="btn btn-primary" onClick=${handleSave} disabled=${saving}>
            ${saving ? 'Saving...' : dirty ? 'Save & Publish' : 'Save & Publish'}
          </button>
        </div>

        <div class="card" style="margin-bottom: 1rem;">
          <h3 style="margin-bottom: 1rem;">Article Details</h3>
          <div class="form-grid">
            <label class="form-group span-2">
              <span class="form-label">Title *</span>
              <input type="text" value=${data.title} onInput=${e => { update('title', e.target.value); if (!slug) update('slug', autoSlug(e.target.value)); }} placeholder="Guide to Accessible Home Design for Children with Disabilities" />
            </label>
            <label class="form-group">
              <span class="form-label">Slug</span>
              <input type="text" value=${data.slug} onInput=${e => update('slug', e.target.value)} placeholder="accessible-home-design" />
              <span class="text-sm text-muted">/resources/${data.slug || '...'}/</span>
            </label>
            <label class="form-group">
              <span class="form-label">Tag / Category</span>
              <input type="text" value=${data.tag} onInput=${e => update('tag', e.target.value)} placeholder="Accessibility" />
            </label>
            <label class="form-group span-2">
              <span class="form-label">Hero Lead Text</span>
              <textarea rows="2" value=${data.heroLead} onInput=${e => update('heroLead', e.target.value)} placeholder="The subtitle shown below the title on the page" />
            </label>
            <label class="form-group">
              <span class="form-label">Date Published</span>
              <input type="date" value=${data.datePublished} onInput=${e => update('datePublished', e.target.value)} />
            </label>
            <label class="form-group">
              <span class="form-label">Display Order</span>
              <input type="number" value=${data.order} onInput=${e => update('order', Number(e.target.value))} />
            </label>
          </div>
        </div>

        <div class="card" style="margin-bottom: 1rem;">
          <h3 style="margin-bottom: 0.5rem;">Article Body (HTML)</h3>
          <p class="text-sm text-muted" style="margin-bottom: 1rem;">Write the article content as HTML. Use &lt;h2&gt; for main sections, &lt;h3&gt; for subsections, &lt;p&gt; for paragraphs, &lt;strong&gt; for bold, and &lt;a href="..."&gt; for links.</p>
          <textarea
            style="width: 100%; min-height: 400px; font-family: monospace; font-size: 0.85rem; line-height: 1.6; padding: 1rem; border: 1px solid #E5E4E0; border-radius: 8px; resize: vertical;"
            value=${data.body}
            onInput=${e => update('body', e.target.value)}
            placeholder="<h2>Section Title</h2>\n<p>Your content here...</p>"
          />
          <span class="text-sm text-muted">${(data.body || '').length.toLocaleString()} characters</span>
        </div>

        <div class="card" style="margin-bottom: 1rem;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h3>FAQs (${(data.faqs || []).length})</h3>
            <button class="btn btn-ghost btn-sm" onClick=${addFaq}>+ Add FAQ</button>
          </div>
          <p class="text-sm text-muted" style="margin-bottom: 1rem;">FAQs generate FAQPage schema for Google rich results. Each FAQ appears as an expandable accordion at the bottom of the article.</p>
          ${(data.faqs || []).map((faq, idx) => html`
            <div key=${idx} style="border: 1px solid #E5E4E0; border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem;">
              <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 0.5rem;">
                <strong class="text-sm">FAQ #${idx + 1}</strong>
                <button class="btn btn-ghost btn-sm" style="color: #E53E3E; font-size: 0.8rem;" onClick=${() => removeFaq(idx)}>Remove</button>
              </div>
              <label class="form-group" style="margin-bottom: 0.5rem;">
                <span class="form-label">Question</span>
                <input type="text" value=${faq.question} onInput=${e => updateFaq(idx, 'question', e.target.value)} placeholder="How much does it cost to..." />
              </label>
              <label class="form-group">
                <span class="form-label">Answer</span>
                <textarea rows="3" value=${faq.answer} onInput=${e => updateFaq(idx, 'answer', e.target.value)} placeholder="Plain text answer..." />
              </label>
            </div>
          `)}
          ${(data.faqs || []).length === 0 && html`<p class="text-sm text-muted">No FAQs yet. Click "+ Add FAQ" above.</p>`}
        </div>

        <div class="card" style="margin-bottom: 1rem;">
          <h3 style="margin-bottom: 1rem;">Call-to-Action Section</h3>
          <div class="form-grid">
            <label class="form-group span-2">
              <span class="form-label">CTA Heading</span>
              <input type="text" value=${data.ctaHeading} onInput=${e => update('ctaHeading', e.target.value)} />
            </label>
            <label class="form-group span-2">
              <span class="form-label">CTA Text</span>
              <textarea rows="2" value=${data.ctaText} onInput=${e => update('ctaText', e.target.value)} />
            </label>
            <label class="form-group">
              <span class="form-label">Primary Button Label</span>
              <input type="text" value=${data.ctaPrimaryLabel} onInput=${e => update('ctaPrimaryLabel', e.target.value)} />
            </label>
            <label class="form-group">
              <span class="form-label">Primary Button Link</span>
              <input type="text" value=${data.ctaPrimaryLink} onInput=${e => update('ctaPrimaryLink', e.target.value)} />
            </label>
            <label class="form-group">
              <span class="form-label">Secondary Button Label</span>
              <input type="text" value=${data.ctaSecondaryLabel} onInput=${e => update('ctaSecondaryLabel', e.target.value)} />
            </label>
            <label class="form-group">
              <span class="form-label">Secondary Button Link</span>
              <input type="text" value=${data.ctaSecondaryLink} onInput=${e => update('ctaSecondaryLink', e.target.value)} />
            </label>
          </div>
        </div>
      `;
    }

    // ═══════════════════════════════════════════
