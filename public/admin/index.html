    // ═══════════════════════════════════════════
    // TEAM EDITOR
    // ═══════════════════════════════════════════
    function TeamEditor({ slug, onBack, addToast }) {
      const [loading, setLoading] = useState(!!slug);
      const [saving, setSaving] = useState(false);
      const [deleting, setDeleting] = useState(false);
      const [showDeleteModal, setShowDeleteModal] = useState(false);
      const [dirty, setDirty] = useState(false);
      const [sha, setSha] = useState(null);
      const [photoPreview, setPhotoPreview] = useState('');
      const [uploading, setUploading] = useState(false);
      const [data, setData] = useState({
        name: '', slug: '', title: '', organization: '',
        photo: '', group: 'team', order: 0,
      });

      useEffect(() => {
        const handler = (e) => { if (dirty) { e.preventDefault(); e.returnValue = ''; } };
        window.addEventListener('beforeunload', handler);
        return () => window.removeEventListener('beforeunload', handler);
      }, [dirty]);

      const safeBack = () => {
        if (dirty && !confirm('You have unsaved changes. Leave without saving?')) return;
        onBack();
      };

      const handleDelete = async () => {
        if (!slug || !sha) return;
        setDeleting(true);
        try {
          const res = await api.deleteContent(
            `src/content/team/${slug}.json`, sha, `Delete team member: ${data.name}`
          );
          if (res.success) {
            addToast(`${data.name} deleted`, 'success');
            setDirty(false);
            onBack();
          } else {
            addToast(`Delete failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Delete error: ${err.message}`, 'error');
        }
        setDeleting(false);
        setShowDeleteModal(false);
      };

      useEffect(() => {
        if (!slug) return;
        (async () => {
          const res = await api.readContent(`src/content/team/${slug}.json`);
          if (res.success) {
            const parsed = JSON.parse(res.content);
            setData(parsed);
            setSha(res.sha);
            setPhotoPreview(parsed.photo || '');
          }
          setLoading(false);
        })();
      }, [slug]);

      const updateField = (field, value) => {
        setDirty(true);
        setData(d => {
          const updated = { ...d, [field]: value };
          if (field === 'name' && !slug) updated.slug = slugify(value);
          return updated;
        });
      };

      const handlePhotoUpload = async (files) => {
        setDirty(true);
        const file = files[0];
        setPhotoPreview(URL.createObjectURL(file));
        setUploading(true);
        try {
          const cfId = `team/${data.slug || slugify(data.name) || 'new'}`;
          const res = await api.uploadImage(file, cfId);
          if (res.success) {
            setData(d => ({ ...d, photo: res.imageUrl }));
            setPhotoPreview(res.imageUrl);
            addToast('Photo uploaded', 'success');
          } else {
            addToast(`Upload failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Upload error: ${err.message}`, 'error');
        }
        setUploading(false);
      };

      const handleSave = async () => {
        if (!data.name) { addToast('Name is required', 'error'); return; }
        setSaving(true);
        try {
          const saveData = { ...data, order: Number(data.order) || 0 };
          const path = `src/content/team/${data.slug}.json`;
          const content = JSON.stringify(saveData, null, 2);
          const message = slug ? `Update team member: ${data.name}` : `Add team member: ${data.name}`;
          const res = await api.saveContent(path, content, message, sha || undefined);
          if (res.success) {
            setSha(res.sha);
            setDirty(false);
            addToast(`${data.name} saved!`, 'success');
          } else {
            addToast(`Save failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Save error: ${err.message}`, 'error');
        }
        setSaving(false);
      };

      if (loading) return html`<div class="card" style="text-align: center; padding: 3rem;"><div class="spinner" style="width: 32px; height: 32px;" /></div>`;

      return html`
        ${showDeleteModal ? html`<${ConfirmModal}
          title="Delete ${data.name}?"
          message="This will permanently remove this team member from the site."
          danger=${true}
          onConfirm=${handleDelete}
          onCancel=${() => setShowDeleteModal(false)}
        />` : null}
        <button class="back-link" onClick=${safeBack}>← Back to Team</button>
        <div class="page-header">
          <h2>${slug ? `Edit: ${data.name}` : 'Add Team Member'}</h2>
          <div class="flex gap-1 items-center">
            ${slug ? html`<button class="btn btn-danger btn-sm" onClick=${() => setShowDeleteModal(true)} disabled=${deleting}>Delete</button>` : null}
            <button class="btn btn-primary" onClick=${handleSave} disabled=${saving}>
              ${saving ? html`<span class="spinner" />` : null} ${saving ? 'Saving...' : 'Save & Publish'}
            </button>
          </div>
        </div>
        <div class="card">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Full Name *</label>
              <input class="form-input" value=${data.name}
                onInput=${e => updateField('name', e.target.value)} placeholder="e.g., Peter Ranney" />
            </div>
            <div class="form-group">
              <label class="form-label">Slug</label>
              <input class="form-input" value=${data.slug}
                onInput=${e => updateField('slug', e.target.value)} ${slug ? 'disabled' : ''} />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Title / Role *</label>
              <input class="form-input" value=${data.title}
                onInput=${e => updateField('title', e.target.value)}
                placeholder="e.g., Co-Founder & Program Director" />
            </div>
            <div class="form-group">
              <label class="form-label">Organization (optional)</label>
              <input class="form-input" value=${data.organization || ''}
                onInput=${e => updateField('organization', e.target.value)}
                placeholder="e.g., Ranney Blair Weidmann" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Group *</label>
              <select class="form-select" value=${data.group}
                onChange=${e => updateField('group', e.target.value)}>
                <option value="team">Team</option>
                <option value="board">Board</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Display Order</label>
              <input class="form-input" type="number" value=${data.order || 0}
                onInput=${e => updateField('order', e.target.value)} />
              <div class="form-hint">Lower numbers appear first</div>
            </div>
          </div>
        </div>
        <div class="card">
          <h3 style="margin-bottom: 1rem;">Headshot</h3>
          ${photoPreview ? html`
            <div style="margin-bottom: 1rem; text-align: center;">
              <img src=${photoPreview} alt="Photo preview"
                style="width: 120px; height: 120px; object-fit: cover; border-radius: 50%;" />
              ${uploading ? html`<div class="text-sm text-muted mt-1"><span class="spinner" /> Uploading...</div>` : null}
            </div>
          ` : null}
          <${DropZone} onFiles=${handlePhotoUpload} multiple=${false}
            accept="image/*" label="Square photo works best (will display as circle)" />
        </div>
        <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1rem;">
          <button class="btn btn-ghost" onClick=${safeBack}>Cancel</button>
          <button class="btn btn-primary" onClick=${handleSave} disabled=${saving}>
            ${saving ? 'Saving...' : 'Save & Publish'}
          </button>
        </div>
      `;
    }

    // ═══════════════════════════════════════════
    // FAQ MANAGEMENT
    // ═══════════════════════════════════════════
    function FAQManager({ addToast }) {
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [sha, setSha] = useState(null);
      const [data, setData] = useState({ categories: [], items: [] });
      const [editItem, setEditItem] = useState(null); // null=list, 'new'=new, {id}=editing
      const [editCat, setEditCat] = useState(null);
      const [dragIdx, setDragIdx] = useState(null);

      useEffect(() => {
        (async () => {
          try {
            const res = await api.readContent('src/content/site/faq.json');
            if (res.success) {
              setData(JSON.parse(res.content));
              setSha(res.sha);
            }
          } catch {}
          setLoading(false);
        })();
      }, []);

      const handleSave = async () => {
        setSaving(true);
        try {
          const content = JSON.stringify(data, null, 2);
          const res = await api.saveContent(
            'src/content/site/faq.json', content,
            'Update FAQ content', sha
          );
          if (res.success) {
            setSha(res.sha);
            addToast('FAQs saved & published!', 'success');
          } else {
            addToast(`Failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Error: ${err.message}`, 'error');
        }
        setSaving(false);
      };

      // ── Category helpers ──
      const addCategory = () => {
        const id = `cat-${Date.now()}`;
        setData(d => ({
          ...d,
          categories: [...d.categories, { id, label: 'New Category', showOnDonatePage: false }],
        }));
        setEditCat(id);
      };

      const updateCategory = (id, field, value) => {
        setData(d => ({
          ...d,
          categories: d.categories.map(c => c.id === id ? { ...c, [field]: value } : c),
        }));
      };

      const deleteCategory = (id) => {
        const hasItems = data.items.some(i => i.category === id);
        if (hasItems) {
          addToast('Move or delete all FAQs in this category first.', 'error');
          return;
        }
        setData(d => ({
          ...d,
          categories: d.categories.filter(c => c.id !== id),
        }));
        setEditCat(null);
      };

      // ── Item helpers ──
      const addItem = (categoryId) => {
        const id = `faq-${Date.now()}`;
        const catItems = data.items.filter(i => i.category === categoryId);
        const maxOrder = catItems.reduce((m, i) => Math.max(m, i.order || 0), 0);
        const newItem = {
          id,
          question: '',
          answer: '',
          category: categoryId,
          order: maxOrder + 1,
        };
        setData(d => ({ ...d, items: [...d.items, newItem] }));
        setEditItem(id);
      };

      const updateItem = (id, field, value) => {
        setData(d => ({
          ...d,
          items: d.items.map(i => i.id === id ? { ...i, [field]: value } : i),
        }));
      };

      const deleteItem = (id) => {
        setData(d => ({ ...d, items: d.items.filter(i => i.id !== id) }));
        if (editItem === id) setEditItem(null);
      };

      const moveItem = (id, direction) => {
        setData(d => {
          const item = d.items.find(i => i.id === id);
          if (!item) return d;
          const catItems = d.items
            .filter(i => i.category === item.category)
            .sort((a, b) => (a.order || 0) - (b.order || 0));
          const idx = catItems.findIndex(i => i.id === id);
          const swapIdx = idx + direction;
          if (swapIdx < 0 || swapIdx >= catItems.length) return d;
          const swapItem = catItems[swapIdx];
          return {
            ...d,
            items: d.items.map(i => {
              if (i.id === id) return { ...i, order: swapItem.order };
              if (i.id === swapItem.id) return { ...i, order: item.order };
              return i;
            }),
          };
        });
      };

      if (loading) return html`<div class="card" style="text-align: center; padding: 3rem;"><div class="spinner" style="width: 32px; height: 32px;" /></div>`;

      // ── Edit single FAQ item ──
      if (editItem) {
        const item = data.items.find(i => i.id === editItem);
        if (!item) { setEditItem(null); return null; }
        return html`
          <div class="page-header">
            <div style="display: flex; align-items: center; gap: 0.75rem;">
              <button class="btn btn-ghost btn-sm" onClick=${() => setEditItem(null)}>← Back</button>
              <h2>${item.question ? 'Edit FAQ' : 'New FAQ'}</h2>
            </div>
            <button class="btn btn-primary" onClick=${handleSave} disabled=${saving}>
              ${saving ? html`<span class="spinner" />` : null} ${saving ? 'Saving...' : 'Save All'}
            </button>
          </div>
          <div class="card">
            <div class="form-group">
              <label class="form-label">Question *</label>
              <input class="form-input" value=${item.question}
                placeholder="e.g. Is my donation tax-deductible?"
                onInput=${e => updateItem(item.id, 'question', e.target.value)} />
            </div>
            <div class="form-group">
              <label class="form-label">Answer *</label>
              <textarea class="form-input" rows="5" value=${item.answer}
                placeholder="Write the answer here. HTML links are supported: <a href='/page'>Link text</a>"
                onInput=${e => updateItem(item.id, 'answer', e.target.value)} />
              <p class="text-sm text-muted" style="margin-top: 0.35rem;">Supports basic HTML for links. Example: &lt;a href="/donate"&gt;Donate page&lt;/a&gt;</p>
            </div>
            <div class="form-group">
              <label class="form-label">Category</label>
              <select class="form-input" value=${item.category}
                onChange=${e => updateItem(item.id, 'category', e.target.value)}>
                ${data.categories.map(c => html`<option value=${c.id}>${c.label}</option>`)}
              </select>
            </div>
          </div>
          <div style="margin-top: 1rem;">
            <button class="btn btn-ghost" style="color: #e53e3e;" onClick=${() => { deleteItem(item.id); }}>
              🗑 Delete this FAQ
            </button>
          </div>
        `;
      }

      // ── Main FAQ list view ──
      return html`
        <div class="page-header">
          <h2>FAQs</h2>
          <div style="display: flex; gap: 0.5rem;">
            <button class="btn btn-ghost btn-sm" onClick=${addCategory}>+ Category</button>
            <button class="btn btn-primary" onClick=${handleSave} disabled=${saving}>
              ${saving ? html`<span class="spinner" />` : null} ${saving ? 'Saving...' : 'Save & Publish'}
            </button>
          </div>
        </div>
        <p class="text-sm text-muted" style="margin-bottom: 1rem;">Manage FAQ questions shown on the Donate page and the FAQ page. Categories marked with ⭐ appear on the Donate page.</p>

        ${data.categories.map(cat => {
          const catItems = data.items
            .filter(i => i.category === cat.id)
            .sort((a, b) => (a.order || 0) - (b.order || 0));

          return html`
            <div class="card" key=${cat.id} style="margin-bottom: 1rem;">
              <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;">
                ${editCat === cat.id ? html`
                  <div style="display: flex; align-items: center; gap: 0.5rem; flex: 1;">
                    <input class="form-input" value=${cat.label} style="max-width: 240px;"
                      onInput=${e => updateCategory(cat.id, 'label', e.target.value)} 
                      onKeyDown=${e => { if (e.key === 'Enter') setEditCat(null); }} />
                    <label style="display: flex; align-items: center; gap: 0.35rem; font-size: 0.85rem; color: rgba(45,46,51,0.6); white-space: nowrap; cursor: pointer;">
                      <input type="checkbox" checked=${cat.showOnDonatePage}
                        onChange=${e => updateCategory(cat.id, 'showOnDonatePage', e.target.checked)} />
                      Show on Donate page
                    </label>
                    <button class="btn btn-ghost btn-sm" onClick=${() => setEditCat(null)}>Done</button>
                    <button class="btn btn-ghost btn-sm" style="color: #e53e3e;" onClick=${() => deleteCategory(cat.id)}>Delete</button>
                  </div>
                ` : html`
                  <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <h3 style="margin: 0;">${cat.showOnDonatePage ? '⭐ ' : ''}${cat.label}</h3>
                    <span class="text-sm text-muted">(${catItems.length})</span>
                    <button class="btn btn-ghost btn-sm" onClick=${() => setEditCat(cat.id)} title="Edit category">✏️</button>
                  </div>
                `}
                <button class="btn btn-ghost btn-sm" onClick=${() => addItem(cat.id)}>+ Add FAQ</button>
              </div>

              ${catItems.length === 0 ? html`
                <div class="empty-state" style="padding: 2rem;">
                  <p class="text-sm text-muted">No questions in this category yet.</p>
                </div>
              ` : html`
                <div class="table-wrap"><table>
                  <thead><tr><th style="width: 50px;">#</th><th>Question</th><th style="width: 120px;">Actions</th></tr></thead>
                  <tbody>
                    ${catItems.map((item, idx) => html`
                      <tr key=${item.id}>
                        <td class="text-muted">
                          <div style="display: flex; flex-direction: column; align-items: center; gap: 2px;">
                            <button class="btn btn-ghost btn-sm" style="padding: 0; min-height: auto; font-size: 0.7rem; opacity: ${idx === 0 ? 0.2 : 0.6};"
                              onClick=${() => moveItem(item.id, -1)} disabled=${idx === 0} title="Move up">▲</button>
                            <span style="font-size: 0.85rem;">${String(idx + 1).padStart(2, '0')}</span>
                            <button class="btn btn-ghost btn-sm" style="padding: 0; min-height: auto; font-size: 0.7rem; opacity: ${idx === catItems.length - 1 ? 0.2 : 0.6};"
                              onClick=${() => moveItem(item.id, 1)} disabled=${idx === catItems.length - 1} title="Move down">▼</button>
                          </div>
                        </td>
                        <td>
                          <strong style="cursor: pointer;" onClick=${() => setEditItem(item.id)}>${item.question || '(untitled)'}</strong>
                          <div class="text-sm text-muted" style="margin-top: 0.2rem; max-width: 500px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                            ${item.answer.replace(/<[^>]+>/g, '').slice(0, 80)}${item.answer.length > 80 ? '…' : ''}
                          </div>
                        </td>
                        <td>
                          <div style="display: flex; gap: 0.25rem;">
                            <button class="btn btn-ghost btn-sm" onClick=${() => setEditItem(item.id)}>Edit</button>
                            <button class="btn btn-ghost btn-sm" style="color: #e53e3e;" onClick=${() => deleteItem(item.id)}>🗑</button>
                          </div>
                        </td>
                      </tr>
                    `)}
                  </tbody>
                </table></div>
              `}
            </div>
          `;
        })}

        ${data.categories.length === 0 ? html`
          <div class="card">
            <div class="empty-state">
              <div class="empty-state-icon">❓</div>
              <p>No FAQ categories yet.</p>
              <p class="text-sm text-muted">Click "+ Category" to create your first one.</p>
            </div>
          </div>
        ` : null}
      `;
    }

    // ═══════════════════════════════════════════
    // SITE SETTINGS
    // ═══════════════════════════════════════════
    function SiteSettings({ addToast }) {
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [sha, setSha] = useState(null);
      const [data, setData] = useState({});

      useEffect(() => {
        (async () => {
          const res = await api.readContent('src/content/site/settings.json');
          if (res.success) {
            setData(JSON.parse(res.content));
            setSha(res.sha);
          }
          setLoading(false);
        })();
      }, []);

      const updateStat = (key, value) => {
        setData(d => ({
          ...d,
          stats: { ...d.stats, [key]: Number(value) || 0 },
        }));
      };

      const updateField = (path, value) => {
        setData(d => {
          const copy = JSON.parse(JSON.stringify(d));
          const keys = path.split('.');
          let obj = copy;
          for (let i = 0; i < keys.length - 1; i++) {
            obj = obj[keys[i]];
          }
          obj[keys[keys.length - 1]] = value;
          return copy;
        });
      };

      const handleSave = async () => {
        setSaving(true);
        try {
          const content = JSON.stringify(data, null, 2);
          const res = await api.saveContent(
            'src/content/site/settings.json', content,
            'Update site settings', sha
          );
          if (res.success) {
            setSha(res.sha);
            addToast('Settings saved!', 'success');
          } else {
            addToast(`Failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Error: ${err.message}`, 'error');
        }
        setSaving(false);
      };

      if (loading) return html`<div class="card" style="text-align: center; padding: 3rem;"><div class="spinner" style="width: 32px; height: 32px;" /></div>`;

      return html`
        <div class="page-header">
          <h2>Site Settings</h2>
          <button class="btn btn-primary" onClick=${handleSave} disabled=${saving}>
            ${saving ? html`<span class="spinner" />` : null} ${saving ? 'Saving...' : 'Save & Publish'}
          </button>
        </div>
        <div class="card">
          <h3 style="margin-bottom: 1rem;">Impact Numbers</h3>
          <p class="text-sm text-muted mb-1">These appear on the homepage and throughout the site.</p>
          <div class="form-row" style="grid-template-columns: 1fr 1fr 1fr;">
            <div class="form-group">
              <label class="form-label">Rooms Completed</label>
              <input class="form-input" type="number" value=${data.stats?.roomsCompleted || 0}
                onInput=${e => updateStat('roomsCompleted', e.target.value)} />
            </div>
            <div class="form-group">
              <label class="form-label">Kids Served</label>
              <input class="form-input" type="number" value=${data.stats?.kidsServed || 0}
                onInput=${e => updateStat('kidsServed', e.target.value)} />
            </div>
            <div class="form-group">
              <label class="form-label">Partners</label>
              <input class="form-input" type="number" value=${data.stats?.partners || 0}
                onInput=${e => updateStat('partners', e.target.value)} />
            </div>
          </div>
        </div>
        <div class="card">
          <h3 style="margin-bottom: 1rem;">Contact Info</h3>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Phone</label>
              <input class="form-input" value=${data.phone || ''}
                onInput=${e => updateField('phone', e.target.value)} />
            </div>
            <div class="form-group">
              <label class="form-label">Email</label>
              <input class="form-input" value=${data.email || ''}
                onInput=${e => updateField('email', e.target.value)} />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Street Address</label>
            <input class="form-input" value=${data.address?.street || ''}
              onInput=${e => updateField('address.street', e.target.value)} />
          </div>
          <div class="form-row" style="grid-template-columns: 2fr 1fr 1fr;">
            <div class="form-group">
              <label class="form-label">City</label>
              <input class="form-input" value=${data.address?.city || ''}
                onInput=${e => updateField('address.city', e.target.value)} />
            </div>
            <div class="form-group">
              <label class="form-label">State</label>
              <input class="form-input" value=${data.address?.state || ''}
                onInput=${e => updateField('address.state', e.target.value)} />
            </div>
            <div class="form-group">
              <label class="form-label">ZIP</label>
              <input class="form-input" value=${data.address?.zip || ''}
                onInput=${e => updateField('address.zip', e.target.value)} />
            </div>
          </div>
        </div>
        <div class="card">
          <h3 style="margin-bottom: 1rem;">Social Links</h3>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Facebook</label>
              <input class="form-input" value=${data.social?.facebook || ''}
                onInput=${e => updateField('social.facebook', e.target.value)} />
            </div>
            <div class="form-group">
              <label class="form-label">Instagram</label>
              <input class="form-input" value=${data.social?.instagram || ''}
                onInput=${e => updateField('social.instagram', e.target.value)} />
            </div>
          </div>
        </div>
      `;
    }

    // ═══════════════════════════════════════════
    // MAIN APP
    // ═══════════════════════════════════════════
    function App() {
      const [view, setView] = useState('dashboard');
      const [editSlug, setEditSlug] = useState(null);
      const [toasts, setToasts] = useState([]);
      const [kids, setKids] = useState([]);
      const [partners, setPartners] = useState([]);
      const [team, setTeam] = useState([]);
      const [loading, setLoading] = useState(true);
      const [sidebarOpen, setSidebarOpen] = useState(false);

      const addToast = (msg, type = 'info') => {
        const id = ++toastId;
        setToasts(t => [...t, { id, msg, type }]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 4000);
      };

      // Load all content
      const loadData = async () => {
        setLoading(true);
        try {
          // Load kids (bulk — one API call)
          const kidsRes = await api.bulkListContent('src/content/kids');
          if (kidsRes.success) {
            setKids(kidsRes.items.map(i => i.content).filter(Boolean)
              .sort((a, b) => (b.year || 0) - (a.year || 0)));
          }

          // Load partners (bulk — one API call)
          const partRes = await api.bulkListContent('src/content/partners');
          if (partRes.success) {
            setPartners(partRes.items.map(i => i.content).filter(Boolean)
              .sort((a, b) => a.name.localeCompare(b.name)));
          }

          // Load team (bulk — one API call)
          const teamRes = await api.bulkListContent('src/content/team');
          if (teamRes.success) {
            setTeam(teamRes.items.map(i => i.content).filter(Boolean)
              .sort((a, b) => (a.order || 0) - (b.order || 0)));
          }
        } catch (err) {
          addToast('Failed to load content. Check API settings.', 'error');
        }
        setLoading(false);
      };

      useEffect(() => { loadData(); }, []);

      const navigate = (v, slug = null) => {
        setView(v);
        setEditSlug(slug);
        setSidebarOpen(false);
      };

      // Delete from list view
      const [deleteModal, setDeleteModal] = useState(null);
      const [deleteLoading, setDeleteLoading] = useState(false);

      const handleListDelete = async () => {
        if (!deleteModal) return;
        setDeleteLoading(true);
        const { type, item } = deleteModal;
        const dir = type === 'kid' ? 'kids' : type === 'partner' ? 'partners' : type === 'team member' ? 'team' : 'partners';
        try {
          // Get SHA first
          const fileRes = await api.readContent(`src/content/${dir}/${item.slug}.json`);
          if (!fileRes.success) {
            addToast(`Could not find file for ${item.name}`, 'error');
            setDeleteLoading(false);
            setDeleteModal(null);
            return;
          }
          const res = await api.deleteContent(
            `src/content/${dir}/${item.slug}.json`,
            fileRes.sha,
            `Delete ${type}: ${item.name}`
          );
          if (res.success) {
            addToast(`${item.name} deleted`, 'success');
            loadData();
          } else {
            addToast(`Delete failed: ${res.error}`, 'error');
          }
        } catch (err) {
          addToast(`Delete error: ${err.message}`, 'error');
        }
        setDeleteLoading(false);
        setDeleteModal(null);
      };

      const navItems = [
        { id: 'dashboard', icon: '📊', label: 'Dashboard' },
        { id: 'kids', icon: '👶', label: 'Kids' },
        { id: 'partners', icon: '🤝', label: 'Partners' },
        { id: 'team', icon: '👥', label: 'Team' },
        { id: 'faq', icon: '❓', label: 'FAQs' },
        { id: 'financials', icon: '📄', label: 'Financials' },
        { id: 'settings', icon: '⚙️', label: 'Site Settings' },
      ];

      const renderView = () => {
        if (loading && view === 'dashboard') {
          return html`<div style="text-align: center; padding: 4rem;">
            <div class="spinner" style="width: 40px; height: 40px; border-width: 3px;" />
            <p class="mt-2 text-muted">Loading content from GitHub...</p>
          </div>`;
        }

        switch (view) {
          case 'dashboard':
            return html`<${Dashboard} kids=${kids} partners=${partners} team=${team} />`;
          case 'kids':
            return editSlug !== null
              ? html`<${KidEditor} slug=${editSlug || undefined} onBack=${() => { navigate('kids'); loadData(); }} addToast=${addToast} partners=${partners} />`
              : html`<${KidsList} kids=${kids} onEdit=${s => navigate('kids', s)} onAdd=${() => navigate('kids', '')}
                  onDelete=${k => setDeleteModal({ type: 'kid', item: k })} />`;
          case 'partners':
            return editSlug !== null
              ? html`<${PartnerEditor} slug=${editSlug || undefined} onBack=${() => { navigate('partners'); loadData(); }} addToast=${addToast} />`
              : html`<${PartnersList} partners=${partners} onEdit=${s => navigate('partners', s)} onAdd=${() => navigate('partners', '')}
                  onDelete=${p => setDeleteModal({ type: 'partner', item: p })} />`;
          case 'team':
            return editSlug !== null
              ? html`<${TeamEditor} slug=${editSlug || undefined} onBack=${() => { navigate('team'); loadData(); }} addToast=${addToast} />`
              : html`<${TeamList} team=${team} onEdit=${s => navigate('team', s)} onAdd=${() => navigate('team', '')}
                  onDelete=${t => setDeleteModal({ type: 'team member', item: t })} />`;
          case 'financials':
            return html`<${Financials} addToast=${addToast} />`;
          case 'faq':
            return html`<${FAQManager} addToast=${addToast} />`;
          case 'settings':
            return html`<${SiteSettings} addToast=${addToast} />`;
        }
      };

      return html`
        <div class="app">
          ${deleteModal ? html`<${ConfirmModal}
            title="Delete ${deleteModal.item.name}?"
            message="This will permanently remove this ${deleteModal.type} from the site. This cannot be undone."
            danger=${true}
            onConfirm=${handleListDelete}
            onCancel=${() => setDeleteModal(null)}
          />` : null}
          <button class="hamburger" onClick=${() => setSidebarOpen(!sidebarOpen)}>
            ${sidebarOpen ? '✕' : '☰'}
          </button>
          <div class="overlay ${sidebarOpen ? 'open' : ''}" onClick=${() => setSidebarOpen(false)} />

          <nav class="sidebar ${sidebarOpen ? 'open' : ''}">
            <div class="sidebar-logo">
              <img src="/images/logos/sunny-pig-transparent.png" alt="" />
              <div class="logo-label">
                <span class="logo-name">Sunshine on a Ranney Day</span>
                <small>Content Admin</small>
              </div>
            </div>
            <div class="nav-section">Manage</div>
            ${navItems.map(item => html`
              <button key=${item.id}
                class="nav-item ${view === item.id ? 'active' : ''}"
                onClick=${() => navigate(item.id)}>
                <span class="nav-icon">${item.icon}</span>
                ${item.label}
              </button>
            `)}
            <div class="nav-section" style="margin-top: auto;">Links</div>
            <a href="/" class="nav-item" target="_blank">
              <span class="nav-icon">🌐</span> View Site ↗
            </a>
            <a href="https://github.com/pranney82/soard" class="nav-item" target="_blank">
              <span class="nav-icon">📦</span> GitHub ↗
            </a>
          </nav>

          <main class="main">
            ${renderView()}
          </main>

          <${ToastContainer} toasts=${toasts} />
        </div>
      `;
    }

    // ─── Mount ──────────────────────────────
    render(html`<${App} />`, document.getElementById('app'));
  </script>
</body>
</html>
